      // dev server's git push is the truth there.)
      const branch = local ? 'main' : await draftForUpload();
      // Overwrite needs the blob's sha; a fresh path has none.
      let sha;
      try { sha = (await gh(`contents/${path}?ref=${encodeURIComponent(branch)}`)).sha; }
      catch (e) { sha = undefined; }
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message: `primer: add image ${name}`,
          content: b64, branch, ...(sha ? { sha } : {}),
        }),
      });
      localImages.set('assets/' + name, dataUrl);
      $('stat').textContent = shrunk
        ? `${name} uploaded — shrunk from ${beforeKB.toFixed(0)}KB to ${afterKB.toFixed(0)}KB`
        : `${name} uploaded`;
      onDone('assets/' + name, name);
    } catch (e) {
      $('stat').textContent = 'upload failed: ' + e.message;
    }
  });
  inp.click();
}

/** Show just-uploaded images before they are deployed: the page resolves
 *  assets/… against the live site, where a new file does not exist yet. */
function showLocalImages(d) {
  if (!localImages.size) return;
  d.querySelectorAll('img[src^="assets/"]').forEach(img => {
    const local = localImages.get(img.getAttribute('src'));
    if (local) img.src = local;
  });
}

// ------------------------------------------------------------------ fills
// Recolouring goes through the renderer, always. is_light_bg() decides white vs
// charcoal text from a tile's luminance AT BUILD TIME, and the footnote pills
// ride the same class — so painting a new colour onto the DOM would leave the
// old contrast decision in place. That is not "slightly off": it is white text
// on a pale tile. So: write the fill, re-render, let Python decide again.
//
// What CAN be recoloured is not this file's opinion. The renderer stamps
// data-fill on exactly the surfaces whose colour it consults — cards, branch
// tiles, callouts, pages, Table 1's rows — so a new report teaches the editor
// by marking its page, not by editing it. Shapes and text boxes carry their
// colour in their own objects, so they route there instead of layout.fill.
/** A designed element whose artwork is a local SVG (the logos): the renderer
 *  can inline and repaint it, so it is a real colour target — unlike a JPEG,
 *  where a "fill" could only ever paint a box behind the pixels. */
function svgMarkEl(id) {
  const d = $('out').contentDocument;
  const el = d && d.querySelector(`[data-el="${CSS.escape(id)}"]`);
  if (!el) return null;
  return el.querySelector('img[src$=".svg"], svg.logo-img') ? el : null;
}

function fillTargets(id) {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return {
    label: sh.kind === 'line' ? 'Line colour' : 'Fill',
    get: () => (sh.kind === 'line' ? sh.stroke : sh.fill),
    set: c => { if (sh.kind === 'line') sh.stroke = c || '#52796F';
                else sh.fill = c || '#6B9E78'; },
    resettable: false,             // a shape's colour is intrinsic — no "default"
  };
  const b = boxOf(id);
  if (b) return {
    label: 'Background',
    get: () => b.fill,
    set: c => { if (c) b.fill = c; else delete b.fill; },
    resettable: !!b.fill,
    resetLabel: 'No background',
  };
  const mark = svgMarkEl(id);
  return {
    label: mark ? 'Colour' : id.startsWith('page.') ? 'Page colour' : 'Fill',
    get: () => layout.fill && layout.fill[id],
    set: c => { layout.fill = layout.fill || {};
                if (c) layout.fill[id] = c; else delete layout.fill[id]; },
    resettable: !!(layout.fill && layout.fill[id]),
    resetLabel: mark ? 'Original artwork' : 'Reset colour',
  };
}

// The screen already holds colours worth reusing — every fill, stroke, box and
// text colour in layout.json. Offering them saves eyedropping your own work.
function colorsInUse() {
  const set = new Set();
  const add = c => {
    if (typeof c === 'string' && /^#[0-9a-f]{3,8}$/i.test(c)) set.add(c.toUpperCase());
    else if (c && typeof c === 'object' && Array.isArray(c.stops)) c.stops.forEach(s => add(s.color));
  };
  Object.values(layout.fill || {}).forEach(add);
  (layout.shapes || []).forEach(s => { add(s.fill); add(s.stroke); });
  (layout.boxes || []).forEach(b => add(b.fill));
  Object.values(layout.text || {}).forEach(t => { add(t.color); if (t.effect) { add(t.effect.color); add(t.effect.shadow); } });
  return [...set].slice(0, 12);
}

const hasEyeDropper = () => typeof window.EyeDropper === 'function';
async function eyedrop(onPick) {
  if (!hasEyeDropper()) { $('stat').textContent = 'the eyedropper needs a Chromium browser'; return; }
  try { const r = await new window.EyeDropper().open(); onPick(r.sRGBHex); }
  catch (e) { /* the user pressed Esc */ }
}

/** An eyedropper button and the current in-use colours, shared by every colour
 *  surface. `onPick(hex)` applies a chosen colour. */
function colorExtras(d, host, current, onPick) {
  const inUse = colorsInUse().filter(c => c.slice(0, 7) !== (current || '').slice(0, 7));
  if (hasEyeDropper() || inUse.length) {
    const row = d.createElement('div');
    row.className = 'ds-swatches';
    if (hasEyeDropper()) {
      const eye = d.createElement('button');
      eye.className = 'ds-sw ds-sw-eye';
      eye.title = 'Pick a colour from anywhere on screen';
      eye.textContent = '⦿';
      eye.addEventListener('click', () => eyedrop(onPick));
      row.appendChild(eye);
    }
    inUse.forEach(c => {
      const b = d.createElement('button');
      b.className = 'ds-sw';
      b.style.background = c;
      b.title = c + ' — in use';
      b.addEventListener('click', () => onPick(c));
      row.appendChild(b);
    });
    host.appendChild(row);
  }
}

// A fill value -> a CSS background, for the gradient editor's PREVIEW bar only.
// The report itself is painted by Python's fill_css at render time; this mirror
// exists so a slider drag updates the swatch without a full re-render, and it
// matches that one on purpose.
function cssFill(v) {
  if (!v || typeof v === 'string') return v || 'transparent';
  const stops = v.stops.map(s => `${s.color} ${(+s.at * 100).toFixed(1)}%`).join(', ');
  return v.type === 'radial'
    ? `radial-gradient(circle, ${stops})`
    : `linear-gradient(${v.angle ?? 0}deg, ${stops})`;
}

// The colour surface in the right-click menu. A fill is a solid hex OR a
// gradient; a Solid / Linear / Radial switch chooses. Solid is the original
// one-click flow. A gradient is edited in place against a live preview and only
// committed (one render) on Apply — the menu lives in the iframe, so rendering
// mid-edit would destroy it. A line paints its stroke, which stays a solid hex,
// so it never offers the gradient modes.
function fillRow(d, m, id) {
  const t = fillTargets(id);
  const sh = layout.shapes.find(s => s.id === id);
  const isLine = sh && sh.kind === 'line';
  let val = t.get();
  let mode = (val && typeof val === 'object') ? val.type : 'solid';

  const head = d.createElement('div');
  head.className = 'ds-menu-head';
  head.textContent = t.label.toLowerCase();
  m.appendChild(head);
  const modesWrap = d.createElement('div');
  const body = d.createElement('div');
  m.appendChild(modesWrap);
  m.appendChild(body);

  const commit = async v => { pushHistory(); t.set(v); markDirty(); closeMenu(d); await render(); };

  function toGrad(type) {
    if (val && typeof val === 'object') return { ...val, type };
    const seed = (typeof val === 'string' && val) ? val.slice(0, 7) : '#E8EDE6';
    return { type, angle: 90, stops: [{ color: seed, at: 0 }, { color: '#FFFFFF', at: 1 }] };
  }
  function setMode(mk) {
    if (mk === mode) return;
    if (mk === 'solid') {                       // take the first stop, commit
      const c = (val && typeof val === 'object') ? val.stops[0].color
              : (typeof val === 'string' && val) ? val : '#6B9E78';
      return commit(c);
    }
    val = toGrad(mk); mode = mk; redraw();
  }
  function drawModes() {
    modesWrap.innerHTML = '';
    if (isLine) return;
    modesWrap.className = 'ds-fillmodes';
    [['solid', 'Solid'], ['linear', 'Linear'], ['radial', 'Radial']].forEach(([mk, lbl]) => {
      const b = d.createElement('button');
      b.textContent = lbl;
      b.className = 'ds-modebtn' + (mk === mode ? ' on' : '');
      b.addEventListener('click', () => setMode(mk));
      modesWrap.appendChild(b);
    });
  }
  function redraw() { drawModes(); body.innerHTML = ''; mode === 'solid' ? solidBody() : gradBody(); }

  function solidBody() {
    const current = (typeof val === 'string' ? val : '').toUpperCase();
    const rgb6 = current.slice(0, 7);
    // Opacity rides the 8th/9th hex digits — is_light_bg composites it over
    // white, so a translucent tile still gets a readable text colour.
    let alpha = current.length >= 9 ? parseInt(current.slice(7, 9), 16) / 255 : 1;
    const alphaHex = () => alpha >= 0.999 ? '' :
      Math.round(alpha * 255).toString(16).padStart(2, '0').toUpperCase();
    const row = d.createElement('div');
    row.className = 'ds-swatches';
    (M.palette || []).forEach(c => {
      const b = d.createElement('button');
      b.className = 'ds-sw' + (c.toUpperCase() === rgb6 ? ' on' : '');
      b.style.background = c; b.title = c;
      b.addEventListener('click', () => commit(c));
      row.appendChild(b);
    });
    const custom = d.createElement('input');
    custom.type = 'color'; custom.className = 'ds-sw-custom'; custom.title = 'Custom colour';
    custom.value = /^#[0-9A-F]{6}/.test(current) ? rgb6 : '#6b9e78';
    custom.addEventListener('change', () => commit(custom.value + alphaHex()));
    row.appendChild(custom);
    body.appendChild(row);
    colorExtras(d, body, current, c => commit(c + alphaHex()));
    const arow = d.createElement('label');
    arow.className = 'ds-menu-slider'; arow.textContent = 'opacity';
    const ain = d.createElement('input');
    ain.type = 'range'; ain.min = '0.1'; ain.max = '1'; ain.step = '0.05'; ain.value = alpha;
    ain.addEventListener('change', () => { alpha = +ain.value; if (rgb6.length === 7) commit(rgb6 + alphaHex()); });
    arow.appendChild(ain);
    if (rgb6.length === 7) body.appendChild(arow);
    if (t.resettable) {
      const b = d.createElement('button');
      b.textContent = t.resetLabel;
      b.addEventListener('click', () => commit(null));
      body.appendChild(b);
    }
  }

  function gradBody() {
    const g = val;                              // edited in place; Apply commits it
    const prev = d.createElement('div');
    prev.className = 'ds-gradprev';
    const paintPrev = () => { prev.style.background = cssFill(g); };
    body.appendChild(prev); paintPrev();
    const stopsWrap = d.createElement('div');
    body.appendChild(stopsWrap);
    const drawStops = () => {
      stopsWrap.innerHTML = '';
      g.stops.forEach((s, i) => {
        const rw = d.createElement('div'); rw.className = 'ds-stoprow';
        const col = d.createElement('input');
        col.type = 'color'; col.value = (s.color || '#000000').slice(0, 7); col.title = 'stop colour';
        col.addEventListener('input', () => { s.color = col.value.toUpperCase(); paintPrev(); });
        const pos = d.createElement('input');
        pos.type = 'range'; pos.min = '0'; pos.max = '1'; pos.step = '0.01'; pos.value = s.at; pos.title = 'position';
        pos.addEventListener('input', () => { s.at = +pos.value; paintPrev(); });
        const del = d.createElement('button');
        del.textContent = '×'; del.title = 'remove stop'; del.disabled = g.stops.length <= 2;
        del.addEventListener('click', () => { g.stops.splice(i, 1); drawStops(); paintPrev(); });
        rw.append(col, pos, del);
        stopsWrap.appendChild(rw);
      });
    };
    drawStops();
    const add = d.createElement('button');
    add.textContent = '+ add stop';
    add.addEventListener('click', () => { g.stops.push({ color: '#FFFFFF', at: 1 }); drawStops(); paintPrev(); });
    body.appendChild(add);
    if (mode === 'linear') {
      const arow = d.createElement('label');
      arow.className = 'ds-menu-slider'; arow.textContent = 'angle';
      const ain = d.createElement('input');
      ain.type = 'range'; ain.min = '0'; ain.max = '360'; ain.step = '5'; ain.value = g.angle ?? 90;
      ain.addEventListener('input', () => { g.angle = +ain.value; paintPrev(); });
      arow.appendChild(ain); body.appendChild(arow);
    }
    const apply = d.createElement('button');
    apply.className = 'ds-apply'; apply.textContent = 'Apply gradient';
    apply.addEventListener('click', () => { g.stops.sort((a, b) => a.at - b.at); commit(g); });
    body.appendChild(apply);
    if (t.resettable) {
      const rb = d.createElement('button');
      rb.textContent = t.resetLabel;
      rb.addEventListener('click', () => commit(null));
      body.appendChild(rb);
    }
  }

  redraw();
}

// ------------------------------------------------------------------ layers
// z is a plain integer: below zero sits under the text, above it over the top.
// Right-click is where "which thing is on top" has lived for thirty years, so
// it lives there here too.
const zOf = id => {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return typeof sh.z === 'number' ? sh.z : (sh.z === 'front' ? 2 : -1);
  const b = boxOf(id);
  if (b) return b.z ?? 2;
  return layout.positions[id]?.z ?? 1;
};
const setZ = (id, z) => {
  const sh = layout.shapes.find(s => s.id === id);
  const b = boxOf(id);
  if (sh) sh.z = z;
  else if (b) b.z = z;
  else if (layout.positions[id]) layout.positions[id].z = z;
  else return false;
  return true;
};
function closeMenu(d) {
  d.querySelectorAll('.ds-menu').forEach(m => m.remove());
}

function layerMenu(d, el, e) {
  closeMenu(d);
  const id = el.dataset.shape || el.dataset.el || el.dataset.fill;
  // A page or a table row is a SURFACE: it can change colour but it is not a
  // thing that moves, so it gets the fill section and nothing else.
  const surface = !el.dataset.shape && !el.dataset.el;
  // Only a moved element has a layer to change: an untouched one is still
  // wherever the design put it, and z-index would not apply to it anyway.
  const known = layout.shapes.some(s => s.id === id) || !!layout.positions[id] || !!boxOf(id);
  const m = d.createElement('div');
  m.className = 'ds-menu';
  m.style.left = (e.clientX + d.defaultView.scrollX) + 'px';
  m.style.top = (e.clientY + d.defaultView.scrollY) + 'px';

  const item = (label, fn, on = true) => {
    const b = d.createElement('button');
    b.textContent = label;
    b.disabled = !on;
    b.addEventListener('click', async () => { closeMenu(d); await fn(); });
    m.appendChild(b);
  };
  // A locked element offers only its release — no fill, no layer, nothing. That
  // is the whole point of locking it, so this comes before everything else.
  if (!surface && isLocked(id)) {
    const head = d.createElement('div');
    head.className = 'ds-menu-head';
    head.textContent = `${id} · locked`;
    m.appendChild(head);
    item('Unlock', () => {
      pushHistory();
      layout.locked = lockedList().filter(x => x !== id);
      if (!layout.locked.length) delete layout.locked;
      markDirty(); paintSel(d);
    });
    d.body.appendChild(m);
    return;
  }

  const canFill = !!(el.dataset.fill || el.dataset.shape || boxOf(id) || svgMarkEl(id));
  if (canFill) {
    fillRow(d, m, id);
    if (!surface) {
      const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    }
  }
  // Group / ungroup, when the right-click is part of a real multi-selection or
  // lands on a grouped element. Right-clicking an unselected thing acts on it
  // alone, so the group offer follows the current selection.
  if (!surface) {
    const inGroup = !!groupOf(id);
    if (inGroup || (selIds.has(id) && selIds.size > 1)) {
      if (inGroup) item('Ungroup', () => ungroupSel(d));
      else item('Group', () => groupSel(d));
      const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    }
  }
  // Copy / paste (objects) and the format painter (copy / paste style). Acting
  // through the menu selects the clicked element first, so it operates on what
  // was right-clicked rather than a stale selection.
  if (!surface) {
    const clonable = layout.shapes.some(s => s.id === id) || !!boxOf(id);
    item('Copy', () => { if (!selIds.has(id)) setSel(d, [id]); copySel(d); }, clonable);
    if (clip) item('Paste', () => pasteClip(d));
    item('Copy style', () => { setSel(d, [id]); copyStyle(d); }, !!styleType(d, id));
    if (styleClip) item('Paste style',
      () => { if (!selIds.has(id)) setSel(d, [id]); pasteStyle(d); },
      styleType(d, id) === styleClip.type);
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
  }
  if (!surface) {
    const head = d.createElement('div');
    head.className = 'ds-menu-head';
    head.textContent = `${id} · layer ${zOf(id)}`;
    m.appendChild(head);

    // Layering an untouched designed element pins it into positions{} first —
    // z-index means nothing to a thing still in the flow, and "send this
    // behind" IS a placement decision. Front/back scan THIS page's stack;
    // another page's z ceiling is not this page's business.
    const pg2 = el.closest('section.page') || d.querySelector('section.page');
    const zSet = async z => {
      pushHistory();
      if (!known) ensureStore(d, el);
      setZ(id, z);
      markDirty();
      await render();
    };
    const zsPage = () => [...pg2.querySelectorAll('[data-el], [data-shape]')]
      .map(x => zOf(idOf(x)));
    item('Bring to front', () => zSet(Math.max(...zsPage(), 0) + 1));
    item('Forward',        () => zSet(zOf(id) + 1));
    item('Backward',       () => zSet(zOf(id) - 1));
    item('Send to back',   () => zSet(Math.min(...zsPage(), 0) - 1));
    item(isLocked(id) ? 'Unlock' : 'Lock', () => {
      pushHistory();
      layout.locked = isLocked(id) ? lockedList().filter(x => x !== id)
                                   : [...lockedList(), id];
      if (!layout.locked.length) delete layout.locked;
      markDirty();
      paintSel(d);
    });
    // Opacity, live while sliding, committed through the renderer on release.
    const orow = d.createElement('label');
    orow.className = 'ds-menu-slider';
    orow.textContent = 'opacity';
    const oin = d.createElement('input');
    oin.type = 'range'; oin.min = '0.1'; oin.max = '1'; oin.step = '0.05';
    oin.value = (storeOf(id) || {}).alpha ?? 1;
    oin.addEventListener('pointerdown', () => pushHistory());
    oin.addEventListener('input', () => {
      const st = ensureStore(d, el);
      const v = +oin.value;
      if (v >= 0.999) delete st.alpha; else st.alpha = v;
      if (el.dataset.shape) {
        v >= 0.999 ? el.removeAttribute('opacity') : el.setAttribute('opacity', v);
      } else {
        el.style.opacity = v >= 0.999 ? '' : v;
      }
    });
    oin.addEventListener('change', async () => {
      markDirty(); closeMenu(d); await render();
    });
    orow.appendChild(oin);
    m.appendChild(orow);
  }
  // One slider recipe for every styled number: history on grab, live paint
  // while sliding, the renderer's word on release.
  const slider = (label, min, max, step, val, live) => {
    const w = d.createElement('label');
    w.className = 'ds-menu-slider';
    w.textContent = label;
    const r = d.createElement('input');
    r.type = 'range'; r.min = min; r.max = max; r.step = step; r.value = val;
    r.addEventListener('pointerdown', () => pushHistory());
    r.addEventListener('input', () => live(+r.value));
    r.addEventListener('change', async () => { markDirty(); closeMenu(d); await render(); });
    w.appendChild(r);
    m.appendChild(w);
  };
  const menuHead = t => {
    const h2 = d.createElement('div');
    h2.className = 'ds-menu-head';
    h2.textContent = t;
    m.appendChild(h2);
  };

  // Shadows belong to the things that own their whole silhouette — shapes and
  // text boxes. A designed card's edge is the design's business.
  const shOwner = layout.shapes.find(s => s.id === id) || boxOf(id);
  if (shOwner) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    if (!shOwner.shadow) {
      item('Add shadow', async () => {
        pushHistory();
        shOwner.shadow = { offset: 0.05, direction: 135, blur: 0.08, alpha: 0.35 };
        markDirty(); await render();
      });
    } else {
      menuHead('shadow');
      const sdef = { offset: 0.05, blur: 0.08, alpha: 0.35, direction: 135 };
      const sh = (key, v) => { shOwner.shadow[key] = v; paintShadow(d, el); };
      slider('offset', 0, 0.3, 0.01, shOwner.shadow.offset ?? sdef.offset, v => sh('offset', v));
      slider('angle', 0, 360, 15, shOwner.shadow.direction ?? sdef.direction, v => sh('direction', v));
      slider('blur', 0, 0.3, 0.01, shOwner.shadow.blur ?? sdef.blur, v => sh('blur', v));
      slider('depth', 0, 1, 0.05, shOwner.shadow.alpha ?? sdef.alpha, v => sh('alpha', v));
      item('Remove shadow', async () => {
        pushHistory();
        delete shOwner.shadow;
        markDirty(); await render();
      });
    }
  }

  // Shape styling: corners, border, dash, arrowheads — the schema the
  // renderer already honours, finally reachable without hand-editing JSON.
  const shp = layout.shapes.find(s => s.id === id);
  if (shp) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    menuHead(shp.kind === 'line' ? 'line style' : 'border');
    const node = () => d.querySelector(`[data-shape="${CSS.escape(id)}"]`);
    if (shp.kind === 'rect') {
      slider('corners', 0, 0.4, 0.01, shp.r || 0, v => {
        if (v) shp.r = v; else delete shp.r;
        node().setAttribute('rx', v || 0);
      });
    }
    slider('weight', 0, 0.08, 0.005, shp.sw ?? 0.02, v => {
      shp.sw = v;
      node().setAttribute('stroke-width', v);
    });
    if (shp.kind !== 'line') {
      // Border colour: the palette again, plus none — writing stroke, not fill.
      const row = d.createElement('div');
      row.className = 'ds-swatches';
      const strokePaint = async c => {
        pushHistory();
        shp.stroke = c;
        if (c !== 'none' && (shp.sw ?? 0) < 0.005) shp.sw = 0.02;
        markDirty(); closeMenu(d); await render();
      };
      const none = d.createElement('button');
      none.className = 'ds-sw';
      none.style.cssText = 'background:#fff url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 10 10%27%3E%3Cpath d=%27M1 9L9 1%27 stroke=%27%23C0392B%27/%3E%3C/svg%3E")';
      none.title = 'No border';
      none.addEventListener('click', () => strokePaint('none'));
      row.appendChild(none);
      (M.palette || []).forEach(c => {
        const b = d.createElement('button');
        b.className = 'ds-sw' + (c.toUpperCase() === (shp.stroke || '').toUpperCase() ? ' on' : '');
        b.style.background = c;
        b.title = c;
        b.addEventListener('click', () => strokePaint(c));
        row.appendChild(b);
      });
      m.appendChild(row);
    }
    const presets = { solid: null, dashed: [0.08, 0.05], dotted: [0.02, 0.04] };
    const cur = !shp.dash ? 'solid' : (shp.dash[0] <= 0.03 ? 'dotted' : 'dashed');
    Object.keys(presets).forEach(k => {
      if (k === cur) return;
      item(k[0].toUpperCase() + k.slice(1) + (shp.kind === 'line' ? ' line' : ' border'),
        async () => {
          pushHistory();
          if (presets[k]) shp.dash = presets[k]; else delete shp.dash;
          markDirty(); await render();
        });
    });
    if (shp.kind === 'line') {
      const ends = ['none', 'end', 'both'];
      const curE = shp.ends || 'none';
      ends.filter(e2 => e2 !== curE).forEach(e2 => {
        item({ none: 'Plain ends', end: 'Arrowhead', both: 'Arrows both ways' }[e2],
          async () => {
            pushHistory();
            if (e2 === 'none') delete shp.ends; else shp.ends = e2;
            markDirty(); await render();
          });
      });
    }
  }
  // Images: flip, tone, replace, crop. The wrapper of a cropped image counts.
  if (el.tagName === 'IMG' || el.classList.contains('ds-cropw')) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    menuHead('image');
    const ig = () => {
      layout.img = layout.img || {};
      return (layout.img[id] = layout.img[id] || {});
    };
    const igNow = (layout.img || {})[id] || {};
    const flipItem = axis => {
      const cur = (storeOf(id) || {}).flip || '';
      const on = cur.includes(axis);
      item((on ? 'Unflip ' : 'Flip ') + (axis === 'h' ? 'horizontal' : 'vertical'),
        async () => {
          pushHistory();
          const st = ensureStore(d, el);
          const next = on ? cur.replace(axis, '')
                          : (cur + axis).split('').sort().join('');
          if (next) st.flip = next; else delete st.flip;
          markDirty(); await render();
        });
    };
    flipItem('h');
    flipItem('v');
    slider('corners', 0, 0.4, 0.01, igNow.radius || 0, v => {
      const g = ig();
      if (v) g.radius = v; else delete g.radius;
      el.style.borderRadius = v ? v + 'in' : '';
    });
    // Live tone preview is plain JS on purpose-matched values — the renderer's
    // img_css emits the same brightness()/contrast()/saturate()/grayscale().
    const fdef = { bright: 1, contrast: 1, sat: 1, gray: 0 };
    const paintF = () => {
      const f = (ig().filter) || {};
      el.style.filter = [
        f.bright != null ? `brightness(${f.bright})` : '',
        f.contrast != null ? `contrast(${f.contrast})` : '',
        f.sat != null ? `saturate(${f.sat})` : '',
        f.gray ? `grayscale(${f.gray})` : '',
      ].filter(Boolean).join(' ');
    };
    const setF = (k, v) => {
      const g = ig();
      g.filter = g.filter || {};
      if (Math.abs(v - fdef[k]) < 0.001) delete g.filter[k]; else g.filter[k] = v;
      if (!Object.keys(g.filter).length) delete g.filter;
      paintF();
    };
    slider('brightness', 0.3, 1.7, 0.05, igNow.filter?.bright ?? 1, v => setF('bright', v));
    slider('contrast', 0.3, 1.7, 0.05, igNow.filter?.contrast ?? 1, v => setF('contrast', v));
    slider('colour', 0, 2, 0.05, igNow.filter?.sat ?? 1, v => setF('sat', v));
    slider('mono', 0, 1, 0.05, igNow.filter?.gray ?? 0, v => setF('gray', v));
    item('Replace image…', () => {
      closeMenu(d);
      uploadImageFile(d, async path => {
        pushHistory();
        ig().src = path;
        markDirty(); await render();
      });
    });
    item('Crop… (or double-click)', () => { closeMenu(d); cropMode(d, el); });
    if (igNow.crop) {
      item('Reset crop', async () => {
        pushHistory();
        delete ig().crop;
        markDirty(); await render();
      });
    }
    if (Object.keys(igNow).length) {
      item('Reset image styling', async () => {
        pushHistory();
        delete layout.img[id];
        if (!Object.keys(layout.img).length) delete layout.img;
        markDirty(); await render();
      });
    }
  }
  if (layout.shapes.some(s => s.id === id)) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Delete shape', async () => {
      layout.shapes = layout.shapes.filter(s => s.id !== id);
      markDirty(); await render();
    });
  }
  if (boxOf(id)) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Delete text box', async () => {
      pushHistory();
      layout.boxes = boxes().filter(b => b.id !== id.replace(/^text\./, ''));
      markDirty(); await render();
    });
  }
  if (layout.positions[id]) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Reset to its designed place', async () => {
      delete layout.positions[id];
      markDirty(); await render();
    });
  }
  d.body.appendChild(m);
}

function contextify(d) {
  // data-fill alone (a page, a table row) opens the colour menu too — the
  // querySelectorAll list is deduplicated, so a card matching twice binds once.
  d.querySelectorAll('[data-el], [data-shape], [data-fill]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      // A right-click that reached the page SECTION may really mean a placed
      // element the DOM hid from it (see hitPlaced) — that element's menu, not
      // the page's. Table rows keep their own: a box UNDER a table is unseen.
      let target = el;
      if (el.tagName === 'SECTION') {
        const hit = hitPlaced(d, el, e);
        if (hit) target = hit;
      }
      layerMenu(d, target, e);
    });
  });
  d.addEventListener('mousedown', e => {
    if (!e.target.closest || !e.target.closest('.ds-menu')) closeMenu(d);
  });
}

// ---------------------------------------------------------------- resizing
// Width is always safe: text reflows, images scale. Height is not — pin a text
// box's height and it either clips the words or leaves a hole the moment the
// prose changes, and .page is overflow:hidden so the clipping is silent. So
// prose gets a width handle only; things whose size IS their content (images,
// shapes) get corners too.
const MIN_IN = 0.4;

function handlesFor(el) {
  // Shapes and text boxes resize from every edge and corner. Graphics scale
  // uniformly, so their handles are the four corners (each drives the one
  // scale factor). A designed prose slot reflows on width alone — no height to
  // drag — so it gets both horizontal edges, east and west.
  // An icon is a drawn glyph, not a box: stretching one only distorts it, so
  // it takes the four corners like any other graphic and scales as a whole.
  if (el.dataset.shape) {
    const sh = (layout.shapes || []).find(s => s.id === el.dataset.shape);
    if (sh && sh.kind === 'icon') return ['ne', 'nw', 'se', 'sw'];
    return ['n', 's', 'e', 'w', 'ne', 'nw', 'se', 'sw'];
  }
  if (el.classList.contains('ds-textbox')) return ['n', 's', 'e', 'w', 'ne', 'nw', 'se', 'sw'];
  if (isGraphic(el)) return ['ne', 'nw', 'se', 'sw'];
  // A table is width-driven — its rows set the height — so it takes the two
  // horizontal edges, like a designed prose slot.
  return ['e', 'w'];
}

function showHandles(d, page, el) {
  hideHandles(d);
  const b = inchBox(el, page);
  const ov = d.createElement('div');
  ov.className = 'ds-handles';
  ov.style.cssText = `left:${b.x}in;top:${b.y}in;width:${b.w}in;height:${b.h}in`;
  const dirs = handlesFor(el);
  // Canva's own trick: a corner does double duty. A ring OUTSIDE each corner's
  // resize square rotates; the square itself still resizes. The ring is
  // painted (and appended) BEFORE its resize square, so the square — same
  // stacking context, later in the DOM — wins the pixels they share, and only
  // the surrounding ring answers to a rotate drag.
  const corners = dirs.filter(dir => dir.length === 2);
  corners.forEach(dir => {
    const rg = d.createElement('div');
    rg.className = 'ds-h ds-rot-corner ds-rot-' + dir;
    rg.title = 'Drag to rotate — snaps to the compass, Shift for free angles';
    rg.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startRotate(d, el, e);
    });
    ov.appendChild(rg);
  });
  dirs.forEach(dir => {
    const h = d.createElement('div');
    h.className = 'ds-h ds-h-' + dir;
    h.title = dir === 'e' ? 'Drag to set width' : 'Drag to resize';
    h.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startResize(d, el, e, dir);
    });
    ov.appendChild(h);
  });
  // Elements with no corner (width-only: a designed prose slot, a table) have
  // nowhere to hang a corner rotate ring — keep the dangling top handle so
  // they don't lose rotation entirely.
  if (!corners.length) {
    const rg = d.createElement('div');
    rg.className = 'ds-h ds-rot';
    rg.title = 'Drag to rotate — snaps to the compass, Shift for free angles';
    rg.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startRotate(d, el, e);
    });
    ov.appendChild(rg);
  }
  ov.dataset.for = el.dataset.shape || el.dataset.el;
  page.appendChild(ov);
}

const hideHandles = d => d.querySelectorAll('.ds-handles, .ds-mini')
  .forEach(h => h.remove());       // the mini bar rides the handles' lifecycle

function startResize(d, el, e0, dir) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  if (!pr.width) return;
  pushHistory();
  const px = DPI * zoomOf(page);
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const graphic = !shapeId && isGraphic(el);
  // A graphic keeps its position and grows by SCALE; pin it first (rotate and
  // resize alike are placements), then read the scale it starts from.
  if (graphic) ensureStore(d, el);
  const P = placer(d, el, page);          // reuse: a resize is a layout override too
  const b = P.box;                        // b.w/b.h are the CURRENT (scaled) size
  const baseScale = graphic ? ((storeOf(id) || {}).scale || 1) : 1;
  const grab = { x: e0.clientX, y: e0.clientY };
  el.classList.add('ds-lifted');
  d.body.classList.add('ds-resizing');

  const apply = e => {
    const dx = (e.clientX - grab.x) / px, dy = (e.clientY - grab.y) / px;
    if (graphic) {
      // Uniform, aspect-locked: whichever axis travelled further drives the
      // one factor. Each corner grows outward from itself — a NW drag up-left
      // enlarges just like a SE drag down-right.
      const fx = dir.includes('w') ? (b.w - dx) / b.w
               : dir.includes('e') ? (b.w + dx) / b.w : 1;
      const fy = dir.includes('n') ? (b.h - dy) / b.h
               : dir.includes('s') ? (b.h + dy) / b.h : 1;
      const factor = Math.abs(fx - 1) > Math.abs(fy - 1) ? fx : fy;
      const scale = Math.max(0.2, Math.min(5, +(baseScale * factor).toFixed(3)));
      const st = storeOf(id);
      if (Math.abs(scale - 1) < 0.005) delete st.scale; else st.scale = scale;
      paintRot(d, el);
      showHandles(d, page, el);
      $('stat').textContent = `${id} → ${Math.round(scale * 100)}%`;
      return { scale };
    }
    // Any edge, any corner: a west or north handle moves the origin as it
    // resizes, keeping the opposite edge fixed — which is what dragging that
    // side means. Clamped so the minimum wins over the moved edge.
    let x = b.x, y = b.y, w = b.w, h = b.h;
    if (dir.includes('e')) w = b.w + dx;
    if (dir.includes('w')) w = b.w - dx;
    if (dir.includes('s')) h = b.h + dy;
    if (dir.includes('n')) h = b.h - dy;
    w = Math.max(MIN_IN, w);
    h = Math.max(MIN_IN, h);
    if (dir.includes('w')) x = b.x + b.w - w;   // opposite (east) edge stays put
    if (dir.includes('n')) y = b.y + b.h - h;   // opposite (south) edge stays put
    // Never let a resize push content off the page — same rule as the drag.
    if (x < 0) { w += x; x = 0; }
    if (y < 0) { h += y; y = 0; }
    w = Math.min(w, PAGE_W_IN - x);
    h = Math.min(h, PAGE_H_IN - y);
    const vertical = dir.includes('s') || dir.includes('n');
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) {
        sh.x = +x.toFixed(2); sh.y = +y.toFixed(2);
        sh.w = +w.toFixed(2); sh.h = +h.toFixed(2);
        paintShape(d, shapeId);
      }
    } else {
      P.put(x, y, false);                 // pin it in place, holding its flow slot
      el.style.width = w.toFixed(2) + 'in';
      if (vertical) el.style.height = h.toFixed(2) + 'in';
    }
    showHandles(d, page, el);
    $('stat').textContent = `${id} → ${w.toFixed(2)}in wide`
                          + (vertical ? ` × ${h.toFixed(2)}in` : '');
    return { x, y, w, h };
  };

  let size = { x: b.x, y: b.y, w: b.w, h: b.h };
  const move = e => { size = apply(e); };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    el.classList.remove('ds-lifted');
    d.body.classList.remove('ds-resizing');
    if (graphic) {
      markDirty();                        // the scale is already on the store
    } else if (!shapeId) {
      P.commit({ x: size.x, y: size.y });
      // A text box's geometry lives in boxes[], not positions{} — writing to
      // the wrong store used to throw here and the width never persisted.
      const bx2 = boxOf(id), tb2 = tableOf(id);
      if (bx2) {
        bx2.w = +size.w.toFixed(2);
        // A text box grows to at least this height (min-height in the renderer,
        // so words never clip); dragging a vertical edge sets it, and dragging
        // it back to nothing clears it (auto height again).
        if (dir.includes('s') || dir.includes('n')) {
          if (size.h > MIN_IN + 0.01) bx2.h = +size.h.toFixed(2);
          else delete bx2.h;
        }
        markDirty();
      } else if (tb2) {
        tb2.w = +size.w.toFixed(2);       // a table is width-only; rows set height
        markDirty();
      } else {
        const p = layout.positions[id];
        p.w = +size.w.toFixed(2);
        if (dir.includes('s') || dir.includes('n')) p.h = +size.h.toFixed(2);
      }
    } else {
      markDirty();
    }
    paintSel(d);                          // ring + handles + mini follow the new box
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

// ------------------------------------------------------------ rotate & style
/** The store that carries an element's rot/alpha/shadow. Shapes and boxes
 *  have their own objects; a designed element must be pinned into positions{}
 *  first — rotating or fading a thing IS placing it. */
function ensureStore(d, el) {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return sh;
  const b = boxOf(id);
  if (b) return b;
  if (!layout.positions[id]) {
    const page = el.closest('section.page') || d.querySelector('section.page');
    const P = placer(d, el, page);
    P.commit(P.put(P.box.x, P.box.y, false));
  }
  return layout.positions[id];
}
const storeOf = id => layout.shapes.find(s => s.id === id) || boxOf(id)
                    || layout.positions[id];

/** Paint a store's rotation onto the live node — the same declaration the
 *  renderer will emit, so the drag and the committed page cannot disagree. */
function paintRot(d, el) {
  const id = idOf(el);
  const st = storeOf(id) || {};
  if (el.dataset.shape) {
    const s = st;
    if (st.rot) el.setAttribute('transform',
      `rotate(${st.rot} ${+(s.x + s.w / 2).toFixed(4)} ${+(s.y + s.h / 2).toFixed(4)})`);
    else el.removeAttribute('transform');
  } else {
    // Rotation, scale and flip share one declaration in the renderer's order,
    // so the live node and the committed page can never disagree.
    el.style.transform = [
      st.rot ? `rotate(${st.rot}deg)` : '',
      (st.scale && st.scale !== 1) ? `scale(${st.scale})` : '',
      st.flip ? `scale(${st.flip.includes('h') ? -1 : 1},${st.flip.includes('v') ? -1 : 1})` : '',
    ].filter(Boolean).join(' ');
  }
}
// A graphic — an image or a logo lockup with no editable text — resizes by
// SCALING, because its content has a fixed intrinsic size a width alone cannot
// stretch (the logo's image is 95px tall no matter how wide its box). Text
// containers keep width-reflow; shapes keep w/h. This is the one distinction
// the resize needs.
const isGraphic = el => !el.dataset.shape && !el.matches('[data-slot]')
  && !el.querySelector('[data-slot]') && !el.classList.contains('ds-textbox')
  && (el.tagName === 'IMG' || !!el.querySelector('img'));

function startRotate(d, el, e0) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  pushHistory();
  const st = ensureStore(d, el);
  const id = idOf(el);
  const b = inchBox(el, page);           // rotation preserves the centre
  const pr = page.getBoundingClientRect();
  const px = DPI * zoomOf(page);
  const cx = pr.left + (b.x + b.w / 2) * px;
  const cy = pr.top + (b.y + b.h / 2) * px;
  const start = st.rot || 0;
  const a0 = Math.atan2(e0.clientY - cy, e0.clientX - cx);
  hideHandles(d);
  const move = e => {
    let deg = start + (Math.atan2(e.clientY - cy, e.clientX - cx) - a0) * 180 / Math.PI;
    if (!e.shiftKey) {
      const near = Math.round(deg / 45) * 45;   // the compass pulls
      if (Math.abs(deg - near) < 6) deg = near;
    }
    deg = ((Math.round(deg * 10) / 10) % 360 + 360) % 360;
    if (deg > 180) deg -= 360;
    if (deg) st.rot = deg; else delete st.rot;
    paintRot(d, el);
    $('stat').textContent = `${id} → ${deg}°`;
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    markDirty();
    paintSel(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** The CSS a shadow means, asked of the engine — same rule as cssFor: a
 *  JavaScript twin of shadow_css would drift from it silently and forever. */
function shadowCssFor(sh, forShape) {
  py.globals.set('SH_JSON', JSON.stringify(sh || {}));
  return py.runPython(
    'import json\nfrom docsync.layout import shadow_css, shape_shadow_css\n'
    + (forShape ? 'shape_shadow_css' : 'shadow_css') + '(json.loads(SH_JSON))');
}

function paintShadow(d, el) {
  const st = storeOf(idOf(el)) || {};
  if (el.dataset.shape) {
    if (st.shadow) el.setAttribute('style', shadowCssFor(st.shadow, true));
    else el.removeAttribute('style');
  } else {
    el.style.boxShadow = st.shadow ? shadowCssFor(st.shadow, false) : '';
  }
}

// -------------------------------------------------------------------- crop
// The window stays put; the image moves under it. Pan by dragging, zoom by
// scrolling, Enter keeps it, Esc puts everything back. What gets stored is
// absolute inches — how wide the full image is drawn and how far the window
// sits into it — so the renderer never needs to know a file's pixel size.
// Afterwards the normal resize handles size the WINDOW, which is also
// cropping; no special mode needed for that half.
function cropMode(d, el) {
  if (editing) return;
  const id = idOf(el);
  const page = el.closest('section.page') || d.querySelector('section.page');
  pushHistory();
  const b = inchBox(el, page);
  const st = ensureStore(d, el);          // the window must be a fixed frame
  st.w = +b.w.toFixed(2);
  st.h = +b.h.toFixed(2);
  layout.img = layout.img || {};
  const g = (layout.img[id] = layout.img[id] || {});
  const c = g.crop ? { ...g.crop } : { imgW: +b.w.toFixed(2), dx: 0, dy: 0 };
  const srcNode = el.tagName === 'IMG' ? el : el.querySelector('img');

  const ov = d.createElement('div');
  ov.className = 'ds-cropov';
  ov.style.cssText = `left:${b.x}in;top:${b.y}in;width:${b.w}in;height:${b.h}in`;
  const ghost = d.createElement('img');
  ghost.src = srcNode.src;
  ghost.className = 'ds-crop-ghost';
  const frame = d.createElement('div');
  frame.className = 'ds-crop-frame';
  const hint = d.createElement('div');
  hint.className = 'ds-crop-hint';
  hint.textContent = 'drag to pan · scroll to zoom · Enter keeps it · Esc cancels';
  ov.append(ghost, frame, hint);
  page.appendChild(ov);
  hideHandles(d);

  const aspect = () => ghost.naturalWidth
    ? ghost.naturalHeight / ghost.naturalWidth : 0.75;
  const paint = () => {
    // The image may never leave the window uncovered.
    c.imgW = Math.max(c.imgW, b.w, b.h / aspect());
    c.dx = Math.min(Math.max(c.dx, 0), c.imgW - b.w);
    c.dy = Math.min(Math.max(c.dy, 0), c.imgW * aspect() - b.h);
    ghost.style.cssText =
      `position:absolute;left:${-c.dx}in;top:${-c.dy}in;width:${c.imgW}in;max-width:none`;
  };
  ghost.onload = paint;
  paint();

  ov.addEventListener('mousedown', e0 => {
    e0.preventDefault();
    e0.stopPropagation();
    const px = DPI * zoomOf(page);
    const g0 = { x: e0.clientX, y: e0.clientY, dx: c.dx, dy: c.dy };
    const mv = e => {
      c.dx = g0.dx - (e.clientX - g0.x) / px;
      c.dy = g0.dy - (e.clientY - g0.y) / px;
      paint();
    };
    const up2 = () => {
      d.removeEventListener('mousemove', mv);
      d.removeEventListener('mouseup', up2);
    };
    d.addEventListener('mousemove', mv);
    d.addEventListener('mouseup', up2);
  });
  ov.addEventListener('wheel', e => {
    e.preventDefault();
    const k = e.deltaY < 0 ? 1.06 : 1 / 1.06;
    c.imgW *= k;                          // zoom about the window's centre
    c.dx = (c.dx + b.w / 2) * k - b.w / 2;
    c.dy = (c.dy + b.h / 2) * k - b.h / 2;
    paint();
  }, { passive: false });

  const finish = async keep => {
    d.removeEventListener('keydown', keys, true);
    ov.remove();
    if (!keep) { await undo(); return; }
    g.crop = { imgW: +c.imgW.toFixed(2), dx: +c.dx.toFixed(2), dy: +c.dy.toFixed(2) };
    markDirty();
    await render();
    $('stat').textContent = `${id} cropped — the resize handles size the window`;
  };
  const keys = e => {
    if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); finish(true); }
    if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); finish(false); }
  };
  d.addEventListener('keydown', keys, true);
}

// -------------------------------------------------------------------- fit
// @media print pins .page to a FIXED 11in and .page is overflow:hidden, so
// anything below the cut is not "scrolled", it is gone from the PDF — which is
// the real deliverable. On screen .page is min-height, so the page simply grows
// and nothing says the bottom will be lost. The overflow is already on your
// screen; this only labels it.
//
// Measuring this correctly is fiddlier than it looks, and getting it wrong is
// worse than not doing it — a check that cries wolf gets ignored, and then the
// real one is ignored too. Three traps, all of which reported false overflow on
// the untouched report:
//   * scrollHeight counts .page's own 0.9in bottom padding as overflow. It is
//     padding. Six of twelve pages "overflowed" by that alone.
//   * .explore and .obligated are in-flow on screen and display:none in print.
//   * The FY2026 twins of every year-picker figure are display:none.
// So: hide .noprint, ignore anything with no box, and measure the lowest
// RENDERED child against 11in.
const FIT_TOL_IN = 0.02;

function fitCheck(d) {
  const s = d.createElement('style');
  s.textContent = '.noprint{display:none!important}';
  d.head.appendChild(s);
  const bad = [];
  d.querySelectorAll('section.page').forEach((pg, i) => {
    const pr = pg.getBoundingClientRect();
    if (!pr.width) return;
    // A narrow window squeezes .page below its print width (max-width:100%)
    // and everything reflows taller. That layout says nothing about where the
    // 11in cut falls on paper — measuring it would cry wolf on every page, and
    // a check that cries wolf gets ignored. Say nothing rather than guess.
    if (pg.offsetWidth < PAGE_W_IN * DPI * 0.98) return;
    const px = DPI * (pr.width / pg.offsetWidth || 1);
    let low = 0, who = '';
    pg.querySelectorAll('*').forEach(el => {
      const r = el.getBoundingClientRect();
      if (!r.width && !r.height) return;                    // display:none
      const pos = d.defaultView.getComputedStyle(el).position;
      // Absolute children never grow the page; they are checked below, and
      // counting them here would flag every folio (which sits by design in the
      // bottom padding).
      if (pos === 'absolute' || pos === 'fixed') return;
      const b = (r.bottom - pr.top) / px;
      if (b > low) { low = b; who = el.dataset.slot || el.tagName.toLowerCase(); }
    });
    if (low > PAGE_H_IN + FIT_TOL_IN)
      bad.push({ page: i + 1, over: +(low - PAGE_H_IN).toFixed(2), who, kind: 'flow' });
    // Moved boxes and floating text do not grow the page — they are simply cut.
    pg.querySelectorAll('[data-el], [data-box]').forEach(el => {
      const r = el.getBoundingClientRect();
      if (!r.height) return;
      const b = (r.bottom - pr.top) / px;
      if (b > PAGE_H_IN + FIT_TOL_IN)
        bad.push({ page: i + 1, over: +(b - PAGE_H_IN).toFixed(2),
                   who: el.dataset.el || el.dataset.box, kind: 'placed' });
    });
  });
  s.remove();
  return bad;
}

/** Draw the cut, don't just describe it: a red line exactly where the PDF ends
 *  and hatching over what it will lose. Seeing it beats reading about it. */
function paintCut(d, bad) {
  d.querySelectorAll('.ds-cut').forEach(c => c.remove());
  const pages = [...d.querySelectorAll('section.page')];
  new Set(bad.map(b => b.page)).forEach(n => {
    const pg = pages[n - 1];
    if (!pg) return;
    const worst = Math.max(...bad.filter(b => b.page === n).map(b => b.over));
    const cut = d.createElement('div');
    cut.className = 'ds-cut';
    cut.style.cssText = `top:${PAGE_H_IN}in;height:${worst + 0.15}in`;
    cut.dataset.label = `cut off in the PDF — ${worst.toFixed(2)}in`;
    pg.appendChild(cut);
  });
}

function reportFit(d) {
  const bad = fitCheck(d);
  paintCut(d, bad);
  lastFit = bad;
  if (!bad.length) { $('fit').hidden = true; return; }
  const pages = [...new Set(bad.map(b => b.page))];
  $('fit').hidden = false;
  $('fit').textContent = `⚠ ${pages.length} page${pages.length > 1 ? 's' : ''} cut in print: `
                       + pages.join(', ');
  $('fit').title = bad.map(b => `page ${b.page}: ${b.who} is ${b.over}in past the cut`).join('\n');
}

// -------------------------------------------------------------- text boxes
// A slot says what the report always says; a box is a note someone put on one
// page. That is why it lives in layout.json — and the price is real and worth
// stating plainly: it never reaches the bound Google Doc, so an editor working
// there will never see it.
//
// A box carries data-el="text.<id>", so drag, resize, snap, layers, right-click
// and undo all work on it already. Almost none of this is new machinery.
const boxes = () => (layout.boxes = layout.boxes || []);
const boxOf = id => boxes().find(b => b.id === (id || '').replace(/^text\./, ''));
const tables = () => (layout.tables = layout.tables || []);
const tableOf = id => tables().find(t => t.id === (id || '').replace(/^table\./, ''));

/** One popover open at a time, anchored under its button; any click that is
 *  not inside a popover (or on its trigger) closes them. */
function togglePop(pop, anchor) {
  const wasHidden = pop.hidden;
  document.querySelectorAll('.pop').forEach(p => { p.hidden = true; });
  if (!wasHidden) return;
  // Fixed coordinates from the anchor's on-screen rect — the pop lives inside
  // a fixed-height row whose overflow would clip an absolute panel.
  const r = anchor.getBoundingClientRect();
  pop.hidden = false;
  pop.style.top = (r.bottom + 6) + 'px';
  pop.style.left = Math.max(8, Math.min(r.left,
    document.documentElement.clientWidth - pop.offsetWidth - 16)) + 'px';
}
addEventListener('mousedown', e => {
  if (!e.target.closest('.pop') && !e.target.closest('#ty-colorbtn, #ty-spacebtn, #text, #shape, #icon, #layers, #download'))
    document.querySelectorAll('.pop').forEach(p => { p.hidden = true; });
});

// Canva's "Add a text box" panel: a heading, a subheading, or body text. Each
// is a text box with a style preset, so it drags, resizes and recolours like
// any other — and its size/weight can then be tuned in the formatting toolbar.
$('text').onclick = () => togglePop($('textpop'), $('text'));
const TEXT_PRESETS = {
  heading:    { md: 'Heading',     style: { size: 30, weight: 700, leading: 1.05 }, w: 4 },
  subheading: { md: 'Subheading',  style: { size: 19, weight: 600 },               w: 3.5 },
  body:       { md: 'Body text. **Bold**, *italic* and [links](https://example.org) work.',
                style: {},                                                          w: 3 },
};
async function addTextBox(kind) {
  $('textpop').hidden = true;
  const preset = TEXT_PRESETS[kind] || TEXT_PRESETS.body;
  const page = visiblePageId();
  pushHistory();
  const id = freeBoxId();
  const box = { id, page, x: 1, y: 2, w: preset.w, z: 2, md: preset.md };
  if (preset.style && Object.keys(preset.style).length) box.style = { ...preset.style };
  boxes().push(box);
  setSel($('out').contentDocument, ['text.' + id]);
  markDirty();
  await render();
  $('stat').textContent = `text.${id} added to page ${page} — double-click to write, drag to place`;
}
document.querySelectorAll('#textpop .txtpreset').forEach(b =>
  b.addEventListener('click', () => addTextBox(b.dataset.k)));

const freeTableId = () => {
  let n = 1; while (tables().some(t => t.id === 't' + n)) n++;
  return 't' + n;
};

$('table').onclick = async () => {
  const page = visiblePageId();
  pushHistory();
  const id = freeTableId();
  tables().push({ id, page, x: 1, y: 2, w: 3.5, z: 2, header: true,
                  rows: [['Column 1', 'Column 2'], ['', ''], ['', '']] });
  setSel($('out').contentDocument, ['table.' + id]);
  markDirty();
  await render();
  $('stat').textContent = `table.${id} added to page ${page} — double-click a cell to edit, right-click for rows & columns`;
};

/** Table cells edit in place (double-click) and offer a rows/columns menu
 *  (right-click). Both are bound each render, since the DOM is rebuilt. */
function wireCells(d) {
  d.querySelectorAll('table.ds-table[data-el] td[data-cell], table.ds-table[data-el] th[data-cell]')
    .forEach(td => {
      td.addEventListener('dblclick', e => { e.preventDefault(); e.stopPropagation(); editCell(d, td); });
      td.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); tableMenu(d, td, e); });
    });
}

function editCell(d, td) {
  if (editing) return;
  const tableEl = td.closest('[data-el^="table."]');
  const t = tableEl && tableOf(tableEl.dataset.el);
  if (!t) return;
  const [ri, ci] = td.dataset.cell.split(',').map(Number);
  editing = true;
  const raw = (t.rows[ri] && t.rows[ri][ci]) || '';
  const host = d.createElement('span');
  host.contentEditable = 'true';
  host.className = 'ds-cell-edit';
  host.dataset.richMode = 'inline';
  host.style.whiteSpace = 'pre-wrap';   // a cell can carry a Shift+Enter newline
  host.innerHTML = mdToHtml(raw, { inline: true });
  td.textContent = '';
  td.appendChild(host);
  host.focus();
  const r = d.createRange(); r.selectNodeContents(host);
  const s = d.getSelection(); s.removeAllRanges(); s.addRange(r);
  const finish = async keep => {
    if (host.dataset.done) return; host.dataset.done = '1';
    editing = false;
    if (keep) {
      const newVal = htmlToMd(host, { inline: true });
      if (newVal !== ((t.rows[ri] && t.rows[ri][ci]) || '')) {
        pushHistory(); t.rows[ri][ci] = newVal; markDirty();
      }
    }
    await render();
  };
  host.addEventListener('blur', () => { if (!modalOpen) finish(true); });
  host.addEventListener('paste', e => pasteClean(d, host, e, { inline: true }));
  host.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    // Enter commits (a cell is usually one line); Shift+Enter for a real newline.
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finish(true); }
    else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); insertBreak(d, host); }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, host); }
  });
}

/** Rows & columns for the right-clicked cell — insert/delete either side, and
 *  toggle the header band. */
function tableMenu(d, td, e) {
  closeMenu(d);
  const tableEl = td.closest('[data-el^="table."]');
  const t = tableEl && tableOf(tableEl.dataset.el);
  if (!t) return;
  const [ri, ci] = td.dataset.cell.split(',').map(Number);
  const cols = t.rows[0].length;
  const m = d.createElement('div'); m.className = 'ds-menu';
  m.addEventListener('mousedown', ev => ev.preventDefault());
  m.style.left = (e.clientX + d.defaultView.scrollX) + 'px';
  m.style.top = (e.clientY + d.defaultView.scrollY) + 'px';
  const head = d.createElement('div'); head.className = 'ds-menu-head';
  head.textContent = `${tableEl.dataset.el} · row ${ri + 1}, col ${ci + 1}`; m.appendChild(head);
  const item = (label, fn, on = true) => {
    const b = d.createElement('button'); b.textContent = label; b.disabled = !on;
    b.addEventListener('click', async () => { closeMenu(d); pushHistory(); fn(); markDirty(); await render(); });
    m.appendChild(b);
  };
  const sep = () => { const s = d.createElement('div'); s.className = 'ds-menu-sep'; m.appendChild(s); };
  item('Insert row above', () => t.rows.splice(ri, 0, Array(cols).fill('')));
  item('Insert row below', () => t.rows.splice(ri + 1, 0, Array(cols).fill('')));
  item('Delete row', () => t.rows.splice(ri, 1), t.rows.length > 1);
  sep();
  item('Insert column left', () => t.rows.forEach(r => r.splice(ci, 0, '')));
  item('Insert column right', () => t.rows.forEach(r => r.splice(ci + 1, 0, '')));
  item('Delete column', () => t.rows.forEach(r => r.splice(ci, 1)), cols > 1);
  sep();
  item(t.header ? 'Remove header row' : 'Make first row a header', () => { t.header = !t.header; });
  d.body.appendChild(m);
  const r = m.getBoundingClientRect(), vw = d.defaultView.innerWidth, vh = d.defaultView.innerHeight;
  if (r.right > vw) m.style.left = (e.clientX + d.defaultView.scrollX - r.width) + 'px';
  if (r.bottom > vh) m.style.top = (e.clientY + d.defaultView.scrollY - r.height) + 'px';
}

/** Editing a box's words. Its text is in layout.json, not content.md, so it
 *  cannot go through readSlot/writeSlot — but it is the same textarea, the same
 *  markdown, and the same blur-commits rule. */
function editBox(d, el) {
  if (editing) return;
  const b = boxOf(el.dataset.el);
  if (!b) return;
  editing = true;
  pushHistory();
  // The editor opens WHERE THE BOX IS. A bare host is static, and static
  // means it flows to wherever the box's markup happens to sit in the DOM —
  // on the cover that was the top of the page, nowhere near the words being
  // edited. So it rides an absolutely positioned wrapper at the box's own
  // inches, above everything while it is open.
  const wrap = d.createElement('div');
  wrap.style.cssText = `position:absolute;left:${b.x}in;top:${b.y}in;`
    + `width:${Math.max(b.w, 1.8)}in;z-index:20000`;
  const host = d.createElement('div');
  host.contentEditable = 'true';
  host.className = 'ds-edit';
  host.dataset.richMode = 'block';
  host.innerHTML = mdToHtml(b.md, { allowLists: true });
  // Just the words — no toolbar or hint row under them (they added height and
  // shoved the page around; see edit()). Chrome bar has B/I/lists, ⌘K links,
  // right-click cites.
  wrap.append(host);
  el.replaceWith(wrap);
  richHost = host;
  richOpts = { allowLists: true, allowMd: true };
  showType(`text.${b.id}`);   // the chrome row carries B/I/lists now — raise it
  syncMarksBar();
  host.focus();
  const r = d.createRange(); r.selectNodeContents(host);
  const s = d.getSelection(); s.removeAllRanges(); s.addRange(r);
  const finish = async keep => {
    if (host.dataset.done) return;
    host.dataset.done = '1';
    editing = false;
    richHost = null; syncMarksBar();
    if (keep) {
      const newVal = htmlToMd(host, { allowLists: true });
      if (newVal.trim() && newVal !== b.md) { b.md = newVal.trim(); markDirty(); }
    }
    await render();
  };
  host.addEventListener('blur', () => {
    if (modalOpen) return;
    finish(true);
  });
  host.addEventListener('paste', e => pasteClean(d, host, e, { allowLists: true }));
  host.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, host); }
  });
  host.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    endnoteMenu(d, host, e);
  });
}

/** Edit an endnote's citation text/URL right on the Endnotes page. A source
 *  is two fields (text + URL), not one markdown blob, so — like a text box —
 *  it gets its own small form rather than the [data-slot] editor. It reuses
 *  updateSource() (the same function the Sources panel's own text/url fields
 *  call, docsync/editor/edit.html's renderSources()): both write through to
 *  the single [[sources]] block in content.md, and the Endnotes page's <li>
 *  list is rebuilt fresh from it on every render — so there is nothing else
 *  that could hold a second, stale copy for the two to fall out of sync. */
function editEndnote(d, li, sid) {
  if (editing) return;
  const s = parseSources().find(r => r.id === sid);
  if (!s) return;
  editing = true;

  const wrap = d.createElement('div');
  wrap.className = 'ds-endnote-edit';
  const txt = d.createElement('input');
  txt.className = 'ds-en-text';
  txt.value = s.text;
  txt.placeholder = 'citation text';
  const url = d.createElement('input');
  url.className = 'ds-en-url';
  url.value = s.url;
  url.placeholder = 'https://…';
  wrap.append(txt, url);   // two fields, nothing else — no hint row pushing the list
  li.replaceWith(wrap);
  txt.focus();
  txt.select();

  const finish = async keep => {
    if (wrap.dataset.done) return;
    wrap.dataset.done = '1';
    editing = false;
    if (keep) {
      const t = txt.value.trim(), u = url.value.trim();
      if (t && u && (t !== s.text || u !== s.url)) {
        pushHistory();
        updateSource(sid, t, u);
        markDirty();
      }
    }
    await render();
  };
  // Only finish once focus truly leaves BOTH fields, not on the hop between
  // them (matches the [data-slot] editor's toolbar-focus guard, adapted for
  // two inputs instead of one field plus a toolbar).
  const blurCheck = () => setTimeout(() => {
    if (!wrap.contains(d.activeElement)) finish(true);
  }, 0);
  txt.addEventListener('blur', blurCheck);
  url.addEventListener('blur', blurCheck);
  [txt, url].forEach(inp => inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
  }));
}

// ----------------------------------------------------------------- effects
// Which knobs an effect has comes from the engine (EFFECT_PARAMS), not a list
// retyped here: a control that does nothing is worse than a missing one, and a
// second list would drift from the first.
let fxParams = {};

const FX_RANGE = {                       // step, min, max — physical units
  offset:    [0.01, 0, 0.5],             // em, so it scales with the type
  direction: [15, 0, 360],               // degrees, 0 = 12 o'clock, clockwise
  blur:      [0.01, 0, 0.5],
  alpha:     [0.05, 0, 1],               // alpha, not "transparency" — see layout.py
  intensity: [0.1, 0, 3],
  width:     [0.005, 0, 0.2],
};

function fxOf(k) { return styleOf(k).effect || {}; }

function setFx(k, patch) {
  const fx = { ...fxOf(k), ...patch };
  Object.keys(fx).forEach(p => { if (fx[p] === '' || fx[p] === null) delete fx[p]; });
  setStyle(k, { effect: fx.kind ? fx : null });
}

function showFxParams(key) {
  const host = $('ty-fxp');
  host.innerHTML = '';
  const fx = fxOf(key);
  if (!fx.kind) return;
  (fxParams[fx.kind] || []).forEach(name => {
    if (name === 'color' || name === 'shadow') {
      const c = document.createElement('input');
      c.type = 'color'; c.title = name === 'color' ? 'Effect colour' : 'Second colour';
      c.value = /^#[0-9a-f]{6}$/i.test(fx[name] || '') ? fx[name]
              : (name === 'color' ? '#52796f' : '#95b7a2');
      c.addEventListener('input', () => { setFx(key, { [name]: c.value }); paintText(key); });
      c.addEventListener('change', async () => {
        setFx(key, { [name]: c.value }); markDirty(); await render(); showType(key);
      });
      host.appendChild(c);
      return;
    }
    const [step, min, max] = FX_RANGE[name] || [0.01, 0, 1];
    const w = document.createElement('label');
    w.className = 'ty-num';
    w.title = name;
    w.textContent = name.slice(0, 3);
    const n = document.createElement('input');
    n.type = 'number'; n.step = step; n.min = min; n.max = max;
    n.value = fx[name] ?? '';
    n.placeholder = 'auto';
    n.addEventListener('input', () => {
      setFx(key, { [name]: n.value === '' ? null : +n.value }); paintText(key);
    });
    n.addEventListener('change', async () => {
      setFx(key, { [name]: n.value === '' ? null : +n.value });
      markDirty(); await render(); showType(key);
    });
    w.appendChild(n);
    host.appendChild(w);
  });
}

// ------------------------------------------------------------------- type
// A contextual row, Canva's own pattern: it appears when text is selected and
// is otherwise not in the way. It lives OUTSIDE the iframe and is keyed on a
// slot NAME, never a DOM node — so a blur that commits and re-renders cannot
// invalidate it, and its <select>s need none of the mousedown gymnastics the
// in-page strip does.
let selected = null;                   // the slot key the type row is editing
let fonts = {};                        // family -> weights, from the engine

const styleOf = k => (layout.text && layout.text[k]) || {};
const setStyle = (k, patch) => {
  layout.text = layout.text || {};
  const st = { ...styleOf(k), ...patch };
  Object.keys(st).forEach(p => { if (st[p] === '' || st[p] === null) delete st[p]; });
  if (Object.keys(st).length) layout.text[k] = st; else delete layout.text[k];
};

/** The CSS a style means, asked of the engine rather than reimplemented here.
 *  Two implementations of that question would drift apart silently. */
function cssFor(st) {
  py.globals.set('STYLE_JSON', JSON.stringify(st || {}));
  return py.runPython('import json\nfrom docsync.layout import text_css\ntext_css(json.loads(STYLE_JSON))');
}

/** Paint the style straight onto the node while a control is being dragged.
 *  A full re-render is ~1s; a slider is 60fps. Same bargain the drag strikes —
 *  the renderer catches up on release. */
function paintText(key) {
  const d = $('out').contentDocument;
  const css = cssFor(styleOf(key));
  d.querySelectorAll(`[data-slot="${key}"]`).forEach(el => el.style.cssText = css);
}

function fillWeights(fam, want) {
  const sel = $('ty-weight');
  const ws = fonts[fam] || [400];
  sel.innerHTML = '<option value="">weight</option>'
    + ws.map(w => `<option value="${w}">${w}</option>`).join('');
  sel.value = want && ws.includes(+want) ? String(want) : '';
}

/** What the slot's type measures today, from the rendered page — so the size
 *  stepper and the spacing sliders start from reality, not from zero. */
function computedType(key) {
  const el = $('out').contentDocument.querySelector(`[data-slot="${key}"]`);
  if (!el) return { size: 16, leading: 1.45 };
  const cs = el.ownerDocument.defaultView.getComputedStyle(el);
  const size = parseFloat(cs.fontSize) || 16;
  const lh = parseFloat(cs.lineHeight);
  return { size, leading: lh ? +(lh / size).toFixed(2) : 1.45 };
}

function showType(key) {
  selected = key;
  const st = styleOf(key);
  const real = computedType(key);
  $('ty-key').textContent = key;
  $('ty-key').title = key;
  // text-align means nothing to SVG text — a curved label is centred on its
  // path by text-anchor, and display:inline-block is not a thing there either.
  // Hide the control rather than offer one that does nothing.
  const el = $('out').contentDocument.querySelector(`[data-slot="${key}"]`);
  const inSvg = !!(el && el.closest('svg'));
  document.querySelectorAll('.ty-al').forEach(b => b.hidden = inSvg);
  $('ty-font').value = st.font || '';
  fillWeights(st.font, st.weight);
  // The stepper shows the REAL size as a placeholder when none is set: what
  // you would be stepping from, not a blank.
  $('ty-size').value = st.size ?? '';
  $('ty-size').placeholder = real.size % 1 ? real.size.toFixed(1) : real.size;
  $('ty-track').value = st.tracking ?? '';
  $('ty-track-r').value = st.tracking ?? 0;
  $('ty-lead').value = st.leading ?? '';
  $('ty-lead-r').value = st.leading ?? real.leading;
  $('ty-case').value = st.case || 'none';
  $('ty-color').value = /^#[0-9a-f]{6}$/i.test(st.color || '') ? st.color : '#2f3e46';
  const cur = (st.color || '').toUpperCase();
  document.querySelectorAll('#ty-swgrid .sw[data-c]').forEach(s =>
    s.classList.toggle('on', s.dataset.c === cur));
  $('ty-Abar').style.background =
    st.color || 'linear-gradient(90deg,#e66,#6b9e78,#66e)';
  $('ty-fx').value = (st.effect && st.effect.kind) || '';
  showFxParams(key);
  $('ty-i').classList.toggle('on', !!st.italic);
  $('ty-u').classList.toggle('on', !!st.underline);
  document.querySelectorAll('.ty-al').forEach(b =>
    b.classList.toggle('on', b.dataset.a === st.align));
  $('type').hidden = false;
  $('arrange').hidden = true;            // the fixed row holds one toolbar at a time
}

/** input -> paint (fast, local). change -> commit and re-render, because the
 *  cascade and is_light_bg are the renderer's job, not something to fake. */
function wireType() {
  const live = (el, read) => {
    el.addEventListener('input', () => { setStyle(selected, read()); paintText(selected); });
    el.addEventListener('change', async () => {
      setStyle(selected, read()); markDirty(); await render(); showType(selected);
    });
  };
  live($('ty-size'), () => ({ size: $('ty-size').value === '' ? null : +$('ty-size').value }));
  live($('ty-track'), () => ({ tracking: $('ty-track').value === '' ? null : +$('ty-track').value }));
  live($('ty-lead'), () => ({ leading: $('ty-lead').value === '' ? null : +$('ty-lead').value }));
  live($('ty-color'), () => ({ color: $('ty-color').value }));

  // The stepper works from the size the page actually shows, so the first
  // press on an untouched heading goes 26 -> 27, not blank -> 1.
  const step = dir => async () => {
    const st = styleOf(selected);
    const cur = st.size ?? computedType(selected).size;
    const next = Math.max(6, Math.min(200, Math.round((cur + dir) * 2) / 2));
    setStyle(selected, { size: next });
    markDirty(); await render(); showType(selected);
  };
  $('ty-down').addEventListener('click', step(-1));
  $('ty-up').addEventListener('click', step(1));

  // Sliders mirror their number fields; drag paints live, release commits.
  const slider = (rid, nid, prop) => {
    const r = $(rid), n = $(nid);
    r.addEventListener('input', () => {
      n.value = r.value;
      setStyle(selected, { [prop]: +r.value });
      paintText(selected);
    });
    r.addEventListener('change', async () => {
      markDirty(); await render(); showType(selected);
    });
  };
  slider('ty-track-r', 'ty-track', 'tracking');
  slider('ty-lead-r', 'ty-lead', 'leading');

  $('ty-colorbtn').addEventListener('click', () => {
    // Rebuild the eyedropper + in-use row each open: the colours in play change.
    const host = $('ty-color-extras');
    host.innerHTML = '';
    colorExtras(document, host, (styleOf(selected).color || ''), async c => {
      $('ty-colorpop').hidden = true;
      setStyle(selected, { color: c });
      markDirty(); await render(); showType(selected);
    });
    togglePop($('ty-colorpop'), $('ty-colorbtn'));
  });
  $('ty-spacebtn').addEventListener('click', () => togglePop($('ty-spacepop'), $('ty-spacebtn')));
  $('ty-colordefault').addEventListener('click', async () => {
    $('ty-colorpop').hidden = true;
    setStyle(selected, { color: null });
    markDirty(); await render(); showType(selected);
  });

  $('ty-font').addEventListener('change', async () => {
    const fam = $('ty-font').value || null;
    // A weight the new family does not have would be faked by the browser, and
    // the engine refuses it at load — so drop it rather than carry it over.
    const w = fam && fonts[fam] && fonts[fam].includes(+styleOf(selected).weight)
      ? styleOf(selected).weight : null;
    setStyle(selected, { font: fam, weight: w });
    markDirty(); await render(); showType(selected);
  });
  $('ty-weight').addEventListener('change', async () => {
    setStyle(selected, { weight: $('ty-weight').value === '' ? null : +$('ty-weight').value });
    markDirty(); await render(); showType(selected);
  });
  $('ty-case').addEventListener('change', async () => {
    const v = $('ty-case').value;
    setStyle(selected, { case: v === 'none' ? null : v });
    markDirty(); await render(); showType(selected);
  });
  const toggle = (id, prop) => $(id).addEventListener('click', async () => {
    setStyle(selected, { [prop]: !styleOf(selected)[prop] || null });
    markDirty(); await render(); showType(selected);
  });
  toggle('ty-i', 'italic');
  toggle('ty-u', 'underline');
  document.querySelectorAll('.ty-al').forEach(b => b.addEventListener('click', async () => {
    const a = styleOf(selected).align === b.dataset.a ? null : b.dataset.a;
    setStyle(selected, { align: a });
    markDirty(); await render(); showType(selected);
  }));
  $('ty-fx').addEventListener('change', async () => {
    const kind = $('ty-fx').value || null;
    // Drop the old effect's parameters rather than carrying them across: they
    // mean different things per effect, and 'width' on a shadow is noise.
    setStyle(selected, { effect: kind ? { kind } : null });
    markDirty(); await render(); showType(selected);
  });
  $('ty-reset').addEventListener('click', async () => {
    if (layout.text) delete layout.text[selected];
    markDirty(); await render(); showType(selected);
  });
}

// --------------------------------------------------------------- selection
// Selection is a set of element IDS, not nodes: every commit-level change
// re-renders the page into a fresh document, and a node-keyed selection would
// silently die each time. wire() re-resolves and repaints after each render.
//
// Click selects and drags in one gesture (Canva's own physics); shift-click
// toggles membership; dragging on empty page is a marquee; Esc clears. The
// resize handles now belong to the selection — exactly one selected element
// shows them — rather than to whatever the mouse happens to cross.
const selIds = new Set();
const idOf = el => el.dataset.shape || el.dataset.el;
const selEls = d => [...selIds].map(id =>
  d.querySelector(`[data-el="${CSS.escape(id)}"], [data-shape="${CSS.escape(id)}"]`))
  .filter(Boolean);
const lockedList = () => (layout.locked = layout.locked || []);
const isLocked = id => (layout.locked || []).includes(id);

// Clipboard + format painter, both IN-MEMORY only (no OS clipboard). `clip`
// holds whole shape/box overrides for ⌘C/⌘V; `styleClip` holds one element's
// style subset for the format painter. Neither is in snapshot(), so undo never
// touches them.
let clip = null;
let styleClip = null;
const clone = v => JSON.parse(JSON.stringify(v));
const pick = (o, keys) => {          // just the named keys that are actually set
  const r = {};
  keys.forEach(k => { if (o && o[k] !== undefined) r[k] = clone(o[k]); });
  return r;
};

// Groups: a click on any member selects the WHOLE group, so it moves as one —
// Canva's own model. Alt-click reaches through to the single member inside.
// The renderer never reads groups; this is pure editor behaviour.
const groupOf = id => (layout.groups || []).find(g => g.includes(id));
function withGroups(ids) {
  const out = new Set();
  ids.forEach(id => (groupOf(id) || [id]).forEach(m => out.add(m)));
  return [...out];
}
// Every distinct group touched by the current selection.
const selGroups = () => {
  const gs = new Set();
  [...selIds].forEach(id => { const g = groupOf(id); if (g) gs.add(g); });
  return [...gs];
};

function paintSel(d) {
  d.querySelectorAll('.ds-sel, .ds-grouped').forEach(el =>
    el.classList.remove('ds-sel', 'ds-grouped'));
  d.querySelectorAll('.ds-selbox').forEach(el => el.remove());
  hideHandles(d);
  const els = selEls(d);
  // A selection that is exactly one whole group reads as a group: a lighter
  // dashed ring, so it looks like one object rather than N loose ones.
  const gs = selGroups();
  const wholeGroup = gs.length === 1 && gs[0].length === selIds.size
    && gs[0].every(id => selIds.has(id));
  els.forEach(el => {
    // A CSS outline on an SVG child paints around the whole page-sized <svg>
    // viewport, not the shape — so shapes get a plain OVERLAY ring drawn at
    // their box instead of a class. HTML elements keep the class.
    if (el.dataset.shape) {
      const page = el.closest('section.page') || d.querySelector('section.page');
      const b = inchBox(el, page);
      const ring = d.createElement('div');
      ring.className = 'ds-selbox' + (wholeGroup ? ' grouped' : '');
      ring.style.cssText = `left:${b.x}in;top:${b.y}in;width:${b.w}in;height:${b.h}in`;
      page.appendChild(ring);
    } else {
      el.classList.add(wholeGroup ? 'ds-grouped' : 'ds-sel');
    }
  });
  if (els.length === 1 && !isLocked(idOf(els[0]))) {
    const page = els[0].closest('section.page') || d.querySelector('section.page');
    showHandles(d, page, els[0]);
  }
  showMini(d, els);
  arrangeBar(d);
  if (!$('layerspop').hidden) setTimeout(layersRender, 0);   // highlight tracks selection
}

// ------------------------------------------------------------ mini toolbar
// Canva's floating strip beside the selection: duplicate, lock, delete, and a
// "…" that opens the full context menu (fill, opacity, layers, effects) — the
// same one right-click opens. Drawn in the page overlay, so it never touches
// the chrome's layout.
function showMini(d, els) {
  d.querySelectorAll('.ds-mini').forEach(m => m.remove());
  if (!els.length || editing) return;
  const page = els[0].closest('section.page') || d.querySelector('section.page');
  const mine = els.filter(el => (el.closest('section.page')) === page);
  if (!mine.length) return;
  let x1 = 1e9, y1 = 1e9, x2 = -1e9;
  mine.forEach(el => {
    const b = inchBox(el, page);
    x1 = Math.min(x1, b.x); y1 = Math.min(y1, b.y); x2 = Math.max(x2, b.x + b.w);
  });
  const bar = d.createElement('div');
  bar.className = 'ds-mini';
  const above = y1 > 0.55;
  bar.style.cssText = `left:${((x1 + x2) / 2).toFixed(3)}in;`
    + `top:${(above ? y1 - 0.46 : y1 + 0.12).toFixed(3)}in`;
  bar.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); });

  const allLocked = [...selIds].every(isLocked);
  const btn = (title, svg, fn, disabled = false) => {
    const b = d.createElement('button');
    b.setAttribute('aria-label', title);
    b.innerHTML = svg;
    b.disabled = disabled;
    b.addEventListener('click', e => { e.stopPropagation(); fn(); });
    bar.appendChild(b);
    return b;
  };
  const dupDisabled = ![...selIds].every(id => dupModeOf(d, id));
  btn(dupDisabled ? 'Duplicate — an endnote reorders instead: drag it up or down the list'
                  : 'Duplicate (⌘D)',
    '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="1.5" width="8" height="8" rx="1.5"/><path d="M12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5"/></svg>',
    () => duplicateSel(d),
    dupDisabled);
  const lockB = btn(allLocked ? 'Unlock' : 'Lock',
    '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="2.5" y="6" width="9" height="6" rx="1.2"/><path d="M4.5 6V4.5a2.5 2.5 0 0 1 5 0V6"/></svg>',
    () => toggleLockSel(d));
  if (allLocked) lockB.classList.add('on');
  btn('Delete (⌫)',
    '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 3.5h10M5.5 3.5V2.2h3v1.3M3.5 3.5l.7 8.3h5.6l.7-8.3M5.9 6v3.5M8.1 6v3.5"/></svg>',
    () => deleteSel(d), allLocked);
  if (mine.length === 1) {
    btn('More — fill, opacity, layer, effects…',
