<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#2F3E46">
<title>Draft editor</title>
<!--
  Edit the report's prose in the report itself.

  Click a paragraph, its source appears in place, edit, click away — the whole
  page re-renders through the repo's REAL renderer (Pyodide), so footnote
  numbers, layout and every figure stay honest. No Google Doc, no CORS, no
  deploy: the page fetches content.md and the renderer from main and does the
  work locally.

  What is editable: the report's prose blocks. Everything else — figures,
  Table 1, dollar amounts — is generated from the budget data and has no text
  to edit. Structural changes (new sections, new footnotes) still belong in
  content.md or the doc.

  Save commits content.md via a fine-grained token, which is what triggers the
  site rebuild and pushes the same text to the Google Doc. Nothing is written
  anywhere until you press it.
-->
<style>
  :root { --ink:#2F3E46; --sage:#6B9E78; --deep:#52796F; --chrome:#334049;
          --chrome2:#3B4A54; --line:#4B5C66; --ctl:#455460; --ctl-line:#57686F;
          --txt:#EDF2EF; --dim:#A9BCB4; }
  html { height:100%; }
  /* Flex column, so the iframe takes whatever the bars leave. The old fixed
     calc() heights lied whenever a toolbar wrapped to a second line. */
  body { margin:0; height:100%; font:13px/1.45 system-ui, sans-serif;
         display:flex; flex-direction:column; }

  /* -- hover tooltips ------------------------------------------------------ */
  #tt { position:fixed; z-index:10000; background:var(--ink); color:var(--txt);
        font:12px/1.3 system-ui, sans-serif; padding:4px 8px; border-radius:5px;
        pointer-events:none; white-space:nowrap; box-shadow:0 2px 10px rgba(0,0,0,.3); }
  #tt::after { content:""; position:absolute; left:50%; margin-left:-4px;
               border:4px solid transparent; }
  #tt:not(.above)::after { bottom:100%; border-bottom-color:var(--ink); }
  #tt.above::after { top:100%; border-top-color:var(--ink); }

  /* -- top bar ----------------------------------------------------------- */
  #bar { position:relative; display:flex; gap:8px; align-items:center; padding:8px 14px;
         background:var(--chrome); color:var(--txt); flex-wrap:wrap;
         border-bottom:1px solid var(--line); }
  #brand { display:flex; align-items:center; gap:7px; font-weight:700;
           letter-spacing:.2px; color:#fff; white-space:nowrap; }
  #brand svg { display:block; }
  #stat { flex:1; min-width:180px; opacity:.9; overflow:hidden;
          text-overflow:ellipsis; white-space:nowrap; }
  /* A boot failure is the one status the row must not quietly ellipsis away:
     it is the only thing on screen telling you why nothing works. */
  #stat.err { opacity:1; color:#FFD9D4; font-weight:600; cursor:help; }
  .ds-id { font:11.5px ui-monospace,monospace; color:var(--dim);
           background:rgba(255,255,255,.07); padding:2px 8px; border-radius:99px; }
  #fit { background:#C0392B; color:#fff; padding:3px 10px; border-radius:99px;
         font:12px system-ui; cursor:help; }
  /* one button language everywhere: quiet by default, sage when primary */
  #bar button { display:inline-flex; align-items:center; gap:6px; font:12.5px system-ui;
                background:var(--ctl); color:var(--txt); border:1px solid var(--ctl-line);
                border-radius:7px; padding:5px 12px; cursor:pointer; height:29px;
                transition:background .12s, border-color .12s; }
  #bar button:hover { border-color:var(--sage); background:#4B5B68; }
  #bar button:disabled { opacity:.45; cursor:default; border-color:var(--ctl-line);
                         background:var(--ctl); }
  #bar button.on { background:var(--sage); border-color:var(--sage); color:#fff; }
  #undo, #redo { font-size:16px; line-height:1; padding:4px 9px; }

  /* Sources manager — a light panel over the preview, in the top document so a
     re-render of the iframe never disturbs it. top is set from the bar height. */
  #srcpanel { position:fixed; right:16px; width:min(560px,92vw);
    max-height:calc(100vh - 90px); overflow:auto; background:#fff; color:var(--ink);
    border:1px solid #C9D6CD; border-radius:8px; box-shadow:0 14px 38px rgba(0,0,0,.30);
    z-index:60; font:13px/1.45 system-ui; }
  #srcpanel header { display:flex; align-items:center; gap:10px; padding:9px 12px;
    background:var(--ink); color:#E8EDE6; border-radius:8px 8px 0 0; position:sticky; top:0; }
  #srcpanel header b { letter-spacing:.3px; }
  #srcpanel header span { flex:1; font-size:11px; opacity:.82; }
  #srcpanel header button { background:var(--sage); color:#fff; border:0;
    border-radius:4px; padding:3px 11px; cursor:pointer; font:inherit; }
  .srcrow { padding:9px 12px; border-bottom:1px solid #EDF1EE;
    display:grid; grid-template-columns:1fr auto; gap:6px 8px; align-items:center; }
  .srcid { grid-column:1 / -1; font:11px ui-monospace,monospace; color:var(--deep);
    display:flex; gap:8px; align-items:center; }
  .srcuse { font-size:10px; color:#8B9A90; }
  .srcidctl { margin-left:auto; display:flex; gap:4px; }
  .srcren { font:10px system-ui; padding:2px 8px; cursor:pointer; border:1px solid #C9D6CD;
    background:#fff; color:var(--deep); border-radius:4px; }
  .srcren:hover:not(:disabled) { background:var(--sage); color:#fff; border-color:var(--sage); }
  .srcren:disabled { opacity:.35; cursor:default; }
  .srcrow input { font:12px system-ui; padding:5px 7px; width:100%; box-sizing:border-box;
    border:1px solid #C9D6CD; border-radius:4px; color:var(--ink); }
  .srctext { grid-column:1 / -1; }
  .srcdel { font:11px system-ui; padding:5px 11px; border:1px solid #d9b0a0;
    background:#fff; color:#C2703A; border-radius:4px; cursor:pointer; white-space:nowrap; }
  .srcdel:hover:not(:disabled) { background:#C2703A; color:#fff; border-color:#C2703A; }
  .srcdel:disabled { opacity:.5; cursor:default; border-color:#d7dcd8; color:#9aa4a0; }
  .srcempty { padding:16px; color:#8B9A90; font-size:12px; }

  /* Sign in with GitHub — same family as the sources panel. */
  #authpanel { position:fixed; right:16px; width:min(380px,92vw); background:#fff;
    color:var(--ink); border:1px solid #C9D6CD; border-radius:8px;
    box-shadow:0 14px 38px rgba(0,0,0,.30); z-index:70; font:13px/1.5 system-ui; }
  #authpanel header { display:flex; align-items:center; gap:10px; padding:9px 12px;
    background:var(--ink); color:#E8EDE6; border-radius:8px 8px 0 0; }
  #authpanel header b { flex:1; letter-spacing:.3px; }
  #authpanel header .x { background:var(--sage); color:#fff; border:0;
    border-radius:4px; padding:3px 11px; cursor:pointer; font:inherit; }
  .au-body { padding:14px 16px 12px; text-align:center; }
  .au-msg { margin:0 0 8px; color:#5B6E66; }
  .au-code { font:700 26px/1.3 ui-monospace,monospace; letter-spacing:3px;
    color:var(--ink); background:#EDF1EE; border-radius:6px; padding:8px 0;
    margin-bottom:10px; user-select:all; }
  .au-open { background:var(--sage); color:#fff; border:0; border-radius:5px;
    padding:8px 18px; cursor:pointer; font:600 13px system-ui; }
  .au-open:hover { background:var(--deep); }
  .au-hint { margin:9px 0 0; font-size:11.5px; color:#8B9A90; }
  .au-alt { margin:12px 0 0; font-size:11px; }
  .au-alt a { color:#8B9A90; }
  #save { background:var(--sage); border-color:var(--sage); color:#fff; font-weight:600; }
  #save:hover { background:var(--deep); border-color:var(--deep); }
  #save.dirty { background:#C2703A; border-color:#C2703A; }
  #save.dirty:hover { background:#A85E2F; }
  #publish { background:var(--deep); border-color:var(--deep); color:#fff; font-weight:600; }
  #publish:hover:not(:disabled) { background:#3F5F57; border-color:#3F5F57; }
  #proj { font:12.5px system-ui; background:var(--ctl); color:#E8EDE6;
          border:1px solid var(--ctl-line); border-radius:5px; padding:4px 6px;
          cursor:pointer; max-width:220px; }
  #proj:hover { border-color:var(--sage); }
  /* Below the bars: the page rail and the canvas, side by side. */
  #work { flex:1; min-height:0; display:flex; }
  /* The canvas: the report renders in a fixed desktop-width viewport and the
     whole iframe is SCALED to the pane, never reflowed. A narrow pane would
     otherwise fire the report's mobile media queries, and a drag would record
     the phone layout's geometry into layout.json as if it were the page. */
  #stage { flex:1; min-height:0; overflow:auto; position:relative; background:#EDF1EE; }
  #out { border:0; display:block; width:1200px; height:100%;
         transform-origin:0 0; background:#EDF1EE; }
  /* Page rail: numbered chips ACROSS THE BOTTOM, drag to reorder, eye to
     hide. It sat down the left until the left column became a panel host —
     a filmstrip is the more natural read for page order anyway. */
  #rail { flex:none; display:flex; align-items:center; gap:7px;
          overflow-x:auto; overflow-y:hidden; background:var(--chrome);
          border-top:1px solid var(--line); padding:8px 10px; scrollbar-width:thin; }
  #rail-list { display:flex; align-items:center; gap:7px; }
  #rail-head { font:600 10px system-ui; letter-spacing:.7px; text-transform:uppercase;
          color:var(--dim); flex:none; padding-right:4px; }
  .chip { position:relative; display:flex; align-items:center; gap:7px; flex:none;
          padding:7px 8px; border:1px solid var(--ctl-line); border-radius:8px;
          background:var(--ctl); color:var(--txt); cursor:pointer; font:12px system-ui;
          transition:border-color .12s, opacity .12s; }
  .chip:hover { border-color:var(--sage); }
  .chip.on { border-color:var(--sage); background:#4B5B68; }
  .chip.hidden-pg { opacity:.4; }
  .chip.blank { border-style:dashed; }
  /* Horizontal now, so the insertion marker is a LEFT edge, not a top one. */
  .chip.drag-over { border-color:var(--sage); border-left-width:3px; }
  .chip-n { font:700 12px ui-monospace,monospace; min-width:20px; }
  .chip-lab { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
          font-size:11px; color:var(--dim); }
  .chip-x { border:0; background:none; color:var(--dim); cursor:pointer; font-size:14px;
          padding:0 2px; line-height:1; }
  .chip-x:hover { color:#F2B8A8; }
  .chip-eye { border:0; background:none; cursor:pointer; padding:0 2px; opacity:.7;
          font-size:12px; }
  .chip-eye:hover { opacity:1; }
  #rail-add { display:flex; align-items:center; justify-content:center; gap:6px;
          flex:none; padding:8px 12px; border:1px dashed var(--ctl-line);
          border-radius:8px; background:none; color:var(--dim); cursor:pointer;
          font:12px system-ui; }
  #rail-add:hover { border-color:var(--sage); color:var(--txt); }
  .chip-lab { max-width:110px; }

  /* -- the left panel: a tool's full surface, where a popover would be
     cramped. Light, because it is a content surface rather than chrome. */
  #side { width:288px; flex:none; display:flex; flex-direction:column;
          background:#fff; color:var(--ink); border-right:1px solid #C9D6CD; }
  #side[hidden] { display:none; }
  #side-head { display:flex; align-items:center; justify-content:space-between;
          padding:14px 16px 10px; font:600 15px system-ui; }
  #side-x { border:0; background:none; font-size:17px; line-height:1; cursor:pointer;
          color:#52796F; padding:2px 4px; }
  #side-x:hover { color:var(--ink); }
  #side-body { flex:1; min-height:0; overflow-y:auto; padding:0 16px 18px; }
  #side-body h4 { display:flex; align-items:center; gap:7px; font:600 12.5px system-ui;
          margin:16px 0 9px; color:var(--ink); }
  #side-search { width:100%; box-sizing:border-box; font:13px system-ui;
          padding:8px 10px; border:1px solid #C9D6CD; border-radius:8px; }
  .cgrid { display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; }
  .cdot { aspect-ratio:1; border-radius:50%; border:1px solid rgba(0,0,0,.14);
          padding:0; cursor:pointer; }
  .cdot.on { outline:2px solid #6B9E78; outline-offset:2px; }
  .cdot.plus { background:conic-gradient(#f66,#fd6,#6f6,#6ff,#66f,#f6f,#f66);
          display:flex; align-items:center; justify-content:center; position:relative; }
  .cdot.plus::after { content:'+'; position:absolute; inset:4px; border-radius:50%;
          background:#fff; color:var(--ink); font:600 15px system-ui;
          display:flex; align-items:center; justify-content:center; }
  .cdot.none { background:#fff url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 10 10%27%3E%3Cpath d=%27M1 9L9 1%27 stroke=%27%23C0392B%27/%3E%3C/svg%3E") center/100% no-repeat; }
  .cdot.eye { background:#fff; font-size:13px; }
  .side-note { font:11.5px system-ui; color:#7A8E92; margin:8px 0 0; }

  /* -- the picker: SV square, hue rail, hex. Canva's own arrangement. */
  #cpick { border:1px solid #C9D6CD; border-radius:10px; padding:12px;
           margin:10px 0 4px; box-shadow:0 6px 20px rgba(20,30,35,.10); }
  .cp-tabs { display:flex; gap:16px; margin-bottom:10px; }
  .cp-tab { border:0; background:none; font:600 13px system-ui; color:#7A8E92;
            padding:0 0 6px; cursor:pointer; border-bottom:2px solid transparent; }
  .cp-tab.on { color:var(--ink); border-bottom-color:#6B9E78; }
  #cp-sv { position:relative; height:132px; border-radius:8px; cursor:crosshair;
           touch-action:none; }
  #cp-hue { position:relative; height:14px; border-radius:99px; margin-top:12px;
            cursor:pointer; touch-action:none;
            background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); }
  .cp-knob { position:absolute; width:16px; height:16px; border-radius:50%;
             border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.3);
             transform:translate(-50%,-50%); pointer-events:none; }
  .cp-row { display:flex; align-items:center; gap:8px; margin-top:12px; }
  #cp-hex { flex:1; min-width:0; font:13px ui-monospace,monospace; padding:8px 10px;
            border:1px solid #C9D6CD; border-radius:8px; text-transform:uppercase; }
  #cp-swatch { width:26px; height:26px; border-radius:50%; flex:none;
               border:1px solid rgba(0,0,0,.18); }
  #cp-eye { flex:none; border:1px solid #C9D6CD; border-radius:8px; background:#fff;
            cursor:pointer; padding:7px 9px; font-size:13px; }
  .cp-stops { display:flex; align-items:center; gap:8px; margin-top:10px; }
  .cp-stop { width:26px; height:26px; border-radius:50%; cursor:pointer;
             border:1px solid rgba(0,0,0,.18); }
  .cp-stop.on { outline:2px solid #6B9E78; outline-offset:2px; }
  #cp-angle { width:100%; margin-top:4px; }

  /* -- the context row: ONE fixed-height slot that holds either the type
     toolbar (text) or the arrange strip (elements), and never collapses.
     It used to appear and disappear with the selection, which resized the
     whole flex column — the canvas visibly "jumped up" on every select, by
     a full 100px when the strip wrapped. Fixed height, no wrap, horizontal
     scroll if a row runs long: the chrome never moves again. */
  #context { height:46px; flex:none; background:var(--chrome2);
          border-bottom:1px solid var(--line); }
  #type, #arrange { display:flex; gap:6px; align-items:center;
          justify-content:safe center;   /* Canva's centered strip */
          flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden;
          padding:0 14px; height:100%; box-sizing:border-box;
          background:var(--chrome2); scrollbar-width:thin; }
  #type > *, #arrange > * { flex:none; }
  /* display:flex would silently beat the hidden attribute's display:none */
  #ar-fxbtn, #ar-pos { font:12.5px system-ui; padding:4px 11px; }
  .ar-slide { display:flex; align-items:center; gap:8px; font:11px system-ui;
              color:#52796F; margin-top:8px; width:100%; }
  .ar-slide input[type=range] { flex:1; }
  .ar-dashrow { display:flex; gap:6px; margin-top:8px; }
  .ar-dashrow button { font:11px system-ui; padding:3px 9px; border:1px solid #B9C9BE;
              background:#fff; color:#2F3E46; border-radius:4px; cursor:pointer; }
  .ar-dashrow button.on { background:#2F3E46; color:#fff; border-color:#2F3E46; }
  #ar-pospop { width:430px; }
  .ar-posrows { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  #type[hidden], #arrange[hidden] { display:none; }
  /* Same trap one level down: a styled button's display beats the hidden
     attribute's UA display:none, so a "hidden" control kept rendering. */
  #type [hidden], #arrange [hidden] { display:none !important; }
  #type select, #type input[type=number], #arrange input[type=number] {
          font:12.5px system-ui; height:29px; padding:0 7px; box-sizing:border-box;
          border:1px solid var(--ctl-line); border-radius:7px; background:var(--ctl);
          color:var(--txt); transition:border-color .12s; }
  #type select:hover, #type input[type=number]:hover,
  #arrange input[type=number]:hover { border-color:var(--sage); }
  #type select:focus, #type input:focus, #type button:focus-visible,
  #arrange input:focus, #arrange button:focus-visible
        { outline:2px solid rgba(107,158,120,.55); outline-offset:1px; }
  #ty-font { width:150px; }
  #ty-weight { width:78px; }
  #type input[type=number], #arrange input[type=number] { width:54px; }
  #type button, #arrange button { display:inline-flex; align-items:center;
          justify-content:center; font:12.5px system-ui; min-width:29px; height:29px;
          padding:0 8px; cursor:pointer; border:1px solid var(--ctl-line);
          border-radius:7px; background:var(--ctl); color:var(--txt);
          transition:background .12s, border-color .12s; }
  #type button:hover, #arrange button:hover { border-color:var(--sage); background:#4B5B68; }
  #type button.on, #arrange button.on { background:var(--sage); border-color:var(--sage); color:#fff; }
  #type button svg, #arrange button svg { display:block; pointer-events:none; }
  #arrange button:disabled { opacity:.4; cursor:default; border-color:var(--ctl-line);
          background:var(--ctl); }
  #ar-del { color:#F2B8A8; }
  #ar-del:hover { background:#8A4A3A; border-color:#8A4A3A; color:#fff; }
  /* segmented align group reads as one control, like Canva's */
  .ty-seg { display:inline-flex; }
  .ty-seg button { border-radius:0; margin-left:-1px; }
  .ty-seg button:first-child { border-radius:7px 0 0 7px; margin-left:0; }
  .ty-seg button:last-child { border-radius:0 7px 7px 0; }
  .ty-seg button.on { position:relative; z-index:1; }
  #ty-reset { margin-left:auto; color:var(--dim); }
  #ty-reset:hover { color:#fff; }
  .ty-key { font:11.5px ui-monospace,monospace; color:var(--dim); max-width:170px;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            background:rgba(255,255,255,.07); padding:3px 9px; border-radius:99px; }
  .ty-sep { width:1px; height:20px; background:var(--line); margin:0 4px; }
  /* Canva-style LIGHT formatting toolbar: clean white controls, segmented
     groups, sage for the active/primary state — matching the reference. Only
     the context (#type/#arrange) row is re-themed; the dark top chrome stays. */
  #context { background:#F5F8F6; border-bottom:1px solid #D9E1DB; }
  #type, #arrange { background:#F5F8F6; gap:5px; }
  #type select, #type input[type=number], #arrange input[type=number],
  #type button, #arrange button {
    background:#fff; color:#2F3E46; border-color:#D9E1DB;
    box-shadow:0 1px 1px rgba(20,40,30,.04); }
  #type select:hover, #type input[type=number]:hover, #arrange input[type=number]:hover,
  #type button:hover, #arrange button:hover { border-color:var(--sage); background:#EDF4EE; }
  #type button.on, #arrange button.on { background:var(--sage); border-color:var(--sage); color:#fff; }
  #arrange button:disabled { background:#fff; border-color:#E6ECE7; color:#A6B4AB; opacity:.7; box-shadow:none; }
  .ty-sep { background:#DCE4DE; }
  .ty-seg button { box-shadow:none; }
  .ty-key, .ar-count { color:#5B6E66; background:#E7EEE8; }
  #ty-reset { color:#7A8E85; box-shadow:none; }
  #ty-reset:hover { color:#2F3E46; background:#EDF4EE; }
  #ar-del { color:#C0603F; }
  #ar-del:hover { background:#C0603F; border-color:#C0603F; color:#fff; }
  #ty-colorbtn .A, #ar-fill .A { color:#2F3E46; }
  /* effect parameter chips */
  .ty-num { display:inline-flex; align-items:center; gap:4px; font:11.5px system-ui;
            color:var(--dim); background:rgba(255,255,255,.05); border-radius:7px;
            padding:0 0 0 7px; }
  .ty-num input[type=number] { border:0; background:none; width:48px; }
  #ty-fxp { display:inline-flex; gap:5px; align-items:center; }
  #ty-fxp input[type=color] { width:29px; height:29px; padding:2px; border:1px solid
            var(--ctl-line); border-radius:7px; background:var(--ctl); cursor:pointer; }
  /* the text-colour button: an A over its current colour, Canva's icon */
  #ty-colorbtn { flex-direction:column; gap:1px; padding:3px 9px 4px; line-height:1; }
  #ty-colorbtn .A { font:700 13px/1 system-ui; }
  #ty-colorbtn .Abar { width:16px; height:4px; border-radius:2px;
            background:linear-gradient(90deg,#e66,#6b9e78,#66e); }
  #ar-fill { flex-direction:column; gap:1px; padding:3px 9px 4px; line-height:1; }
  #ar-fill .A { font:700 13px/1 system-ui; }
  #ar-fill .Abar { width:16px; height:4px; border-radius:2px;
            background:linear-gradient(90deg,#e66,#6b9e78,#66e); }
  #ar-fill-extras .ds-swatches { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  #ar-fill-extras .ds-sw { width:26px; height:26px; border:1px solid rgba(0,0,0,.16);
        border-radius:6px; cursor:pointer; padding:0; }
  #ar-fill-extras .ds-sw:hover { outline:2px solid var(--ink); outline-offset:1px; }
  #ar-fill-extras .ds-sw-eye { display:grid; place-items:center; font-size:14px;
        background:#fff; color:var(--ink); }
  /* size stepper: − number + as one unit */
  .ty-step { display:inline-flex; align-items:center; }
  .ty-step button { border-radius:7px 0 0 7px; font-size:15px; }
  .ty-step button:last-child { border-radius:0 7px 7px 0; }
  .ty-step input { border-radius:0 !important; margin:0 -1px; position:relative;
                   z-index:1; text-align:center; }
  .ty-step input::-webkit-inner-spin-button { display:none; }
  /* popovers: colour panel, spacing panel, shape picker. FIXED, not absolute:
     they live inside the fixed-height context row, whose overflow would clip
     an absolutely positioned panel; fixed coordinates (set from the anchor by
     togglePop) escape any container. */
  .pop { position:fixed; z-index:1000; background:#fff;
         color:var(--ink); border:1px solid #C9D6CD; border-radius:10px;
         box-shadow:0 10px 32px rgba(20,30,35,.35); padding:12px; min-width:190px; }
  .pop-h { font:600 11px system-ui; letter-spacing:.7px; text-transform:uppercase;
           color:#7A8E92; margin:0 0 8px; }
  /* The icon picker: a search field over a scrolling grid of results. Wider
     than the other popovers because a grid of glyphs is what it is for. */
  .pop-wide { width:340px; }
  #icon-q, #icon-set { width:100%; box-sizing:border-box; font:13px system-ui;
           padding:6px 8px; border:1px solid #C9D6CD; border-radius:6px;
           background:#fff; color:var(--ink); }
  #icon-set { margin-top:6px; font-size:12px; }
  #icon-grid { display:grid; grid-template-columns:repeat(8, 1fr); gap:4px;
           margin-top:8px; max-height:230px; overflow-y:auto; }
  #icon-grid:empty { display:none; }
  .icon-tile { display:flex; align-items:center; justify-content:center;
           aspect-ratio:1; padding:0; border:1px solid transparent; border-radius:6px;
           background:none; color:var(--ink); cursor:pointer; }
  .icon-tile:hover { background:#EAF3EC; border-color:#95B7A2; }
  .icon-note { font:11px system-ui; color:#7A8E92; margin:8px 0 0; }
  .swgrid { display:grid; grid-template-columns:repeat(5, 26px); gap:6px; }
  .sw { width:26px; height:26px; border:1px solid rgba(0,0,0,.16); border-radius:6px;
        cursor:pointer; padding:0; position:relative; }
  .sw:hover { outline:2px solid var(--ink); outline-offset:1px; }
  .sw.on::after { content:"✓"; position:absolute; inset:0; display:grid;
        place-items:center; font:700 13px system-ui; color:#fff;
        text-shadow:0 0 3px rgba(0,0,0,.85); }
  .sw.custom { border:1px dashed #8B9A90;
        background:conic-gradient(#e66,#ea3,#6b9e78,#39c,#96e,#e66); }
  /* eyedropper + in-use colours, shared with the fill menu via colorExtras */
  #ty-color-extras .ds-swatches { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  #ty-color-extras .ds-sw { width:26px; height:26px; border:1px solid rgba(0,0,0,.16);
        border-radius:6px; cursor:pointer; padding:0; }
  #ty-color-extras .ds-sw:hover { outline:2px solid var(--ink); outline-offset:1px; }
  #ty-color-extras .ds-sw-eye { display:grid; place-items:center; font-size:14px;
        background:#fff; color:var(--ink); }
  .sw-default { margin-top:9px; width:100%; font:12.5px system-ui; padding:5px 0;
        border:1px solid #C9D6CD; border-radius:7px; background:#fff;
        color:var(--ink); cursor:pointer; }
  .sw-default:hover { background:var(--sage); border-color:var(--sage); color:#fff; }
  .pop label { display:flex; align-items:center; gap:8px; font:12.5px system-ui;
        margin:7px 0; white-space:nowrap; }
  .pop label span { width:92px; color:#5B6E66; }
  .pop input[type=range] { width:110px; accent-color:var(--sage); }
  .pop input[type=number] { width:56px; font:12.5px system-ui; padding:3px 5px;
        border:1px solid #C9D6CD; border-radius:6px; }
  .pop .shp { display:flex; align-items:center; gap:9px; width:100%; border:0;
        background:none; font:12.5px system-ui; color:var(--ink); padding:7px 8px;
        border-radius:7px; cursor:pointer; }
  .pop .shp:hover { background:var(--sage); color:#fff; }
  .pop .shp svg { display:block; }
  /* the layers panel: this page's objects, top of the stack first */
  #layerspop { min-width:230px; max-height:340px; overflow-y:auto; }
  .lrow { display:flex; align-items:center; gap:8px; padding:6px 8px; margin:2px 0;
        border:1px solid transparent; border-radius:7px; font:12.5px system-ui;
        color:var(--ink); cursor:grab; }
  .lrow:hover { border-color:var(--sage); background:#F2F6F3; }
  .lrow.sel { border-color:var(--sage); background:#E7F0EA; }
  .lrow.drag-over { border-top:2px solid var(--sage); }
  .lrow-kind { width:22px; text-align:center; font:600 10px ui-monospace,monospace;
        color:#7A8E92; flex:none; }
  .lrow-id { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        font-family:ui-monospace,monospace; font-size:11px; }
  .lrow-lock { flex:none; font-size:11px; opacity:.6; }
  .ldivider { display:flex; align-items:center; gap:8px; margin:6px 0;
        font:600 10px system-ui; letter-spacing:.6px; text-transform:uppercase;
        color:#9AACA4; }
  .ldivider::before, .ldivider::after { content:""; flex:1; height:1px;
        background:#DDE7E0; }
  .ldivider.drag-over { color:var(--sage); }
  .lempty { font:12px system-ui; color:#8B9A90; padding:6px 4px; }
  /* zoom: a quiet segmented control at the far end of the bar */
  #zoom { display:inline-flex; margin-left:2px; }
  #zoom button { border-radius:0; margin-left:-1px; min-width:34px; padding:5px 7px; }
  #zoom button:first-child { border-radius:7px 0 0 7px; margin-left:0; }
  #zoom button:last-child { border-radius:0 7px 7px 0; }
  #zoom button.on { background:var(--sage); border-color:var(--sage); color:#fff;
        position:relative; z-index:1; }
  .ar-count { font:11.5px ui-monospace,monospace; color:var(--dim);
        background:rgba(255,255,255,.07); padding:3px 9px; border-radius:99px;
        max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ar-lab { font:11px system-ui; color:var(--dim); margin-left:2px; }
  .ar-pos { display:inline-flex; align-items:center; gap:4px;
        font:11.5px system-ui; color:var(--dim); }
  .ar-pos input { width:58px !important; }
  /* modal dialogs (native <dialog>): replace prompt()/confirm()/alert() with a
     focus-trapped modal that can gather several fields at once. */
  .dsdlg { border:0; border-radius:12px; padding:0; width:min(440px, 92vw);
        box-shadow:0 24px 60px rgba(20,30,35,.4); color:var(--ink);
        background:#fff; }
  .dsdlg::backdrop { background:rgba(30,44,50,.5); }
  .dsdlg-form { display:flex; flex-direction:column; gap:12px; padding:18px 20px 16px; margin:0; }
  .dsdlg-title { font:600 14px system-ui; margin:0; color:var(--ink); }
  .dsdlg-msg { font:13px/1.5 system-ui; margin:0; white-space:pre-wrap; color:var(--ink); }
  .dsdlg-field { display:flex; flex-direction:column; gap:5px; font:12px system-ui; color:#5B6E66; }
  .dsdlg-field > input, .dsdlg-field > select, .dsdlg-field > textarea {
        font:13px system-ui; color:var(--ink); padding:8px 10px;
        border:1px solid #C9D6CD; border-radius:7px; background:#fff; width:100%;
        box-sizing:border-box; }
  .dsdlg-field > textarea { resize:vertical; min-height:64px; }
  .dsdlg-field > input:focus, .dsdlg-field > select:focus, .dsdlg-field > textarea:focus {
        outline:none; border-color:var(--sage); box-shadow:0 0 0 3px rgba(107,158,120,.18); }
  .dsdlg-err { font:12px system-ui; color:#C0392B; margin:0; min-height:0; }
  .dsdlg-err:empty { display:none; }
  .dsdlg-btns { display:flex; justify-content:flex-end; gap:8px; margin-top:4px; }
  .dsdlg-btns button { font:600 12.5px system-ui; padding:7px 15px; border-radius:7px;
        cursor:pointer; border:1px solid #C9D6CD; background:#fff; color:var(--ink); }
  .dsdlg-btns button:hover { border-color:var(--sage); }
  .dsdlg-ok { background:var(--sage) !important; border-color:var(--sage) !important; color:#fff !important; }
  .dsdlg-ok:hover { background:var(--deep) !important; border-color:var(--deep) !important; }
  .dsdlg-ok.danger { background:#C0392B !important; border-color:#C0392B !important; }
  .dsdlg-ok.danger:hover { background:#A93226 !important; border-color:#A93226 !important; }
</style>
</head>
<body>
<div id="bar">
  <span id="brand"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path
    d="M11.3 1.9l2.8 2.8L5 13.8l-3.6.8.8-3.6z"/></svg>Draft editor</span>
  <span id="title" class="ds-id"></span>
  <select id="proj" hidden title="Switch project"></select>
  <span id="stat">loading the render engine…</span>
  <span id="fit" hidden title="">⚠</span>
  <button id="text" aria-label="Add a text box to the page in view">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.6" stroke-linecap="round"><path d="M2 3.2V2h10v1.2M7 2v10M5.2 12h3.6"/></svg>
    Text</button>
  <button id="shape" aria-label="Add a shape to the page in view">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.5"><rect x="1.2" y="3.4" width="8" height="8" rx="1.4"/>
      <circle cx="10" cy="4.4" r="2.9"/></svg>
    Shape</button>
  <button id="icon" aria-label="Search thousands of open-source icons and place one">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.4" stroke-linejoin="round"><path d="M7 1.6l1.7 3.4 3.8.55-2.75 2.68.65 3.77L7 10.22 3.6 12l.65-3.77L1.5 5.55l3.8-.55z"/></svg>
    Icon</button>
  <button id="table" aria-label="Add a table to the page in view">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.4"><rect x="1.5" y="2" width="11" height="10" rx="1"/>
      <path d="M1.5 5.5h11M1.5 9h11M5.5 2v10"/></svg>
    Table</button>
  <button id="tok" aria-label="Check or replace the GitHub token used to save">Token…</button>
  <span id="zoom" title="Zoom">
    <button data-z="fit">Fit</button><button data-z="1">100</button><button
      data-z="1.25">125</button><button data-z="1.5">150</button>
  </span>
  <button id="guides" aria-label="Rulers and snap guides — drag from a ruler to add one">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.3"><rect x="1.5" y="1.5" width="11" height="11" rx="1"/>
      <path d="M1.5 4.5h2M1.5 7h3M1.5 9.5h2M4.5 1.5v2M7 1.5v3M9.5 1.5v2"
        stroke-linecap="round"/></svg></button>
  <button id="layers" aria-label="Layers — this page's objects in stacking order; drag to restack">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.3" stroke-linejoin="round"><path d="M7 1.8L12.6 4.6 7 7.4 1.4 4.6z"/>
      <path d="M1.4 7.2L7 10l5.6-2.8M1.4 9.8L7 12.6l5.6-2.8"/></svg></button>
  <div class="pop" id="layerspop" hidden>
    <p class="pop-h" id="layers-title">Layers</p>
    <div id="layers-list"></div>
  </div>
  <button id="add" aria-label="Add a new prose section to a page">+ Section</button>
  <button id="sources" aria-label="View, edit, reorder and remove citations">Sources</button>
  <button id="undo" disabled aria-label="Undo (⌘Z)">↶</button>
  <button id="redo" disabled aria-label="Redo (⌘⇧Z)">↷</button>
  <button id="revert" disabled>Discard</button>
  <button id="save" disabled>Save draft</button>
  <button id="share" disabled aria-label="Copy a link that shows this draft to anyone">Share</button>
  <button id="publish" disabled aria-label="Make this draft the live report">Publish</button>
  <button id="download" aria-label="Download the report as a PDF or per-page PNGs">Download ▾</button>
  <div class="pop" id="downloadpop" hidden>
    <p class="pop-h">Download this draft</p>
    <button class="shp" id="dl-pdf">PDF — the whole report</button>
    <button class="shp" id="dl-png">PNG — every page (.zip)</button>
    <button class="shp" id="dl-html">HTML — one self-contained file</button>
    <button class="shp" id="dl-sqsp">HTML for Squarespace — paste-in block</button>
    <button class="shp" id="dl-src">Source — files &amp; images (.zip)</button>
    <label style="margin-top:6px;padding-top:8px;border-top:1px solid #EEF2EF">
      <input type="checkbox" id="dl-marks">Bleed &amp; crop marks (PDF)</label>
  </div>
  <div class="pop" id="textpop" hidden>
    <p class="pop-h">Add text to the page in view</p>
    <button class="shp txtpreset" data-k="heading" style="font:700 17px system-ui">Add a heading</button>
    <button class="shp txtpreset" data-k="subheading" style="font:600 14px system-ui">Add a subheading</button>
    <button class="shp txtpreset" data-k="body" style="font:12px system-ui">Add body text</button>
  </div>
  <div class="pop" id="shapepop" hidden>
    <p class="pop-h">Add to the page in view</p>
    <button class="shp" data-k="rect"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2"><rect x="1.5" y="3" width="12"
      height="9" rx="1.5"/></svg>Rectangle</button>
    <button class="shp" data-k="ellipse"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2"><ellipse cx="7.5" cy="7.5"
      rx="6" ry="4.6"/></svg>Ellipse</button>
    <button class="shp" data-k="line"><svg width="15" height="15" viewBox="0 0 15 15"
      stroke="#52796F" stroke-width="1.6" stroke-linecap="round"><path
      d="M2 12.5L13 2.5"/></svg>Line</button>
    <button class="shp" data-k="triangle"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2" stroke-linejoin="round"><path
      d="M7.5 2.5L13 12.5H2z"/></svg>Triangle</button>
    <button class="shp" data-k="arrow"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2" stroke-linejoin="round"><path
      d="M1.5 5.8h6.5V3.2l5.5 4.3-5.5 4.3V9.2H1.5z"/></svg>Arrow</button>
  </div>
  <div class="pop pop-wide" id="iconpop" hidden>
    <p class="pop-h">Search open-source icons</p>
    <input id="icon-q" type="search" placeholder="chart, house, arrow, people…"
      autocomplete="off" spellcheck="false">
    <select id="icon-set" title="Which icon set to search">
      <option value="">All sets</option>
    </select>
    <div id="icon-grid"></div>
    <p class="icon-note" id="icon-note"></p>
  </div>
</div>
<div id="context">
<div id="type" hidden>
  <span class="ty-key" id="ty-key"></span>
  <span class="ty-sep"></span>

  <select id="ty-weight" title="Weight"></select>

      <circle cx="2.2" cy="3.5" r="1" fill="currentColor" stroke="none"/>
      <circle cx="2.2" cy="7" r="1" fill="currentColor" stroke="none"/>
      <circle cx="2.2" cy="10.5" r="1" fill="currentColor" stroke="none"/></svg></button>
    <button id="ty-mol" aria-label="Numbered list"><svg width="14" height="14" viewBox="0 0 14 14"

      <path d="M1.5 2.6l1-.6v3" stroke-width="1.1"/><path d="M1.2 8.4c1.6-1.6 2.2.6.2 1.6h2" stroke-width="1.1" fill="none"/></svg></button>

  <span class="ty-sep"></span>

  <span class="ty-seg">

      <path d="M2 3h10M4 6h6M2 9h10M4 12h6"/></svg></button>
    <button class="ty-al" data-a="right" aria-label="Align right"><svg width="14" height="14"

      <path d="M2 3h10M6 6h6M2 9h10M6 12h6"/></svg></button>
    <button class="ty-al" data-a="justify" aria-label="Justify"><svg width="14" height="14"

      <path d="M2 3h10M2 6h10M2 9h10M2 12h10"/></svg></button>
  </span>
  <select id="ty-case" title="Letter case">

  <span class="ty-sep"></span>
  <button id="ty-colorbtn" aria-label="Text colour"><span class="A">A</span><span

  <select id="ty-fx" title="Effect"></select>
  <span id="ty-fxp"></span>

</div>
<div id="arrange" hidden>
  <span class="ar-count" id="ar-count"></span>
  <span class="ty-sep"></span>

    <label class="ar-slide">weight<input id="ar-bw" type="range" min="0" max="0.08" step="0.005"></label>

  <div class="pop" id="ar-alphapop" hidden>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
// This editor knows nothing about any particular report. Everything specific —
// which renderer to run, what it reads, where it writes, how big a page is —
// comes from engine/manifest.json, staged beside this file from docsync.yml by
// `python3 -m docsync.stage`. A second report is a second registry entry, not a
// second editor.
//
// Same origin, deliberately: fetching the renderer from raw.githubusercontent
// let its CDN serve a copy several commits old — a page that renders fine and is
// quietly wrong. Staged here, the engine can only be the one that shipped with
// this editor.
let M = null;                          // the manifest
let REPO = '';                         // owner/name we save to
let BRANCH = 'main';                    // the deploy branch drafts fork from and publish to
const $ = id => document.getElementById(id);
const bust = u => u + (u.includes('?') ? '&' : '?') + 'cb=' + Date.now();

// --- modal dialogs ----------------------------------------------------------
// Native <dialog> (Baseline since 2022): focus-trapped, Esc-closable, a
// backdrop for free — and, unlike prompt()/confirm(), one dialog can gather
// several fields at once and never silently drops typed input to an accidental
// dismissal. Everything below returns a Promise so call sites just `await`.
// modalOpen guards the in-iframe edit: opening a dialog steals focus and would
// otherwise blur the paragraph being edited and commit it out from under the
// dialog (see edit()'s blur handler).
let modalOpen = false;

function dsModal(build) {
  return new Promise(resolve => {
    const dlg = document.createElement('dialog');
    dlg.className = 'dsdlg';
    let settled = false;
    const done = v => {
      if (settled) return; settled = true;
      modalOpen = false;
      try { dlg.close(); } catch (e) {}
      dlg.remove();
      resolve(v);
    };
    build(dlg, done);
    dlg.addEventListener('cancel', e => { e.preventDefault(); done(null); });   // Esc
    dlg.addEventListener('click', e => { if (e.target === dlg) done(null); });  // backdrop
    document.body.appendChild(dlg);
    modalOpen = true;
    dlg.showModal();
  });
}

/** A form dialog. fields: [{name, label, type:'text'|'textarea'|'select',
 *  value, placeholder, options:[{value,label}], required, readOnly}]. Resolves
 *  an object of the entered values, or null if cancelled. opts.validate(values)
 *  may return an error string to show and keep the dialog open. */
function dsForm(title, fields, opts = {}) {
  return dsModal((dlg, done) => {
    const form = document.createElement('form');
    form.method = 'dialog';
    form.className = 'dsdlg-form';
    if (title) {
      const h = document.createElement('p'); h.className = 'dsdlg-title';
      h.textContent = title; form.appendChild(h);
    }
    const inputs = {};
    fields.forEach(f => {
      const label = document.createElement('label'); label.className = 'dsdlg-field';
      if (f.label) { const s = document.createElement('span'); s.textContent = f.label; label.appendChild(s); }
      let input;
      if (f.type === 'select') {
        input = document.createElement('select');
        (f.options || []).forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value; opt.textContent = o.label;
          input.appendChild(opt);
        });
        if (f.value != null) input.value = f.value;
      } else if (f.type === 'textarea') {
        input = document.createElement('textarea');
        input.value = f.value || '';
        if (f.placeholder) input.placeholder = f.placeholder;
      } else {
        input = document.createElement('input');
        input.type = 'text';
        input.value = f.value || '';
        if (f.placeholder) input.placeholder = f.placeholder;
        if (f.readOnly) input.readOnly = true;
      }
      input.name = f.name;
      if (f.required) input.required = true;
      label.appendChild(input);
      inputs[f.name] = input;
      form.appendChild(label);
    });
    const err = document.createElement('p'); err.className = 'dsdlg-err'; form.appendChild(err);
    const btns = document.createElement('div'); btns.className = 'dsdlg-btns';
    const cancel = document.createElement('button');
    cancel.type = 'button'; cancel.className = 'dsdlg-cancel';
    cancel.textContent = opts.cancelLabel || 'Cancel';
    const ok = document.createElement('button');
    ok.type = 'submit'; ok.className = 'dsdlg-ok' + (opts.danger ? ' danger' : '');
    ok.textContent = opts.okLabel || 'OK';
    btns.append(cancel, ok); form.appendChild(btns);
    cancel.onclick = () => done(null);
    form.onsubmit = e => {
      e.preventDefault();
      const values = {};
      for (const k in inputs) values[k] = inputs[k].value;
      if (opts.validate) { const msg = opts.validate(values); if (msg) { err.textContent = msg; return; } }
      done(values);
    };
    dlg.appendChild(form);
    const first = fields[0] && inputs[fields[0].name];
    if (first) setTimeout(() => { first.focus(); first.select && first.select(); }, 0);
  });
}

/** A yes/no dialog. Resolves true only on the confirm button. */
function dsConfirm(message, opts = {}) {
  return dsModal((dlg, done) => {
    const form = document.createElement('form');
    form.method = 'dialog'; form.className = 'dsdlg-form';
    const msg = document.createElement('p'); msg.className = 'dsdlg-msg';
    msg.textContent = message; form.appendChild(msg);
    const btns = document.createElement('div'); btns.className = 'dsdlg-btns';
    const cancel = document.createElement('button');
    cancel.type = 'button'; cancel.className = 'dsdlg-cancel';
    cancel.textContent = opts.cancelLabel || 'Cancel';
    const ok = document.createElement('button');
    ok.type = 'submit'; ok.className = 'dsdlg-ok' + (opts.danger ? ' danger' : '');
    ok.textContent = opts.okLabel || 'OK';
    btns.append(cancel, ok); form.appendChild(btns);
    cancel.onclick = () => done(false);
    form.onsubmit = e => { e.preventDefault(); done(true); };
    dlg.appendChild(form);
    setTimeout(() => ok.focus(), 0);
  }).then(v => v === true);
}

/** A single-field prompt. Resolves the string, or null if cancelled. */
async function dsPrompt(message, value = '', opts = {}) {
  const r = await dsForm(opts.title || '', [{
    name: 'value', label: message, type: opts.multiline ? 'textarea' : 'text',
    value, placeholder: opts.placeholder, readOnly: opts.readOnly, required: opts.required,
  }], opts);
  return r ? r.value : null;
}

/** An acknowledge-only dialog. */
function dsAlert(message) {
  return dsModal((dlg, done) => {
    const form = document.createElement('form');
    form.method = 'dialog'; form.className = 'dsdlg-form';
    const msg = document.createElement('p'); msg.className = 'dsdlg-msg';
    msg.textContent = message; form.appendChild(msg);
    const btns = document.createElement('div'); btns.className = 'dsdlg-btns';
    const ok = document.createElement('button');
    ok.type = 'submit'; ok.className = 'dsdlg-ok'; ok.textContent = 'OK';
    btns.appendChild(ok); form.appendChild(btns);
    form.onsubmit = e => { e.preventDefault(); done(); };
    dlg.appendChild(form);
    setTimeout(() => ok.focus(), 0);
  });
}

let py = null, source = '', original = '', dirty = false, editing = false;
let lastFit = [];
let layout = null, layoutOrig = '', scrollTopWas = 0;

async function get(u) {
  // no-store: a query string alone does not reliably defeat the raw CDN,
  // and a stale renderer silently produces a wrong page.
  const r = await fetch(bust(u), { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${u}`);
  return r.text();
}

// --- projects: one editor, many reports ------------------------------------
// projects.json beside this file maps an id to the directory holding that
// report's engine/ (relative to this page, or an absolute URL — GitHub Pages
// sends CORS, so another repo's site works). ?project=<id> picks one; no
// param, a missing registry, or an unknown id all mean the engine/ next door,
// which is exactly the single-project editor this grew from.
let PROJECT = new URLSearchParams(location.search).get('project') || '';
let PBASE = '';                 // '' = this directory
let REGISTRY = null;

const withBase = u => PBASE ? PBASE.replace(/\/+$/, '') + '/' + u : u;

/** Every URL the editor writes carries the project, so a draft link, a
 *  reload, or a post-publish reset never quietly jumps projects. */
const pageUrl = extra => {
  const q = new URLSearchParams();
  if (PROJECT) q.set('project', PROJECT);
  if (extra) for (const k in extra) q.set(k, extra[k]);
  const s = q.toString();
  return location.pathname + (s ? '?' + s : '');
};

async function loadRegistry() {
  try { REGISTRY = JSON.parse(await get('projects.json')); } catch (e) { REGISTRY = null; }
  if (!REGISTRY) { PROJECT = ''; return; }
  if (PROJECT && REGISTRY[PROJECT]) PBASE = REGISTRY[PROJECT].base || '';
  else PROJECT = '';            // unknown id: fall back to the default engine
  const ids = Object.keys(REGISTRY);
  if (ids.length < 2) return;   // one project: no picker, nothing to switch to
  const defaultId = ids.find(id => !(REGISTRY[id].base || '')) || ids[0];
  const sel = $('proj');
  sel.innerHTML = ids.map(id =>
    `<option value="${id}">${REGISTRY[id].name || id}</option>`).join('');
  sel.value = PROJECT || defaultId;
  sel.hidden = false;
  sel.onchange = async () => {
    if (dirty && !await dsConfirm('Switch project? Unsaved edits here are lost.',
        { okLabel: 'Switch', danger: true })) {
      sel.value = PROJECT || defaultId; return;
    }
    location.href = location.pathname + '?project=' + encodeURIComponent(sel.value);
  };
}

// content.md is [[key]] lines followed by their text. Reading and rewriting a
// single slot is all the editor needs, so it works on the raw string and
// leaves every byte it did not touch exactly as it was.
//
// No 'm' flag, deliberately: under it '$' means end-of-LINE, which ended every
// slot at its first line. Multi-line slots — the sources list, a two-paragraph
// block — would open truncated and save the rest into oblivion. Here '$' means
// end of input, and the marker is anchored by hand.
const rxEsc = k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const slotRe = k => new RegExp(`((?:^|\\n)\\[\\[${rxEsc(k)}\\]\\]\\n)([\\s\\S]*?)(?=\\n\\[\\[|$)`);
const readSlot  = k => (source.match(slotRe(k)) || [,,''])[2].trim();
// The renderer's own rule for a sources line (content.py parse_sources): a
// malformed line there fails the whole BUILD, hours later and far from its
// cause — the "25-2027/" incident was one stray URL fragment on its own line.
// So the sources slot is validated AT THE WRITE: a value that would not build
// is refused loudly right here, naming the bad line, and nothing changes.
const SOURCE_LINE_RE = /^\[[^\]]+\]:\s*.*?\s+—\s+\S+\s*$/;
const badSourceLines = v => v.split('\n').map(l => l.trim()).filter(Boolean)
  .filter(l => !SOURCE_LINE_RE.test(l));
const writeSlot = (k, v) => {
  if (k === 'sources') {
    const bad = badSourceLines(v);
    if (bad.length) {
      console.warn('refused malformed sources line(s):', bad);
      $('stat').textContent = `refused a malformed sources line: "${bad[0].slice(0, 70)}" — nothing was saved`;
      return;
    }
  }
  source = source.replace(slotRe(k), (m, head) => head + v.trim() + '\n');
};

// --- markdown <-> rich text --------------------------------------------
// The contenteditable edit surface shows exactly what the report will
// render, so this re-derives the same HTML content.py's md_inline() /
// paragraphs() / block_html() produce server-side, and reverses it on save.
// One grammar, two directions: images, links (never a footnote ref — same
// exclusion as Python), bold, italic, footnote refs as non-editable chips,
// plus (only for allowLists surfaces — block_html() is the only renderer
// that gives them meaning) '#'/'##' headings and '- '/'N. ' lists.
//
// Bold+italic together don't round-trip through md_inline's regexes (the
// bold pass' non-greedy match eats into a following italic marker), so the
// toolbar keeps the two mutually exclusive rather than let the UI create
// markup that silently corrupts on save — see boldItalicBlocked().
const escAttr = s => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');

function mdInlineToHtml(text) {
  // Footnote refs first — an editor-only concept (Python leaves [^id]
  // literal, for later document-wide resolution) — stashed before anything
  // else so no other pass can split or escape into the middle of one.
  const fns = [];
  let s = text.replace(/\[\^([^\]]+)\]/g, (m, id) => {
    fns.push(id);
    return `\x00FN${fns.length - 1}\x00`;
  });
  // Images, then links — same order and same footnote-ref exclusion as
  // content.py's md_inline, so a link can never swallow a stashed footnote.
  const imgs = [];
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (m, alt, src) => {
    imgs.push([alt, src]);
    return `\x00IMG${imgs.length - 1}\x00`;
  });
  const urls = [];
  s = s.replace(/\[([^\]^][^\]]*)\]\((https?:\/\/[^)\s]+)\)/g, (m, txt, url) => {
    urls.push(url);
    return `\x00LINK${urls.length - 1}\x00${txt}\x01`;
  });
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  s = s.replace(/\*\*([\s\S]+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/(?<![\w*])\*(?!\s)([\s\S]+?)(?<!\s)\*(?![\w*])/g, '<i>$1</i>');
  s = s.replace(/\x00LINK(\d+)\x00([\s\S]*?)\x01/g,
    (m, i, inner) => `<a href="${escAttr(urls[+i])}">${inner}</a>`);
  s = s.replace(/\x00IMG(\d+)\x00/g, (m, i) => {
    const [alt, src] = imgs[+i];
    return `<img class="inline-img" contenteditable="false" src="${escAttr(src)}" alt="${escAttr(alt)}">`;
  });
  s = s.replace(/\x00FN(\d+)\x00/g, (m, i) =>
    `<span class="ds-chip ds-fnchip" contenteditable="false" data-fn-id="${escAttr(fns[+i])}">[^${fns[+i]}]</span>`);
  return s;
}

/** A slot's raw markdown -> the contenteditable's initial innerHTML.
 *  inline: one run, no <p> wrapper (a heading, a caption, a table cell).
 *  allowLists: block_html()'s grammar (headings + lists) — editBox/extras
 *  targets only; every other slot goes through paragraphs(), which has no
 *  block structure beyond blank-line-separated <p>s. */
function mdToHtml(md, { allowLists = false, inline = false } = {}) {
  if (inline) return mdInlineToHtml((md || '').trim());
  if (!allowLists) {
    const chunks = (md || '').trim().split(/\n\s*\n/).filter(c => c.trim());
    if (!chunks.length) return '<p><br></p>';
    return chunks.map(c => {
      const line = c.split('\n').map(l => l.trim()).filter(Boolean).join(' ');
      return `<p>${mdInlineToHtml(line)}</p>`;
    }).join('');
  }
  // block_html()'s line-by-line state machine: '#'/'##' heading, '- '
  // bulleted, 'N.'/'N)' numbered, blank-line-separated paragraphs otherwise.
  const out = [];
  let para = [], items = [], ordered = false;
  const flushPara = () => { if (para.length) { out.push(`<p>${mdInlineToHtml(para.join(' '))}</p>`); para = []; } };
  const flushItems = () => {
    if (items.length) {
      const tag = ordered ? 'ol' : 'ul';
      out.push(`<${tag}>${items.map(i => `<li>${mdInlineToHtml(i)}</li>`).join('')}</${tag}>`);
      items = [];
    }
  };
  for (const raw of (md || '').split('\n')) {
    const s = raw.trim();
    if (!s) { flushPara(); flushItems(); continue; }
    const h = s.match(/^(#{1,6})\s+(.*)$/);
    if (h) {
      flushPara(); flushItems();
      out.push(h[1].length <= 2 ? `<h2>${mdInlineToHtml(h[2])}</h2>` : `<h3>${mdInlineToHtml(h[2])}</h3>`);
      continue;
    }
    const n = s.match(/^(\d+)[.)]\s+(.*)$/);
    if (s.startsWith('- ') || n) {
      const isOrdered = !!n;
      if (items.length && ordered !== isOrdered) flushItems();
      flushPara();
      ordered = isOrdered;
      items.push(n ? n[2].trim() : s.slice(2).trim());
      continue;
    }
    flushItems();
    para.push(s);
  }
  flushPara(); flushItems();
  return out.length ? out.join('') : '<p><br></p>';
}

function nodeToMdInline(node) {
  let out = '';
  node.childNodes.forEach(n => {
    // Zero-width spaces are caret scaffolding (insertBreak drops one after a
    // <br> so the new line is reachable). They are never content.
    if (n.nodeType === Node.TEXT_NODE) { out += n.nodeValue.replace(/​/g, ''); return; }
    if (n.nodeType !== Node.ELEMENT_NODE) return;
    if (n.classList && n.classList.contains('ds-fnchip')) { out += `[^${n.dataset.fnId}]`; return; }
    const tag = n.tagName;
    if (tag === 'B' || tag === 'STRONG') { out += `**${nodeToMdInline(n)}**`; return; }
    if (tag === 'I' || tag === 'EM') { out += `*${nodeToMdInline(n)}*`; return; }
    if (tag === 'A') { out += `[${nodeToMdInline(n)}](${n.getAttribute('href') || ''})`; return; }
    if (tag === 'IMG') { out += `![${n.getAttribute('alt') || ''}](${n.getAttribute('src') || ''})`; return; }
    if (tag === 'BR') { out += '\n'; return; }
    out += nodeToMdInline(n);   // unknown wrapper: recurse, don't drop content
  });
  return out;
}

/** The contenteditable's current DOM -> markdown text, the inverse of
 *  mdToHtml — same {allowLists, inline} contract. */
function htmlToMd(root, { allowLists = false, inline = false } = {}) {
  if (inline) return nodeToMdInline(root).trim();
  const blocks = [...root.children];
  const parts = [];
  for (const el of blocks) {
    const tag = el.tagName;
    if (allowLists && tag === 'UL') {
      parts.push([...el.children].map(li => `- ${nodeToMdInline(li).trim()}`).join('\n'));
    } else if (allowLists && tag === 'OL') {
      parts.push([...el.children].map((li, i) => `${i + 1}. ${nodeToMdInline(li).trim()}`).join('\n'));
    } else if (allowLists && tag === 'H2') {
      parts.push(`## ${nodeToMdInline(el).trim()}`);
    } else if (allowLists && tag === 'H3') {
      parts.push(`### ${nodeToMdInline(el).trim()}`);
    } else {
      const text = nodeToMdInline(el).trim();
      if (text) parts.push(text);
    }
  }
  return parts.join('\n\n').trim();
}

/** True when the selection sits inside a <b> while about to apply italic
 *  (or vice versa) — md_inline's bold/italic regexes don't round-trip a
 *  combined ***bold italic*** span, so the toolbar refuses to create one. */
function boldItalicBlocked(d, which) {
  const sel = d.getSelection();
  if (!sel || !sel.rangeCount) return false;
  let n = sel.getRangeAt(0).commonAncestorContainer;
  if (n.nodeType === Node.TEXT_NODE) n = n.parentElement;
  const other = which === 'bold' ? ['I', 'EM'] : ['B', 'STRONG'];
  for (let e = n; e; e = e.parentElement) {
    if (e.tagName && other.includes(e.tagName)) return true;
    if (e.classList && e.classList.contains('ds-edit')) break;
  }
  return false;
}

// --- bold / italic, without execCommand ---------------------------------
// document.execCommand is deprecated: it still works in Chromium, but it is
// unspecified, unmaintained, and free to change under us. These three do the
// same jobs on Ranges — the whole reason it is only three is that the
// grammar is small (see content.py's md_inline: bold, italic, and nothing
// that nests).
//
// extractContents() is what makes this short: it SPLITS partially-selected
// ancestors on the way out. Selecting "wor" inside <b>hello world</b> hands
// back <b>wor</b> and leaves <b>hello </b><b>ld</b> behind — so unbolding is
// "extract, strip the tag, put it back", with the awkward half-covered case
// already handled.
const MARK_TAGS = { b: ['B', 'STRONG'], i: ['I', 'EM'] };

function hasMarkAncestor(node, tags, host) {
  for (let e = node.nodeType === Node.TEXT_NODE ? node.parentElement : node;
       e && e !== host.parentElement; e = e.parentElement) {
    if (e.tagName && tags.includes(e.tagName)) return true;
    if (e === host) break;
  }
  return false;
}

/** Is every word in the selection already inside this mark? Decides whether
 *  the button turns the mark on or off, and whether it draws as active. */
function markActive(d, host, tag) {
  const sel = d.getSelection();
  if (!sel || !sel.rangeCount) return false;
  const tags = MARK_TAGS[tag];
  const r = sel.getRangeAt(0);
  if (r.collapsed) return hasMarkAncestor(r.startContainer, tags, host);
  const w = d.createTreeWalker(host, NodeFilter.SHOW_TEXT);
  let seen = 0;
  while (w.nextNode()) {
    const n = w.currentNode;
    if (!n.nodeValue.trim() || !sel.containsNode(n, true)) continue;
    seen++;
    if (!hasMarkAncestor(n, tags, host)) return false;
  }
  return seen > 0;
}

/** The mark element wholly CONTAINING the range, if there is one.
 *
 *  This is the case extractContents cannot help with. It splits ancestors
 *  that are only partly covered, but a mark the range sits entirely inside
 *  is the common ancestor, not a partly-covered one — so extracting from
 *  inside <b>hello world</b> hands back a bare "wor" and leaves the <b>
 *  whole. Un-bolding part of a run therefore has to split the run by hand.
 */
function containingMark(host, r, tags) {
  let n = r.commonAncestorContainer;
  if (n.nodeType === Node.TEXT_NODE) n = n.parentElement;
  for (; n && n !== host; n = n.parentElement) {
    if (n.tagName && tags.includes(n.tagName)) return n;
  }
  return null;
}

/** Split `mark` around `r` and drop the covered middle out of it:
 *  <b>hello world</b> + "wor" -> <b>hello </b>wor<b>ld</b>.
 *  Returns the now-unmarked nodes. */
function splitMarkOut(d, mark, r) {
  // Tail first: extracting it cannot disturb the range's START, whereas
  // taking the head first would move the end offset out from under us.
  const tailR = d.createRange();
  tailR.selectNodeContents(mark);
  tailR.setStart(r.endContainer, r.endOffset);
  const tail = tailR.extractContents();

  const headR = d.createRange();
  headR.selectNodeContents(mark);
  headR.setEnd(r.startContainer, r.startOffset);
  const head = headR.extractContents();

  const out = d.createDocumentFragment();
  if (head.textContent) { const c = mark.cloneNode(false); c.appendChild(head); out.appendChild(c); }
  const mid = [];
  while (mark.firstChild) { mid.push(mark.firstChild); out.appendChild(mark.firstChild); }
  if (tail.textContent) { const c = mark.cloneNode(false); c.appendChild(tail); out.appendChild(c); }
  mark.replaceWith(out);
  return mid;
}

function toggleMark(d, host, tag) {
  const sel = d.getSelection();
  if (!sel || !sel.rangeCount) return;
  const r = sel.getRangeAt(0);
  if (r.collapsed) return;              // no "pending mark" state; select first
  const tags = MARK_TAGS[tag];
  const off = markActive(d, host, tag);

  let inserted;
  const inside = off ? containingMark(host, r, tags) : null;
  if (inside) {
    inserted = splitMarkOut(d, inside, r);
  } else {
    const frag = r.extractContents();
    // Either way the mark inside the selection goes: turning it OFF is the
    // point, and turning it ON must not nest <b> in <b> (which would
    // serialize to ****doubled**** stars and render as literal asterisks).
    frag.querySelectorAll(tags.join(',')).forEach(el => el.replaceWith(...el.childNodes));
    if (off) {
      inserted = [...frag.childNodes];
      r.insertNode(frag);
    } else {
      const wrap = d.createElement(tag);
      wrap.appendChild(frag);
      r.insertNode(wrap);
      inserted = [wrap];
    }
  }
  // Splitting can leave an empty half behind.
  host.querySelectorAll('b, strong, i, em, a').forEach(el => {
    if (!el.textContent && !el.querySelector('img, .ds-chip')) el.remove();
  });
  // Deliberately no normalize(): merging adjacent text nodes would invalidate
  // the references below, and htmlToMd concatenates them anyway.
  inserted = inserted.filter(n => n.isConnected);
  if (inserted.length) {
    const nr = d.createRange();
    nr.setStartBefore(inserted[0]);
    nr.setEndAfter(inserted[inserted.length - 1]);
    sel.removeAllRanges();
    sel.addRange(nr);
  }
  host.dispatchEvent(new Event('input', { bubbles: true }));
}

/** Shift+Enter in a table cell: a real line break at the caret. */
function insertBreak(d, host) {
  const sel = d.getSelection();
  if (!sel || !sel.rangeCount) return;
  const r = sel.getRangeAt(0);
  r.deleteContents();
  const br = d.createElement('br');
  r.insertNode(br);
  // A trailing <br> is invisible until something follows it — the zero-width
  // space gives the caret a line to land on, and serializing trims it away.
  const pad = d.createTextNode('​');
  br.after(pad);
  const nr = d.createRange();
  nr.setStart(pad, 1);
  nr.collapse(true);
  sel.removeAllRanges();
  sel.addRange(nr);
  host.dispatchEvent(new Event('input', { bubbles: true }));
}

// The open rich editor, if any — what the chrome's #ty-marks group acts on.
// mousedown on the group is prevented so the iframe keeps focus AND its
// selection; without that, pressing Bold up in the chrome would first blur
// the editor, which commits and destroys the very element being formatted.
let richHost = null, richOpts = {};
function syncMarksBar() {
  const seg = $('ty-marks');
  if (!seg) return;
  const on = !!richHost && richOpts.allowMd !== false;
  seg.hidden = !on;
  if (on) {
    $('ty-mul').hidden = $('ty-mol').hidden = !richOpts.allowLists;
  }
  // Slot-level italic/underline read confusingly beside selection-level
  // marks — while editing, the selection is the truth.
  $('ty-i').hidden = $('ty-u').hidden = on;
}

/** Save the current selection's Range if it sits inside `host` — captured
 *  before a modal (dsForm/dsPrompt/file picker) steals focus, so an insert
 *  flow (Cite -&gt; new source, Image upload) can land back at the right
 *  caret instead of wherever focus happens to end up. */
function saveRange(d, host) {
  const sel = d.getSelection();
  if (!sel || !sel.rangeCount) return null;
  const r = sel.getRangeAt(0);
  return host.contains(r.commonAncestorContainer) ? r.cloneRange() : null;
}

/** Insert `node` at `range`'s START (or the end of `host` if the range was
 *  lost to a modal) and collapse the selection just after it. Never deletes
 *  a selection — a citation/image dropped in belongs AT the caret, not in
 *  place of whatever happened to be selected (the editor auto-selects all
 *  text on open, so a Cite click with no intervening click-to-place-caret
 *  would otherwise wipe the field instead of inserting into it). Fires
 *  'input' so the caller's dirty-tracking sees the change. */
function insertNodeAt(d, host, range, node) {
  host.focus();
  const r = range && host.contains(range.commonAncestorContainer)
    ? range
    : (() => { const rr = d.createRange(); rr.selectNodeContents(host); rr.collapse(false); return rr; })();
  r.collapse(true);
  r.insertNode(node);
  r.setStartAfter(node);
  r.collapse(true);
  const sel = d.getSelection();
  sel.removeAllRanges();
  sel.addRange(r);
  host.dispatchEvent(new Event('input', { bubbles: true }));
}

/** Paste what the report can actually render, and nothing else.
 *
 * Left to the browser, pasting from Word or Google Docs drops their whole
 * markup into the page — headings, tables, nested lists, colour spans. None
 * of that survives: htmlToMd keeps text plus b/i/a/img and drops the rest,
 * so the structure vanishes at COMMIT, silently, long after the paste
 * looked like it worked. Better to be honest immediately — run the clipboard
 * through the same round-trip a save would, and insert that. What lands on
 * the page is then, by construction, exactly what will render.
 *
 * A plain-text target (the cover title, an endnote) takes the text only:
 * there is no markdown there to parse, so pasted **stars** must stay stars.
 */
function pasteClean(d, host, e, { allowLists = false, inline = false, allowMd = true } = {}) {
  const cb = e.clipboardData;
  if (!cb) return;                       // no clipboard access: let the browser try
  e.preventDefault();
  const html = allowMd ? cb.getData('text/html') : '';
  const text = cb.getData('text/plain') || '';

  let md;
  if (html) {
    // Normalize through the report's own grammar: parse the foreign markup
    // down to markdown, which discards anything content.py could not emit.
    const tmp = d.createElement('div');
    tmp.innerHTML = html;
    tmp.querySelectorAll('script, style, meta, link').forEach(n => n.remove());
    md = htmlToMd(tmp, { allowLists, inline });
  } else {
    md = text;
  }
  if (!md) return;

  if (!allowMd) {
    // Plain-text slot: insert literally, newlines and all.
    const r = saveRange(d, host);
    insertNodeAt(d, host, r, d.createTextNode(inline ? md.replace(/\s*\n\s*/g, ' ') : md));
    return;
  }

  // Build the nodes the same way opening the editor would, so pasted content
  // is indistinguishable from content that was already there.
  const frag = d.createDocumentFragment();
  const holder = d.createElement('div');
  holder.innerHTML = mdToHtml(md, { allowLists, inline });
  // Inline targets (a heading, a table cell) have no blocks to paste INTO —
  // flatten to one run rather than dropping <p>s inside a <span>.
  if (inline) {
    holder.querySelectorAll('p, li, h2, h3').forEach((b, i) => {
      if (i) b.before(d.createTextNode(' '));
      b.replaceWith(...b.childNodes);
    });
  }
  while (holder.firstChild) frag.appendChild(holder.firstChild);

  const r = saveRange(d, host) || (() => {
    const rr = d.createRange(); rr.selectNodeContents(host); rr.collapse(false); return rr;
  })();
  r.deleteContents();                    // a paste DOES replace the selection
  const last = frag.lastChild;
  r.insertNode(frag);
  if (last) { r.setStartAfter(last); r.collapse(true); }
  const sel = d.getSelection();
  sel.removeAllRanges();
  sel.addRange(r);
  host.dispatchEvent(new Event('input', { bubbles: true }));
}

/**
 * Link and cite, acting on the open editor's selection.
 *
 * mousedown is cancelled on the whole bar: a click would otherwise blur the
 * editor first, which commits and re-renders, so the button would act on an
 * element that no longer exists.
 */
/** The chrome's B/I say what the selection already IS, not just what they do
 *  — the only way to tell bold text from a heavy font once the raw ** is gone
 *  from the page. Wired per document (each render replaces the iframe's
 *  document wholesale, so wire() installs it fresh each time); it acts only
 *  while a rich editor is actually open. This state used to live on an inline
 *  toolbar under the text; that bar had height, and its height shoved the
 *  page around for as long as an edit was open, so the buttons live in the
 *  chrome now and the editing surface is just the words. */
function wireMarkState(d) {
  d.addEventListener('selectionchange', () => {
    if (!richHost || richOpts.allowMd === false) return;
    const mb = $('ty-mb'), mi = $('ty-mi');
    if (!mb || !mi) return;
    mb.disabled = boldItalicBlocked(d, 'bold');
    mi.disabled = boldItalicBlocked(d, 'italic');
    mb.classList.toggle('on', !mb.disabled && markActive(d, richHost, 'b'));
    mi.classList.toggle('on', !mi.disabled && markActive(d, richHost, 'i'));
  });
}

async function link(d, host) {
  const range = saveRange(d, host);
  const url = await dsPrompt('Link URL', 'https://', { title: 'Add a link' });
  if (!url) return;
  const r = range && host.contains(range.commonAncestorContainer) ? range : null;
  const a = d.createElement('a');
  a.href = url;
  if (r && !r.collapsed) {
    // Wrap the selection's contents in the link, preserving any bold/italic
    // already inside it (surroundContents throws on a partial overlap —
    // fall back to extract-wrap-reinsert, the standard workaround).
    try { r.surroundContents(a); }
    catch (e) { a.appendChild(r.extractContents()); r.insertNode(a); }
    r.setStartAfter(a); r.collapse(true);
    d.getSelection().removeAllRanges(); d.getSelection().addRange(r);
    host.dispatchEvent(new Event('input', { bubbles: true }));
  } else {
    a.textContent = 'link text';
    insertNodeAt(d, host, r, a);
  }
}

/** Create a brand-new source and cite it at the caret. One form, not three
 *  sequential prompts — a dismissed field no longer throws away the id and
 *  text already typed, and the duplicate-id check is inline. Shared by the Cite
 *  panel's "+ new source" and the right-click "Add endnote here". */
async function newSourceAt(d, host, range) {
  const r = await dsForm('New endnote', [
    { name: 'id', label: 'Short id (e.g. act99, itep-whopays)', type: 'text', required: true },
    { name: 'text', label: 'Citation text, e.g. "Act 99," 2026.', type: 'text', required: true },
    { name: 'url', label: 'Source URL', type: 'text', value: 'https://', required: true },
  ], { okLabel: 'Add & cite', validate: vals => {
    const id = vals.id.trim();
    if (!id) return 'A short id is required.';
    if (sourceIds().includes(id)) return `[${id}] already exists — pick it from the list.`;
    if (!vals.text.trim()) return 'Citation text is required.';
    if (!vals.url.trim()) return 'A source URL is required.';
    // The sources line format ends "— url" with no spaces in the url; a space
    // here would be refused at the write (see writeSlot's gate) AFTER the
    // citation chip was already placed — catch it while the form is open.
    if (/\s/.test(vals.url.trim())) return 'The URL cannot contain spaces.';
    return '';
  } });
  if (!r) return null;
  const id = r.id.trim();
  addSource(id, r.text.trim(), r.url.trim());
  insertNodeAt(d, host, range, makeFnChip(d, id));
  return id;
}

function makeFnChip(d, id) {
  const chip = d.createElement('span');
  chip.className = 'ds-chip ds-fnchip';
  chip.contentEditable = 'false';
  chip.dataset.fnId = id;
  chip.textContent = `[^${id}]`;
  return chip;
}

/** The right-click endnote menu, shown over the prose editor at the caret.
 *  "Add endnote here" is the direct path the plain prose reader expects;
 *  existing sources are listed to cite without retyping. */
function endnoteMenu(d, host, e) {
  closeMenu(d);
  const range = saveRange(d, host);
  const m = d.createElement('div');
  m.className = 'ds-menu';
  // Keep the editor focused when a menu button is pressed — otherwise the
  // click blurs it, commits the edit, and the caret this menu targets is gone.
  m.addEventListener('mousedown', ev => ev.preventDefault());
  m.style.left = (e.clientX + d.defaultView.scrollX) + 'px';
  m.style.top = (e.clientY + d.defaultView.scrollY) + 'px';
  const head = d.createElement('div');
  head.className = 'ds-menu-head'; head.textContent = 'Endnote'; m.appendChild(head);
  const item = (label, fn) => {
    const b = d.createElement('button');
    b.textContent = label;
    b.addEventListener('click', async () => { closeMenu(d); await fn(); });
    m.appendChild(b);
  };
  item('Add endnote here…', () => newSourceAt(d, host, range));
  // Most-recent first, so a source you just added is right at the top; capped
  // so the menu stays short. The Cite button holds the full list.
  const ids = sourceIds().slice().reverse();
  if (ids.length) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    const h2 = d.createElement('div'); h2.className = 'ds-menu-head'; h2.textContent = 'Cite existing'; m.appendChild(h2);
    ids.slice(0, 12).forEach(id =>
      item(`[${id}] ${(sourceText(id) || '').slice(0, 34)}`, async () => insertNodeAt(d, host, range, makeFnChip(d, id))));
  }
  d.body.appendChild(m);
  // Nudge back on-screen if it would spill off the right/bottom edge.
  const r = m.getBoundingClientRect(), vw = d.defaultView.innerWidth, vh = d.defaultView.innerHeight;
  if (r.right > vw) m.style.left = (e.clientX + d.defaultView.scrollX - r.width) + 'px';
  if (r.bottom > vh) m.style.top = (e.clientY + d.defaultView.scrollY - r.height) + 'px';
}

/** Toggle a bulleted/numbered list on the block-level elements ($host's
 *  direct children — <p>, <h2>/<h3>, an existing <ul>/<ol>) the selection
 *  spans. Mirrors the old line-prefix toggleList's "toggle off when the
 *  whole selection is already one list of the same kind" semantics, but
 *  operates on DOM block structure instead of markdown '- '/'N. ' prefixes,
 *  since a contenteditable has no lines to prefix. */
function blockAncestor(host, node, offset) {
  // Range.selectNodeContents(host) (select-all) points startContainer/
  // endContainer straight at host, offset indexing its childNodes — resolve
  // that to the actual child before walking up, or the walk overshoots host
  // entirely and returns null.
  if (node === host) {
    const kids = host.childNodes;
    node = kids[Math.min(offset ?? 0, kids.length - 1)];
  }
  if (node && node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  while (node && node.parentElement !== host) node = node.parentElement;
  return node;
}
function toggleListRich(d, host, ordered) {
  const sel = d.getSelection();
  if (!sel.rangeCount) return;
  const r = sel.getRangeAt(0);
  const startEl = blockAncestor(host, r.startContainer, r.startOffset);
  const endEl = blockAncestor(host, r.endContainer, r.endOffset);
  if (!startEl || !endEl) return;
  const children = [...host.children];
  let si = children.indexOf(startEl), ei = children.indexOf(endEl);
  if (si === -1 || ei === -1) return;
  if (si > ei) [si, ei] = [ei, si];
  const targets = children.slice(si, ei + 1);
  const wantTag = ordered ? 'OL' : 'UL';
  const allListed = targets.every(el => el.tagName === wantTag);
  if (allListed) {
    for (const list of targets) {
      const ps = [...list.children].map(li => {
        const p = d.createElement('p');
        p.append(...li.childNodes);
        return p;
      });
      list.replaceWith(...ps);
    }
  } else {
    const listEl = d.createElement(ordered ? 'ol' : 'ul');
    for (const el of targets) {
      if (el.tagName === 'UL' || el.tagName === 'OL') {
        [...el.children].forEach(li => listEl.appendChild(li));
      } else {
        const li = d.createElement('li');
        li.append(...el.childNodes);
        listEl.appendChild(li);
      }
    }
    targets[0].replaceWith(listEl);
    targets.slice(1).forEach(el => el.remove());
  }
  host.dispatchEvent(new Event('input', { bubbles: true }));
}

// Uploaded images live in the report's own assets dir; the binding's build
// copies them to the deployed page, so the path in the prose ("assets/x.jpg")
// is the same one the published report uses.
const assetPath = name => (M.assets || 'assets') + '/' + name;
const localImages = new Map();     // path -> data URL, for previewing pre-deploy

// A phone photo lands at 3000-4000px on its long side; every image already in
// this report is under 1400px (checked the actual assets). A canvas resize,
// not a library — there is no build step here beyond Pyodide, and this is a
// well-understood recipe. SVGs are skipped (already vector, already tiny;
// rasterizing one through canvas would only make it worse). Anything already
// under the cap is left byte-for-byte alone, so a small, already-optimized
// image never takes a needless re-encode.
const MAX_IMAGE_DIM = 2000;    // generous for print at ~300dpi on a Letter page
const JPEG_QUALITY = 0.85;

async function compressImageFile(file) {
  if (file.type === 'image/svg+xml') return file;
  let bitmap;
  try { bitmap = await createImageBitmap(file); }
  catch (e) { return file; }               // a format the browser can't decode
  try {
    const scale = Math.min(1, MAX_IMAGE_DIM / Math.max(bitmap.width, bitmap.height));
    if (scale === 1) return file;          // already small enough
    const w = Math.round(bitmap.width * scale), h = Math.round(bitmap.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    // Keep the original format — a PNG may carry transparency a JPEG cannot —
    // and only cut quality for JPEGs, since that is real photo compression.
    const mime = file.type || 'image/png';
    const quality = mime === 'image/jpeg' ? JPEG_QUALITY : undefined;
    const blob = await new Promise(r => canvas.toBlob(r, mime, quality));
    return blob ? new File([blob], file.name, { type: mime }) : file;
  } catch (e) {
    return file;                           // never block an upload on this
  } finally {
    bitmap.close();
  }
}

/** Pick a file, push it to the repo's assets, and hand back its path — the
 *  one upload flow, whether the image lands in prose or replaces another. */
async function uploadImageFile(d, onDone) {
  const tok = await ensureAuth();
  if (!tok) return;
  const inp = d.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.addEventListener('change', async () => {
    let file = inp.files[0];
    if (!file) return;
    const beforeKB = file.size / 1024;
    file = await compressImageFile(file);
    const afterKB = file.size / 1024;
    const shrunk = afterKB < beforeKB * 0.95;   // ignore noise-level changes
    const name = file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-')
                          .replace(/^-|-$/g, '');
    const path = assetPath(name);
    const dataUrl = await new Promise(r => {
      const fr = new FileReader();
      fr.onload = () => r(fr.result);
      fr.readAsDataURL(file);
    });
    const b64 = String(dataUrl).split(',')[1];
    $('stat').textContent = shrunk
      ? `uploading ${name}… (shrunk ${beforeKB.toFixed(0)}KB → ${afterKB.toFixed(0)}KB)`
      : `uploading ${name}…`;
    try {
      // Images ride the draft too: they publish with the prose that uses them
      // instead of landing on main ahead of it. (Local mode keeps main — the
