      '<svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor"><circle cx="2.5" cy="7" r="1.3"/><circle cx="7" cy="7" r="1.3"/><circle cx="11.5" cy="7" r="1.3"/></svg>',
      () => {
        const r = bar.getBoundingClientRect();
        layerMenu(d, mine[0], { clientX: r.left, clientY: r.bottom + 6 });
      });
  }
  page.appendChild(bar);
}
const setSel = (d, ids) => { selIds.clear(); ids.forEach(i => selIds.add(i)); paintSel(d); };
const clearSel = d => { selIds.clear(); paintSel(d); };

/** The one place a mouse-selection is decided, so dragify and the hit-test
 *  agree. Returns whether the element ends up selected (so a drag may follow).
 *  A group selects whole; shift toggles it. To reach one member of a group,
 *  click its row in the Layers panel — alt is the duplicate-drag modifier, so
 *  it cannot also mean "drill in" without the two fighting. */
function selectClick(d, id, e) {
  const members = withGroups([id]);
  if (e.shiftKey) {
    const on = members.every(m => selIds.has(m));
    members.forEach(m => on ? selIds.delete(m) : selIds.add(m));
    paintSel(d);
    return !on;
  }
  // Clicking inside the current selection keeps it (so the group/multi drags);
  // clicking outside replaces it.
  if (!members.every(m => selIds.has(m))) setSel(d, members);
  return true;
}

function arrangeBar(d) {
  const n = selIds.size;
  // The strip is ALWAYS present (disabled when nothing is selected) and the
  // row it lives in is fixed-height — appearing and disappearing with the
  // selection is what made the canvas jump on every click.
  $('arrange').hidden = false;
  if (n) $('type').hidden = true;        // the row holds one toolbar at a time
  const wholeGroup = n > 0 && selGroups().length === 1 && selGroups()[0].length === n
    && selGroups()[0].every(id => selIds.has(id));
  $('ar-count').textContent = !n ? '—'
    : wholeGroup ? `group of ${n}`
    : n === 1 ? [...selIds][0] : `${n} selected`;
  document.querySelectorAll('.ar-al').forEach(b => { b.disabled = !n; });
  $('ar-front').disabled = $('ar-back').disabled = !n;
  $('ar-del').disabled = !n || [...selIds].every(isLocked);
  $('ar-dh').disabled = $('ar-dv').disabled = n < 3;
  $('ar-dup').disabled = !n || ![...selIds].every(id =>
    dupModeOf($('out').contentDocument, id));
  $('ar-group').disabled = !canGroup();
  $('ar-ungroup').disabled = !canUngroup();
  $('ar-lock').disabled = !n;
  const locked = n > 0 && [...selIds].every(isLocked);
  $('ar-lock').classList.toggle('on', locked);
  $('ar-lock').setAttribute('aria-label', locked ? 'Unlock' : 'Lock — a locked element cannot be dragged');
  // The numbers panel: one element, typed placement in inches.
  const one = n === 1 && d ? selEls(d)[0] : null;
  document.querySelectorAll('.ar-pos, #ar-possep').forEach(x => { x.hidden = !one; });
  // Fill control: one selected shape or text box carries its own colour, so it
  // gets a Fill swatch right here in the toolbar (no more right-click needed).
  const fillId = one ? idOf(one) : null;
  const canFill = !!fillId && (layout.shapes.some(s => s.id === fillId) || !!boxOf(fillId) || !!svgMarkEl(fillId));
  $('ar-fill').hidden = !canFill;
  if (!canFill) $('ar-fillpop').hidden = true;
  // An open colour panel follows the selection, and closes when there is
  // nothing single-selected left for it to be about.
  if (!$('side').hidden) {
    if (canFill) { if (sideFillId !== fillId) openColorPanel(fillId); }
    else if (!selIds.size) closeSide();
  }
  if (canFill) {
    const ft = fillTargets(fillId);
    $('ar-fillbar').style.background = fillPreview(ft.get());
    $('ar-fill').setAttribute('aria-label',
      ft.label.includes('olour') ? ft.label : ft.label + ' colour');
  }
  // The rest of the Canva strip, by what the selection can actually take:
  // border and effects need a shape/box behind them; transparency needs any
  // store to keep the alpha in (a designed element grows one when moved).
  const oneSh = fillId && layout.shapes.find(x => x.id === fillId);
  $('ar-border').hidden = !oneSh || ['line', 'icon'].includes(oneSh.kind);
  $('ar-alpha').hidden = !fillId || !(storeOf(fillId) || (layout.positions || {})[fillId]);
  $('ar-fxbtn').hidden = !fillId || !(oneSh || boxOf(fillId));
  if ($('ar-border').hidden) $('ar-borderpop').hidden = true;
  if ($('ar-alpha').hidden) $('ar-alphapop').hidden = true;
  if ($('ar-fxbtn').hidden) $('ar-fxpop').hidden = true;
  if (!one) return;
  const page = one.closest('section.page') || d.querySelector('section.page');
  const b = inchBox(one, page);
  const st = storeOf(idOf(one)) || {};
  $('ar-x').value = (st.x ?? b.x).toFixed(2);
  $('ar-y').value = (st.y ?? b.y).toFixed(2);
  // A graphic reads out as a scale percent, not a width its box would ignore.
  const graphic = isGraphic(one);
  $('ar-wwrap').hidden = graphic;
  $('ar-swrap').hidden = !graphic;
  if (graphic) $('ar-scale').value = Math.round((st.scale || 1) * 100);
  else $('ar-w').value = (st.w ?? b.w).toFixed(2);
  const hasH = !graphic && (!!one.dataset.shape || st.h != null);
  $('ar-hwrap').hidden = !hasH;
  if (hasH) $('ar-h').value = (st.h ?? b.h).toFixed(2);
  $('ar-rot').value = st.rot ?? 0;
}

/** Typed placement goes through the same placer a drag uses — one rule for
 *  what a coordinate means, whichever finger set it. */
const arField = (fid, apply) => $(fid).addEventListener('change', async () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  const el = els[0];
  const page = el.closest('section.page') || d.querySelector('section.page');
  const v = parseFloat($(fid).value);
  if (isNaN(v)) return;
  pushHistory();
  apply(d, el, page, v);
  clearGuides(d);
  markDirty();
  paintSel(d);
});
arField('ar-x', (d, el, page, v) => {
  const P = placer(d, el, page); P.commit(P.put(v, P.box.y, false));
});
arField('ar-y', (d, el, page, v) => {
  const P = placer(d, el, page); P.commit(P.put(P.box.x, v, false));
});
arField('ar-w', (d, el, page, v) => {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  const b = boxOf(id);
  if (sh) { sh.w = v; paintShape(d, id); }
  else if (b) { b.w = v; el.style.width = v + 'in'; }
  else { ensureStore(d, el).w = v; el.style.width = v + 'in'; }
});
arField('ar-h', (d, el, page, v) => {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) { sh.h = v; paintShape(d, id); }
  else { ensureStore(d, el).h = v; el.style.height = v + 'in'; }
});
arField('ar-scale', (d, el, page, v) => {
  const st = ensureStore(d, el);
  const s = Math.max(0.2, Math.min(5, v / 100));
  if (Math.abs(s - 1) < 0.005) delete st.scale; else st.scale = +s.toFixed(3);
  paintRot(d, el);
});
arField('ar-rot', (d, el, page, v) => {
  const st = ensureStore(d, el);
  if (v) st.rot = v; else delete st.rot;
  paintRot(d, el);
});

/** Members of the selection on one page — cross-page alignment has no
 *  meaning, so operations quietly act on the first element's page. */
function pageMembers(d) {
  // Locked means hands off — from align and distribute as much as from a drag.
  const els = selEls(d).filter(el => !isLocked(idOf(el)));
  if (!els.length) return { page: null, els: [] };
  const page = els[0].closest('section.page') || d.querySelector('section.page');
  return { page, els: els.filter(el => (el.closest('section.page')) === page) };
}

// Align: a single element aligns to the page (edges = the text column's
// margins, centres = the true page centre — flush beats touching the trim);
// several align to their own bounding box, which is what "align these" means.
function alignSel(d, mode) {
  const { page, els } = pageMembers(d);
  if (!els.length) return;
  pushHistory();
  const items = els.map(el => ({ el, b: inchBox(el, page) }));
  let ref;
  if (items.length === 1) {
    ref = { x: MARGIN_IN, y: TOP_IN,
            w: PAGE_W_IN - 2 * MARGIN_IN, h: PAGE_H_IN - TOP_IN - 0.9 };
    if (mode === 'hcenter') { ref.x = 0; ref.w = PAGE_W_IN; }
    if (mode === 'vcenter') { ref.y = 0; ref.h = PAGE_H_IN; }
  } else {
    const x1 = Math.min(...items.map(o => o.b.x)), y1 = Math.min(...items.map(o => o.b.y));
    const x2 = Math.max(...items.map(o => o.b.x + o.b.w));
    const y2 = Math.max(...items.map(o => o.b.y + o.b.h));
    ref = { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
  }
  items.forEach(({ el, b }) => {
    let { x, y } = b;
    if (mode === 'left') x = ref.x;
    if (mode === 'hcenter') x = ref.x + (ref.w - b.w) / 2;
    if (mode === 'right') x = ref.x + ref.w - b.w;
    if (mode === 'top') y = ref.y;
    if (mode === 'vcenter') y = ref.y + (ref.h - b.h) / 2;
    if (mode === 'bottom') y = ref.y + ref.h - b.h;
    const P = placer(d, el, page);
    P.commit(P.put(x, y, false));
  });
  clearGuides(d);
  paintSel(d);
}

function distributeSel(d, axis) {
  const { page, els } = pageMembers(d);
  if (els.length < 3) return;
  pushHistory();
  const items = els.map(el => ({ el, b: inchBox(el, page) }))
    .sort((a, q) => axis === 'h' ? a.b.x - q.b.x : a.b.y - q.b.y);
  const first = items[0].b, last = items[items.length - 1].b;
  if (axis === 'h') {
    const gap = ((last.x + last.w - first.x)
               - items.reduce((s, o) => s + o.b.w, 0)) / (items.length - 1);
    let x = first.x;
    items.forEach(({ el, b }) => {
      const P = placer(d, el, page);
      P.commit(P.put(x, b.y, false));
      x += b.w + gap;
    });
  } else {
    const gap = ((last.y + last.h - first.y)
               - items.reduce((s, o) => s + o.b.h, 0)) / (items.length - 1);
    let y = first.y;
    items.forEach(({ el, b }) => {
      const P = placer(d, el, page);
      P.commit(P.put(b.x, y, false));
      y += b.h + gap;
    });
  }
  clearGuides(d);
  paintSel(d);
}

/** Delete what can be deleted: shapes and text boxes cease to exist; a
 *  designed element cannot be deleted, so the key resets its override and
 *  the design's own placement stands again. */
async function deleteSel(d) {
  if (!selIds.size) return;
  pushHistory();
  let touched = false;
  const gone = [];
  [...selIds].filter(id => !isLocked(id)).forEach(id => {
    if (layout.shapes.some(s => s.id === id)) {
      layout.shapes = layout.shapes.filter(s => s.id !== id); touched = true; gone.push(id);
    } else if (boxOf(id)) {
      layout.boxes = boxes().filter(b => b.id !== id.replace(/^text\./, '')); touched = true; gone.push(id);
    } else if (tableOf(id)) {
      layout.tables = tables().filter(t => t.id !== id.replace(/^table\./, '')); touched = true; gone.push(id);
    } else if (layout.positions[id]) {
      delete layout.positions[id]; touched = true;
    }
  });
  forgetInGroups(gone);            // a group loses its deleted members
  selIds.clear();
  if (!touched) { past.pop(); return; }
  markDirty();
  await render();
}

/** Drop ids from any group and discard groups the removal empties below two. */
function forgetInGroups(ids) {
  if (!layout.groups || !ids.length) return;
  const set = new Set(ids);
  layout.groups = layout.groups
    .map(g => g.filter(m => !set.has(m)))
    .filter(g => g.length >= 2);
  if (!layout.groups.length) delete layout.groups;
}

const freeBoxId = () => {
  let n = 1;
  while (boxes().some(b => b.id === 't' + n) || layout.shapes.some(s => s.id === 't' + n)) n++;
  return 't' + n;
};
const freeShapeId = kind => {
  let n = layout.shapes.length + 1;
  while (layout.shapes.some(s => s.id === `s${n}-${kind}`)) n++;
  return `s${n}-${kind}`;
};

/** What Duplicate can honestly offer for this id.
 *  'clone'  — a real second instance (shapes, text boxes, tables).
 *  'asBox'  — a designed element; the copy is a floating TEXT BOX carrying
 *             the same words (or the same image), because a designed element
 *             exists exactly once — but what a person duplicating one wants
 *             is almost never a second heading slot, it is that content,
 *             loose, to restyle and move. Canva's own semantics.
 *  null     — nothing sane to offer (an endnote: it is one row of a numbered
 *             list, and reordering — not duplication — is its drag story). */
function dupModeOf(d, id) {
  if ((id || '').startsWith('endnote.')) return null;
  if (layout.shapes.some(s => s.id === id) || boxOf(id) || tableOf(id)) return 'clone';
  const el = d && d.querySelector(`[data-el="${CSS.escape(id)}"]`);
  if (!el) return null;
  const img = el.tagName === 'IMG' ? el : el.querySelector('img');
  if (img && img.getAttribute('src')) return 'asBox';
  if (el.dataset.slot || el.querySelector('[data-slot]')) return 'asBox';
  return (el.innerText || '').trim() ? 'asBox' : null;
}

/** Duplicate the selection, offset a fifth of an inch. Shapes, boxes and
 *  tables clone outright; a designed element hands back its content as a
 *  text box (see dupModeOf). */
async function duplicateSel(d) {
  const copies = [];
  let asBoxCount = 0;
  const dupDesigned = id => {
    const el = d.querySelector(`[data-el="${CSS.escape(id)}"]`);
    if (!el) return;
    const pg = el.closest('section[data-page]');
    const pid = pg ? (/^\d+$/.test(pg.dataset.page) ? +pg.dataset.page : pg.dataset.page)
                   : visiblePageId();
    const bx = pg ? inchBox(el, pg) : { x: 1, y: 1, w: 3, h: 1 };
    const img = el.tagName === 'IMG' ? el : el.querySelector('img');
    let md;
    if (img && img.getAttribute('src')) {
      md = `![${img.getAttribute('alt') || ''}](${img.getAttribute('src')})`;
    } else {
      // The element's own authored text, from content.md — the DOM's version
      // has footnote markers and editor scaffolding baked in.
      const keys = [...new Set([el.dataset.slot,
        ...[...el.querySelectorAll('[data-slot]')].map(n => n.dataset.slot)].filter(Boolean))];
      const parts = keys.map(k => readSlot(k)).filter(Boolean);
      md = parts.length ? parts.join('\n\n') : (el.innerText || '').trim();
    }
    if (!md) return;
    const nid = freeBoxId();
    boxes().push({ id: nid, page: pid, md,
      x: Math.min(bx.x + 0.2, PAGE_W_IN - 1),
      y: Math.min(bx.y + 0.2, PAGE_H_IN - 0.4),
      w: Math.max(0.8, Math.min(bx.w, PAGE_W_IN - 0.4)), z: 3 });
    copies.push('text.' + nid);
    asBoxCount++;
  };
  const dup = id => {
    const sh = layout.shapes.find(s => s.id === id);
    const b = boxOf(id);
    const t = tableOf(id);
    if (sh) {
      const nid = freeShapeId(sh.kind);
      layout.shapes.push({ ...sh, id: nid,
        x: Math.min(sh.x + 0.2, PAGE_W_IN - Math.min(sh.w, PAGE_W_IN)),
        y: Math.min(sh.y + 0.2, PAGE_H_IN - Math.min(sh.h, PAGE_H_IN)) });
      copies.push(nid);
    } else if (b) {
      const nid = freeBoxId();
      boxes().push({ ...b, id: nid,
        x: Math.min(b.x + 0.2, PAGE_W_IN - Math.min(b.w, PAGE_W_IN)),
        y: Math.min(b.y + 0.2, PAGE_H_IN - 0.4) });
      copies.push('text.' + nid);
    } else if (t) {
      const nid = freeTableId();
      tables().push({ ...clone(t), id: nid,
        x: Math.min(t.x + 0.2, PAGE_W_IN - Math.min(t.w, PAGE_W_IN)),
        y: Math.min(t.y + 0.2, PAGE_H_IN - 0.4) });
      copies.push('table.' + nid);
    } else if (dupModeOf(d, id) === 'asBox') {
      dupDesigned(id);
    }
  };
  if (!selIds.size) return;
  pushHistory();
  const wasGroup = selGroups().length === 1 && selGroups()[0].length === selIds.size
    && selGroups()[0].every(id => selIds.has(id));
  [...selIds].forEach(dup);
  if (!copies.length) { past.pop(); return; }
  // Duplicating a whole group hands back a group — the copy stays together,
  // as Canva's does.
  if (wasGroup && copies.length > 1) {
    layout.groups = layout.groups || [];
    layout.groups.push(copies);
  }
  setSel(d, copies);                       // the copies become the selection
  markDirty();
  await render();
  $('stat').textContent = asBoxCount
    ? `duplicated ${copies.length} — a designed element's copy is a floating text box`
    : `duplicated ${copies.length} element${copies.length > 1 ? 's' : ''}`;
}

// ----------------------------------------------------------- clipboard
// Copy the selection's shapes and boxes, then paste onto the page IN VIEW with
// fresh ids — so an object crosses pages, which ⌘D / alt-drag (same-page only)
// cannot. Designed elements have exactly one instance and no free id, so they
// are never cloned; copySel skips them (matching duplicateSel) and points at
// Copy style instead.
function copySel(d) {
  if (!selIds.size) return;
  const items = [];
  [...selIds].forEach(id => {
    const sh = layout.shapes.find(s => s.id === id);
    const b = boxOf(id);
    if (sh) items.push({ kind: 'shape', data: clone(sh) });
    else if (b) items.push({ kind: 'box', data: clone(b) });
  });
  if (!items.length) {
    $('stat').textContent = "nothing to copy — a designed element can't be copied; try Copy style";
    return;
  }
  const wasGroup = selGroups().length === 1 && selGroups()[0].length === selIds.size
    && selGroups()[0].every(id => selIds.has(id));
  clip = { items, wasGroup, pastes: 0 };
  $('stat').textContent = `copied ${items.length} element${items.length > 1 ? 's' : ''} — ⌘V pastes onto the page in view`;
}

async function pasteClip(d) {
  if (!clip || !clip.items.length) return;
  pushHistory();
  const page = visiblePageId();
  const off = 0.2 * (++clip.pastes);         // repeated pastes cascade
  const copies = [];
  clip.items.forEach(it => {
    if (it.kind === 'shape') {
      const nid = freeShapeId(it.data.kind);
      layout.shapes.push({ ...it.data, id: nid, page,
        x: Math.min(it.data.x + off, PAGE_W_IN - Math.min(it.data.w, PAGE_W_IN)),
        y: Math.min(it.data.y + off, PAGE_H_IN - Math.min(it.data.h, PAGE_H_IN)) });
      copies.push(nid);
    } else {
      const nid = freeBoxId();
      boxes().push({ ...it.data, id: nid, page,
        x: Math.min(it.data.x + off, PAGE_W_IN - Math.min(it.data.w, PAGE_W_IN)),
        y: Math.min(it.data.y + off, PAGE_H_IN - 0.4) });
      copies.push('text.' + nid);
    }
  });
  if (clip.wasGroup && copies.length > 1) {   // a copied group pastes as a group
    layout.groups = layout.groups || [];
    layout.groups.push(copies);
  }
  setSel(d, copies);
  markDirty();
  await render();
  $('stat').textContent = `pasted ${copies.length} element${copies.length > 1 ? 's' : ''} onto page ${page}`;
}

// ------------------------------------------------------- format painter
// Copy one element's STYLE and stamp it onto others of a COMPATIBLE type. The
// subset is per-type; geometry / id / page are never touched. Paste makes each
// target MATCH the source — a key the source lacks is removed from the target —
// so it copies the look exactly rather than merging into it.
const STYLE_SUBSET = {
  shape: ['fill', 'stroke', 'sw', 'dash', 'ends', 'r', 'shadow', 'alpha'],
  box:   ['fill', 'shadow', 'alpha', 'style'],
};
function styleType(d, id) {
  if (layout.shapes.some(s => s.id === id)) return 'shape';
  if (boxOf(id)) return 'box';
  const el = d.querySelector(`[data-el="${CSS.escape(id)}"]`);
  if (!el) return null;
  if (el.matches('[data-slot]') || el.querySelector('[data-slot]')) return null;  // prose: use the type strip
  if (el.tagName === 'IMG' || el.querySelector('img')) return 'image';
  return null;
}
function copyStyle(d) {
  if (selIds.size !== 1) { $('stat').textContent = 'select one element to copy its style'; return; }
  const id = [...selIds][0];
  const type = styleType(d, id);
  let data;
  if (type === 'shape') data = pick(layout.shapes.find(s => s.id === id), STYLE_SUBSET.shape);
  else if (type === 'box') data = pick(boxOf(id), STYLE_SUBSET.box);
  else if (type === 'image') data = {                      // image style lives in TWO stores
    img: pick((layout.img || {})[id] || {}, ['radius', 'filter']),
    flip: ((layout.positions || {})[id] || {}).flip };
  else { $('stat').textContent = 'that element has no copyable style'; return; }
  styleClip = { type, data: clone(data) };
  $('stat').textContent = `style copied — select ${type}${type === 'box' ? 'es' : 's'} and press ⌘⌥V to paste it`;
}
async function pasteStyle(d) {
  if (!styleClip) { $('stat').textContent = 'copy a style first (⌘⌥C)'; return; }
  const targets = [...selIds].filter(id => styleType(d, id) === styleClip.type);
  if (!targets.length) { $('stat').textContent = `paste style needs a selected ${styleClip.type}`; return; }
  pushHistory();
  targets.forEach(id => {
    if (styleClip.type === 'image') {
      layout.img = layout.img || {};
      const g = layout.img[id] || (layout.img[id] = {});
      ['radius', 'filter'].forEach(k =>
        styleClip.data.img[k] !== undefined ? g[k] = clone(styleClip.data.img[k]) : delete g[k]);
      if (!Object.keys(g).length) delete layout.img[id];
      layout.positions = layout.positions || {};
      const p = layout.positions[id] || (layout.positions[id] = {});
      styleClip.data.flip !== undefined ? p.flip = styleClip.data.flip : delete p.flip;
      if (!Object.keys(p).length) delete layout.positions[id];
    } else {
      const obj = styleClip.type === 'shape' ? layout.shapes.find(s => s.id === id) : boxOf(id);
      if (!obj) return;
      STYLE_SUBSET[styleClip.type].forEach(k =>
        styleClip.data[k] !== undefined ? obj[k] = clone(styleClip.data[k]) : delete obj[k]);
    }
  });
  markDirty();
  await render();
  $('stat').textContent = `style pasted to ${targets.length} ${styleClip.type}${targets.length > 1 ? 's' : ''}`;
}

function toggleLockSel(d) {
  if (!selIds.size) return;
  pushHistory();
  const all = [...selIds];
  const locked = all.every(isLocked);
  layout.locked = locked ? lockedList().filter(id => !selIds.has(id))
                         : [...new Set([...lockedList(), ...all])];
  if (!layout.locked.length) delete layout.locked;
  markDirty();
  paintSel(d);
  $('stat').textContent = locked ? 'unlocked' : 'locked — drag is off until unlocked';
}

// ------------------------------------------------------------------ groups
// A group ties elements together so a click on one moves them all. It is a
// list in layout.json and nothing more — the renderer never sees it. Grouping
// pulls any members already in OTHER groups out of those first (an element
// belongs to one group), and drops groups the merge empties.
function groupSel(d) {
  const ids = [...selIds];
  if (ids.length < 2) return;
  pushHistory();
  const set = new Set(ids);
  layout.groups = (layout.groups || [])
    .map(g => g.filter(m => !set.has(m)))
    .filter(g => g.length >= 2);
  layout.groups.push(ids);
  markDirty();
  paintSel(d);
  $('stat').textContent = `grouped ${ids.length} elements — they move as one`;
}

function ungroupSel(d) {
  const gs = selGroups();
  if (!gs.length) return;
  pushHistory();
  layout.groups = (layout.groups || []).filter(g => !gs.includes(g));
  if (!layout.groups.length) delete layout.groups;
  markDirty();
  paintSel(d);
  $('stat').textContent = 'ungrouped';
}
// Group when 2+ are selected and they are not already one whole group;
// ungroup when the selection is (or holds) a group.
const canGroup = () => selIds.size >= 2 &&
  !(selGroups().length === 1 && selGroups()[0].length === selIds.size
    && selGroups()[0].every(id => selIds.has(id)));
const canUngroup = () => selGroups().length > 0;

let lastNudge = 0;
function nudgeSel(d, d4) {
  const els = selEls(d).filter(el => !isLocked(idOf(el)));
  if (!els.length) return;
  // One undo step per burst of presses, not one per pixel of progress.
  const now = Date.now();
  if (now - lastNudge > 900) pushHistory();
  lastNudge = now;
  els.forEach(el => {
    const page = el.closest('section.page') || d.querySelector('section.page');
    const P = placer(d, el, page);
    P.commit(P.put(P.box.x + d4[0], P.box.y + d4[1], false));
  });
  clearGuides(d);
  paintSel(d);
}

/** The placed element under a point, topmost first — by GEOMETRY, not by DOM
 *  hit-testing. The DOM lies here: a transparent container (the cover's inner
 *  wrapper) or a paragraph above a z:-1 shape swallows the mousedown, and the
 *  thing you can plainly SEE never hears it. Ties go to the later element,
 *  which is the one painted on top. */
function hitPlaced(d, pg, e) {
  const px = DPI * zoomOf(pg);
  const pr = pg.getBoundingClientRect();
  const x = (e.clientX - pr.left) / px, y = (e.clientY - pr.top) / px;
  let best = null, bestZ = -Infinity;
  pg.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    // Nested movables belong to their outer object — same rule as dragify.
    if (el.parentElement && el.parentElement.closest('[data-el]')) return;
    const b = inchBox(el, pg);
    if (!b.w && !b.h) return;
    if (x < b.x || x > b.x + b.w || y < b.y || y > b.y + b.h) return;
    const z = zOf(idOf(el));
    if (z >= bestZ) { bestZ = z; best = el; }
  });
  return best;
}

/** Rubber-band select: drag on empty page. A click that never travels is a
 *  click-away, which clears the selection — one gesture, both meanings. */
function marquee(d, pg, e0) {
  const px = DPI * zoomOf(pg);
  const pr = pg.getBoundingClientRect();
  const ox = (e0.clientX - pr.left) / px, oy = (e0.clientY - pr.top) / px;
  const box = d.createElement('div');
  box.className = 'ds-marquee';
  pg.appendChild(box);
  let r = null;
  const move = e => {
    const x = (e.clientX - pr.left) / px, y = (e.clientY - pr.top) / px;
    r = { x: Math.min(ox, x), y: Math.min(oy, y),
          w: Math.abs(x - ox), h: Math.abs(y - oy) };
    box.style.cssText = `left:${r.x}in;top:${r.y}in;width:${r.w}in;height:${r.h}in`;
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    box.remove();
    if (!r || (r.w < 0.05 && r.h < 0.05)) { clearSel(d); return; }
    const hit = [];
    pg.querySelectorAll('[data-el], [data-shape]').forEach(el => {
      if (el.parentElement && el.parentElement.closest('[data-el]')) return;
      const b = inchBox(el, pg);
      if ((b.w || b.h) && b.x < r.x + r.w && b.x + b.w > r.x
          && b.y < r.y + r.h && b.y + b.h > r.y)
        hit.push(idOf(el));
    });
    // A group is all-or-nothing: touch one member, take them all.
    const all = withGroups(hit);
    setSel(d, all);
    $('stat').textContent = all.length ? `${all.length} selected` : '';
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Keyboard, inside the page: the top-level listener never hears iframe keys
 *  (undo was dead whenever focus sat in the report — a real bug until now). */
function keysFor(d) {
  d.addEventListener('keydown', e => {
    if (editing) return;
    const t = e.target;
    if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT'
              || t.tagName === 'SELECT' || t.isContentEditable)) return;
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
      e.preventDefault(); e.shiftKey ? redo() : undo(); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') {
      e.preventDefault(); duplicateSel(d); return;
    }
    // ⌘C/⌘V copy objects; ⌥ makes it the format painter (copy/paste style).
    // Guard on there being something to act on, so a bare ⌘C/⌘V still reaches
    // the browser's own copy/paste.
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'c' && selIds.size) {
      e.preventDefault(); e.altKey ? copyStyle(d) : copySel(d); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'v' && (e.altKey ? styleClip : clip)) {
      e.preventDefault(); e.altKey ? pasteStyle(d) : pasteClip(d); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'g') {
      e.preventDefault(); e.shiftKey ? ungroupSel(d) : groupSel(d); return;
    }
    if ((e.metaKey || e.ctrlKey) && (e.key === ']' || e.key === '[')) {
      e.preventDefault(); layerStep(d, e.key === ']' ? 1 : -1, e.altKey); return;
    }
    if (!selIds.size) return;
    if (e.key === 'Escape') { clearSel(d); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault(); deleteSel(d); return;
    }
    if (t && held.get(t)) return;          // keyDrag owns a picked-up element
    const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
    const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
                 ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
    if (d4) { e.preventDefault(); nudgeSel(d, d4); }
  });
}

// ------------------------------------------------------------------- pages
// The rail is the page-order editor. layout.pages holds order + blanks and IS
// the truth; the renderer stamps every designed page's identity and hands over
// a metadata list of all of them (labels, and the ones currently hidden). So
// the rail = the order, drawn from what the report says exists.
let designedPages = [];                  // [{id, label}] from ds-pagemeta

function pageOrder() {
  // Default: every designed page in identity order. An explicit order may hide
  // (by omission) and interleave blanks.
  if (layout.pages && layout.pages.order && layout.pages.order.length)
    return layout.pages.order.slice();
  return designedPages.map(p => p.id);
}
function pageBlanks() { return (layout.pages && layout.pages.blanks) || []; }

function writeOrder(order, blanks) {
  const dflt = designedPages.map(p => p.id);
  const isDefault = !blanks.length
    && order.length === dflt.length && order.every((v, i) => v === dflt[i]);
  if (isDefault) {                        // no override = byte-identical build
    if (layout.pages) delete layout.pages;
  } else {
    layout.pages = { order };
    if (blanks.length) layout.pages.blanks = blanks;
  }
  markDirty();
}

function railRender() {
  const list = $('rail-list');
  if (!designedPages.length) { $('rail').hidden = true; return; }
  $('rail').hidden = false;
  list.innerHTML = '';
  const order = pageOrder();
  const labelOf = id => (designedPages.find(p => p.id === id) || {}).label;
  const hidden = designedPages.filter(p => !order.includes(p.id));
  order.forEach((pid, i) => list.appendChild(chip(pid, i + 1, labelOf(pid), false)));
  if (hidden.length) {
    const sep = document.createElement('div');
    sep.id = 'rail-head'; sep.textContent = 'Hidden';
    list.appendChild(sep);
    hidden.forEach(p => list.appendChild(chip(p.id, null, p.label, true)));
  }
}

function chip(pid, pos, label, isHidden) {
  const isBlank = typeof pid === 'string';
  const c = document.createElement('div');
  c.className = 'chip' + (isBlank ? ' blank' : '') + (isHidden ? ' hidden-pg' : '');
  c.dataset.pid = pid;
  c.draggable = !isHidden;
  c.innerHTML = `<span class="chip-n">${isHidden ? '—' : pos}</span>`
    + `<span class="chip-lab">${isBlank ? 'blank page' : (label || 'page ' + pid)}</span>`;
  // Show/hide (designed only) or delete (blank).
  if (isBlank) {
    const x = document.createElement('button');
    x.className = 'chip-x'; x.textContent = '×'; x.setAttribute('aria-label', 'Delete this blank page');
    x.addEventListener('click', async e => {
      e.stopPropagation();
      // A blank page has no content.md tie to "un-hide" back to — unlike a
      // designed page, deleting it is really final, so anything placed there
      // is about to become unreachable. Ask first, same as any other
      // permanent loss (a saved draft, a source).
      const onPage = layout.shapes.filter(s => s.page === pid)
        .concat(boxes().filter(b => b.page === pid))
        .concat(tables().filter(t => t.page === pid));
      if (onPage.length) {
        const n = onPage.length;
        if (!await dsConfirm(
            `Delete this blank page? It has ${n} element${n > 1 ? 's' : ''} on it — `
            + `they go with it and cannot be recovered from here.`,
            { okLabel: 'Delete page', danger: true })) return;
      }
      pushHistory();
      const blanks = pageBlanks().filter(b => b.id !== pid);
      writeOrder(pageOrder().filter(p => p !== pid), blanks);
      // Nothing can render on a page that no longer exists — orphaned shapes/
      // boxes/tables would otherwise sit invisible in layout.json and silently
      // reappear if a future blank page reused this same id.
      const gone = [];
      layout.shapes = layout.shapes.filter(s => {
        if (s.page !== pid) return true; gone.push(s.id); return false;
      });
      layout.boxes = boxes().filter(b => {
        if (b.page !== pid) return true; gone.push('text.' + b.id); return false;
      });
      layout.tables = tables().filter(t => {
        if (t.page !== pid) return true; gone.push('table.' + t.id); return false;
      });
      forgetInGroups(gone);
      gone.forEach(id => selIds.delete(id));
      if (layout.locked) layout.locked = layout.locked.filter(id => !gone.includes(id));
      await render();
      $('stat').textContent = `page deleted`;
    });
    c.appendChild(x);
  } else {
    const eye = document.createElement('button');
    eye.className = 'chip-eye';
    eye.textContent = isHidden ? '𐄂' : '👁';
    eye.setAttribute('aria-label', isHidden ? 'Show this page' : 'Hide this page from the report');
    eye.addEventListener('click', async e => {
      e.stopPropagation();
      pushHistory();
      let order = pageOrder();
      if (isHidden) {
        // Re-show at its designed position among the visible pages.
        const target = pid;
        order = order.slice();
        const after = designedPages.filter(p => p.id < target).map(p => p.id);
        let at = 0;
        for (let k = 0; k < order.length; k++) if (after.includes(order[k])) at = k + 1;
        order.splice(at, 0, target);
      } else {
        if (order.length <= 1) { $('stat').textContent = 'a report needs at least one page'; return; }
        order = order.filter(p => p !== pid);
      }
      writeOrder(order, pageBlanks());
      await render();
    });
    c.appendChild(eye);
  }
  // Click a visible chip to scroll to it; the rail is navigation too.
  if (!isHidden) c.addEventListener('click', () => {
    const d = $('out').contentDocument;
    const sec = d.querySelector(`section[data-page="${CSS.escape(String(pid))}"]`);
    if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    list.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x === c));
  });
  // Drag to reorder.
  if (!isHidden) {
    c.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', String(pid)); });
    c.addEventListener('dragover', e => { e.preventDefault(); c.classList.add('drag-over'); });
    c.addEventListener('dragleave', () => c.classList.remove('drag-over'));
    c.addEventListener('drop', async e => {
      e.preventDefault();
      c.classList.remove('drag-over');
      const from = e.dataTransfer.getData('text/plain');
      const fromPid = /^\d+$/.test(from) ? +from : from;
      if (fromPid === pid) return;
      pushHistory();
      let order = pageOrder().filter(p => p !== fromPid);
      const at = order.indexOf(pid);
      order.splice(at, 0, fromPid);
      writeOrder(order, pageBlanks());
      await render();
    });
  }
  return c;
}

$('rail-add').addEventListener('click', async () => {
  pushHistory();
  const order = pageOrder();
  const inView = visiblePageId();
  let n = 1;
  const blanks = pageBlanks();
  while (blanks.some(b => b.id === 'p' + n)) n++;
  const bid = 'p' + n;
  const at = order.indexOf(inView);
  order.splice(at >= 0 ? at + 1 : order.length, 0, bid);
  writeOrder(order, [...blanks, { id: bid }]);
  await render();
  $('stat').textContent = `blank page added — drag boxes, shapes and images onto it`;
});

/** The identity of the page whose middle is nearest the viewport middle. */
function visiblePageId() {
  const d = $('out').contentDocument;
  if (!d) return pageOrder()[0];
  const mid = d.defaultView.innerHeight / 2;
  let best = pageOrder()[0], dist = Infinity;
  d.querySelectorAll('section[data-page]').forEach(pg => {
    const r = pg.getBoundingClientRect();
    const dd = Math.abs((r.top + r.bottom) / 2 - mid);
    if (dd < dist) {
      dist = dd;
      const pid = pg.dataset.page;
      best = /^\d+$/.test(pid) ? +pid : pid;
    }
  });
  return best;
}

// ------------------------------------------------------------------- zoom
// The iframe is a fixed desktop-width viewport (so the report's own media
// queries see a desktop, always) and the CANVAS is scaled — Canva's model.
// Events map through the transform, so every inch of drag math is untouched.
// "Fit" tracks the pane; the numbers are absolute canvas scales.
const VIEW_W = 1200;
let zoomChoice = '';
try { zoomChoice = localStorage.getItem('ds-zoom') || ''; } catch (e) { /* file: */ }

function applyZoom() {
  const out = $('out'), stage = $('stage');
  const availW = stage.clientWidth;
  let s = zoomChoice === 'fit' || !zoomChoice
    ? Math.min(availW / VIEW_W, zoomChoice === 'fit' ? 10 : 1)
    : +zoomChoice;
  s = Math.max(0.25, Math.min(2, Math.round(s * 1000) / 1000));
  out.style.width = VIEW_W + 'px';
  out.style.height = (stage.clientHeight / s) + 'px';
  out.style.transform = s === 1 ? '' : `scale(${s})`;
  // Centre a canvas narrower than the pane; let a wider one scroll.
  const slack = availW - VIEW_W * s;
  out.style.marginLeft = slack > 0 ? (slack / 2) + 'px' : '0';
}

document.querySelectorAll('#zoom button').forEach(b => b.addEventListener('click', () => {
  zoomChoice = zoomChoice === b.dataset.z ? '' : b.dataset.z;   // toggle off = auto
  try { localStorage.setItem('ds-zoom', zoomChoice); } catch (e) { /* file: */ }
  document.querySelectorAll('#zoom button').forEach(x =>
    x.classList.toggle('on', x.dataset.z === zoomChoice));
  applyZoom();
  const d = $('out').contentDocument;
  if (d) paintSel(d);
}));

let rsT = null;
addEventListener('resize', () => {
  clearTimeout(rsT);
  rsT = setTimeout(applyZoom, 120);
});

// ----------------------------------------------------------------- guides
// Ruler guides: teal lines you pull from the page edges and everything snaps
// to. They are the editor's alone — layout.guides, which the renderer never
// reads — so they leave the published page untouched and are drawn entirely
// here, in the overlay, re-drawn after every render from the stored inches.
// Global across pages: every page is the same size, so a left-margin guide is
// worth the same on all twelve.
let guidesOn = false;
try { guidesOn = localStorage.getItem('ds-guides') === '1'; } catch (e) { /* file: */ }
const guidesX = () => (layout.guides && layout.guides.x) || [];
const guidesY = () => (layout.guides && layout.guides.y) || [];
const round2 = v => +v.toFixed(2);

function setGuides(x, y) {
  const g = {};
  if (x.length) g.x = x.slice().sort((a, b) => a - b);
  if (y.length) g.y = y.slice().sort((a, b) => a - b);
  if (Object.keys(g).length) layout.guides = g; else delete layout.guides;
  markDirty();
}

function drawGuideLayer(d) {
  d.querySelectorAll('.ds-rule, .ds-gd').forEach(n => n.remove());
  if (!guidesOn) return;
  d.querySelectorAll('section.page').forEach(pg => {
    ['t', 'l'].forEach(side => {
      const r = d.createElement('div');
      r.className = 'ds-rule ' + side;
      r.title = 'Drag onto the page to add a guide';
      r.addEventListener('mousedown', e => startGuideCreate(d, pg, side === 't' ? 'v' : 'h', e));
      pg.appendChild(r);
    });
    guidesX().forEach((gx, i) => pg.appendChild(guideLine(d, pg, 'v', i, gx)));
    guidesY().forEach((gy, i) => pg.appendChild(guideLine(d, pg, 'h', i, gy)));
  });
}

function guideLine(d, pg, axis, idx, pos) {
  const el = d.createElement('div');
  el.className = 'ds-gd ' + axis;
  el.style[axis === 'v' ? 'left' : 'top'] = pos + 'in';
  el.title = `guide at ${pos}in — drag to move, off the page to delete`;
  el.addEventListener('mousedown', e => startGuideDrag(d, pg, axis, idx, e));
  return el;
}

/** Pull a fresh guide out of a ruler. It follows the cursor from the first
 *  pixel and commits where you drop it (inside the page). */
function startGuideCreate(d, pg, axis, e0) {
  e0.preventDefault(); e0.stopPropagation();
  const px = DPI * zoomOf(pg), pr = pg.getBoundingClientRect();
  const span = axis === 'v' ? PAGE_W_IN : PAGE_H_IN;
  const ghost = d.createElement('div');
  ghost.className = 'ds-gd ' + axis;
  pg.appendChild(ghost);
  let pos = 0;
  const at = e => round2(Math.max(0, Math.min(span,
    axis === 'v' ? (e.clientX - pr.left) / px : (e.clientY - pr.top) / px)));
  const move = e => {
    pos = at(e);
    ghost.style[axis === 'v' ? 'left' : 'top'] = pos + 'in';
    $('stat').textContent = `guide at ${pos}in`;
  };
  move(e0);
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    pushHistory();
    if (axis === 'v') setGuides([...guidesX(), pos], guidesY());
    else setGuides(guidesX(), [...guidesY(), pos]);
    drawGuideLayer(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Move an existing guide; drop it past a page edge to delete it. */
function startGuideDrag(d, pg, axis, idx, e0) {
  e0.preventDefault(); e0.stopPropagation();
  const px = DPI * zoomOf(pg), pr = pg.getBoundingClientRect();
  const span = axis === 'v' ? PAGE_W_IN : PAGE_H_IN;
  pushHistory();
  const el = e0.currentTarget;
  const raw = e => axis === 'v' ? (e.clientX - pr.left) / px : (e.clientY - pr.top) / px;
  let pos = raw(e0);
  const move = e => {
    pos = raw(e);
    const shown = Math.max(0, Math.min(span, pos));
    el.style[axis === 'v' ? 'left' : 'top'] = round2(shown) + 'in';
    el.style.opacity = (pos < -0.1 || pos > span + 0.1) ? '.3' : '';
    $('stat').textContent = (pos < -0.1 || pos > span + 0.1)
      ? 'release to delete this guide' : `guide at ${round2(shown)}in`;
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    const arr = (axis === 'v' ? guidesX() : guidesY()).slice();
    if (pos < -0.1 || pos > span + 0.1) arr.splice(idx, 1);
    else arr[idx] = round2(Math.max(0, Math.min(span, pos)));
    if (axis === 'v') setGuides(arr, guidesY()); else setGuides(guidesX(), arr);
    drawGuideLayer(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

$('guides').addEventListener('click', () => {
  guidesOn = !guidesOn;
  try { localStorage.setItem('ds-guides', guidesOn ? '1' : '0'); } catch (e) { /* file: */ }
  $('guides').classList.toggle('on', guidesOn);
  const d = $('out').contentDocument;
  if (d) drawGuideLayer(d);
  $('stat').textContent = guidesOn
    ? 'guides on — drag from a ruler to add one' : 'guides off';
});

// ----------------------------------------------------------------- layers
// Canva's layers panel, scoped to the page in view: every FLOATING object —
// shapes, text boxes, pinned elements — top of the stack first, around a fixed
// "page content" divider that is the report's own flow (the designed prose is
// the mid-plane, not an object). Drag rows to restack; on drop every object
// gets a fresh unique z — above the divider 1..n counting up from it, below
// -1..-m counting down — so no two objects ever tie and the order you see is
// exactly the order that renders.
function pageEl(d) {
  const pid = visiblePageId();
  return d.querySelector(`section[data-page="${CSS.escape(String(pid))}"]`)
      || d.querySelector('section.page');
}

function layerItems(d, pg) {
  return [...pg.querySelectorAll('[data-el], [data-shape]')]
    .map((el, dom) => ({ el, dom, id: idOf(el) }))
    .filter(o => layout.shapes.some(s => s.id === o.id) || boxOf(o.id)
              || layout.positions[o.id])
    .map(o => ({ ...o, z: zOf(o.id) }))
    .sort((a, b) => (b.z - a.z) || (b.dom - a.dom));      // top first
}

function kindOf(id, el) {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return sh.kind === 'line' ? '─' : sh.kind === 'ellipse' ? '◯'
        : sh.kind === 'triangle' ? '△' : sh.kind === 'arrow' ? '➔' : '▭';
  if (boxOf(id)) return 'T';
  if (el.tagName === 'IMG' || el.classList.contains('ds-cropw')
      || el.querySelector('img')) return 'img';
  return '▣';
}

function layersRender() {
  const d = $('out').contentDocument;
  const host = $('layers-list');
  if (!d || !d.querySelector('section.page')) return;
  const pg = pageEl(d);
  const pid = visiblePageId();
  $('layers-title').textContent =
    `Layers — page ${pageOrder().indexOf(pid) + 1 || '?'}`;
  host.innerHTML = '';
  const items = layerItems(d, pg);
  const above = items.filter(o => o.z > 0);
  const below = items.filter(o => o.z <= 0);
  const row = o => {
    const r = document.createElement('div');
    r.className = 'lrow' + (selIds.has(o.id) ? ' sel' : '');
    r.draggable = true;
    r.dataset.id = o.id;
    r.innerHTML = `<span class="lrow-kind">${kindOf(o.id, o.el)}</span>`
      + `<span class="lrow-id">${o.id}</span>`
      + (isLocked(o.id) ? '<span class="lrow-lock">🔒</span>' : '');
    r.addEventListener('click', () => {
      const el = d.querySelector(`[data-el="${CSS.escape(o.id)}"], `
        + `[data-shape="${CSS.escape(o.id)}"]`);
      if (!el) return;
      setSel(d, [o.id]);
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      layersRender();
    });
    r.addEventListener('dragstart', e =>
      e.dataTransfer.setData('text/plain', o.id));
    dropTarget(r);
    return r;
  };
  const dropTarget = r => {
    r.addEventListener('dragover', e => { e.preventDefault(); r.classList.add('drag-over'); });
    r.addEventListener('dragleave', () => r.classList.remove('drag-over'));
    r.addEventListener('drop', async e => {
      e.preventDefault();
      r.classList.remove('drag-over');
      const from = e.dataTransfer.getData('text/plain');
      if (!from || from === r.dataset.id) return;
      const seq = [...host.children].map(x => x.dataset.id || '__content__');
      const fromAt = seq.indexOf(from);
      seq.splice(fromAt, 1);
      const toAt = seq.indexOf(r.dataset.id || '__content__');
      seq.splice(toAt, 0, from);            // drop ABOVE the row it landed on
      await applyLayerOrder(d, seq);
    });
  };
  if (!items.length) {
    const e = document.createElement('div');
    e.className = 'lempty';
    e.textContent = 'Nothing floats on this page yet — shapes, text boxes and moved elements appear here.';
    host.appendChild(e);
    return;
  }
  above.forEach(o => host.appendChild(row(o)));
  const div = document.createElement('div');
  div.className = 'ldivider';
  div.textContent = 'page content';
  dropTarget(div);
  host.appendChild(div);
  below.forEach(o => host.appendChild(row(o)));
}

async function applyLayerOrder(d, seq) {
  pushHistory();
  const di = seq.indexOf('__content__');
  const above = seq.slice(0, di), below = seq.slice(di + 1);
  above.forEach((id, i) => setZ(id, above.length - i));
  below.forEach((id, i) => setZ(id, -(i + 1)));
  markDirty();
  await render();
  layersRender();
}

/** Step the selection through the stack: ⌘] forward, ⌘[ backward, ⌥ for all
 *  the way. An unpinned designed element is pinned first — same rule as the
 *  menu, layering is placement. */
async function layerStep(d, dir, extreme) {
  const els = selEls(d).filter(el => !isLocked(idOf(el)));
  if (!els.length) return;
  pushHistory();
  els.forEach(el => {
    const id = idOf(el);
    if (!layout.shapes.some(s => s.id === id) && !boxOf(id)
        && !layout.positions[id]) ensureStore(d, el);
    const pg = el.closest('section.page') || d.querySelector('section.page');
    const zs = [...pg.querySelectorAll('[data-el], [data-shape]')]
      .map(x => zOf(idOf(x)));
    setZ(id, extreme ? (dir > 0 ? Math.max(...zs, 0) + 1 : Math.min(...zs, 0) - 1)
                     : zOf(id) + dir);
  });
  markDirty();
  await render();
  $('stat').textContent = extreme
    ? (dir > 0 ? 'brought to front' : 'sent to back')
    : (dir > 0 ? 'brought forward' : 'sent backward');
}

$('layers').addEventListener('click', () => {
  const pop = $('layerspop');
  if (pop.hidden) layersRender();
  togglePop(pop, $('layers'));
});
$('ar-front').addEventListener('click', () => layerStep($('out').contentDocument, 1, true));
$('ar-back').addEventListener('click', () => layerStep($('out').contentDocument, -1, true));

$('ar-dup').addEventListener('click', () => duplicateSel($('out').contentDocument));
$('ar-del').addEventListener('click', () => deleteSel($('out').contentDocument));
$('ar-lock').addEventListener('click', () => toggleLockSel($('out').contentDocument));
$('ar-group').addEventListener('click', () => groupSel($('out').contentDocument));
$('ar-ungroup').addEventListener('click', () => ungroupSel($('out').contentDocument));
$('ar-dh').addEventListener('click', () => distributeSel($('out').contentDocument, 'h'));
$('ar-dv').addEventListener('click', () => distributeSel($('out').contentDocument, 'v'));
document.querySelectorAll('.ar-al').forEach(b => b.addEventListener('click', () =>
  alignSel($('out').contentDocument, b.dataset.al)));

// The Fill swatch on a selected shape/text box: a hex preview, or a gradient
// bar. Mirrors the text-colour button's preview.
function fillPreview(v) {
  if (typeof v === 'string' && /^#[0-9a-f]{3,8}$/i.test(v)) return v;
  if (v && typeof v === 'object' && Array.isArray(v.stops))
    return 'linear-gradient(90deg,' + v.stops.map(s => s.color).join(',') + ')';
  return 'linear-gradient(90deg,#e66,#6b9e78,#66e)';   // no fill set
}

// The colour button opens the LEFT PANEL. Colour needs a search, the design's
// own colours, a few dozen defaults and a picker — none of which fits in a
// popover hanging off a 46px row, which is why that column stopped holding
// pages and started holding whatever the current tool actually needs.
$('ar-fill').addEventListener('click', () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  openColorPanel(idOf(els[0]));
});


// Border: colour, weight, dash — the layerMenu's shape styling, surfaced on
// the strip where Canva keeps it.
$('ar-border').addEventListener('click', () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  const shp = layout.shapes.find(x => x.id === idOf(els[0]));
  if (!shp) return;
  const commit = async () => { markDirty(); await render(); paintSel($('out').contentDocument); };
  const grid = $('ar-bswgrid');
  grid.innerHTML = '';
  const strokePaint = async c => {
    $('ar-borderpop').hidden = true;
    pushHistory();
    shp.stroke = c;
    if (c !== 'none' && (shp.sw ?? 0) < 0.005) shp.sw = 0.02;
    await commit();
  };
  const none = document.createElement('button');
  none.className = 'sw';
  none.style.cssText = 'background:#fff url("data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 10 10%27%3E%3Cpath d=%27M1 9L9 1%27 stroke=%27%23C0392B%27/%3E%3C/svg%3E")';
  none.title = 'No border';
  none.addEventListener('click', () => strokePaint('none'));
  grid.appendChild(none);
  (M.palette || []).forEach(c => {
    const b = document.createElement('button');
    b.className = 'sw' + (c.toUpperCase() === (shp.stroke || '').toUpperCase() ? ' on' : '');
    b.style.background = c; b.title = c;
    b.addEventListener('click', () => strokePaint(c));
    grid.appendChild(b);
  });
  const bw = $('ar-bw');
  bw.value = shp.sw ?? 0.02;
  bw.onpointerdown = () => pushHistory();
  bw.oninput = () => {
    shp.sw = +bw.value;
    const node = d.querySelector(`[data-shape="${CSS.escape(shp.id)}"]`);
    if (node) node.setAttribute('stroke-width', bw.value);
  };
  bw.onchange = commit;
  const presets = { Solid: null, Dashed: [0.08, 0.05], Dotted: [0.02, 0.04] };
  const cur = !shp.dash ? 'Solid' : (shp.dash[0] <= 0.03 ? 'Dotted' : 'Dashed');
  const drow = $('ar-dashrow');
  drow.innerHTML = '';
  Object.keys(presets).forEach(kk => {
    const b = document.createElement('button');
    b.textContent = kk;
    b.classList.toggle('on', kk === cur);
    b.addEventListener('click', async () => {
      pushHistory();
      if (presets[kk]) shp.dash = presets[kk]; else delete shp.dash;
      $('ar-borderpop').hidden = true;
      await commit();
    });
    drow.appendChild(b);
  });
  togglePop($('ar-borderpop'), $('ar-border'));
});

// Transparency: one slider, alpha in the element's own store — the same
// number the right-click menu drives.
$('ar-alpha').addEventListener('click', () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  const el = els[0], id = idOf(el);
  const ain = $('ar-alphain');
  ain.value = (storeOf(id) || (layout.positions || {})[id] || {}).alpha ?? 1;
  ain.onpointerdown = () => pushHistory();
  ain.oninput = () => {
    const st = ensureStore(d, el);
    const v = +ain.value;
    if (v >= 0.999) delete st.alpha; else st.alpha = v;
    if (el.dataset.shape) {
      v >= 0.999 ? el.removeAttribute('opacity') : el.setAttribute('opacity', v);
    } else {
      el.style.opacity = v >= 0.999 ? '' : v;
    }
  };
  ain.onchange = async () => { markDirty(); await render(); paintSel($('out').contentDocument); };
  togglePop($('ar-alphapop'), $('ar-alpha'));
});

// Effects: a shadow, for now — add, tune, remove. Same store the right-click
// menu writes (shape.shadow / box.shadow).
$('ar-fxbtn').addEventListener('click', () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  const id = idOf(els[0]);
  const owner = layout.shapes.find(x => x.id === id) || boxOf(id);
  if (!owner) return;
  const body = $('ar-fxbody');
  const commit = async () => { markDirty(); await render(); paintSel($('out').contentDocument); };
  const build = () => {
    body.innerHTML = '';
    if (!owner.shadow) {
      const add = document.createElement('button');
      add.id = 'ar-fx-add';
      add.className = 'sw-default';
      add.textContent = 'Add shadow';
      add.addEventListener('click', async () => {
        pushHistory();
        owner.shadow = { offset: 0.06, direction: 135, blur: 0.08, alpha: 0.35 };
        build(); await commit();
      });
      body.appendChild(add);
      return;
    }
    const mk = (label, key, min, max, step) => {
      const w = document.createElement('label');
      w.className = 'ar-slide';
      w.textContent = label;
      const r = document.createElement('input');
      r.type = 'range'; r.min = min; r.max = max; r.step = step;
      r.value = owner.shadow[key];
      r.addEventListener('pointerdown', () => pushHistory());
      r.addEventListener('input', () => { owner.shadow[key] = +r.value; });
      r.addEventListener('change', commit);
      w.appendChild(r);
      body.appendChild(w);
    };
    mk('offset', 'offset', 0, 0.3, 0.01);
    mk('angle', 'direction', 0, 360, 15);
    mk('blur', 'blur', 0, 0.3, 0.01);
    mk('depth', 'alpha', 0, 1, 0.05);
    const rm = document.createElement('button');
    rm.className = 'sw-default';

// Colour needs more room than a 46px row's popover can give: a search, the
// colours already in the design, a couple of dozen defaults, and a picker.
// So it opens the LEFT PANEL — which is what that column is for now, the
// pages having moved to the bottom strip.

// the toolbar swatch already use, so a shape, a text box, a page and a
// recolourable logo all work without the panel knowing which it has.

// hex <-> hsv, for the SV square and the hue rail.
function hexToRgb(h) {
  h = (h || '').replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  const n = parseInt(h.slice(0, 6), 16);
  return Number.isNaN(n) ? null : { r: n >> 16 & 255, g: n >> 8 & 255, b: n & 255 };
}
const to2 = v => Math.round(v).toString(16).padStart(2, '0');
const rgbToHex = (r, g, b) => '#' + to2(r) + to2(g) + to2(b);
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let h = 0;
  if (d) {
    if (mx === r) h = ((g - b) / d + (g < b ? 6 : 0));
    else if (mx === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  return { h, s: mx ? d / mx : 0, v: mx };
}
function hsvToHex(h, sat, v) {
  const c = v * sat, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  const t = [[c, x, 0], [x, c, 0], [0, c, x], [0, x, c], [x, 0, c], [c, 0, x]][Math.floor(h / 60) % 6];
  return rgbToHex((t[0] + m) * 255, (t[1] + m) * 255, (t[2] + m) * 255);
}

      ? '#' + t.replace('#', '').toUpperCase() : null;

      results.appendChild(host);
      const head = document.createElement('h4');

      if (hexHit) dot(g, hexHit, hexHit, '', () => apply(hexHit));
      SOLID_DEFAULTS.filter(([n, c]) => n.includes(t) || c.toLowerCase().includes(t))
        .forEach(([n, c]) => dot(g, c, `${n} ${c}`, c.toUpperCase() === curHex ? 'on' : '', () => apply(c)));
      GRAD_DEFAULTS.filter(([n]) => n.includes(t)).forEach(([n, st, a]) =>
        dot(g, cssFill(gradOf(st, a)), `${n} gradient`, '', () => apply(gradOf(st, a))));
      if (!g.children.length) {
        const none = document.createElement('p');
        none.className = 'side-note';

    // --- this element's own colours ---------------------------------------
    const shead = document.createElement('h4');
    shead.textContent = ft.label === 'Colour' ? 'Artwork colour' : ft.label + ' colours';
    results.appendChild(shead);
    const own = document.createElement('div'); own.className = 'cgrid'; results.appendChild(own);
    dot(own, '', 'Custom colour or gradient', 'plus', () => togglePicker(id));
    if (hasEyeDropper()) {
      const e = dot(own, '', 'Pick a colour from anywhere on screen', 'eye', () => eyedrop(apply));
      e.textContent = '⦿';
    }
    if (ft.resettable) dot(own, '', ft.resetLabel || 'None', 'none', () => apply(null));
    if (cur) dot(own, cssFill(cur), 'Current', 'on', () => {});

    // --- what the design already uses -------------------------------------
    const inUse = colorsInUse();
    if (inUse.length) {
      const uh = document.createElement('h4');
      uh.textContent = 'Colors in this design';
      results.appendChild(uh);
      const ug = document.createElement('div'); ug.className = 'cgrid'; results.appendChild(ug);
      inUse.forEach(c => dot(ug, c, c, c === curHex ? 'on' : '', () => apply(c)));
    }

    // --- the report's own palette, then the generic defaults ---------------
    if ((M.palette || []).length) {
      const ph = document.createElement('h4');
      ph.textContent = 'Report palette';

    SOLID_DEFAULTS.forEach(([n, c]) =>

    const gh = document.createElement('h4');
    gh.textContent = 'Default gradient colors';
    results.appendChild(gh);
    const gg = document.createElement('div'); gg.className = 'cgrid'; results.appendChild(gg);
    GRAD_DEFAULTS.forEach(([n, st, a]) =>
      dot(gg, cssFill(gradOf(st, a)), `${n} gradient`, '', () => apply(gradOf(st, a))));

  let timer = null;

  // --- the picker: Solid | Gradient, SV square, hue rail, hex -------------
  function togglePicker(fid) {
    const open = body.querySelector('#cpick');
    if (open) { open.remove(); return; }
    const ftl = fillTargets(fid);
    const start = ftl.get();
    const isGrad = !!start && typeof start === 'object';
    // Editing state: a gradient is a list of stops with one selected; a solid
    // is the degenerate case of that, so both drive the same square.
    let mode = isGrad ? 'grad' : 'solid';
    let stops = isGrad ? start.stops.map(x => ({ ...x }))
                       : [{ color: (typeof start === 'string' && start) || '#6B9E78', at: 0 },
                          { color: '#2F3E46', at: 1 }];
    let angle = isGrad ? (start.angle ?? 180) : 180;
    let si = 0;                                  // which stop the square edits
    let hsv = rgbToHsv(...Object.values(hexToRgb(stops[0].color) || { r: 107, g: 158, b: 120 }));

    const wrap = document.createElement('div');
    wrap.id = 'cpick';
    wrap.innerHTML = `
      <div class="cp-tabs">
        <button class="cp-tab" data-m="solid">Solid color</button>
        <button class="cp-tab" data-m="grad">Gradient</button>
      </div>
      <div id="cp-sv"><span class="cp-knob" id="cp-svknob"></span></div>
      <div id="cp-hue"><span class="cp-knob" id="cp-hueknob" style="top:50%"></span></div>
      <div class="cp-stops" id="cp-stops" hidden></div>
      <input id="cp-angle" type="range" min="0" max="360" step="15" hidden>
      <div class="cp-row">
        <span id="cp-swatch"></span>
        <input id="cp-hex" spellcheck="false" maxlength="7">
        <button id="cp-eye" aria-label="Pick a colour from anywhere on screen">⦿</button>
      </div>`;
    // Anchor it under the swatch row it belongs to, not at the panel's end.
    results.insertBefore(wrap, results.children[2] || null);

    const $$ = sel => wrap.querySelector(sel);
    const sv = $$('#cp-sv'), hue = $$('#cp-hue');
    const svk = $$('#cp-svknob'), huek = $$('#cp-hueknob');
    const hex = $$('#cp-hex'), swatch = $$('#cp-swatch');
    if (!hasEyeDropper()) $$('#cp-eye').hidden = true;

    const value = () => mode === 'solid'
      ? stops[si].color
      : { type: 'linear', angle, stops: stops.map(x => ({ ...x })) };

    const paint = (commit) => {
      const c = hsvToHex(hsv.h, hsv.s, hsv.v);
      stops[si].color = c;
      sv.style.background =
        `linear-gradient(to top, #000, transparent), `
        + `linear-gradient(to right, #fff, ${hsvToHex(hsv.h, 1, 1)})`;
      svk.style.left = (hsv.s * 100) + '%';
      svk.style.top = ((1 - hsv.v) * 100) + '%';
      svk.style.background = c;
      huek.style.left = (hsv.h / 360 * 100) + '%';
      huek.style.background = hsvToHex(hsv.h, 1, 1);
      if (document.activeElement !== hex) hex.value = c.toUpperCase();
      swatch.style.background = mode === 'solid' ? c : cssFill(value());
      wrap.querySelectorAll('.cp-stop').forEach((n, i) => {
        n.style.background = stops[i].color;
        n.classList.toggle('on', i === si);
      });
      if (commit) apply(value());
    };

    const buildStops = () => {
      const host = $$('#cp-stops');
      host.hidden = mode !== 'grad';
      $$('#cp-angle').hidden = mode !== 'grad';
      host.innerHTML = '';
      if (mode !== 'grad') return;
      stops.forEach((st, i) => {
        const b = document.createElement('button');
        b.className = 'cp-stop' + (i === si ? ' on' : '');
        b.style.background = st.color;
        b.title = `Stop ${i + 1}`;
        b.addEventListener('click', () => {
          si = i;
          hsv = rgbToHsv(...Object.values(hexToRgb(stops[i].color)));
          paint(false);
          buildStops();
        });
        host.appendChild(b);
      });
    };

    wrap.querySelectorAll('.cp-tab').forEach(t => {
      t.classList.toggle('on', t.dataset.m === mode);
      t.addEventListener('click', () => {
        mode = t.dataset.m;
        si = 0;
        hsv = rgbToHsv(...Object.values(hexToRgb(stops[0].color)));
        wrap.querySelectorAll('.cp-tab').forEach(x => x.classList.toggle('on', x.dataset.m === mode));
        buildStops();
        paint(true);
      });
    });

    // Dragging the square / rail: pointer capture so a fast drag that leaves
    // the box keeps tracking, which is the difference between "a picker" and
    // "a picker that fights you".
    const track = (el, onAt) => {
      const move = ev => {
        const r = el.getBoundingClientRect();
        onAt(Math.min(1, Math.max(0, (ev.clientX - r.left) / r.width)),
             Math.min(1, Math.max(0, (ev.clientY - r.top) / r.height)));
        paint(false);
      };
      el.addEventListener('pointerdown', ev => {
        el.setPointerCapture(ev.pointerId);
        move(ev);
        const up = () => {
          el.removeEventListener('pointermove', move);
          el.removeEventListener('pointerup', up);
          paint(true);
        };
        el.addEventListener('pointermove', move);
        el.addEventListener('pointerup', up);
      });
    };
    track(sv, (x, y) => { hsv.s = x; hsv.v = 1 - y; });
    track(hue, x => { hsv.h = x * 360; });

    hex.addEventListener('input', () => {
      const rgb = hexToRgb(hex.value);
      if (!rgb || !/^#?([0-9a-f]{3}|[0-9a-f]{6})$/i.test(hex.value.trim())) return;
      hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
      paint(false);
    });
    hex.addEventListener('change', () => paint(true));
    $$('#cp-eye').addEventListener('click', () => eyedrop(c => {
      const rgb = hexToRgb(c);
      if (!rgb) return;
      hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
      paint(true);
    }));
    $$('#cp-angle').value = angle;
    $$('#cp-angle').addEventListener('input', e => { angle = +e.target.value; paint(false); });
    $$('#cp-angle').addEventListener('change', () => paint(true));

    buildStops();
    paint(false);
  }
}

// ------------------------------------------------------------------ moving
// No modes. A box is draggable by its own chrome; the text inside it is not.
// The target of the mousedown decides: land on a text slot and you are
// editing, land on the box itself and you are moving it.
//
// A drop does NOT re-render. The drag already moved the real element, so the
// page on screen is already the answer, and re-rendering would freeze for a
// second and throw away your scroll position for nothing. layout.json is
// updated and the renderer catches up on the next render or on save.
const DPI = 96;                        // CSS px per inch — the one real constant
// Page geometry belongs to the report, not to this file. Set from the manifest
// at boot; the defaults are only what a letter-portrait report happens to use.
let PAGE_W_IN = 8.5, PAGE_H_IN = 11;
let MARGIN_IN = 0.62, TOP_IN = 0.75;
const SNAP_IN = 0.06;                  // how close before it pulls into line
const NUDGE_IN = 0.05, NUDGE_BIG_IN = 0.25;

/**
 * primer.css zooms .page to 125% on wide screens and the factor moves with the
 * viewport. getBoundingClientRect reports zoomed pixels; CSS inches are
 * unzoomed. Every conversion divides it back out — assuming 1 made a 7.26in box
 * measure 9.08in and moved things a quarter further than the cursor.
 */
const zoomOf = page => (page.getBoundingClientRect().width / page.offsetWidth) || 1;

const inchBox = (el, page) => {
  const r = el.getBoundingClientRect(), pr = page.getBoundingClientRect();
  const px = DPI * zoomOf(page);
  return { x: (r.left - pr.left) / px, y: (r.top - pr.top) / px,
           w: r.width / px, h: r.height / px };
};

/**
 * Lines worth snapping to: the page's own geometry, and the edges and centres
 * of everything else on the page. Alignment you can feel is the difference
 * between arranging and fiddling.
 */
function snapLines(d, page, moving) {
  const skip = Array.isArray(moving) ? moving : [moving];   // a group skips itself
  const xs = [0, MARGIN_IN, PAGE_W_IN / 2, PAGE_W_IN - MARGIN_IN, PAGE_W_IN];
  const ys = [0, TOP_IN, PAGE_H_IN / 2, PAGE_H_IN - 0.9, PAGE_H_IN];
  page.querySelectorAll('[data-el], [data-shape], h1, h2.sub, .card, .branch, .photo')
      .forEach(el => {
    if (skip.some(m => el === m || m.contains(el) || el.contains(m))) return;
    const b = inchBox(el, page);
    if (b.w < 0.1 || b.h < 0.1) return;
    xs.push(b.x, b.x + b.w / 2, b.x + b.w);
    ys.push(b.y, b.y + b.h / 2, b.y + b.h);
  });
  // Your own ruler guides are snap targets too, when they are showing.
  if (guidesOn) { xs.push(...guidesX()); ys.push(...guidesY()); }
  return { xs, ys };
}

/** Nearest line within the threshold, given the three edges we align on. */
function snapAxis(lines, lo, size) {
  let best = null;
  for (const probe of [[lo, 0], [lo + size / 2, size / 2], [lo + size, size]]) {
    for (const line of lines) {
      const d = Math.abs(probe[0] - line);
      if (d <= SNAP_IN && (!best || d < best.d)) best = { d, at: line - probe[1], line };
    }
  }
  return best;
}
