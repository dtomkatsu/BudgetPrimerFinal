<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Draft editor</title>
<!--
  Edit the report's prose in the report itself.

  Click a paragraph, its source appears in place, edit, click away — the whole
  page re-renders through the repo's REAL renderer (Pyodide), so footnote
  numbers, layout and every figure stay honest. No Google Doc, no CORS, no
  deploy: the page fetches content.md and the renderer from main and does the
  work locally.

  What is editable: the report's prose blocks. Everything else — figures,
  Table 1, dollar amounts — is generated from the budget data and has no text
  to edit. Structural changes (new sections, new footnotes) still belong in
  content.md or the doc.

  Save commits content.md via a fine-grained token, which is what triggers the
  site rebuild and pushes the same text to the Google Doc. Nothing is written
  anywhere until you press it.
-->
<style>
  :root { --ink:#2F3E46; --sage:#6B9E78; --deep:#52796F; --chrome:#334049;
          --chrome2:#3B4A54; --line:#4B5C66; --ctl:#455460; --ctl-line:#57686F;
          --txt:#EDF2EF; --dim:#A9BCB4; }
  html { height:100%; }
  /* Flex column, so the iframe takes whatever the bars leave. The old fixed
     calc() heights lied whenever a toolbar wrapped to a second line. */
  body { margin:0; height:100%; font:13px/1.45 system-ui, sans-serif;
         display:flex; flex-direction:column; }

  /* -- top bar ----------------------------------------------------------- */
  #bar { position:relative; display:flex; gap:8px; align-items:center; padding:8px 14px;
         background:var(--chrome); color:var(--txt); flex-wrap:wrap;
         border-bottom:1px solid var(--line); }
  #brand { display:flex; align-items:center; gap:7px; font-weight:700;
           letter-spacing:.2px; color:#fff; white-space:nowrap; }
  #brand svg { display:block; }
  #stat { flex:1; min-width:180px; opacity:.9; overflow:hidden;
          text-overflow:ellipsis; white-space:nowrap; }
  .ds-id { font:11.5px ui-monospace,monospace; color:var(--dim);
           background:rgba(255,255,255,.07); padding:2px 8px; border-radius:99px; }
  #fit { background:#C0392B; color:#fff; padding:3px 10px; border-radius:99px;
         font:12px system-ui; cursor:help; }
  /* one button language everywhere: quiet by default, sage when primary */
  #bar button { display:inline-flex; align-items:center; gap:6px; font:12.5px system-ui;
                background:var(--ctl); color:var(--txt); border:1px solid var(--ctl-line);
                border-radius:7px; padding:5px 12px; cursor:pointer; height:29px;
                transition:background .12s, border-color .12s; }
  #bar button:hover { border-color:var(--sage); background:#4B5B68; }
  #bar button:disabled { opacity:.45; cursor:default; border-color:var(--ctl-line);
                         background:var(--ctl); }
  #save { background:var(--sage); border-color:var(--sage); color:#fff; font-weight:600; }
  #save:hover { background:var(--deep); border-color:var(--deep); }
  #save.dirty { background:#C2703A; border-color:#C2703A; }
  #save.dirty:hover { background:#A85E2F; }
  /* The canvas: the report renders in a fixed desktop-width viewport and the
     whole iframe is SCALED to the pane, never reflowed. A narrow pane would
     otherwise fire the report's mobile media queries, and a drag would record
     the phone layout's geometry into layout.json as if it were the page. */
  #stage { flex:1; min-height:0; overflow:auto; position:relative; background:#EDF1EE; }
  #out { border:0; display:block; width:1200px; height:100%;
         transform-origin:0 0; background:#EDF1EE; }

  /* -- contextual rows: type (text selected) and arrange (elements selected) */
  #type, #arrange { position:relative; display:flex; gap:6px; align-items:center;
          flex-wrap:wrap; padding:7px 14px; background:var(--chrome2);
          border-bottom:1px solid var(--line); }
  /* display:flex would silently beat the hidden attribute's display:none */
  #type[hidden], #arrange[hidden] { display:none; }
  #type select, #type input[type=number], #arrange input[type=number] {
          font:12.5px system-ui; height:29px; padding:0 7px; box-sizing:border-box;
          border:1px solid var(--ctl-line); border-radius:7px; background:var(--ctl);
          color:var(--txt); transition:border-color .12s; }
  #type select:hover, #type input[type=number]:hover,
  #arrange input[type=number]:hover { border-color:var(--sage); }
  #type select:focus, #type input:focus, #type button:focus-visible,
  #arrange input:focus, #arrange button:focus-visible
        { outline:2px solid rgba(107,158,120,.55); outline-offset:1px; }
  #ty-font { width:150px; }
  #ty-weight { width:78px; }
  #type input[type=number], #arrange input[type=number] { width:54px; }
  #type button, #arrange button { display:inline-flex; align-items:center;
          justify-content:center; font:12.5px system-ui; min-width:29px; height:29px;
          padding:0 8px; cursor:pointer; border:1px solid var(--ctl-line);
          border-radius:7px; background:var(--ctl); color:var(--txt);
          transition:background .12s, border-color .12s; }
  #type button:hover, #arrange button:hover { border-color:var(--sage); background:#4B5B68; }
  #type button.on, #arrange button.on { background:var(--sage); border-color:var(--sage); color:#fff; }
  #type button svg, #arrange button svg { display:block; pointer-events:none; }
  #arrange button:disabled { opacity:.4; cursor:default; border-color:var(--ctl-line);
          background:var(--ctl); }
  #ar-del { color:#F2B8A8; }
  #ar-del:hover { background:#8A4A3A; border-color:#8A4A3A; color:#fff; }
  /* segmented align group reads as one control, like Canva's */
  .ty-seg { display:inline-flex; }
  .ty-seg button { border-radius:0; margin-left:-1px; }
  .ty-seg button:first-child { border-radius:7px 0 0 7px; margin-left:0; }
  .ty-seg button:last-child { border-radius:0 7px 7px 0; }
  .ty-seg button.on { position:relative; z-index:1; }
  #ty-reset { margin-left:auto; color:var(--dim); }
  #ty-reset:hover { color:#fff; }
  .ty-key { font:11.5px ui-monospace,monospace; color:var(--dim); max-width:170px;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            background:rgba(255,255,255,.07); padding:3px 9px; border-radius:99px; }
  .ty-sep { width:1px; height:20px; background:var(--line); margin:0 4px; }
  /* effect parameter chips */
  .ty-num { display:inline-flex; align-items:center; gap:4px; font:11.5px system-ui;
            color:var(--dim); background:rgba(255,255,255,.05); border-radius:7px;
            padding:0 0 0 7px; }
  .ty-num input[type=number] { border:0; background:none; width:48px; }
  #ty-fxp { display:inline-flex; gap:5px; align-items:center; }
  #ty-fxp input[type=color] { width:29px; height:29px; padding:2px; border:1px solid
            var(--ctl-line); border-radius:7px; background:var(--ctl); cursor:pointer; }
  /* the text-colour button: an A over its current colour, Canva's icon */
  #ty-colorbtn { flex-direction:column; gap:1px; padding:3px 9px 4px; line-height:1; }
  #ty-colorbtn .A { font:700 13px/1 system-ui; }
  #ty-colorbtn .Abar { width:16px; height:4px; border-radius:2px;
            background:linear-gradient(90deg,#e66,#6b9e78,#66e); }
  /* size stepper: − number + as one unit */
  .ty-step { display:inline-flex; align-items:center; }
  .ty-step button { border-radius:7px 0 0 7px; font-size:15px; }
  .ty-step button:last-child { border-radius:0 7px 7px 0; }
  .ty-step input { border-radius:0 !important; margin:0 -1px; position:relative;
                   z-index:1; text-align:center; }
  .ty-step input::-webkit-inner-spin-button { display:none; }
  /* popovers: colour panel, spacing panel, shape picker */
  .pop { position:absolute; z-index:1000; top:calc(100% - 4px); background:#fff;
         color:var(--ink); border:1px solid #C9D6CD; border-radius:10px;
         box-shadow:0 10px 32px rgba(20,30,35,.35); padding:12px; min-width:190px; }
  .pop-h { font:600 11px system-ui; letter-spacing:.7px; text-transform:uppercase;
           color:#7A8E92; margin:0 0 8px; }
  .swgrid { display:grid; grid-template-columns:repeat(5, 26px); gap:6px; }
  .sw { width:26px; height:26px; border:1px solid rgba(0,0,0,.16); border-radius:6px;
        cursor:pointer; padding:0; position:relative; }
  .sw:hover { outline:2px solid var(--ink); outline-offset:1px; }
  .sw.on::after { content:"✓"; position:absolute; inset:0; display:grid;
        place-items:center; font:700 13px system-ui; color:#fff;
        text-shadow:0 0 3px rgba(0,0,0,.85); }
  .sw.custom { border:1px dashed #8B9A90;
        background:conic-gradient(#e66,#ea3,#6b9e78,#39c,#96e,#e66); }
  .sw-default { margin-top:9px; width:100%; font:12.5px system-ui; padding:5px 0;
        border:1px solid #C9D6CD; border-radius:7px; background:#fff;
        color:var(--ink); cursor:pointer; }
  .sw-default:hover { background:var(--sage); border-color:var(--sage); color:#fff; }
  .pop label { display:flex; align-items:center; gap:8px; font:12.5px system-ui;
        margin:7px 0; white-space:nowrap; }
  .pop label span { width:92px; color:#5B6E66; }
  .pop input[type=range] { width:110px; accent-color:var(--sage); }
  .pop input[type=number] { width:56px; font:12.5px system-ui; padding:3px 5px;
        border:1px solid #C9D6CD; border-radius:6px; }
  .pop .shp { display:flex; align-items:center; gap:9px; width:100%; border:0;
        background:none; font:12.5px system-ui; color:var(--ink); padding:7px 8px;
        border-radius:7px; cursor:pointer; }
  .pop .shp:hover { background:var(--sage); color:#fff; }
  .pop .shp svg { display:block; }
  /* zoom: a quiet segmented control at the far end of the bar */
  #zoom { display:inline-flex; margin-left:2px; }
  #zoom button { border-radius:0; margin-left:-1px; min-width:34px; padding:5px 7px; }
  #zoom button:first-child { border-radius:7px 0 0 7px; margin-left:0; }
  #zoom button:last-child { border-radius:0 7px 7px 0; }
  #zoom button.on { background:var(--sage); border-color:var(--sage); color:#fff;
        position:relative; z-index:1; }
  .ar-count { font:11.5px ui-monospace,monospace; color:var(--dim);
        background:rgba(255,255,255,.07); padding:3px 9px; border-radius:99px;
        max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ar-lab { font:11px system-ui; color:var(--dim); margin-left:2px; }
  .ar-pos { display:inline-flex; align-items:center; gap:4px;
        font:11.5px system-ui; color:var(--dim); }
  .ar-pos input { width:58px !important; }
</style>
</head>
<body>
<div id="bar">
  <span id="brand"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path
    d="M11.3 1.9l2.8 2.8L5 13.8l-3.6.8.8-3.6z"/></svg>Draft editor</span>
  <span id="title" class="ds-id"></span>
  <span id="stat">loading the render engine…</span>
  <span id="fit" hidden title="">⚠</span>
  <button id="text" title="Add a text box to the page in view">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.6" stroke-linecap="round"><path d="M2 3.2V2h10v1.2M7 2v10M5.2 12h3.6"/></svg>
    Text</button>
  <button id="shape" title="Add a shape to the page in view">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.5"><rect x="1.2" y="3.4" width="8" height="8" rx="1.4"/>
      <circle cx="10" cy="4.4" r="2.9"/></svg>
    Shape</button>
  <button id="tok" title="Check or replace the GitHub token used to save">Token…</button>
  <span id="zoom" title="Zoom">
    <button data-z="fit">Fit</button><button data-z="1">100</button><button
      data-z="1.25">125</button><button data-z="1.5">150</button>
  </span>
  <button id="revert" disabled>Discard</button>
  <button id="save" disabled>Save</button>
  <div class="pop" id="shapepop" hidden>
    <p class="pop-h">Add to the page in view</p>
    <button class="shp" data-k="rect"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2"><rect x="1.5" y="3" width="12"
      height="9" rx="1.5"/></svg>Rectangle</button>
    <button class="shp" data-k="ellipse"><svg width="15" height="15" viewBox="0 0 15 15"
      fill="#CAD2C5" stroke="#52796F" stroke-width="1.2"><ellipse cx="7.5" cy="7.5"
      rx="6" ry="4.6"/></svg>Ellipse</button>
    <button class="shp" data-k="line"><svg width="15" height="15" viewBox="0 0 15 15"
      stroke="#52796F" stroke-width="1.6" stroke-linecap="round"><path
      d="M2 12.5L13 2.5"/></svg>Line</button>
  </div>
</div>
<div id="type" hidden>
  <span class="ty-key" id="ty-key"></span>
  <span class="ty-sep"></span>
  <select id="ty-font" title="Font"></select>
  <select id="ty-weight" title="Weight"></select>
  <span class="ty-step" title="Size (px)">
    <button id="ty-down" title="Smaller">−</button><input id="ty-size" type="number"
      min="6" max="200" step="0.5"><button id="ty-up" title="Bigger">+</button>
  </span>
  <span class="ty-sep"></span>
  <button id="ty-i" title="Italic"><svg width="14" height="14" viewBox="0 0 14 14"
    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M6 2h5M3 12h5M8.5 2l-3 10"/></svg></button>
  <button id="ty-u" title="Underline"><svg width="14" height="14" viewBox="0 0 14 14"
    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M3.5 1.8v4.7a3.5 3.5 0 0 0 7 0V1.8M2.5 12.4h9"/></svg></button>
  <span class="ty-seg">
    <button class="ty-al" data-a="left" title="Align left"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 3h10M2 6h6M2 9h10M2 12h6"/></svg></button>
    <button class="ty-al" data-a="center" title="Align centre"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 3h10M4 6h6M2 9h10M4 12h6"/></svg></button>
    <button class="ty-al" data-a="right" title="Align right"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 3h10M6 6h6M2 9h10M6 12h6"/></svg></button>
    <button class="ty-al" data-a="justify" title="Justify"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 3h10M2 6h10M2 9h10M2 12h10"/></svg></button>
  </span>
  <select id="ty-case" title="Letter case">
    <option value="none">Aa</option><option value="upper">AA</option>
    <option value="lower">aa</option><option value="title">Aa Bb</option>
  </select>
  <span class="ty-sep"></span>
  <button id="ty-colorbtn" title="Text colour"><span class="A">A</span><span
    class="Abar" id="ty-Abar"></span></button>
  <button id="ty-spacebtn" title="Letter spacing and line height"><svg width="14"
    height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"
    stroke-linecap="round"><path d="M2 2v10M12 2v10M4.6 7h4.8M4.6 7l1.5-1.5M4.6 7l1.5 1.5M9.4 7L7.9 5.5M9.4 7l-1.5 1.5"/></svg></button>
  <select id="ty-fx" title="Effect"></select>
  <span id="ty-fxp"></span>
  <button id="ty-reset" title="Put this text back the way the report designed it">Reset</button>
  <div class="pop" id="ty-colorpop" hidden>
    <p class="pop-h">Text colour</p>
    <div class="swgrid" id="ty-swgrid"></div>
    <button class="sw-default" id="ty-colordefault">Report's own colour</button>
  </div>
  <div class="pop" id="ty-spacepop" hidden>
    <p class="pop-h">Spacing</p>
    <label><span>Letter spacing</span><input type="range" id="ty-track-r" min="-2"
      max="12" step="0.1"><input id="ty-track" type="number" step="0.1" min="-5" max="20"></label>
    <label><span>Line height</span><input type="range" id="ty-lead-r" min="0.8"
      max="2.6" step="0.05"><input id="ty-lead" type="number" step="0.05" min="0.6" max="4"></label>
  </div>
  <input type="color" id="ty-color" hidden>
</div>
<div id="arrange" hidden>
  <span class="ar-count" id="ar-count"></span>
  <span class="ty-sep"></span>
  <span class="ty-seg" title="Align horizontally (to the page; to the selection when several)">
    <button class="ar-al" data-al="left" title="Align left"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 1.5v11M4.5 4.5h7M4.5 9.5h4.5"/></svg></button>
    <button class="ar-al" data-al="hcenter" title="Align horizontal centre"><svg width="14"
      height="14" viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round"><path d="M7 1.5v11M3.5 4.5h7M4.75 9.5h4.5"/></svg></button>
    <button class="ar-al" data-al="right" title="Align right"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M12 1.5v11M2.5 4.5h7M5 9.5h4.5"/></svg></button>
  </span>
  <span class="ty-seg" title="Align vertically (to the page; to the selection when several)">
    <button class="ar-al" data-al="top" title="Align top"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M1.5 2h11M4.5 4.5v7M9.5 4.5v4.5"/></svg></button>
    <button class="ar-al" data-al="vcenter" title="Align vertical centre"><svg width="14"
      height="14" viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5"

    <button class="ar-al" data-al="bottom" title="Align bottom"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">

  </span>
  <span class="ty-seg" title="Distribute evenly (three or more)">
    <button id="ar-dh" title="Distribute horizontally"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M1.5 2v10M12.5 2v10M7 4.5v5"/></svg></button>
    <button id="ar-dv" title="Distribute vertically"><svg width="14" height="14"
      viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M2 1.5h10M2 12.5h10M4.5 7h5"/></svg></button>
  </span>
  <span class="ty-sep"></span>
  <button id="ar-dup" title="Duplicate (⌘D) — shapes and text boxes">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.4"><rect x="1.5" y="1.5" width="8" height="8" rx="1.5"/>
      <path d="M12.5 5v6a1.5 1.5 0 0 1-1.5 1.5H5"/></svg></button>
  <button id="ar-lock" title="Lock — a locked element cannot be dragged">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.4" stroke-linecap="round"><rect x="2.5" y="6" width="9" height="6"
      rx="1.2"/><path d="M4.5 6V4.5a2.5 2.5 0 0 1 5 0V6"/></svg></button>
  <button id="ar-del" title="Delete (⌫) — removes shapes and text boxes; puts a designed element back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
      stroke-width="1.4" stroke-linecap="round"><path d="M2 3.5h10M5.5 3.5V2.2h3v1.3M3.5 3.5l.7 8.3h5.6l.7-8.3M5.9 6v3.5M8.1 6v3.5"/></svg></button>
  <span class="ty-sep" id="ar-possep"></span>
  <label class="ar-pos" title="Left edge, inches">X<input id="ar-x" type="number" step="0.01"></label>
  <label class="ar-pos" title="Top edge, inches">Y<input id="ar-y" type="number" step="0.01"></label>
  <label class="ar-pos" title="Width, inches">W<input id="ar-w" type="number" step="0.01" min="0.1"></label>
  <label class="ar-pos" title="Height, inches" id="ar-hwrap">H<input id="ar-h" type="number" step="0.01" min="0.1"></label>
  <label class="ar-pos" title="Rotation, degrees">⟳<input id="ar-rot" type="number" step="1" min="-180" max="180"></label>
  <span class="ar-lab" id="ar-hint"></span>
</div>
<div id="stage"><iframe id="out" title="editable draft"></iframe></div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
// This editor knows nothing about any particular report. Everything specific —
// which renderer to run, what it reads, where it writes, how big a page is —
// comes from engine/manifest.json, staged beside this file from docsync.yml by
// `python3 -m docsync.stage`. A second report is a second registry entry, not a
// second editor.
//
// Same origin, deliberately: fetching the renderer from raw.githubusercontent
// let its CDN serve a copy several commits old — a page that renders fine and is
// quietly wrong. Staged here, the engine can only be the one that shipped with
// this editor.
let M = null;                          // the manifest
let REPO = '';                         // owner/name we save to
const $ = id => document.getElementById(id);
const bust = u => u + (u.includes('?') ? '&' : '?') + 'cb=' + Date.now();

let py = null, source = '', original = '', dirty = false, editing = false;
let lastFit = [];
let layout = null, layoutOrig = '', scrollTopWas = 0;

async function get(u) {
  // no-store: a query string alone does not reliably defeat the raw CDN,
  // and a stale renderer silently produces a wrong page.
  const r = await fetch(bust(u), { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${u}`);
  return r.text();
}

// content.md is [[key]] lines followed by their text. Reading and rewriting a
// single slot is all the editor needs, so it works on the raw string and
// leaves every byte it did not touch exactly as it was.
//
// No 'm' flag, deliberately: under it '$' means end-of-LINE, which ended every
// slot at its first line. Multi-line slots — the sources list, a two-paragraph
// block — would open truncated and save the rest into oblivion. Here '$' means
// end of input, and the marker is anchored by hand.
const rxEsc = k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const slotRe = k => new RegExp(`((?:^|\\n)\\[\\[${rxEsc(k)}\\]\\]\\n)([\\s\\S]*?)(?=\\n\\[\\[|$)`);
const readSlot  = k => (source.match(slotRe(k)) || [,,''])[2].trim();
const writeSlot = (k, v) => { source = source.replace(slotRe(k), (m, head) => head + v.trim() + '\n'); };

/**
 * Link and cite, acting on the open editor's selection.
 *
 * mousedown is cancelled on the whole bar: a click would otherwise blur the
 * editor first, which commits and re-renders, so the button would act on an
 * element that no longer exists.
 */
function buildTools(d, ta, key) {
  const bar = d.createElement('div');
  bar.className = 'ds-tools';
  bar.addEventListener('mousedown', e => e.preventDefault());

  const btn = (label, title, fn) => {
    const b = d.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.title = title;
    b.addEventListener('click', fn);
    bar.appendChild(b);
    return b;
  };

  btn('Link', 'Wrap the selection in a link (\u2318K)', () => link(d, ta));
  btn('Cite', 'Insert a footnote reference', () => cite(d, ta, bar));
  btn('Image', 'Upload an image and place it here', () => image(d, ta));
  btn('Bold', 'Wrap the selection in **bold**', () => spliceAt(ta, '**', '**'));
  btn('Italic', 'Wrap the selection in *italic*', () => spliceAt(ta, '*', '*'));

  const note = d.createElement('span');
  note.className = 'ds-tools-key';
  note.textContent = key;
  bar.appendChild(note);
  return bar;
}

function link(d, ta) {
  const sel = ta.value.slice(ta.selectionStart, ta.selectionEnd);
  const url = d.defaultView.prompt('Link URL', 'https://');
  if (!url) return;
  if (sel) spliceAt(ta, '[', `](${url})`);
  else spliceAt(ta, `[link text](${url})`);
}

/** Cite an existing source, or add one and cite it. */
function cite(d, ta, bar) {
  const old = bar.querySelector('.ds-cite');
  if (old) { old.remove(); return; }

  const panel = d.createElement('div');
  panel.className = 'ds-cite';
  const sel = d.createElement('select');
  sel.innerHTML = '<option value="">— cite an existing source —</option>'
    + sourceIds().map(id => `<option value="${id}">[${id}] ${
        (sourceText(id) || '').slice(0, 60)}</option>`).join('')
    + '<option value="__new">+ new source…</option>';
  sel.addEventListener('mousedown', e => e.stopPropagation());  // let it open
  sel.addEventListener('change', () => {
    const v = sel.value;
    if (!v) return;
    if (v === '__new') {
      const w = d.defaultView;
      const id = (w.prompt('Short id for the source (e.g. act99, itep-whopays)') || '').trim();
      if (!id) return;
      if (sourceIds().includes(id)) { w.alert(`[${id}] already exists — pick it from the list.`); return; }
      const text = (w.prompt('Citation text, e.g. "Act 99," State of Hawai\u02bbi, 2026.') || '').trim();
      if (!text) return;
      const url = (w.prompt('Source URL', 'https://') || '').trim();
      if (!url) return;
      addSource(id, text, url);
      spliceAt(ta, `[^${id}]`);
    } else {
      spliceAt(ta, `[^${v}]`);
    }
    panel.remove();
  });
  panel.appendChild(sel);
  bar.appendChild(panel);
  sel.focus();
}

// Uploaded images live in the report's own assets dir; the binding's build
// copies them to the deployed page, so the path in the prose ("assets/x.jpg")
// is the same one the published report uses.
const assetPath = name => (M.assets || 'assets') + '/' + name;
const localImages = new Map();     // path -> data URL, for previewing pre-deploy

async function image(d, ta) {
  const tok = await askToken();
  if (!tok) return;
  const inp = d.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    if (!file) return;
    const name = file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-')
                          .replace(/^-|-$/g, '');
    const path = assetPath(name);
    const dataUrl = await new Promise(r => {
      const fr = new FileReader();
      fr.onload = () => r(fr.result);
      fr.readAsDataURL(file);
    });
    const b64 = String(dataUrl).split(',')[1];
    $('stat').textContent = `uploading ${name}…`;
    try {
      // Overwrite needs the blob's sha; a fresh path has none.
      let sha;
      try { sha = (await gh(`contents/${path}?ref=main`)).sha; } catch (e) { sha = undefined; }
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message: `primer: add image ${name}`,
          content: b64, branch: 'main', ...(sha ? { sha } : {}),
        }),
      });
      localImages.set('assets/' + name, dataUrl);
      const alt = d.defaultView.prompt('Describe the image (alt text)', name) || name;
      spliceAt(ta, `\n\n![${alt}](assets/${name})\n\n`);
      $('stat').textContent = `${name} uploaded — it renders below`;
    } catch (e) {
      $('stat').textContent = 'upload failed: ' + e.message;
    }
  });
  inp.click();
}

/** Show just-uploaded images before they are deployed: the page resolves
 *  assets/… against the live site, where a new file does not exist yet. */
function showLocalImages(d) {
  if (!localImages.size) return;
  d.querySelectorAll('img[src^="assets/"]').forEach(img => {
    const local = localImages.get(img.getAttribute('src'));
    if (local) img.src = local;
  });
}

// ------------------------------------------------------------------ fills
// Recolouring goes through the renderer, always. is_light_bg() decides white vs
// charcoal text from a tile's luminance AT BUILD TIME, and the footnote pills
// ride the same class — so painting a new colour onto the DOM would leave the
// old contrast decision in place. That is not "slightly off": it is white text
// on a pale tile. So: write the fill, re-render, let Python decide again.
//
// What CAN be recoloured is not this file's opinion. The renderer stamps
// data-fill on exactly the surfaces whose colour it consults — cards, branch
// tiles, callouts, pages, Table 1's rows — so a new report teaches the editor
// by marking its page, not by editing it. Shapes and text boxes carry their
// colour in their own objects, so they route there instead of layout.fill.
function fillTargets(id) {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return {
    label: sh.kind === 'line' ? 'Line colour' : 'Fill',
    get: () => (sh.kind === 'line' ? sh.stroke : sh.fill),
    set: c => { if (sh.kind === 'line') sh.stroke = c || '#52796F';
                else sh.fill = c || '#E8EDE6'; },
    resettable: false,             // a shape's colour is intrinsic — no "default"
  };
  const b = boxOf(id);
  if (b) return {
    label: 'Background',
    get: () => b.fill,
    set: c => { if (c) b.fill = c; else delete b.fill; },
    resettable: !!b.fill,
    resetLabel: 'No background',
  };
  return {
    label: id.startsWith('page.') ? 'Page colour' : 'Fill',
    get: () => layout.fill && layout.fill[id],
    set: c => { layout.fill = layout.fill || {};
                if (c) layout.fill[id] = c; else delete layout.fill[id]; },
    resettable: !!(layout.fill && layout.fill[id]),
    resetLabel: 'Reset colour',
  };
}

function fillRow(d, m, id) {
  const t = fillTargets(id);
  const h = d.createElement('div');
  h.className = 'ds-menu-head';
  h.textContent = t.label.toLowerCase();
  m.appendChild(h);
  const row = d.createElement('div');
  row.className = 'ds-swatches';
  const current = (t.get() || '').toUpperCase();
  const paint = async c => {
    pushHistory();
    t.set(c);
    markDirty();
    closeMenu(d);
    await render();
  };
  (M.palette || []).forEach(c => {
    const b = d.createElement('button');
    b.className = 'ds-sw' + (c.toUpperCase() === current ? ' on' : '');
    b.style.background = c;
    b.title = c;
    b.addEventListener('click', () => paint(c));
    row.appendChild(b);
  });
  const custom = d.createElement('input');
  custom.type = 'color';
  custom.className = 'ds-sw-custom';
  custom.title = 'Custom colour';
  custom.value = /^#[0-9A-F]{6}$/.test(current) ? current : '#6b9e78';
  custom.addEventListener('change', () => paint(custom.value));
  row.appendChild(custom);
  m.appendChild(row);
  if (t.resettable) {
    const b = d.createElement('button');
    b.textContent = t.resetLabel;
    b.addEventListener('click', () => paint(null));
    m.appendChild(b);
  }
}

// ------------------------------------------------------------------ layers
// z is a plain integer: below zero sits under the text, above it over the top.
// Right-click is where "which thing is on top" has lived for thirty years, so
// it lives there here too.
const zOf = id => {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return typeof sh.z === 'number' ? sh.z : (sh.z === 'front' ? 2 : -1);
  const b = boxOf(id);
  if (b) return b.z ?? 2;
  return layout.positions[id]?.z ?? 1;
};
const setZ = (id, z) => {
  const sh = layout.shapes.find(s => s.id === id);
  const b = boxOf(id);
  if (sh) sh.z = z;
  else if (b) b.z = z;
  else if (layout.positions[id]) layout.positions[id].z = z;
  else return false;
  return true;
};
const allZ = () => [
  ...Object.keys(layout.positions).map(zOf),
  ...layout.shapes.map(s => zOf(s.id)),
  ...boxes().map(b => zOf('text.' + b.id)),
];

function closeMenu(d) {
  d.querySelectorAll('.ds-menu').forEach(m => m.remove());
}

function layerMenu(d, el, e) {
  closeMenu(d);
  const id = el.dataset.shape || el.dataset.el || el.dataset.fill;
  // A page or a table row is a SURFACE: it can change colour but it is not a
  // thing that moves, so it gets the fill section and nothing else.
  const surface = !el.dataset.shape && !el.dataset.el;
  // Only a moved element has a layer to change: an untouched one is still
  // wherever the design put it, and z-index would not apply to it anyway.
  const known = layout.shapes.some(s => s.id === id) || !!layout.positions[id] || !!boxOf(id);
  const m = d.createElement('div');
  m.className = 'ds-menu';
  m.style.left = (e.clientX + d.defaultView.scrollX) + 'px';
  m.style.top = (e.clientY + d.defaultView.scrollY) + 'px';

  const canFill = !!(el.dataset.fill || el.dataset.shape || boxOf(id));
  if (canFill) {
    fillRow(d, m, id);
    if (!surface) {
      const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    }
  }
  const item = (label, fn, on = true) => {
    const b = d.createElement('button');
    b.textContent = label;
    b.disabled = !on;
    b.addEventListener('click', async () => { closeMenu(d); await fn(); });
    m.appendChild(b);
  };
  if (!surface) {
    const zs = allZ();
    const head = d.createElement('div');
    head.className = 'ds-menu-head';
    head.textContent = known ? `${id} · layer ${zOf(id)}` : `${id} · move it first`;
    m.appendChild(head);

    const bump = async delta => {
      setZ(id, zOf(id) + delta); markDirty(); await render();
    };
    item('Bring to front', async () => { setZ(id, Math.max(...zs, 0) + 1); markDirty(); await render(); }, known);
    item('Forward',        () => bump(1), known);
    item('Backward',       () => bump(-1), known);
    item('Send to back',   async () => { setZ(id, Math.min(...zs, 0) - 1); markDirty(); await render(); }, known);
    item(isLocked(id) ? 'Unlock' : 'Lock', () => {
      pushHistory();
      layout.locked = isLocked(id) ? lockedList().filter(x => x !== id)
                                   : [...lockedList(), id];
      if (!layout.locked.length) delete layout.locked;
      markDirty();
      paintSel(d);
    });
    // Opacity, live while sliding, committed through the renderer on release.
    const orow = d.createElement('label');
    orow.className = 'ds-menu-slider';
    orow.textContent = 'opacity';
    const oin = d.createElement('input');
    oin.type = 'range'; oin.min = '0.1'; oin.max = '1'; oin.step = '0.05';
    oin.value = (storeOf(id) || {}).alpha ?? 1;
    oin.addEventListener('pointerdown', () => pushHistory());
    oin.addEventListener('input', () => {
      const st = ensureStore(d, el);
      const v = +oin.value;
      if (v >= 0.999) delete st.alpha; else st.alpha = v;
      if (el.dataset.shape) {
        v >= 0.999 ? el.removeAttribute('opacity') : el.setAttribute('opacity', v);
      } else {
        el.style.opacity = v >= 0.999 ? '' : v;
      }
    });
    oin.addEventListener('change', async () => {
      markDirty(); closeMenu(d); await render();
    });
    orow.appendChild(oin);
    m.appendChild(orow);
  }
  // Shadows belong to the things that own their whole silhouette — shapes and
  // text boxes. A designed card's edge is the design's business.
  const shOwner = layout.shapes.find(s => s.id === id) || boxOf(id);
  if (shOwner) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    if (!shOwner.shadow) {
      item('Add shadow', async () => {
        pushHistory();
        shOwner.shadow = { offset: 0.05, direction: 135, blur: 0.08, alpha: 0.35 };
        markDirty(); await render();
      });
    } else {
      const slide = (label, min, max, step, key) => {
        const w = d.createElement('label');
        w.className = 'ds-menu-slider';
        w.textContent = label;
        const r = d.createElement('input');
        r.type = 'range'; r.min = min; r.max = max; r.step = step;
        r.value = shOwner.shadow[key] ?? { offset: 0.05, blur: 0.08, alpha: 0.35,
                                           direction: 135 }[key];
        r.addEventListener('pointerdown', () => pushHistory());
        r.addEventListener('input', () => {
          shOwner.shadow[key] = +r.value;
          paintShadow(d, el);
        });
        r.addEventListener('change', async () => {
          markDirty(); closeMenu(d); await render();
        });
        w.appendChild(r);
        m.appendChild(w);
      };
      const h2 = d.createElement('div');
      h2.className = 'ds-menu-head';
      h2.textContent = 'shadow';
      m.appendChild(h2);
      slide('offset', 0, 0.3, 0.01, 'offset');
      slide('angle', 0, 360, 15, 'direction');
      slide('blur', 0, 0.3, 0.01, 'blur');
      slide('depth', 0, 1, 0.05, 'alpha');
      item('Remove shadow', async () => {
        pushHistory();
        delete shOwner.shadow;
        markDirty(); await render();
      });
    }
  }
  if (layout.shapes.some(s => s.id === id)) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Delete shape', async () => {
      layout.shapes = layout.shapes.filter(s => s.id !== id);
      markDirty(); await render();
    });
  }
  if (boxOf(id)) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Delete text box', async () => {
      pushHistory();
      layout.boxes = boxes().filter(b => b.id !== id.replace(/^text\./, ''));
      markDirty(); await render();
    });
  }
  if (layout.positions[id]) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Reset to its designed place', async () => {
      delete layout.positions[id];
      markDirty(); await render();
    });
  }
  d.body.appendChild(m);
}

function contextify(d) {
  // data-fill alone (a page, a table row) opens the colour menu too — the
  // querySelectorAll list is deduplicated, so a card matching twice binds once.
  d.querySelectorAll('[data-el], [data-shape], [data-fill]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      layerMenu(d, el, e);
    });
  });
  d.addEventListener('mousedown', e => {
    if (!e.target.closest || !e.target.closest('.ds-menu')) closeMenu(d);
  });
}

// ---------------------------------------------------------------- resizing
// Width is always safe: text reflows, images scale. Height is not — pin a text
// box's height and it either clips the words or leaves a hole the moment the
// prose changes, and .page is overflow:hidden so the clipping is silent. So
// prose gets a width handle only; things whose size IS their content (images,
// shapes) get corners too.
const MIN_IN = 0.4;

function handlesFor(el) {
  if (el.dataset.shape) return ['e', 's', 'se'];
  const img = el.tagName === 'IMG' || el.querySelector('img');
  return img ? ['e', 's', 'se'] : ['e'];
}

function showHandles(d, page, el) {
  hideHandles(d);
  const b = inchBox(el, page);
  const ov = d.createElement('div');
  ov.className = 'ds-handles';
  ov.style.cssText = `left:${b.x}in;top:${b.y}in;width:${b.w}in;height:${b.h}in`;
  handlesFor(el).forEach(dir => {
    const h = d.createElement('div');
    h.className = 'ds-h ds-h-' + dir;
    h.title = dir === 'e' ? 'Drag to set width' : 'Drag to resize';
    h.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startResize(d, el, e, dir);
    });
    ov.appendChild(h);
  });
  const rg = d.createElement('div');
  rg.className = 'ds-h ds-rot';
  rg.title = 'Drag to rotate — snaps to the compass, Shift for free angles';
  rg.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    startRotate(d, el, e);
  });
  ov.appendChild(rg);
  ov.dataset.for = el.dataset.shape || el.dataset.el;
  page.appendChild(ov);
}

const hideHandles = d => d.querySelectorAll('.ds-handles').forEach(h => h.remove());

function startResize(d, el, e0, dir) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  if (!pr.width) return;
  pushHistory();
  const px = DPI * zoomOf(page);
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const P = placer(d, el, page);          // reuse: a resize is a layout override too
  const b = P.box;
  const grab = { x: e0.clientX, y: e0.clientY };
  el.classList.add('ds-lifted');
  d.body.classList.add('ds-resizing');

  const apply = e => {
    let w = b.w, h = b.h;
    if (dir.includes('e')) w = Math.max(MIN_IN, b.w + (e.clientX - grab.x) / px);
    if (dir.includes('s')) h = Math.max(MIN_IN, b.h + (e.clientY - grab.y) / px);
    // Never let a resize push content off the page — same rule as the drag.
    w = Math.min(w, PAGE_W_IN - b.x);
    h = Math.min(h, PAGE_H_IN - b.y);
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.w = +w.toFixed(2); sh.h = +h.toFixed(2); paintShape(d, shapeId); }
    } else {
      P.put(b.x, b.y, false);             // pin it in place, holding its flow slot
      el.style.width = w.toFixed(2) + 'in';
      if (dir.includes('s')) el.style.height = h.toFixed(2) + 'in';
    }
    showHandles(d, page, el);
    $('stat').textContent = `${id} → ${w.toFixed(2)}in wide`
                          + (dir.includes('s') ? ` × ${h.toFixed(2)}in` : '');
    return { w, h };
  };

  let size = { w: b.w, h: b.h };
  const move = e => { size = apply(e); };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    el.classList.remove('ds-lifted');
    d.body.classList.remove('ds-resizing');
    if (!shapeId) {
      P.commit({ x: b.x, y: b.y });
      const p = layout.positions[id];
      p.w = +size.w.toFixed(2);
      if (dir.includes('s')) p.h = +size.h.toFixed(2);
    } else {
      markDirty();
    }
    showHandles(d, page, el);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

// ------------------------------------------------------------ rotate & style
/** The store that carries an element's rot/alpha/shadow. Shapes and boxes
 *  have their own objects; a designed element must be pinned into positions{}
 *  first — rotating or fading a thing IS placing it. */
function ensureStore(d, el) {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return sh;
  const b = boxOf(id);
  if (b) return b;
  if (!layout.positions[id]) {
    const page = el.closest('section.page') || d.querySelector('section.page');
    const P = placer(d, el, page);
    P.commit(P.put(P.box.x, P.box.y, false));
  }
  return layout.positions[id];
}
const storeOf = id => layout.shapes.find(s => s.id === id) || boxOf(id)
                    || layout.positions[id];

/** Paint a store's rotation onto the live node — the same declaration the
 *  renderer will emit, so the drag and the committed page cannot disagree. */
function paintRot(d, el) {
  const id = idOf(el);
  const st = storeOf(id) || {};
  if (el.dataset.shape) {
    const s = st;
    if (st.rot) el.setAttribute('transform',
      `rotate(${st.rot} ${+(s.x + s.w / 2).toFixed(4)} ${+(s.y + s.h / 2).toFixed(4)})`);
    else el.removeAttribute('transform');
  } else {
    el.style.transform = st.rot ? `rotate(${st.rot}deg)` : '';
  }
}

function startRotate(d, el, e0) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  pushHistory();
  const st = ensureStore(d, el);
  const id = idOf(el);
  const b = inchBox(el, page);           // rotation preserves the centre
  const pr = page.getBoundingClientRect();
  const px = DPI * zoomOf(page);
  const cx = pr.left + (b.x + b.w / 2) * px;
  const cy = pr.top + (b.y + b.h / 2) * px;
  const start = st.rot || 0;
  const a0 = Math.atan2(e0.clientY - cy, e0.clientX - cx);
  hideHandles(d);
  const move = e => {
    let deg = start + (Math.atan2(e.clientY - cy, e.clientX - cx) - a0) * 180 / Math.PI;
    if (!e.shiftKey) {
      const near = Math.round(deg / 45) * 45;   // the compass pulls
      if (Math.abs(deg - near) < 6) deg = near;
    }
    deg = ((Math.round(deg * 10) / 10) % 360 + 360) % 360;
    if (deg > 180) deg -= 360;
    if (deg) st.rot = deg; else delete st.rot;
    paintRot(d, el);
    $('stat').textContent = `${id} → ${deg}°`;
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    markDirty();
    paintSel(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** The CSS a shadow means, asked of the engine — same rule as cssFor: a
 *  JavaScript twin of shadow_css would drift from it silently and forever. */
function shadowCssFor(sh, forShape) {
  py.globals.set('SH_JSON', JSON.stringify(sh || {}));
  return py.runPython(
    'import json\nfrom docsync.layout import shadow_css, shape_shadow_css\n'
    + (forShape ? 'shape_shadow_css' : 'shadow_css') + '(json.loads(SH_JSON))');
}

function paintShadow(d, el) {
  const st = storeOf(idOf(el)) || {};
  if (el.dataset.shape) {
    if (st.shadow) el.setAttribute('style', shadowCssFor(st.shadow, true));
    else el.removeAttribute('style');
  } else {
    el.style.boxShadow = st.shadow ? shadowCssFor(st.shadow, false) : '';
  }
}

// -------------------------------------------------------------------- fit
// @media print pins .page to a FIXED 11in and .page is overflow:hidden, so
// anything below the cut is not "scrolled", it is gone from the PDF — which is
// the real deliverable. On screen .page is min-height, so the page simply grows
// and nothing says the bottom will be lost. The overflow is already on your
// screen; this only labels it.
//
// Measuring this correctly is fiddlier than it looks, and getting it wrong is
// worse than not doing it — a check that cries wolf gets ignored, and then the
// real one is ignored too. Three traps, all of which reported false overflow on
// the untouched report:
//   * scrollHeight counts .page's own 0.9in bottom padding as overflow. It is
//     padding. Six of twelve pages "overflowed" by that alone.
//   * .explore and .obligated are in-flow on screen and display:none in print.
//   * The FY2026 twins of every year-picker figure are display:none.
// So: hide .noprint, ignore anything with no box, and measure the lowest
// RENDERED child against 11in.
const FIT_TOL_IN = 0.02;

function fitCheck(d) {
  const s = d.createElement('style');
  s.textContent = '.noprint{display:none!important}';
  d.head.appendChild(s);
  const bad = [];
  d.querySelectorAll('section.page').forEach((pg, i) => {
    const pr = pg.getBoundingClientRect();
    if (!pr.width) return;
    // A narrow window squeezes .page below its print width (max-width:100%)
    // and everything reflows taller. That layout says nothing about where the
    // 11in cut falls on paper — measuring it would cry wolf on every page, and
    // a check that cries wolf gets ignored. Say nothing rather than guess.
    if (pg.offsetWidth < PAGE_W_IN * DPI * 0.98) return;
    const px = DPI * (pr.width / pg.offsetWidth || 1);
    let low = 0, who = '';
    pg.querySelectorAll('*').forEach(el => {
      const r = el.getBoundingClientRect();
      if (!r.width && !r.height) return;                    // display:none
      const pos = d.defaultView.getComputedStyle(el).position;
      // Absolute children never grow the page; they are checked below, and
      // counting them here would flag every folio (which sits by design in the
      // bottom padding).
      if (pos === 'absolute' || pos === 'fixed') return;
      const b = (r.bottom - pr.top) / px;
      if (b > low) { low = b; who = el.dataset.slot || el.tagName.toLowerCase(); }
    });
    if (low > PAGE_H_IN + FIT_TOL_IN)
      bad.push({ page: i + 1, over: +(low - PAGE_H_IN).toFixed(2), who, kind: 'flow' });
    // Moved boxes and floating text do not grow the page — they are simply cut.
    pg.querySelectorAll('[data-el], [data-box]').forEach(el => {
      const r = el.getBoundingClientRect();
      if (!r.height) return;
      const b = (r.bottom - pr.top) / px;
      if (b > PAGE_H_IN + FIT_TOL_IN)
        bad.push({ page: i + 1, over: +(b - PAGE_H_IN).toFixed(2),
                   who: el.dataset.el || el.dataset.box, kind: 'placed' });
    });
  });
  s.remove();
  return bad;
}

/** Draw the cut, don't just describe it: a red line exactly where the PDF ends
 *  and hatching over what it will lose. Seeing it beats reading about it. */
function paintCut(d, bad) {
  d.querySelectorAll('.ds-cut').forEach(c => c.remove());
  const pages = [...d.querySelectorAll('section.page')];
  new Set(bad.map(b => b.page)).forEach(n => {
    const pg = pages[n - 1];
    if (!pg) return;
    const worst = Math.max(...bad.filter(b => b.page === n).map(b => b.over));
    const cut = d.createElement('div');
    cut.className = 'ds-cut';
    cut.style.cssText = `top:${PAGE_H_IN}in;height:${worst + 0.15}in`;
    cut.dataset.label = `cut off in the PDF — ${worst.toFixed(2)}in`;
    pg.appendChild(cut);
  });
}

function reportFit(d) {
  const bad = fitCheck(d);
  paintCut(d, bad);
  lastFit = bad;
  if (!bad.length) { $('fit').hidden = true; return; }
  const pages = [...new Set(bad.map(b => b.page))];
  $('fit').hidden = false;
  $('fit').textContent = `⚠ ${pages.length} page${pages.length > 1 ? 's' : ''} cut in print: `
                       + pages.join(', ');
  $('fit').title = bad.map(b => `page ${b.page}: ${b.who} is ${b.over}in past the cut`).join('\n');
}

// -------------------------------------------------------------- text boxes
// A slot says what the report always says; a box is a note someone put on one
// page. That is why it lives in layout.json — and the price is real and worth
// stating plainly: it never reaches the bound Google Doc, so an editor working
// there will never see it.
//
// A box carries data-el="text.<id>", so drag, resize, snap, layers, right-click
// and undo all work on it already. Almost none of this is new machinery.
const boxes = () => (layout.boxes = layout.boxes || []);
const boxOf = id => boxes().find(b => b.id === (id || '').replace(/^text\./, ''));

/** The page whose middle sits nearest the middle of the view. "Add" lands
 *  there — nothing should ask you to type a page number at a thing you are
 *  already looking at. */
function visiblePage() {
  const d = $('out').contentDocument;
  if (!d || !d.defaultView) return 1;
  const mid = d.defaultView.innerHeight / 2;
  let best = 1, dist = Infinity;
  [...d.querySelectorAll('section.page')].forEach((pg, i) => {
    const r = pg.getBoundingClientRect();
    const c = (r.top + r.bottom) / 2;
    if (Math.abs(c - mid) < dist) { dist = Math.abs(c - mid); best = i + 1; }
  });
  return best;
}

/** One popover open at a time, anchored under its button; any click that is
 *  not inside a popover (or on its trigger) closes them. */
function togglePop(pop, anchor) {
  const wasHidden = pop.hidden;
  document.querySelectorAll('.pop').forEach(p => { p.hidden = true; });
  if (!wasHidden) return;
  pop.style.left = Math.max(8, Math.min(anchor.offsetLeft,
    document.documentElement.clientWidth - pop.offsetWidth - 16)) + 'px';
  pop.hidden = false;
}
addEventListener('mousedown', e => {
  if (!e.target.closest('.pop') && !e.target.closest('#ty-colorbtn, #ty-spacebtn, #shape'))
    document.querySelectorAll('.pop').forEach(p => { p.hidden = true; });
});

$('text').onclick = async () => {
  const page = visiblePage();
  pushHistory();
  const id = freeBoxId();
  boxes().push({ id, page, x: 1, y: 2, w: 3, z: 2,
                 md: 'New text. **Bold**, *italic* and [links](https://example.org) work.' });
  setSel($('out').contentDocument, ['text.' + id]);
  markDirty();
  await render();
  $('stat').textContent = `text.${id} added to page ${page} — double-click to write, drag to place, right-click for colour`;
};

/** Editing a box's words. Its text is in layout.json, not content.md, so it
 *  cannot go through readSlot/writeSlot — but it is the same textarea, the same
 *  markdown, and the same blur-commits rule. */
function editBox(d, el) {
  if (editing) return;
  const b = boxOf(el.dataset.el);
  if (!b) return;
  editing = true;
  pushHistory();
  const ta = d.createElement('textarea');
  ta.className = 'ds-edit';
  ta.value = b.md;
  const tools = d.createElement('p');
  tools.className = 'ds-hint';
  tools.textContent = `text.${b.id} — markdown; blank line = new paragraph. `
                    + `Not in the Google Doc. Click away to render, Esc to cancel.`;
  el.replaceWith(ta);
  ta.after(tools);
  requestAnimationFrame(() => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(Math.max(ta.scrollHeight + 4, 64), 460) + 'px';
  });
  ta.focus();
  const finish = async keep => {
    if (ta.dataset.done) return;
    ta.dataset.done = '1';
    editing = false;
    if (keep && ta.value.trim() && ta.value !== b.md) { b.md = ta.value.trim(); markDirty(); }
    await render();
  };
  ta.addEventListener('blur', () => finish(true));
  ta.addEventListener('keydown', e => { if (e.key === 'Escape') { e.preventDefault(); finish(false); } });
}

// ----------------------------------------------------------------- effects
// Which knobs an effect has comes from the engine (EFFECT_PARAMS), not a list
// retyped here: a control that does nothing is worse than a missing one, and a
// second list would drift from the first.
let fxParams = {};

const FX_RANGE = {                       // step, min, max — physical units
  offset:    [0.01, 0, 0.5],             // em, so it scales with the type
  direction: [15, 0, 360],               // degrees, 0 = 12 o'clock, clockwise
  blur:      [0.01, 0, 0.5],
  alpha:     [0.05, 0, 1],               // alpha, not "transparency" — see layout.py
  intensity: [0.1, 0, 3],
  width:     [0.005, 0, 0.2],
};

function fxOf(k) { return styleOf(k).effect || {}; }

function setFx(k, patch) {
  const fx = { ...fxOf(k), ...patch };
  Object.keys(fx).forEach(p => { if (fx[p] === '' || fx[p] === null) delete fx[p]; });
  setStyle(k, { effect: fx.kind ? fx : null });
}

function showFxParams(key) {
  const host = $('ty-fxp');
  host.innerHTML = '';
  const fx = fxOf(key);
  if (!fx.kind) return;
  (fxParams[fx.kind] || []).forEach(name => {
    if (name === 'color' || name === 'shadow') {
      const c = document.createElement('input');
      c.type = 'color'; c.title = name === 'color' ? 'Effect colour' : 'Second colour';
      c.value = /^#[0-9a-f]{6}$/i.test(fx[name] || '') ? fx[name]
              : (name === 'color' ? '#52796f' : '#95b7a2');
      c.addEventListener('input', () => { setFx(key, { [name]: c.value }); paintText(key); });
      c.addEventListener('change', async () => {
        setFx(key, { [name]: c.value }); markDirty(); await render(); showType(key);
      });
      host.appendChild(c);
      return;
    }
    const [step, min, max] = FX_RANGE[name] || [0.01, 0, 1];
    const w = document.createElement('label');
    w.className = 'ty-num';
    w.title = name;
    w.textContent = name.slice(0, 3);
    const n = document.createElement('input');
    n.type = 'number'; n.step = step; n.min = min; n.max = max;
    n.value = fx[name] ?? '';
    n.placeholder = 'auto';
    n.addEventListener('input', () => {
      setFx(key, { [name]: n.value === '' ? null : +n.value }); paintText(key);
    });
    n.addEventListener('change', async () => {
      setFx(key, { [name]: n.value === '' ? null : +n.value });
      markDirty(); await render(); showType(key);
    });
    w.appendChild(n);
    host.appendChild(w);
  });
}

// ------------------------------------------------------------------- type
// A contextual row, Canva's own pattern: it appears when text is selected and
// is otherwise not in the way. It lives OUTSIDE the iframe and is keyed on a
// slot NAME, never a DOM node — so a blur that commits and re-renders cannot
// invalidate it, and its <select>s need none of the mousedown gymnastics the
// in-page strip does.
let selected = null;                   // the slot key the type row is editing
let fonts = {};                        // family -> weights, from the engine

const styleOf = k => (layout.text && layout.text[k]) || {};
const setStyle = (k, patch) => {
  layout.text = layout.text || {};
  const st = { ...styleOf(k), ...patch };
  Object.keys(st).forEach(p => { if (st[p] === '' || st[p] === null) delete st[p]; });
  if (Object.keys(st).length) layout.text[k] = st; else delete layout.text[k];
};

/** The CSS a style means, asked of the engine rather than reimplemented here.
 *  Two implementations of that question would drift apart silently. */
function cssFor(st) {
  py.globals.set('STYLE_JSON', JSON.stringify(st || {}));
  return py.runPython('import json\nfrom docsync.layout import text_css\ntext_css(json.loads(STYLE_JSON))');
}

/** Paint the style straight onto the node while a control is being dragged.
 *  A full re-render is ~1s; a slider is 60fps. Same bargain the drag strikes —
 *  the renderer catches up on release. */
function paintText(key) {
  const d = $('out').contentDocument;
  const css = cssFor(styleOf(key));
  d.querySelectorAll(`[data-slot="${key}"]`).forEach(el => el.style.cssText = css);
}

function fillWeights(fam, want) {
  const sel = $('ty-weight');
  const ws = fonts[fam] || [400];
  sel.innerHTML = '<option value="">weight</option>'
    + ws.map(w => `<option value="${w}">${w}</option>`).join('');
  sel.value = want && ws.includes(+want) ? String(want) : '';
}

/** What the slot's type measures today, from the rendered page — so the size
 *  stepper and the spacing sliders start from reality, not from zero. */
function computedType(key) {
  const el = $('out').contentDocument.querySelector(`[data-slot="${key}"]`);
  if (!el) return { size: 16, leading: 1.45 };
  const cs = el.ownerDocument.defaultView.getComputedStyle(el);
  const size = parseFloat(cs.fontSize) || 16;
  const lh = parseFloat(cs.lineHeight);
  return { size, leading: lh ? +(lh / size).toFixed(2) : 1.45 };
}

function showType(key) {
  selected = key;
  const st = styleOf(key);
  const real = computedType(key);
  $('ty-key').textContent = key;
  $('ty-key').title = key;
  // text-align means nothing to SVG text — a curved label is centred on its
  // path by text-anchor, and display:inline-block is not a thing there either.
  // Hide the control rather than offer one that does nothing.
  const el = $('out').contentDocument.querySelector(`[data-slot="${key}"]`);
  const inSvg = !!(el && el.closest('svg'));
  document.querySelectorAll('.ty-al').forEach(b => b.hidden = inSvg);
  $('ty-font').value = st.font || '';
  fillWeights(st.font, st.weight);
  // The stepper shows the REAL size as a placeholder when none is set: what
  // you would be stepping from, not a blank.
  $('ty-size').value = st.size ?? '';
  $('ty-size').placeholder = real.size % 1 ? real.size.toFixed(1) : real.size;
  $('ty-track').value = st.tracking ?? '';
  $('ty-track-r').value = st.tracking ?? 0;
  $('ty-lead').value = st.leading ?? '';
  $('ty-lead-r').value = st.leading ?? real.leading;
  $('ty-case').value = st.case || 'none';
  $('ty-color').value = /^#[0-9a-f]{6}$/i.test(st.color || '') ? st.color : '#2f3e46';
  const cur = (st.color || '').toUpperCase();
  document.querySelectorAll('#ty-swgrid .sw[data-c]').forEach(s =>
    s.classList.toggle('on', s.dataset.c === cur));
  $('ty-Abar').style.background =
    st.color || 'linear-gradient(90deg,#e66,#6b9e78,#66e)';
  $('ty-fx').value = (st.effect && st.effect.kind) || '';
  showFxParams(key);
  $('ty-i').classList.toggle('on', !!st.italic);
  $('ty-u').classList.toggle('on', !!st.underline);
  document.querySelectorAll('.ty-al').forEach(b =>
    b.classList.toggle('on', b.dataset.a === st.align));
  $('type').hidden = false;
}

/** input -> paint (fast, local). change -> commit and re-render, because the
 *  cascade and is_light_bg are the renderer's job, not something to fake. */
function wireType() {
  const live = (el, read) => {
    el.addEventListener('input', () => { setStyle(selected, read()); paintText(selected); });
    el.addEventListener('change', async () => {
      setStyle(selected, read()); markDirty(); await render(); showType(selected);
    });
  };
  live($('ty-size'), () => ({ size: $('ty-size').value === '' ? null : +$('ty-size').value }));
  live($('ty-track'), () => ({ tracking: $('ty-track').value === '' ? null : +$('ty-track').value }));
  live($('ty-lead'), () => ({ leading: $('ty-lead').value === '' ? null : +$('ty-lead').value }));
  live($('ty-color'), () => ({ color: $('ty-color').value }));

  // The stepper works from the size the page actually shows, so the first
  // press on an untouched heading goes 26 -> 27, not blank -> 1.
  const step = dir => async () => {
    const st = styleOf(selected);
    const cur = st.size ?? computedType(selected).size;
    const next = Math.max(6, Math.min(200, Math.round((cur + dir) * 2) / 2));
    setStyle(selected, { size: next });
    markDirty(); await render(); showType(selected);
  };
  $('ty-down').addEventListener('click', step(-1));
  $('ty-up').addEventListener('click', step(1));

  // Sliders mirror their number fields; drag paints live, release commits.
  const slider = (rid, nid, prop) => {
    const r = $(rid), n = $(nid);
    r.addEventListener('input', () => {
      n.value = r.value;
      setStyle(selected, { [prop]: +r.value });
      paintText(selected);
    });
    r.addEventListener('change', async () => {
      markDirty(); await render(); showType(selected);
    });
  };
  slider('ty-track-r', 'ty-track', 'tracking');
  slider('ty-lead-r', 'ty-lead', 'leading');

  $('ty-colorbtn').addEventListener('click', () => togglePop($('ty-colorpop'), $('ty-colorbtn')));
  $('ty-spacebtn').addEventListener('click', () => togglePop($('ty-spacepop'), $('ty-spacebtn')));
  $('ty-colordefault').addEventListener('click', async () => {
    $('ty-colorpop').hidden = true;
    setStyle(selected, { color: null });
    markDirty(); await render(); showType(selected);
  });

  $('ty-font').addEventListener('change', async () => {
    const fam = $('ty-font').value || null;
    // A weight the new family does not have would be faked by the browser, and
    // the engine refuses it at load — so drop it rather than carry it over.
    const w = fam && fonts[fam] && fonts[fam].includes(+styleOf(selected).weight)
      ? styleOf(selected).weight : null;
    setStyle(selected, { font: fam, weight: w });
    markDirty(); await render(); showType(selected);
  });
  $('ty-weight').addEventListener('change', async () => {
    setStyle(selected, { weight: $('ty-weight').value === '' ? null : +$('ty-weight').value });
    markDirty(); await render(); showType(selected);
  });
  $('ty-case').addEventListener('change', async () => {
    const v = $('ty-case').value;
    setStyle(selected, { case: v === 'none' ? null : v });
    markDirty(); await render(); showType(selected);
  });
  const toggle = (id, prop) => $(id).addEventListener('click', async () => {
    setStyle(selected, { [prop]: !styleOf(selected)[prop] || null });
    markDirty(); await render(); showType(selected);
  });
  toggle('ty-i', 'italic');
  toggle('ty-u', 'underline');
  document.querySelectorAll('.ty-al').forEach(b => b.addEventListener('click', async () => {
    const a = styleOf(selected).align === b.dataset.a ? null : b.dataset.a;
    setStyle(selected, { align: a });
    markDirty(); await render(); showType(selected);
  }));
  $('ty-fx').addEventListener('change', async () => {
    const kind = $('ty-fx').value || null;
    // Drop the old effect's parameters rather than carrying them across: they
    // mean different things per effect, and 'width' on a shadow is noise.
    setStyle(selected, { effect: kind ? { kind } : null });
    markDirty(); await render(); showType(selected);
  });
  $('ty-reset').addEventListener('click', async () => {
    if (layout.text) delete layout.text[selected];
    markDirty(); await render(); showType(selected);
  });
}

// --------------------------------------------------------------- selection
// Selection is a set of element IDS, not nodes: every commit-level change
// re-renders the page into a fresh document, and a node-keyed selection would
// silently die each time. wire() re-resolves and repaints after each render.
//
// Click selects and drags in one gesture (Canva's own physics); shift-click
// toggles membership; dragging on empty page is a marquee; Esc clears. The
// resize handles now belong to the selection — exactly one selected element
// shows them — rather than to whatever the mouse happens to cross.
const selIds = new Set();
const idOf = el => el.dataset.shape || el.dataset.el;
const selEls = d => [...selIds].map(id =>
  d.querySelector(`[data-el="${CSS.escape(id)}"], [data-shape="${CSS.escape(id)}"]`))
  .filter(Boolean);
const lockedList = () => (layout.locked = layout.locked || []);
const isLocked = id => (layout.locked || []).includes(id);

function paintSel(d) {
  d.querySelectorAll('.ds-sel').forEach(el => el.classList.remove('ds-sel'));
  hideHandles(d);
  const els = selEls(d);
  els.forEach(el => el.classList.add('ds-sel'));
  if (els.length === 1 && !isLocked(idOf(els[0]))) {
    const page = els[0].closest('section.page') || d.querySelector('section.page');
    showHandles(d, page, els[0]);
  }
  arrangeBar(d);
}
const setSel = (d, ids) => { selIds.clear(); ids.forEach(i => selIds.add(i)); paintSel(d); };
const clearSel = d => { selIds.clear(); paintSel(d); };

function arrangeBar(d) {
  const n = selIds.size;
  $('arrange').hidden = n === 0;
  if (!n) return;
  $('ar-count').textContent = n === 1 ? [...selIds][0] : `${n} selected`;
  $('ar-dh').disabled = $('ar-dv').disabled = n < 3;
  $('ar-dup').disabled = ![...selIds].every(id =>
    layout.shapes.some(s => s.id === id) || boxOf(id));
  const locked = [...selIds].every(isLocked);
  $('ar-lock').classList.toggle('on', locked);
  $('ar-lock').title = locked ? 'Unlock' : 'Lock — a locked element cannot be dragged';
  // The numbers panel: one element, typed placement in inches.
  const one = n === 1 && d ? selEls(d)[0] : null;
  document.querySelectorAll('.ar-pos, #ar-possep').forEach(x => { x.hidden = !one; });
  if (!one) return;
  const page = one.closest('section.page') || d.querySelector('section.page');
  const b = inchBox(one, page);
  const st = storeOf(idOf(one)) || {};
  $('ar-x').value = (st.x ?? b.x).toFixed(2);
  $('ar-y').value = (st.y ?? b.y).toFixed(2);
  $('ar-w').value = (st.w ?? b.w).toFixed(2);
  const hasH = !!one.dataset.shape || st.h != null;
  $('ar-hwrap').hidden = !hasH;
  if (hasH) $('ar-h').value = (st.h ?? b.h).toFixed(2);
  $('ar-rot').value = st.rot ?? 0;
}

/** Typed placement goes through the same placer a drag uses — one rule for
 *  what a coordinate means, whichever finger set it. */
const arField = (fid, apply) => $(fid).addEventListener('change', async () => {
  const d = $('out').contentDocument;
  const els = selEls(d);
  if (els.length !== 1) return;
  const el = els[0];
  const page = el.closest('section.page') || d.querySelector('section.page');
  const v = parseFloat($(fid).value);
  if (isNaN(v)) return;
  pushHistory();
  apply(d, el, page, v);
  clearGuides(d);
  markDirty();
  paintSel(d);
});
arField('ar-x', (d, el, page, v) => {
  const P = placer(d, el, page); P.commit(P.put(v, P.box.y, false));
});
arField('ar-y', (d, el, page, v) => {
  const P = placer(d, el, page); P.commit(P.put(P.box.x, v, false));
});
arField('ar-w', (d, el, page, v) => {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  const b = boxOf(id);
  if (sh) { sh.w = v; paintShape(d, id); }
  else if (b) { b.w = v; el.style.width = v + 'in'; }
  else { ensureStore(d, el).w = v; el.style.width = v + 'in'; }
});
arField('ar-h', (d, el, page, v) => {
  const id = idOf(el);
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) { sh.h = v; paintShape(d, id); }
  else { ensureStore(d, el).h = v; el.style.height = v + 'in'; }
});
arField('ar-rot', (d, el, page, v) => {
  const st = ensureStore(d, el);
  if (v) st.rot = v; else delete st.rot;
  paintRot(d, el);
});

/** Members of the selection on one page — cross-page alignment has no
 *  meaning, so operations quietly act on the first element's page. */
function pageMembers(d) {
  // Locked means hands off — from align and distribute as much as from a drag.
  const els = selEls(d).filter(el => !isLocked(idOf(el)));
  if (!els.length) return { page: null, els: [] };
  const page = els[0].closest('section.page') || d.querySelector('section.page');
  return { page, els: els.filter(el => (el.closest('section.page')) === page) };
}

// Align: a single element aligns to the page (edges = the text column's
// margins, centres = the true page centre — flush beats touching the trim);
// several align to their own bounding box, which is what "align these" means.
function alignSel(d, mode) {
  const { page, els } = pageMembers(d);
  if (!els.length) return;
  pushHistory();
  const items = els.map(el => ({ el, b: inchBox(el, page) }));
  let ref;
  if (items.length === 1) {
    ref = { x: MARGIN_IN, y: TOP_IN,
            w: PAGE_W_IN - 2 * MARGIN_IN, h: PAGE_H_IN - TOP_IN - 0.9 };
    if (mode === 'hcenter') { ref.x = 0; ref.w = PAGE_W_IN; }
    if (mode === 'vcenter') { ref.y = 0; ref.h = PAGE_H_IN; }
  } else {
    const x1 = Math.min(...items.map(o => o.b.x)), y1 = Math.min(...items.map(o => o.b.y));
    const x2 = Math.max(...items.map(o => o.b.x + o.b.w));
    const y2 = Math.max(...items.map(o => o.b.y + o.b.h));
    ref = { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
  }
  items.forEach(({ el, b }) => {
    let { x, y } = b;
    if (mode === 'left') x = ref.x;
    if (mode === 'hcenter') x = ref.x + (ref.w - b.w) / 2;
    if (mode === 'right') x = ref.x + ref.w - b.w;
    if (mode === 'top') y = ref.y;
    if (mode === 'vcenter') y = ref.y + (ref.h - b.h) / 2;
    if (mode === 'bottom') y = ref.y + ref.h - b.h;
    const P = placer(d, el, page);
    P.commit(P.put(x, y, false));
  });
  clearGuides(d);
  paintSel(d);
}

function distributeSel(d, axis) {
  const { page, els } = pageMembers(d);
  if (els.length < 3) return;
  pushHistory();
  const items = els.map(el => ({ el, b: inchBox(el, page) }))
    .sort((a, q) => axis === 'h' ? a.b.x - q.b.x : a.b.y - q.b.y);
  const first = items[0].b, last = items[items.length - 1].b;
  if (axis === 'h') {
    const gap = ((last.x + last.w - first.x)
               - items.reduce((s, o) => s + o.b.w, 0)) / (items.length - 1);
    let x = first.x;
    items.forEach(({ el, b }) => {
      const P = placer(d, el, page);
      P.commit(P.put(x, b.y, false));
      x += b.w + gap;
    });
  } else {
    const gap = ((last.y + last.h - first.y)
               - items.reduce((s, o) => s + o.b.h, 0)) / (items.length - 1);
    let y = first.y;
    items.forEach(({ el, b }) => {
      const P = placer(d, el, page);
      P.commit(P.put(b.x, y, false));
      y += b.h + gap;
    });
  }
  clearGuides(d);
  paintSel(d);
}

/** Delete what can be deleted: shapes and text boxes cease to exist; a
 *  designed element cannot be deleted, so the key resets its override and
 *  the design's own placement stands again. */
async function deleteSel(d) {
  if (!selIds.size) return;
  pushHistory();
  let touched = false;
  [...selIds].filter(id => !isLocked(id)).forEach(id => {
    if (layout.shapes.some(s => s.id === id)) {
      layout.shapes = layout.shapes.filter(s => s.id !== id); touched = true;
    } else if (boxOf(id)) {
      layout.boxes = boxes().filter(b => b.id !== id.replace(/^text\./, '')); touched = true;
    } else if (layout.positions[id]) {
      delete layout.positions[id]; touched = true;
    }
  });
  selIds.clear();
  if (!touched) { past.pop(); return; }
  markDirty();
  await render();
}

const freeBoxId = () => {
  let n = 1;
  while (boxes().some(b => b.id === 't' + n) || layout.shapes.some(s => s.id === 't' + n)) n++;
  return 't' + n;
};
const freeShapeId = kind => {
  let n = layout.shapes.length + 1;
  while (layout.shapes.some(s => s.id === `s${n}-${kind}`)) n++;
  return `s${n}-${kind}`;
};

/** Duplicate the selection's shapes and boxes, offset a fifth of an inch.
 *  Designed elements are skipped: there is exactly one of each by design. */
async function duplicateSel(d) {
  const copies = [];
  const dup = id => {
    const sh = layout.shapes.find(s => s.id === id);
    const b = boxOf(id);
    if (sh) {
      const nid = freeShapeId(sh.kind);
      layout.shapes.push({ ...sh, id: nid,
        x: Math.min(sh.x + 0.2, PAGE_W_IN - Math.min(sh.w, PAGE_W_IN)),
        y: Math.min(sh.y + 0.2, PAGE_H_IN - Math.min(sh.h, PAGE_H_IN)) });
      copies.push(nid);
    } else if (b) {
      const nid = freeBoxId();
      boxes().push({ ...b, id: nid,
        x: Math.min(b.x + 0.2, PAGE_W_IN - Math.min(b.w, PAGE_W_IN)),
        y: Math.min(b.y + 0.2, PAGE_H_IN - 0.4) });
      copies.push('text.' + nid);
    }
  };
  if (!selIds.size) return;
  pushHistory();
  [...selIds].forEach(dup);
  if (!copies.length) { past.pop(); return; }
  setSel(d, copies);                       // the copies become the selection
  markDirty();
  await render();
  $('stat').textContent = `duplicated ${copies.length} element${copies.length > 1 ? 's' : ''}`;
}

function toggleLockSel(d) {
  if (!selIds.size) return;
  pushHistory();
  const all = [...selIds];
  const locked = all.every(isLocked);
  layout.locked = locked ? lockedList().filter(id => !selIds.has(id))
                         : [...new Set([...lockedList(), ...all])];
  if (!layout.locked.length) delete layout.locked;
  markDirty();
  paintSel(d);
  $('stat').textContent = locked ? 'unlocked' : 'locked — drag is off until unlocked';
}

let lastNudge = 0;
function nudgeSel(d, d4) {
  const els = selEls(d).filter(el => !isLocked(idOf(el)));
  if (!els.length) return;
  // One undo step per burst of presses, not one per pixel of progress.
  const now = Date.now();
  if (now - lastNudge > 900) pushHistory();
  lastNudge = now;
  els.forEach(el => {
    const page = el.closest('section.page') || d.querySelector('section.page');
    const P = placer(d, el, page);
    P.commit(P.put(P.box.x + d4[0], P.box.y + d4[1], false));
  });
  clearGuides(d);
  paintSel(d);
}

/** Rubber-band select: drag on empty page. A click that never travels is a
 *  click-away, which clears the selection — one gesture, both meanings. */
function marquee(d, pg, e0) {
  const px = DPI * zoomOf(pg);
  const pr = pg.getBoundingClientRect();
  const ox = (e0.clientX - pr.left) / px, oy = (e0.clientY - pr.top) / px;
  const box = d.createElement('div');
  box.className = 'ds-marquee';
  pg.appendChild(box);
  let r = null;
  const move = e => {
    const x = (e.clientX - pr.left) / px, y = (e.clientY - pr.top) / px;
    r = { x: Math.min(ox, x), y: Math.min(oy, y),
          w: Math.abs(x - ox), h: Math.abs(y - oy) };
    box.style.cssText = `left:${r.x}in;top:${r.y}in;width:${r.w}in;height:${r.h}in`;
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    box.remove();
    if (!r || (r.w < 0.05 && r.h < 0.05)) { clearSel(d); return; }
    const hit = [];
    pg.querySelectorAll('[data-el], [data-shape]').forEach(el => {
      const b = inchBox(el, pg);
      if ((b.w || b.h) && b.x < r.x + r.w && b.x + b.w > r.x
          && b.y < r.y + r.h && b.y + b.h > r.y)
        hit.push(idOf(el));
    });
    setSel(d, hit);
    $('stat').textContent = hit.length ? `${hit.length} selected` : '';
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Keyboard, inside the page: the top-level listener never hears iframe keys
 *  (undo was dead whenever focus sat in the report — a real bug until now). */
function keysFor(d) {
  d.addEventListener('keydown', e => {
    if (editing) return;
    const t = e.target;
    if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT'
              || t.tagName === 'SELECT' || t.isContentEditable)) return;
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
      e.preventDefault(); e.shiftKey ? redo() : undo(); return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') {
      e.preventDefault(); duplicateSel(d); return;
    }
    if (!selIds.size) return;
    if (e.key === 'Escape') { clearSel(d); return; }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault(); deleteSel(d); return;
    }
    if (t && held.get(t)) return;          // keyDrag owns a picked-up element
    const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
    const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
                 ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
    if (d4) { e.preventDefault(); nudgeSel(d, d4); }
  });
}

// ------------------------------------------------------------------- zoom
// The iframe is a fixed desktop-width viewport (so the report's own media
// queries see a desktop, always) and the CANVAS is scaled — Canva's model.
// Events map through the transform, so every inch of drag math is untouched.
// "Fit" tracks the pane; the numbers are absolute canvas scales.
const VIEW_W = 1200;
let zoomChoice = '';
try { zoomChoice = localStorage.getItem('ds-zoom') || ''; } catch (e) { /* file: */ }

function applyZoom() {
  const out = $('out'), stage = $('stage');
  const availW = stage.clientWidth;
  let s = zoomChoice === 'fit' || !zoomChoice
    ? Math.min(availW / VIEW_W, zoomChoice === 'fit' ? 10 : 1)
    : +zoomChoice;
  s = Math.max(0.25, Math.min(2, Math.round(s * 1000) / 1000));
  out.style.width = VIEW_W + 'px';
  out.style.height = (stage.clientHeight / s) + 'px';
  out.style.transform = s === 1 ? '' : `scale(${s})`;
  // Centre a canvas narrower than the pane; let a wider one scroll.
  const slack = availW - VIEW_W * s;
  out.style.marginLeft = slack > 0 ? (slack / 2) + 'px' : '0';
}

document.querySelectorAll('#zoom button').forEach(b => b.addEventListener('click', () => {
  zoomChoice = zoomChoice === b.dataset.z ? '' : b.dataset.z;   // toggle off = auto
  try { localStorage.setItem('ds-zoom', zoomChoice); } catch (e) { /* file: */ }
  document.querySelectorAll('#zoom button').forEach(x =>
    x.classList.toggle('on', x.dataset.z === zoomChoice));
  applyZoom();
  const d = $('out').contentDocument;
  if (d) paintSel(d);
}));

let rsT = null;
addEventListener('resize', () => {
  clearTimeout(rsT);
  rsT = setTimeout(applyZoom, 120);
});

$('ar-dup').addEventListener('click', () => duplicateSel($('out').contentDocument));
$('ar-del').addEventListener('click', () => deleteSel($('out').contentDocument));
$('ar-lock').addEventListener('click', () => toggleLockSel($('out').contentDocument));
$('ar-dh').addEventListener('click', () => distributeSel($('out').contentDocument, 'h'));
$('ar-dv').addEventListener('click', () => distributeSel($('out').contentDocument, 'v'));
document.querySelectorAll('.ar-al').forEach(b => b.addEventListener('click', () =>
  alignSel($('out').contentDocument, b.dataset.al)));

// ------------------------------------------------------------------ moving
// No modes. A box is draggable by its own chrome; the text inside it is not.
// The target of the mousedown decides: land on a text slot and you are
// editing, land on the box itself and you are moving it.
//
// A drop does NOT re-render. The drag already moved the real element, so the
// page on screen is already the answer, and re-rendering would freeze for a
// second and throw away your scroll position for nothing. layout.json is
// updated and the renderer catches up on the next render or on save.
const DPI = 96;                        // CSS px per inch — the one real constant
// Page geometry belongs to the report, not to this file. Set from the manifest
// at boot; the defaults are only what a letter-portrait report happens to use.
let PAGE_W_IN = 8.5, PAGE_H_IN = 11;
let MARGIN_IN = 0.62, TOP_IN = 0.75;
const SNAP_IN = 0.06;                  // how close before it pulls into line
const NUDGE_IN = 0.05, NUDGE_BIG_IN = 0.25;

/**
 * primer.css zooms .page to 125% on wide screens and the factor moves with the
 * viewport. getBoundingClientRect reports zoomed pixels; CSS inches are
 * unzoomed. Every conversion divides it back out — assuming 1 made a 7.26in box
