// appearance, so inserting one never renumbers anything by hand.
const sourceIds = () => [...readSlot('sources').matchAll(/^\[([^\]]+)\]:/gm)].map(m => m[1]);
const sourceText = id => (readSlot('sources').match(
  new RegExp(`^\\[${id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]:\\s*(.*)$`, 'm')) || [,''])[1];

function addSource(id, text, url) {
  const line = `[${id}]: ${text} — ${url}`;
  writeSlot('sources', readSlot('sources') + '\n' + line);
}

// --- sources manager: edit, rename, reorder and remove citations -----------
// Reuses the slot primitives above; every mutation calls pushHistory() first,
// so a source edit is undoable like any move. A source is one "[id]: text — url"
// line; the renderer's parser uses the same shape (docsync/content.py).
const srcLineRe = id => new RegExp(`^\\[${rxEsc(id)}\\]:.*$`, 'm');
const parseSources = () => readSlot('sources').split('\n').map(l => l.trim())
  .filter(Boolean).map(l => {
    const m = l.match(/^\[([^\]]+)\]:\s*(.*?)\s+—\s+(\S+)\s*$/);
    return m ? { id: m[1], text: m[2].trim(), url: m[3].trim() } : null;
  }).filter(Boolean);
const citeCount = id =>
  (source.match(new RegExp(`\\[\\^${rxEsc(id)}\\]`, 'g')) || []).length;

function updateSource(id, text, url) {
  // Replacer FUNCTION, not string: citation text is user-typed, and in a
  // string replacement `$&`/`$'`/$` are live — a citation containing one
  // would splice chunks of the sources block into itself.
  writeSlot('sources', readSlot('sources').replace(srcLineRe(id), () => `[${id}]: ${text} — ${url}`));
}
function deleteSource(id) {
  writeSlot('sources', readSlot('sources')
    .replace(new RegExp(`^\\[${rxEsc(id)}\\]:.*(?:\\n|$)`, 'm'), '')
    .replace(/\n{2,}/g, '\n').trim());
}
// Rename a source id across the whole document: every [^old] ref in the prose
// and the [old]: line. Numbering is by first appearance, so only the stable id
// changes — the footnote numbers do not.
function renameSource(oldId, neu) {
  // Replacer functions — a user-typed id is not a place for $-patterns.
  source = source
    .replace(new RegExp(`\\[\\^${rxEsc(oldId)}\\]`, 'g'), () => `[^${neu}]`)
    .replace(new RegExp(`^\\[${rxEsc(oldId)}\\]:`, 'm'), () => `[${neu}]:`);
}
// Reorder the declaration list. Endnote NUMBERS follow first appearance in the
// prose, so this reorders the [[sources]] list and the Cite dropdown while the
// report's numbering is unaffected — it just keeps the list organised.
function moveSource(id, dir) {
  const lines = readSlot('sources').split('\n').map(l => l.trim()).filter(Boolean);
  const i = lines.findIndex(l => l.startsWith(`[${id}]:`));
  const j = i + dir;
  if (i < 0 || j < 0 || j >= lines.length) return;
  [lines[i], lines[j]] = [lines[j], lines[i]];
  writeSlot('sources', lines.join('\n'));
}

let srcPanel = null;
function closeSources() { if (srcPanel) { srcPanel.remove(); srcPanel = null; } }
function openSources() {
  if (editing) return;
  closeSources();
  srcPanel = document.createElement('div');
  srcPanel.id = 'srcpanel';
  srcPanel.innerHTML =
    '<header><b>SOURCES</b><span>edit text or link, reorder, rename, or delete an '
    + 'uncited source — endnote numbers follow first use in the prose</span>'
    + '<button type="button">Close</button></header><div id="srclist"></div>';
  srcPanel.querySelector('button').onclick = closeSources;
  document.body.appendChild(srcPanel);
  srcPanel.style.top = ($('bar').getBoundingClientRect().bottom + 6) + 'px';
  renderSources();
}
function renderSources() {
  if (!srcPanel) return;
  const list = srcPanel.querySelector('#srclist');
  list.textContent = '';
  const rows = parseSources();
  if (!rows.length) {
    list.innerHTML = '<p class="srcempty">No sources yet. Use <b>Cite</b> while '
      + 'editing a paragraph to add one.</p>';
    return;
  }
  rows.forEach((s, idx) => {
    const n = citeCount(s.id);
    const row = document.createElement('div'); row.className = 'srcrow';
    const id = document.createElement('div'); id.className = 'srcid';
    id.innerHTML = `[${s.id}]<span class="srcuse">${n ? `cited ${n}×` : 'unused'}</span>`;
    const ctl = document.createElement('span'); ctl.className = 'srcidctl';
    const mkb = (label, title, dis, fn) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'srcren'; b.textContent = label; b.title = title;
      b.disabled = !!dis;
      b.addEventListener('click', fn);
      ctl.appendChild(b);
    };
    mkb('↑', 'Move up', idx === 0, () => {
      pushHistory(); moveSource(s.id, -1); markDirty(); render(); renderSources(); });
    mkb('↓', 'Move down', idx === rows.length - 1, () => {
      pushHistory(); moveSource(s.id, 1); markDirty(); render(); renderSources(); });
    mkb('rename', 'Rename this id everywhere it is cited', false, async () => {
      const r = await dsForm(`Rename [${s.id}]`, [{
        name: 'id', label: 'New id', type: 'text', value: s.id, required: true,
      }], { okLabel: 'Rename', validate: vals => {
        const neu = vals.id.trim();
        if (!neu) return 'An id is required.';
        if (!/^[A-Za-z0-9._-]+$/.test(neu)) return 'Use letters, numbers, and . _ - only.';
        if (neu !== s.id && parseSources().some(x => x.id === neu)) return `[${neu}] already exists.`;
        return '';
      } });
      if (!r) return;
      const neu = r.id.trim();
      if (neu === s.id) return;
      pushHistory(); renameSource(s.id, neu); markDirty(); render(); renderSources();
    });
    id.appendChild(ctl);
    const txt = document.createElement('input');
    txt.className = 'srctext'; txt.value = s.text; txt.placeholder = 'citation text';
    const url = document.createElement('input');
    url.value = s.url; url.placeholder = 'https://…';
    const del = document.createElement('button');
    del.type = 'button'; del.className = 'srcdel'; del.textContent = 'Delete';
    if (n) { del.disabled = true; del.title = `Cited in the prose — remove the [^${s.id}] refs first`; }
    const commit = () => {
      const t = txt.value.trim(), u = url.value.trim();
      if (!t || !u) return;                       // never write a half-line
      pushHistory(); updateSource(s.id, t, u); markDirty(); render();
    };
    txt.addEventListener('change', commit);       // fires on blur only when changed
    url.addEventListener('change', commit);
    del.addEventListener('click', async () => {
      if (!await dsConfirm(`Delete source [${s.id}]? This cannot be undone from here.`,
          { okLabel: 'Delete', danger: true })) return;
      pushHistory(); deleteSource(s.id); markDirty(); render(); renderSources();
    });
    row.append(id, txt, url, del);
    list.appendChild(row);
  });
}
$('sources').onclick = openSources;

// --- sections: add, edit, reorder, move and delete whole prose sections -----
// A section is an [[extra.<page>.<slug>]] overflow slot the renderer drops at
// the end of its page (render_report.py's own EXTRA_PAGES list, which this
// must match). Which pages exist is a property of the REPORT, not the editor
// — set in the manifest as "pages": [["id","Label"], …]; this default is the
// Budget Primer's own list, used when a manifest declares none, so the one
// report that predates the field keeps working unmodified. boot() overwrites
// this from M.pages the moment the manifest is known.
let EXTRA_PAGES = [
  ['basics', 'Budget Basics'], ['process', 'Budget Process'],
  ['spent', 'How Money Is Spent'], ['categories', 'Spending Categories'],
  ['cip', 'Capital Improvements'], ['onetime', 'One-Time & Emergency'],
  ['funding', 'Funding the Budget'], ['taxes', 'Taxes'], ['whopays', 'Who Pays'],
];
let pendingEdit = null;    // a section to open for editing after the next render
const pageOf = key => key.split('.')[1];
// A whole block: the [[key]] line and its body, up to the next slot or EOF.
// Anchored on a leading \n — extras always follow an earlier slot, never start
// the file — so swaps and deletes never merge into a neighbour's line.
const blockRe = k => new RegExp(`\\n\\[\\[${rxEsc(k)}\\]\\]\\n[\\s\\S]*?(?=\\n\\[\\[|$)`);
const rawBlock = k => (source.match(blockRe(k)) || [''])[0];
const extraKeys = page => [...source.matchAll(/\n\[\[(extra\.[^\]]+)\]\]/g)]
  .map(m => m[1]).filter(k => k.startsWith(`extra.${page}.`));

function addExtra(page, slug) {
  const key = `extra.${page}.${slug}`;
  const block = `\n\n[[${key}]]\n## New section\n\nWrite the section here.`;
  const sibs = extraKeys(page);
  if (sibs.length) source = source.replace(blockRe(sibs[sibs.length - 1]), m => m + block);
  else source = source.replace(/\s*$/, '') + block + '\n';
  return key;
}
function removeExtra(key) {
  source = source.replace(blockRe(key), '').replace(/\n{3,}/g, '\n\n');
}
// Swap a section with its neighbour on the same page. Placeholders first, so
// replacing the first block cannot clobber the text of the second.
function moveExtra(key, dir) {
  const keys = extraKeys(pageOf(key));
  const i = keys.indexOf(key), j = i + dir;
  if (i < 0 || j < 0 || j >= keys.length) return;
  const a = keys[Math.min(i, j)], b = keys[Math.max(i, j)];
  const ra = rawBlock(a), rb = rawBlock(b);
  // Replacer functions on the re-insert: rb/ra are whole authored sections,
  // and a section containing `$&` or `` $` `` in a string replacement would
  // splice the surrounding document into itself.
  source = source.replace(blockRe(a), '\x00A\x00').replace(blockRe(b), '\x00B\x00')
                 .replace('\x00A\x00', () => rb).replace('\x00B\x00', () => ra);
}
// Relocate a section to another page: the slot's <page> component decides the
// page, so rewrite extra.<old>.<slug> -> extra.<new>.<slug> and drop the block
// among the target page's extras. Slug kept, suffixed only on a clash.
function moveSectionToPage(key, newPage) {
  if (newPage === pageOf(key)) return;
  const body = readSlot(key);
  const slug = key.split('.').slice(2).join('.');
  let newKey = `extra.${newPage}.${slug}`;
  const base = newKey;
  for (let n = 2; source.includes(`[[${newKey}]]`); n++) newKey = `${base}-${n}`;
  removeExtra(key);
  const block = `\n\n[[${newKey}]]\n${body}`;
  const sibs = extraKeys(newPage);
  if (sibs.length) source = source.replace(blockRe(sibs[sibs.length - 1]), m => m + block);
  else source = source.replace(/\s*$/, '') + block + '\n';
}

$('add').onclick = async () => {
  if (editing) return;
  // One form: pick the page and name the section together, so nothing typed is
  // lost to a dismissed second prompt.
  const r = await dsForm('Add a new section', [
    { name: 'page', label: 'Page', type: 'select',
      options: EXTRA_PAGES.map(([id, label]) => ({ value: id, label })) },
    { name: 'slug', label: 'Short name (letters, numbers, hyphens)', type: 'text', required: true },
  ], { okLabel: 'Add', validate: vals =>
    vals.slug.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '')
      ? '' : 'A short name is required.' });
  if (!r) return;
  const page = r.page;
  const label = (EXTRA_PAGES.find(([id]) => id === page) || [, page])[1];
  let slug = r.slug.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  if (!slug) return;
  const base = slug;
  for (let n = 2; source.includes(`[[extra.${page}.${slug}]]`); n++) slug = `${base}-${n}`;
  pushHistory();
  pendingEdit = addExtra(page, slug);
  markDirty();
  $('stat').textContent = `new section on ${label} — write it below`;
  render();
};

/** True Canva-style editing: a contenteditable surface that shows exactly
 *  what the report renders (mdToHtml/htmlToMd, see above), not a boxed
 *  textarea full of raw markdown. allowMd is a conservative denylist — the
 *  slots that don't go through content.py's md_inline are the ones the
 *  renderer builds from C.lines()/C.text() and escapes itself (see
 *  render_report.py); everything else already supports bold/italic/links
 *  and should keep offering them. Offering formatting on a plain slot would
 *  "work" in the editor and then render literal ** after a save. */
const RICH_PLAINTEXT_SLOTS = new Set(['cover.title', 'cover.year', 'toc.copyright']);

function edit(d, key) {

  const blocks = [...d.querySelectorAll(`[data-slot="${key}"]`)];
  if (!blocks.length || editing) return;
  editing = true;
  closeSources();   // its citation counts would go stale behind an edit

  const inline = blocks[0].dataset.inline === '1';
  const allowLists = key.startsWith('extra.');
  const allowMd = !RICH_PLAINTEXT_SLOTS.has(key);
  const extraClass = (blocks[0].className || '').split(/\s+/).filter(Boolean);

  const host = d.createElement(inline ? 'span' : 'div');
  host.contentEditable = 'true';
  host.className = inline ? 'ds-edit ds-inline' : 'ds-edit';
  host.dataset.richMode = inline ? 'inline' : 'block';
  if (extraClass.length) host.classList.add(...extraClass);

  const raw = readSlot(key);
  if (!allowMd) {
    host.style.whiteSpace = 'pre-wrap';   // preserve cover.title's <br> lines
    host.textContent = raw;
  } else {
    host.innerHTML = mdToHtml(raw, { allowLists, inline });
    if (!inline && extraClass.length)
      host.querySelectorAll(':scope > p').forEach(p => p.classList.add(...extraClass));
  }

  // The host replaces the block ONE FOR ONE — no toolbar row, no hint line
  // stacked under it. Anything extra inserted here has height, and that
  // height shoves everything below the block down for as long as the editor
  // is open; editing in place must not reflow the page around the words.
  // Formatting lives in the chrome bar (B/I/lists appear there while a rich
  // editor is open — syncMarksBar), links on ⌘K, endnotes on right-click.
  blocks[0].replaceWith(host);
  blocks.slice(1).forEach(b => b.remove());
  richHost = host;
  richOpts = { allowLists, allowMd };
  // The chrome type row is where B/I/lists live now — raise it no matter how
  // this editor was opened. The click path already did (showType before
  // edit()), but a section fresh from "+ Section" opened via pendingEdit with
  // the row still hidden, leaving no formatting controls anywhere.
  showType(key);
  syncMarksBar();

  host.focus();
  const selRange = d.createRange();
  selRange.selectNodeContents(host);
  const domSel = d.getSelection();
  domSel.removeAllRanges();
  domSel.addRange(selRange);

  const finish = async (keep) => {
    if (host.dataset.done) return;
    host.dataset.done = '1';
    editing = false;
    richHost = null; syncMarksBar();
    if (keep) {
      const newVal = !allowMd ? (inline ? host.textContent : host.innerText)
                               : htmlToMd(host, { allowLists, inline });
      if (newVal.trim() !== readSlot(key)) {
        writeSlot(key, newVal);
        dirty = source !== original || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
        $('save').disabled = $('revert').disabled = !dirty;
        $('save').classList.toggle('dirty', dirty);
      }
    }
    await render();
  };
  host.addEventListener('blur', () => {
    // A modal dialog (right-click Cite → new source, ⌘K link) steals focus
    // while it is open; committing the edit under it would act on a detached
    // element. Any other blur means the edit is over.
    if (modalOpen) return;
    finish(true);
  });
  host.addEventListener('paste', e => pasteClean(d, host, e, { allowLists, inline, allowMd }));
  host.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'Enter' && inline) { e.preventDefault(); finish(true); }
    if (allowMd && e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, host); }
  });
  // Right-click in the prose to drop an endnote at the caret — the intuitive
  // path, without hunting for the Cite button. (Inline single-line fields — a
  // heading, a caption — take no footnotes, so they keep the native menu.)
  if (allowMd && !inline) host.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();   // else it bubbles to an ancestor's fill/colour menu
    endnoteMenu(d, host, e);
  });
}

// --- persistence -----------------------------------------------------------
// The one credential: a fine-grained token, this repo only, Contents r/w (and
// Pull requests r/w, for Publish). It lives in this browser and never leaves
// it except to call GitHub. Saves go to a draft branch; only Publish — a
// merged pull request — touches main, rebuilds the site and updates the doc.
async function gh(path, opts = {}) {
  for (let pass = 0; ; pass++) {
    const tok = localStorage.getItem('docsync-pat');
    const r = await fetch(`https://api.github.com/repos/${REPO}/${path}`, {
      ...opts,
      headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json',
                 ...(opts.headers || {}) },
    });
    // A signed-in token expires after ~8h. One quiet refresh, then the retry;
    // only if that fails does the failure reach the person.
    if (r.status === 401 && pass === 0 && await refreshAuth(true)) continue;
    if (!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0, 160)}`);
    return r.json();
  }
}

/**
 * Check a token before trusting it.
 *
 * The repo endpoint reports what THIS token may do, so "valid but read-only"
 * is caught at the moment it is pasted rather than after an edit is composed.
 */
async function verifyToken(tok) {
  let r;
  try {
    r = await fetch(`https://api.github.com/repos/${REPO}`, {
      headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json' },
    });
  } catch (e) {
    return 'could not reach GitHub: ' + e.message;
  }
  if (r.status === 401) return 'GitHub rejected that token (expired, or mistyped).';
  if (r.status === 404)
    return `that token cannot see ${REPO}. In the token's "Repository access", `
         + 'select this repository.';
  if (!r.ok) return `GitHub said ${r.status}.`;
  const j = await r.json();
  if (!j.permissions || !j.permissions.push)
    return 'that token can read but not write. Open it at '
         + 'github.com/settings/personal-access-tokens and set '
         + 'Permissions -> Repository permissions -> Contents -> Read and write '
         + '(Read-only is the default, and is what this looks like).';
  return '';
}

// --- sign in with GitHub ---------------------------------------------------
// The OAuth device flow needs no secret anywhere — only the App's public
// client id. GitHub's login endpoints refuse cross-origin calls, so a tiny
// relay (docs/primer/oauth-relay.js, ~40 lines, holds nothing) forwards the
// two of them with CORS added. Configured per project in the manifest:
//   "oauth": { "client_id": "Iv23…", "relay": "https://…workers.dev" }
// Absent that config, the paste-a-token prompt below still does the job.
const oauthOn = () => !!(M && M.oauth && M.oauth.client_id && M.oauth.relay);

async function relay(path, body) {
  const r = await fetch(M.oauth.relay + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
    body: JSON.stringify({ client_id: M.oauth.client_id, ...body }),
  });
  if (!r.ok) throw new Error(`sign-in relay ${r.status}`);
  return r.json();
}

function storeAuth(j) {
  localStorage.setItem('docsync-pat', j.access_token);
  if (j.expires_in) localStorage.setItem('docsync-exp', String(Date.now() + j.expires_in * 1000));
  else localStorage.removeItem('docsync-exp');
  if (j.refresh_token) localStorage.setItem('docsync-refresh', j.refresh_token);
  localStorage.removeItem('docsync-user');   // may be a different person now
}

function clearAuth() {
  ['docsync-pat', 'docsync-exp', 'docsync-refresh', 'docsync-user']
    .forEach(k => localStorage.removeItem(k));
}

/** Trade the refresh token for a fresh pair. force skips the expiry check —
 *  that is gh()'s 401 path, where the token has proven stale regardless. */
async function refreshAuth(force) {
  const rt = localStorage.getItem('docsync-refresh');
  if (!rt || !oauthOn()) return false;
  const exp = +localStorage.getItem('docsync-exp') || 0;
  if (!force && exp && Date.now() < exp - 120000) return false;
  try {
    const j = await relay('/device/token', { grant_type: 'refresh_token', refresh_token: rt });
    if (!j.access_token) throw new Error(j.error || 'no token');
    storeAuth(j);
    return true;
  } catch (e) {
    clearAuth();               // a dead pair only blocks the next sign-in
    return false;
  }
}

/** The sign-in panel: a code to type at github.com, and a page that finishes
 *  by itself. Resolves with the token, or null if the person backs out. */
function signIn() {
  return new Promise(resolve => {
    const old = $('authpanel'); if (old) old.remove();
    const p = document.createElement('div');
    p.id = 'authpanel';
    p.innerHTML =
      '<header><b>SIGN IN WITH GITHUB</b><button type="button" class="x">Cancel</button></header>'
      + '<div class="au-body"><p class="au-msg">getting your code…</p>'
      + '<div class="au-code" hidden></div>'
      + '<button type="button" class="au-open" hidden>Open GitHub</button>'
      + '<p class="au-hint" hidden>Enter the code there and approve. '
      + 'This page finishes on its own.</p>'
      + '<p class="au-alt"><a href="#">use a paste-in token instead</a></p></div>';
    document.body.appendChild(p);
    p.style.top = ($('bar').getBoundingClientRect().bottom + 6) + 'px';
    let stopped = false;
    const done = v => { if (!stopped) { stopped = true; p.remove(); resolve(v); } };
    p.querySelector('.x').onclick = () => done(null);
    p.querySelector('.au-alt a').onclick = async e => {
      e.preventDefault(); done(await askToken());
    };
    (async () => {
      let d;
      try { d = await relay('/device/code', {}); }
      catch (e) {
        p.querySelector('.au-msg').textContent =
          'could not reach the sign-in relay — falling back to a paste-in token';
        return setTimeout(async () => done(await askToken()), 1400);
      }
      const code = p.querySelector('.au-code');
      code.textContent = d.user_code; code.hidden = false;
      try { await navigator.clipboard.writeText(d.user_code);
            p.querySelector('.au-msg').textContent = 'your code (already copied):'; }
      catch (e) { p.querySelector('.au-msg').textContent = 'your code:'; }
      const open = p.querySelector('.au-open');
      open.hidden = p.querySelector('.au-hint').hidden = false;
      open.onclick = () => window.open(d.verification_uri, '_blank');
      let wait = (d.interval || 5) * 1000;
      const until = Date.now() + (d.expires_in || 900) * 1000;
      while (!stopped && Date.now() < until) {
        await new Promise(r => setTimeout(r, wait));
        if (stopped) return;
        let j;
        try {
          j = await relay('/device/token',
            { device_code: d.device_code,
              grant_type: 'urn:ietf:params:oauth:grant-type:device_code' });
        } catch (e) { continue; }               // a network blip is not a verdict
        if (j.access_token) { storeAuth(j); return done(j.access_token); }
        if (j.error === 'slow_down') wait += 5000;
        else if (j.error === 'access_denied') {
          p.querySelector('.au-msg').textContent = 'sign-in was declined on GitHub';
          return setTimeout(() => done(null), 1600);
        } else if (j.error && j.error !== 'authorization_pending') break;
      }
      if (!stopped) {
        p.querySelector('.au-msg').textContent = 'the code expired — close this and try again';
      }
    })();
  });
}

/** The one front door for credentials: a live token, refreshed if stale,
 *  else GitHub sign-in, else the paste-a-token prompt. */
async function ensureAuth() {
  await refreshAuth(false);
  const tok = localStorage.getItem('docsync-pat');
  if (tok) return tok;
  if (oauthOn()) return signIn();
  return askToken();
}

async function askToken() {
  const tok = localStorage.getItem('docsync-pat');
  if (tok) return tok;
  const entered = await dsPrompt(
    'github.com → Settings → Developer settings → Fine-grained tokens.\n' +
    `Repository access: only ${REPO}.\n` +
    'Permissions → Repository permissions:\n' +
    '    Contents: Read and WRITE        (saving drafts)\n' +
    '    Pull requests: Read and WRITE   (publishing)\n' +
    '(Both default to no access; Read-only is not enough.)\n' +
    'Stored in this browser only.',
    '', { title: 'Paste a GitHub fine-grained token', placeholder: 'github_pat_…' });
  if (!entered) return null;
  $('stat').textContent = 'checking the token…';
  const bad = await verifyToken(entered.trim());
  if (bad) {
    $('stat').textContent = 'token not usable: ' + bad;
    return null;                       // not stored — a bad token helps nobody
  }
  localStorage.setItem('docsync-pat', entered.trim());
  localStorage.removeItem('docsync-user');   // a new token may be a new person
  $('stat').textContent = 'token accepted';
  return entered.trim();
}

// The Token… button: swap credentials (a new collaborator on a shared machine,
// or an expired token). It had no handler at all before this.
$('tok').onclick = async () => {
  clearAuth();
  await ensureAuth();
};

/** Explain a GitHub failure in terms of the fix, not the status code. */
function tokenWhy(e) {
  const m = String(e.message);
  if (m.includes('not accessible'))
    return 'the token has no write access. github.com/settings/personal-access-tokens '
      + `-> your token -> Repository access: ${REPO} -> Permissions -> Contents: `
      + 'Read and write. Then try again.';
  // Only discard on 401 (the token itself is bad). A 403 means the token is
  // fine but under-permissioned — discarding it just makes you paste the
  // same token again and get the same 403, forever.
  if (m.match(/401/)) {
    localStorage.removeItem('docsync-pat');
    return 'the token was rejected — it may be expired or mistyped.';
  }
  return m;
}

// --- drafts: Save draft / Share / Publish ----------------------------------
// Nothing here writes to main. Save commits your work — prose and layout in
// ONE commit — to draft/<project>/<user>, a branch of your own. Share hands
// out a link that renders that branch. Publish opens and merges a pull
// request into main, the only step that changes the live report. Three verbs;
// the git underneath stays out of sight.
let draftBranch = new URLSearchParams(location.search).get('draft') || null;

const showDraftBadge = () =>
  { $('title').textContent = M.id + ' · draft: ' + draftBranch.split('/').pop(); };
const draftUrl = () => location.origin + pageUrl({ draft: draftBranch });

async function resolveDraft() {
  if (local) { draftBranch = null; return; }
  if (!draftBranch) {
    // No link in the URL, but this browser saved a draft before? Pick it up
    // rather than silently showing main — "my edits vanished" is the scariest
    // bug an editor can have.
    const u = localStorage.getItem('docsync-user');
    if (localStorage.getItem('docsync-pat') && u) {
      const b = `draft/${M.id}/${u}`;
      try { await gh(`git/ref/heads/${b}`); draftBranch = b; } catch (e) { /* none */ }
    }
  }
  if (draftBranch) {
    history.replaceState(null, '', draftUrl());
    showDraftBadge();
  }
}

/** A draft file, fresh. The API sees a commit instantly; raw.githubusercontent
 *  can lag minutes behind a push, so it is only the tokenless fallback. */
async function fromBranch(path) {
  if (localStorage.getItem('docsync-pat')) {
    const j = await gh(`contents/${path}?ref=${encodeURIComponent(draftBranch)}`);
    return new TextDecoder().decode(
      Uint8Array.from(atob(j.content.replace(/\n/g, '')), c => c.charCodeAt(0)));
  }
  const r = await fetch(bust(`https://raw.githubusercontent.com/${REPO}/${draftBranch}/${path}`),
                        { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${path}@${draftBranch}`);
  return r.text();
}

/** Who the token belongs to — names the draft branch and the commits. */
async function ghUser() {
  let u = localStorage.getItem('docsync-user');
  if (u) return u;
  const r = await fetch('https://api.github.com/user', {
    headers: { Authorization: `Bearer ${localStorage.getItem('docsync-pat')}`,
               Accept: 'application/vnd.github+json' },
  });
  if (!r.ok) throw new Error(`GitHub ${r.status} asking who this token belongs to`);
  u = (await r.json()).login.toLowerCase();
  localStorage.setItem('docsync-user', u);
  return u;
}

async function ensureBranch(branch) {
  try { await gh(`git/ref/heads/${branch}`); return; }
  catch (e) { if (!String(e.message).match(/404/)) throw e; }
  // Fork from the project's own deploy branch, not a hardcoded main — a repo
  // this project lives in may deploy from gh-pages, production, or any name.
  const src = await gh(`git/ref/heads/${BRANCH}`);
  await gh('git/refs', { method: 'POST',
    body: JSON.stringify({ ref: `refs/heads/${branch}`, sha: src.object.sha }) });
}

/** One commit for everything that changed — prose and layout land together or
 *  not at all, unlike the old per-file PUTs that could interleave or half-land.
 *  If someone else saved this draft between our read and our write, retry once
 *  on their tip: the tree only names the files WE changed, so their work on
 *  the other file rides along untouched. */
async function commitToBranch(branch, files, message) {
  for (let attempt = 0; ; attempt++) {
    const base = (await gh(`git/ref/heads/${branch}`)).object.sha;
    const tree = await gh('git/trees', { method: 'POST', body: JSON.stringify({
      base_tree: (await gh(`git/commits/${base}`)).tree.sha,
      tree: files.map(f => ({ path: f.path, mode: '100644', type: 'blob', content: f.content })),
    }) });
    const commit = await gh('git/commits', { method: 'POST', body: JSON.stringify({
      message, tree: tree.sha, parents: [base] }) });
    try {
      await gh(`git/refs/heads/${branch}`, { method: 'PATCH',
        body: JSON.stringify({ sha: commit.sha }) });
      return commit.sha;
    } catch (e) {
      // Not a fast-forward: the branch moved under us. Once, quietly, retry.
      if (attempt === 0 && String(e.message).match(/422|fast[- ]forward/i)) continue;
      throw e;
    }
  }
}

/** Uploads (images) need a branch to land on before the editor's next Save;
 *  make sure the draft exists and the URL points at it. */
async function draftForUpload() {
  const user = await ghUser();
  if (!draftBranch) draftBranch = `draft/${M.id}/${user}`;
  await ensureBranch(draftBranch);
  history.replaceState(null, '', draftUrl());
  showDraftBadge();
  return draftBranch;
}

async function saveDraft() {
  if (!await ensureAuth()) return false;
  $('save').disabled = true;
  $('stat').textContent = 'saving your draft…';
  try {
    const user = await ghUser();
    if (!draftBranch) draftBranch = `draft/${M.id}/${user}`;
    await ensureBranch(draftBranch);
    const layoutText = JSON.stringify(layout, null, 2) + '\n';
    const files = [];
    if (source !== original) files.push({ path: M.content, content: source });
    if (M.layout && layoutText !== layoutOrig) files.push({ path: M.layout, content: layoutText });
    if (files.length) await commitToBranch(draftBranch, files, `${M.id}: draft by ${user}`);
    original = source; layoutOrig = layoutText;
    clearDraftCache();        // it's on the branch now — the local cache is stale
    markDirty();
    history.replaceState(null, '', draftUrl());   // a reload finds this draft
    showDraftBadge();
    $('stat').textContent = 'draft saved — yours only, not live. Share it for feedback, or Publish';
    return true;
  } catch (e) {
    $('stat').textContent = 'save failed: ' + tokenWhy(e);
    markDirty();
    return false;
  }
}

$('share').onclick = async () => {
  if (dirty || !draftBranch) { if (!await saveDraft()) return; }
  const url = draftUrl();
  try {
    await navigator.clipboard.writeText(url);
    $('stat').textContent = 'link copied — it shows this draft, not the live report';
  } catch (e) {
    // clipboard blocked: show it in a read-only field to copy by hand
    await dsPrompt('Copy this draft link:', url, { title: 'Share draft', readOnly: true, cancelLabel: 'Close' });
  }
};

$('publish').onclick = async () => {
  if (dirty) { if (!await saveDraft()) return; }
  if (!draftBranch) {
    $('stat').textContent = 'nothing to publish yet — make an edit and Save draft first';
    return;
  }
  if (!await dsConfirm('Make this draft the live report?\n\nEveryone will see it. '
             + 'The live site (and the Google Doc) update in about two minutes.',
             { okLabel: 'Publish' })) return;
  if (!await ensureAuth()) return;
  $('publish').disabled = true;
  $('stat').textContent = 'publishing…';
  try {
    const user = await ghUser();
    const owner = REPO.split('/')[0];
    let pr = (await gh(`pulls?head=${owner}:${encodeURIComponent(draftBranch)}&state=open`))[0];
    if (!pr) pr = await gh('pulls', { method: 'POST', body: JSON.stringify({
      title: `${M.id}: publish draft by ${user}`, head: draftBranch, base: BRANCH,
      body: 'Published from the draft editor.' }) });
    await gh(`pulls/${pr.number}/merge`, { method: 'PUT',
      body: JSON.stringify({ merge_method: 'squash' }) });
    try { await gh(`git/refs/heads/${draftBranch}`, { method: 'DELETE' }); } catch (e) {}
    clearDraftCache();        // it's live now — the local cache is stale
    draftBranch = null;
    history.replaceState(null, '', pageUrl());
    $('title').textContent = M.id;
    markDirty();
    $('stat').textContent = 'published ✓ — the live report updates in about two minutes';
  } catch (e) {
    const m = String(e.message);
    $('stat').textContent =
      m.match(/No commits between/i)
        ? 'this draft already matches the live report — nothing to publish'
      : m.match(/405|not mergeable|merge conflict/i)
        ? 'the live report changed while you worked, and the two now overlap. '
          + `Open github.com/${REPO}/pulls to look at the difference, or ask for help.`
      : m.includes('not accessible')
        ? 'the token cannot open pull requests. github.com/settings/personal-access-tokens '
          + '-> your token -> Permissions -> Pull requests: Read and write. Then Publish again.'
      : 'publish failed: ' + tokenWhy(e);
  }
  $('publish').disabled = false;
};

$('save').onclick = async () => {
  // Confirm, not block: prose has always been able to overflow a page and
  // nothing stopped it. Turning a pre-existing, permitted edit into a hard
  // refusal would be a surprise. Making it impossible to do BY ACCIDENT is the
  // whole job.
  if (lastFit.length) {
    const pages = [...new Set(lastFit.map(b => b.page))];
    if (!await dsConfirm(`${pages.length} page${pages.length > 1 ? 's' : ''} will be cut off in the `
               + `printed PDF (${pages.join(', ')}).\n\nSave anyway?`, { okLabel: 'Save anyway' })) return;
  }
  const layoutText = JSON.stringify(layout, null, 2) + '\n';

  // Live mode: write the files on disk through the local server and let git
  // push them. No token in the browser — your own git credentials do it.
  if (local) {
    $('save').disabled = true;
    $('stat').textContent = 'saving to disk and pushing…';
    try {
      const r = await fetch('/__save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: source !== original ? source : null,
          layout: (M.layout && layoutText !== layoutOrig) ? layoutText : null,
        }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'save failed');
      original = source; layoutOrig = layoutText; dirty = false;
      $('revert').disabled = true;
      $('save').classList.remove('dirty');
      $('stat').textContent = j.message || 'saved';
    } catch (e) {
      $('stat').textContent = 'save failed: ' + e.message;
      $('save').disabled = false;
    }
    return;
  }

  await saveDraft();   // to draft/<project>/<user> — never straight to main
};

$('revert').onclick = async () => {
  // With nothing unsaved, Discard means the DRAFT itself: delete its branch
  // and go back to the live report. (With unsaved edits it stays what it
  // always was — throw away what you typed since the last save.)
  if (!dirty && draftBranch && !local) {
    if (!await dsConfirm('Throw away this saved draft?\n\nThe live report is untouched. '
               + 'This cannot be undone.', { okLabel: 'Throw away', danger: true })) return;
    if (!await ensureAuth()) return;
    try { await gh(`git/refs/heads/${draftBranch}`, { method: 'DELETE' }); } catch (e) {}
    await clearDraftCache();             // dropping the draft drops its cached edits too
    location.href = pageUrl();           // reload clean, on the live content
    return;
  }
  if (!await dsConfirm('Discard your unsaved edits?', { okLabel: 'Discard', danger: true })) return;
  source = original;
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  clearDraftCache();                     // the edits are gone — so is their cache
  markDirty();
  await render();
};

// --- export -----------------------------------------------------------------
// Download the CURRENT draft — unsaved edits and all — as a PDF or per-page
// PNGs. Live mode renders it server-side (Chrome, exactly like `make pdf`) from
// the in-memory content+layout, so nothing is written or pushed. Without the
// server there is no build host: PDF falls back to the browser's own print-to-
// PDF of the preview, and PNG (which needs Chrome screenshots) is unavailable.
$('download').onclick = () => {
  $('dl-png').disabled = !local;
  $('dl-png').title = local ? '' : 'PNG export needs the local live server (make live)';
  $('dl-marks').disabled = !local;
  togglePop($('downloadpop'), $('download'));
};
$('dl-pdf').onclick = () => doExport('pdf');
$('dl-png').onclick = () => doExport('png');
$('dl-src').onclick = () => downloadSource();
$('dl-html').onclick = () => exportHtml(false);
$('dl-sqsp').onclick = () => exportHtml(true);

// --- HTML export ---------------------------------------------------------
// What you see in the editor IS the renderer's HTML — the iframe holds the
// real thing, not a preview of it. So an export that matches the editor is
// not a conversion: it is the same render, minus the editing scaffolding
// (DOCSYNC_EDIT stamps data-slot/data-el hooks that must not ship) and with
// everything it referenced pulled inline so the file stands alone.
async function renderClean() {
  py.globals.set('SRC', source);
  py.globals.set('LAYOUT', JSON.stringify(layout, null, 2));
  py.globals.set('CONTENT', M.content);
  py.globals.set('LAYOUT_PATH', M.layout || '');
  py.globals.set('RENDER', M.render);
  py.globals.set('OUT', M.out);
  return py.runPythonAsync(`
import sys, os, io, runpy, contextlib
os.environ.pop('DOCSYNC_EDIT', None)        # the published bytes, not the editable ones
open('/repo/' + CONTENT, 'w').write(SRC)
if LAYOUT_PATH: open('/repo/' + LAYOUT_PATH, 'w').write(LAYOUT)
for m in [m for m in sys.modules if m.startswith('docsync')]: del sys.modules[m]
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/' + RENDER, run_name='__main__')
open('/repo/' + OUT).read()
`);
}

const asDataUrl = async url => {
  const r = await fetch(url);
  if (!r.ok) throw new Error(url);
  const blob = await r.blob();
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
};

/** Pull every external reference into the document itself: stylesheets as
 *  <style>, images as data: URIs. A file that reaches for assets/ is only
 *  identical while it sits next to them — and a Squarespace block never
 *  does. Session uploads already live in memory as data URLs. */
async function inlineEverything(doc) {
  for (const link of [...doc.querySelectorAll('link[rel~="stylesheet"]')]) {
    try {
      const css = await (await fetch(withBase(link.getAttribute('href')))).text();
      const st = doc.createElement('style');
      st.textContent = css;
      link.replaceWith(st);
    } catch (e) { /* leave the <link>: a broken style beats a broken export */ }
  }
  for (const img of [...doc.querySelectorAll('img')]) {
    const src = img.getAttribute('src') || '';
    if (/^(data:|https?:)/i.test(src)) continue;
    try {
      img.setAttribute('src', localImages.get(src) || await asDataUrl(withBase(src)));
    } catch (e) { /* keep the relative path rather than lose the image tag */ }
  }
}

/** Prefix every selector so pasted CSS cannot reach the host page — and,
 *  just as important, so the host's CSS cannot reach in. Squarespace styles
 *  h1/p/a globally; without scoping, a pasted block inherits them and stops
 *  looking like what the editor showed. @media/@supports recurse; @font-face
 *  and @keyframes are left alone (they name things, they do not select). */
function scopeCss(css, sel) {
  // Comments first, or they are read as part of the next selector: a
  // Google-Fonts sheet puts /* latin */ before every @font-face, and each one
  // came out as "#wrap /* latin */ @font-face{…}" — invalid, and it took the
  // font with it.
  css = css.replace(/\/\*[\s\S]*?\*\//g, '');
  const out = [];
  let i = 0;
  while (i < css.length) {
    const open = css.indexOf('{', i);
    if (open === -1) { out.push(css.slice(i)); break; }
    const head = css.slice(i, open).trim();
    // Find this rule's matching close brace, counting nesting.
    let depth = 1, j = open + 1;
    while (j < css.length && depth) {
      if (css[j] === '{') depth++;
      else if (css[j] === '}') depth--;
      j++;
    }
    const body = css.slice(open + 1, j - 1);
    if (/^@(media|supports|layer|container)/i.test(head)) {
      out.push(`${head}{${scopeCss(body, sel)}}`);
    } else if (head.startsWith('@')) {
      out.push(`${head}{${body}}`);                       // font-face, keyframes
    } else {
      const heads = head.split(',').map(h => {
        h = h.trim();
        if (!h) return h;
        // :root/html/body are the document itself — inside a block, that is
        // the wrapper.
        if (/^(:root|html|body)$/i.test(h)) return sel;
        return `${sel} ${h}`;
      }).filter(Boolean).join(',');
      out.push(`${heads}{${body}}`);
    }
    i = j;
  }
  return out.join('');
}

async function exportHtml(forSquarespace) {
  const label = forSquarespace ? 'Squarespace block' : 'HTML';
  $('stat').textContent = `building ${label}…`;
  try {
    const raw = await renderClean();
    const doc = new DOMParser().parseFromString(raw, 'text/html');
    await inlineEverything(doc);

    let out, name;
    if (!forSquarespace) {
      out = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
      name = (M.id || 'report') + '.html';
    } else {
      // A Squarespace code block is a FRAGMENT living inside someone else's
      // page, so: no <html>/<head>/<body>, styles scoped to a wrapper, and —
      // the part that actually preserves the design — the wrapper is scaled
      // rather than reflowed. This document is absolutely positioned at a
      // fixed page width; letting it reflow would not be "the same page,
      // responsive", it would be a different page. Scaling keeps every
      // relationship exact and simply fits it to the column.
      const uid = 'dsx-' + Math.random().toString(36).slice(2, 8);
      const w = (M.page && M.page.w) || 8.5;
      const css = [...doc.querySelectorAll('style')].map(n => n.textContent).join('\n');
      doc.querySelectorAll('style, script, link').forEach(n => n.remove());
      out = `<!-- Exported from the draft editor. Paste into a Squarespace
     Code Block. Styles are scoped to #${uid}, so nothing here can affect the
     rest of the page and the page's own CSS cannot reach in. The block is
     SCALED to its column, not reflowed: this document is placed at a fixed
     ${w}in width, so scaling is what keeps it identical. -->
<div id="${uid}" class="dsx-wrap">
<style>
#${uid}.dsx-wrap { all:initial; display:block; width:100%; overflow:hidden; }
#${uid} .dsx-scale { transform-origin:top left; }
#${uid} * { box-sizing:border-box; }
${scopeCss(css, '#' + uid)}
</style>
<div class="dsx-scale">
${doc.body.innerHTML}
</div>
<script>
(function(){
  var w = document.getElementById('${uid}');
  var inner = w.querySelector('.dsx-scale');
  var DESIGN = ${w} * 96;                       // the width everything was placed at
  function fit(){
    var s = Math.min(1, w.clientWidth / DESIGN);
    inner.style.transform = 'scale(' + s + ')';
    // The wrapper must take the SCALED height or the block leaves a gap
    // below it the size of the shrink.
    inner.style.width = DESIGN + 'px';
    w.style.height = (inner.scrollHeight * s) + 'px';
  }
  fit();
  addEventListener('resize', fit);
  if (window.ResizeObserver) new ResizeObserver(fit).observe(w);
})();
<\/script>
</div>
`;
      name = (M.id || 'report') + '-squarespace.html';
    }

    const blob = new Blob([out], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    $('stat').textContent = `downloaded ${name}`;
  } catch (e) {
    $('stat').textContent = `${label} export failed: ` + (e.message || e);
  } finally {
    await render();          // put the editable scaffolding back
  }
}

// A "source" download: the two authored files (content.md + layout.json) plus
// any images uploaded this session, zipped in the browser via fflate — an ~8kB
// ESM module loaded from the same CDN as Pyodide, so no build step and no new
// server dependency. This is the half of Export that STANDALONE.md left out:
// the raw material of the report, for anyone who wants the files without a git
// checkout. It only reads state the editor already holds, so it needs neither
// the local server nor a token, and works identically in local and hosted mode.
const baseName = p => p.split('/').pop();
async function downloadSource() {
  $('downloadpop').hidden = true;
  $('stat').textContent = 'zipping the source…';
  try {
    const { zipSync, strToU8 } =
      await import('https://cdn.jsdelivr.net/npm/fflate@0.8.3/esm/browser.js');
    const files = {};
    files[baseName(M.content)] = strToU8(source);
    if (M.layout) files[baseName(M.layout)] = strToU8(JSON.stringify(layout, null, 2) + '\n');
    // Images uploaded this session live in localImages as data URLs; decode
    // each back to bytes and keep its assets/… path inside the zip.
    for (const [path, dataUrl] of localImages) {
      const b64 = String(dataUrl).split(',')[1] || '';
      files[path] = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    }
    const blob = new Blob([zipSync(files, { level: 6 })], { type: 'application/zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (M.id || 'report') + '-source.zip';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    $('stat').textContent = `downloaded ${a.download}`;
  } catch (e) {
    $('stat').textContent = 'source download failed: ' + e.message;
  }
}

async function doExport(fmt) {
  $('downloadpop').hidden = true;
  if (!local) {                        // GitHub mode: browser print-to-PDF only
    if (fmt === 'pdf') $('out').contentWindow.print();
    return;
  }
  const marks = $('dl-marks').checked;
  const name = fmt === 'pdf' ? 'Budget-Primer-FY2026-27.pdf' : 'Budget-Primer-pages.zip';
  $('stat').textContent = `rendering the ${fmt.toUpperCase()}… (a full report takes a moment)`;
  try {
    const r = await fetch('/__export', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fmt, marks,
        content: source, layout: JSON.stringify(layout, null, 2) + '\n' }),
    });
    if ((r.headers.get('Content-Type') || '').includes('application/json')) {
      throw new Error((await r.json()).error || 'export failed');
    }
    const url = URL.createObjectURL(await r.blob());
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
    $('stat').textContent = `downloaded ${name}`;
  } catch (e) {
    $('stat').textContent = 'export failed: ' + e.message;
  }
}

addEventListener('beforeunload', e => { if (dirty) e.preventDefault(); });
// Registered here, not blocking boot() — the editor works with no service
// worker at all (this is a progressive enhancement, not a dependency), and a
// registration failure (an unsupported browser, a scope error) should never
// stop the page from loading.
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
// "Failed to fetch" is what the browser says for every network failure, and
// it names none of them. The common one by far, locally, is that the dev
// server is not running — and the service worker makes that case genuinely
// confusing: edit.html itself comes from cache, so the page RENDERS and only
// its engine files (network-only, deliberately) fail. Say which it is.
boot().catch(async e => {
  const netErr = e instanceof TypeError || /fetch/i.test(e.message || '');
  let msg = 'failed to start: ' + e.message;
  if (netErr) {
    const isLocal = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(location.hostname);
    let serverUp = false;
    try { serverUp = (await fetch('/__ping', { cache: 'no-store' })).ok; } catch (err) {}
    if (isLocal && !serverUp) {
      msg = 'the dev server is not running — start it with: make -C report2027 live '
          + '(this page came from the offline cache, which is why it still drew)';
    } else if (!navigator.onLine) {
      msg = 'no connection — the editor needs one to load a report';
    }
  }
  $('stat').textContent = msg;
  $('stat').title = msg;          // the row ellipsises; hover gets all of it
  $('stat').classList.add('err');
});
</script>
</body>
</html>
