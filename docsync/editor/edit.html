// ---- history: every move is undoable, or it is not safe to experiment ----
const past = [], future = [];
const snapshot = () => JSON.stringify({ source, layout });
// Reflect what's undoable on the toolbar buttons. The buttons only mirror
// state; undo()/redo() themselves stay the source of truth (and still work
// from the keyboard when a button is momentarily out of sync).
function syncHistoryButtons() {
  const u = $('undo'), r = $('redo');
  if (u) u.disabled = !past.length;
  if (r) r.disabled = !future.length;
}
function pushHistory() {
  past.push(snapshot());
  if (past.length > 60) past.shift();
  future.length = 0;
  syncHistoryButtons();
}
async function restore(json) {
  const st = JSON.parse(json);
  source = st.source;
  layout = st.layout;
  markDirty();
  await render();
}
async function undo() {
  if (!past.length) { $('stat').textContent = 'nothing to undo'; return; }
  future.push(snapshot());
  await restore(past.pop());
  syncHistoryButtons();
  $('stat').textContent = 'undone';
}
async function redo() {
  if (!future.length) { $('stat').textContent = 'nothing to redo'; return; }
  past.push(snapshot());
  await restore(future.pop());
  syncHistoryButtons();
  $('stat').textContent = 'redone';
}
$('undo').onclick = undo;
$('redo').onclick = redo;

function dragify(d) {
  d.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    // A movable nested inside another movable — a callout's own paragraphs —
    // is part of that object, not a second one; the outer element owns every
    // gesture. Binding the inner one would let a drag pull a callout apart.
    if (el.parentElement && el.parentElement.closest('[data-el]')) return;
    // A locked element wears its state: a padlock and a muted ring, and the
    // grab cursor gives way. It still SELECTS (so it can be unlocked) but the
    // drag refuses.
    el.classList.toggle('ds-locked', isLocked(idOf(el)));
    // Deliberately NOT focusable. A focusable element scrolls itself into view
    // the instant a click focuses it — the page "jumped up" on every select.
    // Keyboard moves work on the SELECTION at the document level (keysFor), so
    // arrows still nudge a selected element without any element owning focus.
    el.addEventListener('mousedown', e => {
      if (editing || e.button !== 0) return;
      // A movable object grabs from ANYWHERE on itself — including over its own
      // words. A callout is nearly all text; the old rule "a click on text
      // never moves" left it with no grab handle at all. Editing the words is
      // now a double-click (bound on each slot below), Canva's own split. Real
      // controls inside still work: a link, the year picker.
      //
      // An endnote is the exception that proves it: it is mostly its own URL,
      // so honouring the link would leave the entry with almost no grabbable
      // surface — the reason dragging one "did nothing" nine times in ten.
      // Following a citation link matters less here than being able to move
      // the citation, and the link still works in the published report.
      const ctl = e.target.closest('a, button, input, select, textarea, summary');
      if (ctl && !(ctl.tagName === 'A' && (el.dataset.el || '').startsWith('endnote.'))) return;
      e.preventDefault();
      e.stopPropagation();
      const id = idOf(el);
      // One place decides the selection — group expansion, shift, alt — so
      // this and the hit-test can never disagree.
      const selected = selectClick(d, id, e);
      if (e.shiftKey || !selected) return;   // shift builds a set, nothing moves
      // A drag moves the whole selection; if any of it is locked, none moves.
      if ([...selIds].some(isLocked)) {
        $('stat').textContent = `${[...selIds].filter(isLocked)[0]} is locked — unlock it to move it`;
        return;
      }
      startDrag(d, el, e);
    });
    // A text box has no [data-slot] inside it — its words live in layout.json —
    // so it needs its own way in. Double-click, since a single click is the
    // drag it shares with every other placed thing. An image's double-click
    // is Canva's: it opens the crop.
    if ((el.dataset.el || '').startsWith('text.'))
      el.addEventListener('dblclick', e => { e.preventDefault(); editBox(d, el); });
    else if ((el.dataset.el || '').startsWith('endnote.'))
      // Like a text box: its two fields (citation text + URL) don't fit the
      // one-slot-one-string model [data-slot] editing assumes, so it gets its
      // own double-click entry point too.
      el.addEventListener('dblclick', e => {
        e.preventDefault();
        editEndnote(d, el, el.dataset.el.slice('endnote.'.length));
      });
    else if (el.tagName === 'IMG' || el.classList.contains('ds-cropw'))
      el.addEventListener('dblclick', e => { e.preventDefault(); cropMode(d, el); });
  });
}

/** Shared by pointer and keyboard: place the element, snapping as it goes. */
function placer(d, el, page) {
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const bx = boxOf(id);              // a text box keeps its own x/y/w
  // Measure the box, but trust a position we already recorded over a fresh
  // reading of it: rects carry rounding, and the lift's scale nudges them. Take
  // the measurement as truth and picking a box up without moving it walks it a
  // few hundredths of an inch — every time.
  const measured = inchBox(el, page);
  const stored = shapeId ? layout.shapes.find(s => s.id === shapeId)
                         : (bx || layout.positions[id]);
  const box = stored && stored.x !== undefined
    ? { ...measured, x: +stored.x, y: +stored.y }
    : measured;
  const heldFlow = !shapeId &&
    d.defaultView.getComputedStyle(el).position === 'static';
  let spacer = null;

  // Going absolute drops the element out of the flow and everything around it
  // moves in to fill the gap. Below it, the next block rushes up; BESIDE it in
  // a flex row — a branch photo next to its card — the card stretches across
  // the vacated width. The spacer holds the WHOLE box (width and height) with
  // flex:none, so neither happens. The renderer reserves the same on the next
  // build; here it is held in the frame the element leaves the flow, or the
  // page lurches under you.
  const holdPlace = () => {
    if (!heldFlow || spacer) return;
    spacer = d.createElement('div');
    spacer.className = 'ds-spacer ds-ghost';
    spacer.style.cssText = `width:${box.w.toFixed(2)}in;height:${box.h.toFixed(2)}in;`
      + 'flex:0 0 auto';
    spacer.setAttribute('aria-hidden', 'true');
    el.parentNode.insertBefore(spacer, el);
  };

  const lines = snapLines(d, page, el);

  // One rule for the width, used by the drag AND by what gets saved — they had
  // two, and the drag's was "none". An absolutely positioned block with no
  // width shrink-to-fits to its preferred width, which for a card of prose is
  // its longest line: drag it and it stretches into a strip. Pin the width it
  // had. Skip only things genuinely wider than the page (the cover lockup is
  // full-bleed on purpose); pinning that would shove it off the edge.
  const pinW = () => {
    const prev = (shapeId ? null : layout.positions[id]) || {};
    return prev.w ?? (box.w <= PAGE_W_IN ? +box.w.toFixed(2) : undefined);
  };

  const put = (x, y, snap = true) => {
    let vx = null, hy = null;
    if (snap) {
      const sx = snapAxis(lines.xs, x, box.w);
      const sy = snapAxis(lines.ys, y, box.h);
      if (sx) { x = +sx.at.toFixed(3); vx = sx.line; }
      if (sy) { y = +sy.at.toFixed(3); hy = sy.line; }
    }
    // Clamp inside the page: .page is overflow:hidden, so "off the edge" is
    // not bleed, it is gone. Better to refuse the pixel than fail the build.
    x = Math.min(Math.max(x, 0), PAGE_W_IN - Math.min(box.w, PAGE_W_IN));
    y = Math.min(Math.max(y, 0), PAGE_H_IN - Math.min(box.h, PAGE_H_IN));
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.x = +x.toFixed(2); sh.y = +y.toFixed(2); paintShape(d, shapeId); }
    } else if (bx) {
      bx.x = +x.toFixed(2); bx.y = +y.toFixed(2);
      el.style.left = x.toFixed(2) + 'in';
      el.style.top = y.toFixed(2) + 'in';
    } else {
      holdPlace();
      el.style.position = 'absolute';
      el.style.left = x.toFixed(2) + 'in';
      el.style.top = y.toFixed(2) + 'in';
      const w = pinW();
      if (w) el.style.width = w + 'in';     // what the renderer will do, now
    }
    showGuides(d, page, vx, hy);
    $('stat').textContent = `${id} → ${x.toFixed(2)}in, ${y.toFixed(2)}in`
                          + (vx !== null || hy !== null ? '  · aligned' : '');
    return { x, y };
  };

  const commit = ({ x, y }) => {
    if (bx) { clearGuides(d); markDirty(); return; }   // already written above
    if (!shapeId) {
      const prev = layout.positions[id] || {};
      const w = pinW();
      const reserve = prev.reserve ?? (heldFlow ? +box.h.toFixed(2) : undefined);
      layout.positions[id] = { ...prev, x: +x.toFixed(2), y: +y.toFixed(2),
                              ...(w ? { w } : {}),
                              ...(reserve ? { reserve } : {}) };
    }
    clearGuides(d);
    if (spacer) spacer.classList.remove('ds-ghost');
    markDirty();
  };

  return { id, box, put, commit };
}

/** Alt-drag duplicates: clone the data AND the node so the copy is draggable
 *  in the same gesture, before any re-render exists to build it properly. */
function altClone(d, members, page) {
  if (!members.every(m => m.dataset.shape || (m.dataset.el || '').startsWith('text.')))
    return null;
  return members.map(m => {
    if (m.dataset.shape) {
      const sh = layout.shapes.find(s => s.id === m.dataset.shape);
      const nid = freeShapeId(sh.kind);
      layout.shapes.push({ ...sh, id: nid });
      const node = m.cloneNode(true);
      node.setAttribute('data-shape', nid);
      m.parentNode.appendChild(node);
      return node;
    }
    const b = boxOf(m.dataset.el);
    const nid = freeBoxId();
    boxes().push({ ...b, id: nid });
    const node = m.cloneNode(true);
    node.setAttribute('data-el', 'text.' + nid);
    page.appendChild(node);
    return node;
  });
}

function startDrag(d, el, e0) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  const rect = el.getBoundingClientRect();
  // A hidden or unlaid-out pane reports every rect as zero, and the drag would
  // then write nonsense inches into layout.json. Refuse rather than corrupt.
  if (!pr.width || (!rect.width && !el.dataset.shape)) {
    $('stat').textContent = 'cannot move that yet — the page has no layout';
    return;
  }
  // Squeezed below print width the page has REFLOWED (max-width:100%): every
  // measurement describes a layout the PDF will never have. applyZoom pins
  // the width, so this only trips if someone forces 100% in a narrow pane.
  if (page.offsetWidth < PAGE_W_IN * DPI * 0.98) {
    $('stat').textContent = 'the page is squeezed below print width — use Fit zoom to move things';
    return;
  }
  // Dragging a selected element moves every selected element on this page;
  // anything locked stays put. A fresh element drags alone.
  let members = selIds.size > 1 && selIds.has(idOf(el))
    ? selEls(d).filter(m => (m.closest('section.page')) === page && !isLocked(idOf(m)))
    : [el];
  if (!members.length) members = [el];
  const px = DPI * zoomOf(page);
  const grab = { x: e0.clientX, y: e0.clientY };
  // Everything below waits for the FIRST real movement. A mousedown that never
  // travels — an ordinary click — must select and nothing else: no history
  // entry, no lift, no commit. And a real mouse jitters a pixel or two on the
  // way up, well past an inch-scale threshold, so the dead zone is measured in
  // SCREEN pixels (a Canva-style ~4px) rather than inches. Below it, the click
  // stays a click; the logo neither scales nor jumps.
  const DEAD_PX = 4;
  let started = false, cloned = false;
  let Ps, starts, group, glines, at;
  let lastPt = { x: e0.clientX, y: e0.clientY };   // where the drop landed

  const begin = () => {
    started = true;
    pushHistory();
    if (e0.altKey) {
      const copies = altClone(d, members, page);
      if (copies) { members = copies; cloned = true; setSel(d, copies.map(idOf)); }
    }
    Ps = members.map(m => placer(d, m, page));
    starts = Ps.map(P => ({ x: P.box.x, y: P.box.y }));
    group = { x: Math.min(...starts.map(s => s.x)),
              y: Math.min(...starts.map(s => s.y)) };
    group.w = Math.max(...Ps.map((P, i) => starts[i].x + P.box.w)) - group.x;
    group.h = Math.max(...Ps.map((P, i) => starts[i].y + P.box.h)) - group.y;
    glines = members.length > 1 ? snapLines(d, page, members) : null;
    at = starts.map(s => ({ ...s }));
    members.forEach(m => m.classList.add('ds-lifted'));
    d.body.classList.add('ds-grabbing');
    hideHandles(d);
  };

  // Applied straight from the event, not via requestAnimationFrame. Browsers
  // already coalesce mousemove to the frame rate, the snap lines are computed
  // once at pick-up, and put() only writes a couple of styles — so rAF would
  // buy nothing and cost a frame of lag. It also stops firing in a hidden
  // document, which turns a drag into a silent no-op.
  const move = e => {
    lastPt = { x: e.clientX, y: e.clientY };
    if (!started) {
      if (Math.abs(e.clientX - grab.x) < DEAD_PX
          && Math.abs(e.clientY - grab.y) < DEAD_PX) return;
      begin();
    }
    const dx = (e.clientX - grab.x) / px, dy = (e.clientY - grab.y) / px;
    if (members.length === 1) {
      at[0] = Ps[0].put(starts[0].x + dx, starts[0].y + dy);
      return;
    }
    // Group: snap and clamp the GROUP box, then place members by their offsets.
    let gx = group.x + dx, gy = group.y + dy, vx = null, hy = null;
    const sx = snapAxis(glines.xs, gx, group.w), sy = snapAxis(glines.ys, gy, group.h);
    if (sx) { gx = +sx.at.toFixed(3); vx = sx.line; }
    if (sy) { gy = +sy.at.toFixed(3); hy = sy.line; }
    gx = Math.min(Math.max(gx, 0), PAGE_W_IN - Math.min(group.w, PAGE_W_IN));
    gy = Math.min(Math.max(gy, 0), PAGE_H_IN - Math.min(group.h, PAGE_H_IN));
    Ps.forEach((P, i) => {
      at[i] = P.put(starts[i].x - group.x + gx, starts[i].y - group.y + gy, false);
    });
    showGuides(d, page, vx, hy);
    $('stat').textContent = `${members.length} elements → ${gx.toFixed(2)}in, ${gy.toFixed(2)}in`;
  };
  const up = async () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    // Never crossed the dead zone — it was a click, and the selection made on
    // mousedown is all it meant. Nothing to lift, settle, commit or undo.
    if (!started) { clearGuides(d); paintSel(d); return; }
    members.forEach(m => {
      m.classList.remove('ds-lifted');
      m.classList.add('ds-settling');      // ~120ms ease into the snapped spot
    });
    d.defaultView.setTimeout(() =>
      members.forEach(m => m.classList.remove('ds-settling')), 160);
    d.body.classList.remove('ds-grabbing');
    // An endnote REORDERS rather than parks: it is one row of a numbered list,
    // and a citation floating loose over the page while still numbered in
    // sequence would say something the report does not mean. Drop it where it
    // reads, and the list (and every <sup> marker pointing into it) renumbers.
    if (members.length === 1 && (idOf(members[0]) || '').startsWith('endnote.')) {
      const moved = reorderEndnote(d, members[0]);
      if (moved) markDirty(); else past.pop();   // no change: no undo entry
      clearGuides(d);
      await render();                            // snaps it back into the flow
      if (moved) $('stat').textContent = moved;  // after render, so it survives
      return;
    }
    Ps.forEach((P, i) => P.commit(at[i]));
    if (cloned) await render();            // clones need real, wired nodes
    else paintSel(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Where a point falls in the endnotes list's READING order: which column
 *  first, then how far down it. The list is two columns in print and one on
 *  a narrow screen, so the column edges are read off the entries themselves
 *  rather than assumed — a hard-coded 2 would put every drop in column 0 the
 *  moment the CSS collapsed. */
function readingKey(colEdges, x, y) {
  let col = 0;
  colEdges.forEach((edge, i) => { if (x >= edge - 6) col = i; });
  return [col, y];
}
const beforeKey = (a, b) => a[0] !== b[0] ? a[0] < b[0] : a[1] < b[1];

/** Drop an endnote among its neighbours: work out where it now reads, and
 *  write that order to layout.json. Numbering itself stays the renderer's
 *  job (content.py's Footnotes) — this only records the order it should use,
 *  so a dragged citation renumbers everywhere at once, markers included.
 *  Returns the status message to show, or false if nothing moved. */
function reorderEndnote(d, el) {
  const id = (el.dataset.el || '').slice('endnote.'.length);
  const all = [...d.querySelectorAll('[data-el^="endnote."]')];
  const ids = all.map(li => (li.dataset.el || '').slice('endnote.'.length));
  if (!id || ids.length < 2) return false;
  // An endnote never parks: reordering IS the move, so any stale position
  // (from an older build that allowed one) goes rather than fighting the flow.
  if (layout.positions && layout.positions['endnote.' + id]) {
    delete layout.positions['endnote.' + id];
  }
  const others = all.filter(li => li !== el);
  const edges = [...new Set(others.map(li => Math.round(li.getBoundingClientRect().left)))]
    .sort((a, b) => a - b);
  // Measure by the DRAGGED ENTRY'S OWN EDGES, not the pointer, and
  // directionally. Entries run 70-100px tall; the old pointer-vs-midpoint
  // rule meant a one-row move needed the POINTER dragged a full row's height
  // -- the entry could sit visually on top of its neighbour and still snap
  // back, which read as the feature not working. The standard list feel:
  // moving UP swaps once the entry's TOP edge crosses the neighbour above's
  // midpoint; moving DOWN once its BOTTOM edge crosses the one below's --
  // about half a row of travel either way. Two counts, one per leading
  // edge, and the direction (against the entry's own resting index) picks
  // which one is meant.
  const er = el.getBoundingClientRect();
  const cx = er.left + er.width / 2;
  const countBefore = key => {
    let n = 0;
    others.forEach(li => {
      const r = li.getBoundingClientRect();
      if (beforeKey(readingKey(edges, r.left, r.top + r.height / 2), key)) n++;
    });
    return n;
  };
  const idxTop = countBefore(readingKey(edges, cx, er.top));
  const idxBot = countBefore(readingKey(edges, cx, er.bottom));
  const origIdx = ids.indexOf(id);       // its resting slot, in reading order
  const idx = idxTop < origIdx ? idxTop         // leading with the top: moving up
            : idxBot > origIdx ? idxBot         // leading with the bottom: down
            : origIdx;                          // neither edge crossed: stay
  const rest = ids.filter(i => i !== id);
  const next = [...rest.slice(0, idx), id, ...rest.slice(idx)];
  if (next.join(' ') === ids.join(' ')) return false;
  layout.endnotes = next;
  // The message is RETURNED, not shown here: the caller re-renders next,
  // and render() overwrites the status line — shown from here it flashed
  // for one frame and vanished, so the feedback that a drag worked never
  // landed.
  return `endnote [${id}] moved to #${idx + 1} — the list renumbered`;
}

/** Keyboard drag: focus, Space to pick up, arrows to move, Space to drop. */
const held = new WeakMap();
function keyDrag(d, el, e) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const picked = held.get(el);

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!picked) {
      pushHistory();
      const P = placer(d, el, page);
      held.set(el, { P, at: { x: P.box.x, y: P.box.y } });
      el.classList.add('ds-lifted');
      $('stat').textContent = `${P.id} picked up — arrows to move, Space to drop, Esc to cancel`;
    } else {
      picked.P.commit(picked.at);
      el.classList.remove('ds-lifted');
      held.delete(el);
      $('stat').textContent = 'dropped';
    }
    return;
  }
  if (!picked) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    el.classList.remove('ds-lifted');
    held.delete(el);
    clearGuides(d);
    undo();                                  // put it back where it was
    return;
  }
  const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
  const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
               ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
  if (!d4) return;
  e.preventDefault();
  // Arrows are a deliberate placement, so they do not snap out from under you.
  picked.at = picked.P.put(picked.at.x + d4[0], picked.at.y + d4[1], false);
}

// Mirrors of triangle_points/arrow_points in docsync/layout.py, for live drag
// preview — a Pyodide call per mousemove is not a 60fps neighbour. Change the
// Python, change these, or the preview will visibly disagree with the page.
const trianglePts = (x, y, w, h) => [[x + w / 2, y], [x + w, y + h], [x, y + h]];
const arrowPts = (x, y, w, h) => {
  const xs = x + w * 0.62, hh = h / 2;
  return [[x, y + h * 0.28], [xs, y + h * 0.28], [xs, y], [x + w, y + hh],
          [xs, y + h], [xs, y + h * 0.72], [x, y + h * 0.72]];
};
const ptsAttr = pts => pts.map(p => p.map(v => +v.toFixed(4)).join(',')).join(' ');

/** Live-paint a shape's full geometry without a re-render, so drags and
 *  resizes stay smooth. All of it, not just x/y: a resized rect that does not
 *  grow until the next render looks like a resize that did not take. */
function paintShape(d, id) {
  const sh = layout.shapes.find(s => s.id === id);
  const node = d.querySelector(`[data-shape="${id}"]`);
  if (!sh || !node) return;
  if (sh.kind === 'rect') {
    node.setAttribute('x', sh.x); node.setAttribute('y', sh.y);
    node.setAttribute('width', sh.w); node.setAttribute('height', sh.h);
  } else if (sh.kind === 'ellipse') {
    node.setAttribute('cx', sh.x + sh.w / 2); node.setAttribute('cy', sh.y + sh.h / 2);
    node.setAttribute('rx', sh.w / 2); node.setAttribute('ry', sh.h / 2);
  } else if (sh.kind === 'triangle') {
    node.setAttribute('points', ptsAttr(trianglePts(sh.x, sh.y, sh.w, sh.h)));
  } else if (sh.kind === 'arrow') {
    node.setAttribute('points', ptsAttr(arrowPts(sh.x, sh.y, sh.w, sh.h)));
  } else {
    node.setAttribute('x1', sh.x); node.setAttribute('y1', sh.y);
    node.setAttribute('x2', sh.x + sh.w); node.setAttribute('y2', sh.y + sh.h);
  }
  if (sh.rot) paintRot(d, node);         // the pivot moved with the box
}

function markDirty() {
  dirty = source !== original
       || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
  $('save').disabled = !dirty;
  // Discard stays live while a saved draft exists: with nothing unsaved it
  // offers to throw the whole draft away (see its handler).
  $('revert').disabled = !dirty && !(draftBranch && !local);
  $('save').classList.toggle('dirty', dirty);
  cacheDraft();                       // persist unsaved edits for offline safety
}

// --- offline draft cache (idb-keyval) --------------------------------------
// Unsaved edits survive a closed tab or a dropped connection before a network
// Save. localStorage would work but is synchronous and size-limited; IndexedDB
// — via idb-keyval, a ~1kB zero-dependency ESM wrapper loaded from the same CDN
// as Pyodide — is the right store, and matches the offline direction
// STANDALONE.md started. Deliberately ONLY the draft cache lives here: the
// token and user stay in localStorage, so ensureAuth()/resolveDraft() keep
// their synchronous reads. Local mode is exempt — there the files on disk are
// the truth and serve.py already persists every Save.
let _idb = null;
async function idbKV() {
  if (_idb === null) {
    try { _idb = await import('https://cdn.jsdelivr.net/npm/idb-keyval@6.3.0/dist/index.js'); }
    catch (e) { _idb = false; }        // offline first load or blocked — cache just no-ops
  }
  return _idb || null;
}
const cacheKey = () => `draft-cache:${M.id}`;   // per project; stable across draft/main views
let _cacheTimer = 0;
let cachedRestored = false;
function cacheDraft() {
  if (local || !M) return;
  clearTimeout(_cacheTimer);
  _cacheTimer = setTimeout(async () => {
    if (!dirty) return;                // nothing unsaved to keep
    const kv = await idbKV();
    if (!kv) return;
    try { await kv.set(cacheKey(), { source, layout: JSON.stringify(layout), at: Date.now() }); }
    catch (e) { /* storage full / private mode — losing the cache is not fatal */ }
  }, 800);
}
async function clearDraftCache() {
  if (local || !M) return;
  const kv = await idbKV();
  if (kv) { try { await kv.del(cacheKey()); } catch (e) {} }
}
/** On boot, adopt any unsaved edits cached in THIS browser over what we loaded
 *  from the branch — auto-restore, not a prompt, because Save keeps them and
 *  Discard drops them, so nothing is lost either way. */
async function restoreCachedDraft() {
  if (local || !M) return;
  const kv = await idbKV();
  if (!kv) return;
  let cached;
  try { cached = await kv.get(cacheKey()); } catch (e) { return; }
  if (!cached || cached.source == null) return;
  const cachedLayout = cached.layout || '{}';
  if (cached.source === source && cachedLayout === JSON.stringify(layout)) return;  // nothing new
  source = cached.source;
  try { layout = JSON.parse(cachedLayout); } catch (e) { source = original; return; }
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  cachedRestored = true;
}

// ------------------------------------------------------------------- icons
// Thousands of icons from the open-source sets — Iconoir, Lucide, Heroicons,
// Bootstrap Icons, Phosphor, Tabler — searched through the Iconify API, which
// indexes them all behind one endpoint. Nothing is vendored: this is a CDN
// call at PICK time, like the Pyodide and fflate imports already here.
//
// What gets stored is the icon's GEOMETRY, not a reference to it. The PDF is
// printed by headless Chrome from built HTML and the preview renders under
// Pyodide — neither may assume a network. A picked icon therefore renders
// offline forever, and cannot change under the report when a set is revised
// upstream. layout.py re-checks the markup on the way out (layout.json can be
// hand-edited); this is the same whitelist on the way in.
const ICON_API = 'https://api.iconify.design';
// Every one of these is permissively licensed (MIT/ISC/Apache) and designed
// as single-colour strokes, so the report's own palette recolours them.
const ICON_SETS = [
  ['lucide', 'Lucide'], ['iconoir', 'Iconoir'], ['heroicons', 'Heroicons'],
  ['bi', 'Bootstrap Icons'], ['ph', 'Phosphor'], ['tabler', 'Tabler'],
];
const ICON_TAGS_OK = new Set(['g', 'path', 'circle', 'ellipse', 'rect', 'line',
  'polyline', 'polygon', 'defs', 'clipPath', 'mask', 'use', 'title', 'desc',
  'symbol', 'linearGradient', 'radialGradient', 'stop']);
const ICON_BANNED = /<\s*(script|foreignObject|image|iframe|a|animate|animateTransform|set|handler)\b|\bon[a-z]+\s*=|javascript:|<!ENTITY|<!DOCTYPE/i;

/** True when this markup is a plain drawing and nothing else. Mirrors
 *  layout.py's check_icon_svg — deliberately duplicated rather than trusted
 *  from one side, because each end is reachable without the other. */
function iconSvgOk(body) {
  if (typeof body !== 'string' || !body.trim() || body.length > 64000) return false;
  if (ICON_BANNED.test(body)) return false;
  return (body.match(/<\s*\/?\s*([A-Za-z][A-Za-z0-9]*)/g) || [])
    .every(m => ICON_TAGS_OK.has(m.replace(/[<\/\s]/g, '')));
}

const iconCache = new Map();          // "prefix:name" -> {body, vb}
let iconSeq = 0;                      // bumps per search; late replies are dropped

/** Fetch the geometry for a page of results, one request per set. */
async function iconBodies(ids) {
  const want = ids.filter(i => !iconCache.has(i));
  const byPrefix = new Map();
  want.forEach(i => {
    const [p, n] = i.split(':');
    if (!byPrefix.has(p)) byPrefix.set(p, []);
    byPrefix.get(p).push(n);
  });
  await Promise.all([...byPrefix].map(async ([prefix, names]) => {
    try {
      const r = await fetch(`${ICON_API}/${prefix}.json?icons=${names.join(',')}`);
      const j = await r.json();
      const w = j.width || 24, h = j.height || 24;
      // An alias points at another icon's geometry; resolve it or the tile
      // comes back empty.
      const real = n => (j.aliases && j.aliases[n] && j.aliases[n].parent) || n;
      names.forEach(n => {
        const ic = j.icons && j.icons[real(n)];
        if (!ic || !iconSvgOk(ic.body)) return;
        iconCache.set(`${prefix}:${n}`, {
          body: ic.body,
          vb: `${ic.left || 0} ${ic.top || 0} ${ic.width || w} ${ic.height || h}`,
        });
      });
    } catch (e) { /* one set failing must not empty the whole grid */ }
  }));
}

async function iconSearch(q) {
  const grid = $('icon-grid'), note = $('icon-note');
  const mine = ++iconSeq;
  if (!q.trim()) { grid.textContent = ''; note.textContent = ''; return; }
  note.textContent = 'searching…';
  const set = $('icon-set').value;
  const prefixes = set || ICON_SETS.map(([p]) => p).join(',');
  let ids = [];
  try {
    const r = await fetch(`${ICON_API}/search?query=${encodeURIComponent(q)}`
                        + `&limit=60&prefixes=${prefixes}`);
    ids = (await r.json()).icons || [];
  } catch (e) {
    if (mine === iconSeq) note.textContent = 'icon search needs a connection — offline right now';
    return;
  }
  await iconBodies(ids);
  if (mine !== iconSeq) return;                 // a newer search already ran
  grid.textContent = '';
  const found = ids.filter(i => iconCache.has(i));
  found.forEach(id => {
    const { body, vb } = iconCache.get(id);
    const b = document.createElement('button');
    b.className = 'icon-tile';
    b.title = id;
    b.innerHTML = `<svg viewBox="${vb}" width="22" height="22">${body}</svg>`;
    b.addEventListener('click', () => addIcon(id));
    grid.appendChild(b);
  });
  note.textContent = found.length
    ? `${found.length} icons — click one to place it`
    : `nothing matched "${q}"`;
}

async function addIcon(id) {
  const it = iconCache.get(id);
  if (!it) return;
  $('iconpop').hidden = true;
  const page = visiblePageId();
  pushHistory();
  const sid = freeShapeId('icon');
  // Square, and the report's own primary — an icon lands in the palette
  // rather than as a black sticker to be recoloured afterwards. Its markup
  // draws in currentColor, so the Fill control recolours the whole glyph.
  layout.shapes.push({ id: sid, page, kind: 'icon', x: 1, y: 1, w: 0.6, h: 0.6,
                       icon: id, vb: it.vb, svg: it.body,
                       fill: '#52796F', z: 3 });
  setSel($('out').contentDocument, [sid]);
  markDirty();
  await render();
  $('stat').textContent = `${id} placed on page ${page} — drag to size, recolour with Fill`;
}

$('icon').onclick = () => {
  const sel = $('icon-set');
  if (sel.options.length === 1) {
    ICON_SETS.forEach(([p, label]) => sel.add(new Option(label, p)));
  }
  togglePop($('iconpop'), $('icon'));
  if (!$('iconpop').hidden) $('icon-q').focus();
};
let iconTimer = null;
const iconDebounced = () => {
  clearTimeout(iconTimer);
  iconTimer = setTimeout(() => iconSearch($('icon-q').value), 220);
};
$('icon-q').addEventListener('input', iconDebounced);
$('icon-set').addEventListener('change', () => iconSearch($('icon-q').value));

$('shape').onclick = () => togglePop($('shapepop'), $('shape'));
document.querySelectorAll('#shapepop .shp').forEach(b => b.addEventListener('click', async () => {
  $('shapepop').hidden = true;
  const kind = b.dataset.k;
  const page = visiblePageId();
  pushHistory();
  const id = freeShapeId(kind);
  // A new shape is a SOLID, visible object by default — a near-white fill read
  // as "just an outline". Sage is the report's own primary, clearly on the
  // page; recolour it from the Fill control in the toolbar (or right-click).
  // z:3 — on TOP by default so a new shape is plainly visible, not hidden
  // behind the page's own (often translucent) panels, which read as "just an
  // outline". Send it back from the layers panel / right-click when it should
  // sit behind content.
  layout.shapes.push({ id, page, kind, x: 1, y: 1, w: 2, h: kind === 'line' ? 0 : 1,
                       fill: kind === 'line' ? 'none' : '#6B9E78',
                       stroke: kind === 'line' ? '#52796F' : 'none',
                       sw: 0.02, z: 3 });
  setSel($('out').contentDocument, [id]);
  markDirty();
  await render();
  $('stat').textContent = `${id} on page ${page} — drag to place, recolour with the Fill button`;
}));

addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    e.shiftKey ? redo() : undo();
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') {
    e.preventDefault();
    duplicateSel($('out').contentDocument);
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'c' && selIds.size) {
    e.preventDefault();
    e.altKey ? copyStyle($('out').contentDocument) : copySel($('out').contentDocument);
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'v' && (e.altKey ? styleClip : clip)) {
    e.preventDefault();
    e.altKey ? pasteStyle($('out').contentDocument) : pasteClip($('out').contentDocument);
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'g') {
    e.preventDefault();
    e.shiftKey ? ungroupSel($('out').contentDocument) : groupSel($('out').contentDocument);
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === ']' || e.key === '[')) {
    e.preventDefault();
    layerStep($('out').contentDocument, e.key === ']' ? 1 : -1, e.altKey);
  }
  if (e.key === 'Escape' && selIds.size) clearSel($('out').contentDocument);
  // Arrow-nudge and Delete here too, not only in the iframe's own handler:
  // after a click the keyboard focus may sit on the outer page rather than the
  // iframe, and without this the selection would be unreachable by keyboard.
  if (selIds.size) {
    const d = $('out').contentDocument;
    if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSel(d); }
    const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
    const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
                 ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
    if (d4) { e.preventDefault(); nudgeSel(d, d4); }
  }
});

// --- hover tooltips ---------------------------------------------------------
// Native `title` never shows on a disabled button — which is exactly the
// common case for Duplicate/Lock/Delete before anything is selected — and
// otherwise is slow and OS-styled rather than on-brand. This is a small chip
// instead, keyed off aria-label (so the accessible name is unchanged) and
// delegated (so a button added later needs no extra wiring). Long labels
// carry a " — " explanation for screen readers; the chip shows only the part
// before it, matching how a person would say the button's name out loud.
// Shared between this document (the chrome) and the draft iframe (its own
// floating mini toolbar), which is why it takes `doc` rather than closing
// over one — the iframe gets a fresh document, and so a fresh call, on
// every render.
function wireTooltips(doc) {
  const win = doc.defaultView;
  const chip = doc.createElement('div');
  chip.id = 'tt';
  chip.hidden = true;
  doc.body.appendChild(chip);
  let target = null, timer = null;
  const shortLabel = s => { const i = s.indexOf(' — '); return i === -1 ? s : s.slice(0, i); };

  function place() {
    const r = target.getBoundingClientRect();
    const cr = chip.getBoundingClientRect();
    let x = r.left + r.width / 2 - cr.width / 2;
    x = Math.max(4, Math.min(x, win.innerWidth - cr.width - 4));
    let y = r.bottom + 7, above = false;
    if (y + cr.height > win.innerHeight - 4) { y = r.top - cr.height - 7; above = true; }
    chip.style.left = x + 'px';
    chip.style.top = y + 'px';
    chip.classList.toggle('above', above);
  }
  function show() {
    if (!target) return;
    chip.textContent = shortLabel(target.getAttribute('aria-label') || '');
    chip.hidden = false;
    place();
  }
  function hide() {
    clearTimeout(timer); timer = null; target = null;
    chip.hidden = true;
  }
  doc.addEventListener('mouseover', e => {
    const b = e.target.closest('button[aria-label]');
    if (b === target) return;
    hide();
    if (b) { target = b; timer = setTimeout(show, 400); }
  });
  doc.addEventListener('mousedown', hide);
  // :focus-visible, not just focus: a click focuses the button too, and
  // without this check that focus immediately re-showed the tooltip the
  // same mousedown had just dismissed. Keyboard (Tab) focus is the case
  // this exists for.
  doc.addEventListener('focusin', e => {
    const b = e.target.closest('button[aria-label]');
    if (b && b.matches(':focus-visible')) { target = b; show(); }
  });
  doc.addEventListener('focusout', hide);
  win.addEventListener('blur', hide);
  win.addEventListener('resize', () => { if (!chip.hidden) place(); });
}
wireTooltips(document);

async function boot() {
  await loadRegistry();
  M = JSON.parse(await get(withBase('engine/manifest.json')));
  REPO = M.repo || '';
  BRANCH = M.branch || 'main';
  if (M.pages && M.pages.length) EXTRA_PAGES = M.pages;
  PAGE_W_IN = M.page.w; PAGE_H_IN = M.page.h;
  MARGIN_IN = M.margins.side; TOP_IN = M.margins.top;
  $('title').textContent = M.id;
  await detectLocal();          // local live server? then Save writes to disk
  await resolveDraft();         // ?draft=… in the URL, or your own saved draft

  const urls = Object.keys(M.files);
  const [pyodide, ...files] =
    await Promise.all([loadPyodide(), ...urls.map(u => get(withBase(u)))]);
  // Viewing or continuing a draft: its content and layout come from the draft
  // branch, not the deployed copies (which are main's). The engine code itself
  // stays same-origin — only the two authored files differ per draft.
  if (draftBranch) {
    try {
      const [c, l] = await Promise.all([
        fromBranch(M.content),
        M.layout ? fromBranch(M.layout) : Promise.resolve('{}'),
      ]);
      files[urls.indexOf('engine/' + M.content)] = c;
      if (M.layout) files[urls.indexOf('engine/' + M.layout)] = l;
    } catch (e) {
      draftBranch = null;
      history.replaceState(null, '', pageUrl());
      $('title').textContent = M.id;
      $('stat').textContent = "that draft isn't on GitHub any more (probably published) — showing the live report";
    }
  }
  py = pyodide;
  // The renderer is written for a repo checkout, so rebuild one in Pyodide's FS
  // from the paths the manifest names — no directory list to keep in step.
  py.FS.mkdirTree('/repo');
  urls.forEach((u, i) => {
    const path = '/repo/' + M.files[u];
    py.FS.mkdirTree(path.slice(0, path.lastIndexOf('/')));
    py.FS.writeFile(path, files[i]);
  });
  py.FS.mkdirTree('/repo/' + M.out.slice(0, M.out.lastIndexOf('/')));
  source = original = files[urls.indexOf('engine/' + M.content)];
  if (M.layout) {
    layoutOrig = files[urls.indexOf('engine/' + M.layout)];
    layout = JSON.parse(layoutOrig || '{}');
  } else {
    layoutOrig = '{}'; layout = {};
  }
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  // Put the rebuilt checkout on the path once, here, rather than inside the
  // render call — the type row asks the engine for its font list before
  // anything has rendered.
  py.runPython("import sys\nsys.path.insert(0, '/repo')");
  fonts = JSON.parse(py.runPython(
    'import json\nfrom docsync.layout import FONTS\njson.dumps(FONTS)'));
  fxParams = JSON.parse(py.runPython(
    'import json\nfrom docsync.layout import EFFECT_PARAMS\njson.dumps(EFFECT_PARAMS)'));
  // The text-colour popover: the report's own palette first, then the wheel.
  const grid = $('ty-swgrid');
  (M.palette || []).forEach(c => {
    const b = document.createElement('button');
    b.className = 'sw';
    b.dataset.c = c.toUpperCase();
    b.style.background = c;
    b.title = c;
    b.addEventListener('click', async () => {
      setStyle(selected, { color: c });
      markDirty(); await render(); showType(selected);
    });
    grid.appendChild(b);
  });
  const cust = document.createElement('button');
  cust.className = 'sw custom';
  cust.title = 'Custom colour…';
  cust.addEventListener('click', () => $('ty-color').click());
  grid.appendChild(cust);
  $('ty-fx').innerHTML = '<option value="">no effect</option>'
    + Object.keys(fxParams).map(k => `<option value="${k}">${k}</option>`).join('');
  $('ty-font').innerHTML = '<option value="">font</option>'
    + Object.keys(fonts).sort().map(f => `<option value="${f}">${f}</option>`).join('');
  wireType();
  document.querySelectorAll('#zoom button').forEach(x =>
    x.classList.toggle('on', x.dataset.z === zoomChoice));
  $('guides').classList.toggle('on', guidesOn);
  await restoreCachedDraft();   // adopt this browser's unsaved edits before the first paint
  await render();
  if (!local) $('share').disabled = $('publish').disabled = false;
  // Buttons start disabled in the HTML and only markDirty() flips them — run
  // it once now so a resumed draft's Discard is live before the first edit.
  markDirty();
  // detectLocal ran before the renders that overwrite the status line; say it
  // again now that the page is settled.
  if (local) $('stat').textContent = 'live — edits here and from Claude land in the same files';
  else if (cachedRestored) $('stat').textContent =
    'restored unsaved edits from this browser — Save to keep them, or Discard to drop them';
}

// ---------------------------------------------------------------- live mode
// Served by tools/serve.py, the editor is LOCAL-FIRST: the files on disk are
// the truth. Save writes them and pushes (git, not the GitHub API), and a live
// stream tells us when the files changed underneath us — because you asked
// Claude to edit them. We adopt that change and keep whatever you were editing,
// as long as the two are different files. Same file, both edited: you choose.
let local = false;

let liveVer = -1;

async function detectLocal() {
  try {
    const r = await fetch('/__ping', { cache: 'no-store' });
    local = r.ok;
    if (r.ok) { try { liveVer = (await r.json()).v; } catch (e) {} }
  } catch (e) { local = false; }
  if (!local) return;
  // Local mode is the dev loop: files on disk are the truth, git pushes them.
  // Draft branches and PRs belong to the hosted editor, so those verbs hide.
  $('share').hidden = $('publish').hidden = true;
  $('save').textContent = 'Save';
  $('title').textContent = M.id + ' · live';
  $('stat').textContent = 'live — edits here and from Claude land in the same files';
  // Adopt a rebuild the moment the version moves. Two ways see it, because one
  // failing silently is exactly the bug this had: the event stream is instant
  // when the browser keeps it open, and a 1.5s poll catches it when the stream
  // drops (a proxy, a sleep, a browser that stalls EventSource). Both funnel
  // through onBump, which acts ONLY on a real version change, so they never
  // double-fire.
  const onBump = async (v, err) => {
    if (err) { $('stat').textContent = 'build failed on disk — see the terminal'; return; }
    if (v === liveVer) return;
    liveVer = v;
    await pullFromDisk();
  };
  try {
    const es = new EventSource('/__events');
    es.onmessage = ev => {
      let d = {}; try { d = JSON.parse(ev.data || '{}'); } catch (e) {}
      onBump(d.v, d.error);
    };
  } catch (e) { /* no EventSource: the poll below still works */ }
  setInterval(async () => {
    try {
      const d = await (await fetch('/__ping', { cache: 'no-store' })).json();
      onBump(d.v);
    } catch (e) { /* server stopped; leave the last render up */ }
  }, 1500);
}

let pulling = false;

/** Adopt a change Claude (or your text editor) made on disk. Prose and layout
 *  are separate files, so a change to one is folded in while your unsaved edits
 *  to the OTHER stay put. Only a genuine same-file overlap asks you to choose. */
async function pullFromDisk() {
  if (editing || pulling) return;      // never yank the textarea out mid-edit,
  pulling = true;                      // and never let two pulls race a render
  try {
    await _pull();
  } finally { pulling = false; }
}

async function _pull() {
  let freshSrc = original, freshLayout = layoutOrig;
  try {
    [freshSrc, freshLayout] = await Promise.all([
      get(withBase('engine/' + M.content)),
      M.layout ? get(withBase('engine/' + M.layout)) : Promise.resolve('{}'),
    ]);
  } catch (e) { return; }
  let took = false, clash = false;
  if (freshSrc !== original) {
    if (source === original) { source = original = freshSrc; took = true; }
    else clash = true;
  }
  if (M.layout && freshLayout !== layoutOrig) {
    const mineChanged = JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
    if (!mineChanged) { layoutOrig = freshLayout; layout = JSON.parse(freshLayout || '{}');
      layout.positions = layout.positions || {}; layout.shapes = layout.shapes || []; took = true; }
    else clash = true;
  }
  if (took) { markDirty(); await render(); $('stat').textContent = 'updated from disk'; }
  if (clash) {
    $('stat').textContent = 'Claude changed the same thing you have unsaved — '
      + 'Discard to take the disk version, or Save to keep yours';
    $('stat').style.color = '#F2B8A8';
    setTimeout(() => { $('stat').style.color = ''; }, 6000);
  }
}

async function render() {
  $('stat').textContent = 'rendering…';
  py.globals.set('SRC', source);
  py.globals.set('LAYOUT', JSON.stringify(layout, null, 2));
  py.globals.set('CONTENT', M.content);
  py.globals.set('LAYOUT_PATH', M.layout || '');
  py.globals.set('RENDER', M.render);
  py.globals.set('OUT', M.out);
  let html;
  try {
    html = await py.runPythonAsync(`
import sys, os, io, runpy, contextlib
os.environ['DOCSYNC_EDIT'] = '1'            # stamp data-slot on prose blocks
open('/repo/' + CONTENT, 'w').write(SRC)
if LAYOUT_PATH: open('/repo/' + LAYOUT_PATH, 'w').write(LAYOUT)
for m in [m for m in sys.modules if m.startswith('docsync')]: del sys.modules[m]
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/' + RENDER, run_name='__main__')
open('/repo/' + OUT).read()
`);
  } catch (e) {
    // A validation failure is the guardrail working — show it and keep the
    // source, so the edit that broke it can be fixed rather than lost.
    const tail = String(e.message || e).split('\n').filter(l => l.trim()).slice(-6).join('\n');
    $('out').srcdoc = `<pre style="color:#b00020;white-space:pre-wrap;padding:24px;
      font:12px/1.5 ui-monospace,monospace">This draft does not build:\n\n${
      tail.replace(/&/g,'&amp;').replace(/</g,'&lt;')}\n\nYour text is still here — fix it and it recovers.</pre>`;
    $('stat').textContent = 'draft does not build';
    return;
  }
  // Keep the reader's place. Assigning srcdoc reloads the iframe, which
  // scrolls to the top — after every edit, on a twelve-page report, that alone
  // made the thing miserable to use.
  const prev = $('out').contentDocument;
  const keep = prev && prev.scrollingElement ? prev.scrollingElement.scrollTop : scrollTopWas;
  scrollTopWas = keep;
  // onload before srcdoc: assigning srcdoc starts the load, so wiring the
  // handler afterwards is a race the editor loses by silently going inert.
  $('out').onload = () => {
    wire();
    const se = $('out').contentDocument.scrollingElement;
    if (se) se.scrollTop = scrollTopWas;
  };
  // srcdoc resolves relative URLs (assets/…) against THIS page. Right for the
  // default project, whose deploy puts assets beside the editor; a switched
  // project's assets live under its own base, so point the document there.
  if (PBASE) html = html.replace(/<head>/i, `<head><base href="${withBase('')}">`);
  $('out').srcdoc = html;
  $('stat').textContent = dirty ? 'unsaved changes'
                                : 'click selects and drags · double-click edits text';
}

function wire() {
  const d = $('out').contentDocument;
  showLocalImages(d);
  dragify(d);
  contextify(d);
  wireCells(d);
  keysFor(d);
  wireMarkState(d);            // chrome B/I state tracks the edit selection
  applyZoom();
  reportFit(d);
  paintSel(d);                 // the selection is ids, so it survives a render
  const meta = d.getElementById('ds-pagemeta');
  if (meta) { try { designedPages = JSON.parse(meta.textContent); } catch (e) {} }
  railRender();
  drawGuideLayer(d);           // guides are editor-drawn, so redraw each render
  // Deferred a tick: wire() runs before the scroll restore, and the panel
  // keys on the page in VIEW — rebuilt too early it shows the cover's stack.
  if (!$('layerspop').hidden) setTimeout(layersRender, 0);
  // Empty page is the marquee's surface; a travel-less marquee is click-away.
  // But "empty" is the DOM's opinion, not the eye's: a transparent container
  // above a text box, or prose above a z:-1 shape, swallows the mousedown for
  // a thing you can plainly see. So before the marquee gets it, the click is
  // hit-tested against the placed elements by geometry, and the topmost one
  // under the point takes the gesture — select and drag, like any direct hit.
  d.querySelectorAll('section.page').forEach(pg => {
    pg.addEventListener('mousedown', e => {
      if (e.button !== 0 || editing) return;
      if (e.target.closest('[data-el], [data-shape], [data-slot], a, button, input, '
