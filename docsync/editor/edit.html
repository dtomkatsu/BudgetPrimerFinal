 * measure 9.08in and moved things a quarter further than the cursor.
 */
const zoomOf = page => (page.getBoundingClientRect().width / page.offsetWidth) || 1;

const inchBox = (el, page) => {
  const r = el.getBoundingClientRect(), pr = page.getBoundingClientRect();
  const px = DPI * zoomOf(page);
  return { x: (r.left - pr.left) / px, y: (r.top - pr.top) / px,
           w: r.width / px, h: r.height / px };
};

/**
 * Lines worth snapping to: the page's own geometry, and the edges and centres
 * of everything else on the page. Alignment you can feel is the difference
 * between arranging and fiddling.
 */
function snapLines(d, page, moving) {
  const skip = Array.isArray(moving) ? moving : [moving];   // a group skips itself
  const xs = [0, MARGIN_IN, PAGE_W_IN / 2, PAGE_W_IN - MARGIN_IN, PAGE_W_IN];
  const ys = [0, TOP_IN, PAGE_H_IN / 2, PAGE_H_IN - 0.9, PAGE_H_IN];
  page.querySelectorAll('[data-el], [data-shape], h1, h2.sub, .card, .branch, .photo')
      .forEach(el => {
    if (skip.some(m => el === m || m.contains(el) || el.contains(m))) return;
    const b = inchBox(el, page);
    if (b.w < 0.1 || b.h < 0.1) return;
    xs.push(b.x, b.x + b.w / 2, b.x + b.w);
    ys.push(b.y, b.y + b.h / 2, b.y + b.h);
  });
  return { xs, ys };
}

/** Nearest line within the threshold, given the three edges we align on. */
function snapAxis(lines, lo, size) {
  let best = null;
  for (const probe of [[lo, 0], [lo + size / 2, size / 2], [lo + size, size]]) {
    for (const line of lines) {
      const d = Math.abs(probe[0] - line);
      if (d <= SNAP_IN && (!best || d < best.d)) best = { d, at: line - probe[1], line };
    }
  }
  return best;
}

function showGuides(d, page, vx, hy) {
  d.querySelectorAll('.ds-guide').forEach(g => g.remove());
  const add = (cls, style) => {
    const g = d.createElement('div');
    g.className = 'ds-guide ' + cls;
    g.style.cssText = style;
    page.appendChild(g);
  };
  if (vx !== null) add('v', `left:${vx}in;top:0;height:${PAGE_H_IN}in`);
  if (hy !== null) add('h', `top:${hy}in;left:0;width:${PAGE_W_IN}in`);
}

const clearGuides = d => d.querySelectorAll('.ds-guide').forEach(g => g.remove());

// ---- history: every move is undoable, or it is not safe to experiment ----
const past = [], future = [];
const snapshot = () => JSON.stringify({ source, layout });
function pushHistory() {
  past.push(snapshot());
  if (past.length > 60) past.shift();
  future.length = 0;
}
async function restore(json) {
  const st = JSON.parse(json);
  source = st.source;
  layout = st.layout;
  markDirty();
  await render();
}
async function undo() {
  if (!past.length) { $('stat').textContent = 'nothing to undo'; return; }
  future.push(snapshot());
  await restore(past.pop());
  $('stat').textContent = 'undone';
}
async function redo() {
  if (!future.length) { $('stat').textContent = 'nothing to redo'; return; }
  past.push(snapshot());
  await restore(future.pop());
  $('stat').textContent = 'redone';
}

function dragify(d) {
  d.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    // Reachable without a mouse: focus it, Space to pick up, arrows to move.
    el.setAttribute('tabindex', '0');
    el.addEventListener('mousedown', e => {
      if (e.target.closest && e.target.closest('[data-slot]')) return;
      if (editing || e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      const id = idOf(el);
      // Shift toggles membership and nothing moves — building a selection
      // should never scatter it.
      if (e.shiftKey) {
        selIds.has(id) ? selIds.delete(id) : selIds.add(id);
        paintSel(d);
        return;
      }
      // Clicking outside the selection replaces it; clicking inside keeps it,
      // so the drag that follows moves the whole group.
      if (!selIds.has(id)) setSel(d, [id]);
      if (isLocked(id)) {
        $('stat').textContent = `${id} is locked — unlock it to move it`;
        return;
      }
      startDrag(d, el, e);
    });
    // A text box has no [data-slot] inside it — its words live in layout.json —
    // so it needs its own way in. Double-click, since a single click is the
    // drag it shares with every other placed thing.
    if ((el.dataset.el || '').startsWith('text.'))
      el.addEventListener('dblclick', e => { e.preventDefault(); editBox(d, el); });
    el.addEventListener('keydown', e => keyDrag(d, el, e));
    // Focus is selection's keyboard route; the handles ride the selection.
    el.addEventListener('focus', () => { if (!selIds.has(idOf(el))) setSel(d, [idOf(el)]); });
  });
}

/** Shared by pointer and keyboard: place the element, snapping as it goes. */
function placer(d, el, page) {
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const bx = boxOf(id);              // a text box keeps its own x/y/w
  // Measure the box, but trust a position we already recorded over a fresh
  // reading of it: rects carry rounding, and the lift's scale nudges them. Take
  // the measurement as truth and picking a box up without moving it walks it a
  // few hundredths of an inch — every time.
  const measured = inchBox(el, page);
  const stored = shapeId ? layout.shapes.find(s => s.id === shapeId)
                         : (bx || layout.positions[id]);
  const box = stored && stored.x !== undefined
    ? { ...measured, x: +stored.x, y: +stored.y }
    : measured;
  const heldFlow = !shapeId &&
    d.defaultView.getComputedStyle(el).position === 'static';
  let spacer = null;

  // Going absolute drops the element out of the flow and everything below it
  // rushes up into the gap. The renderer reserves that height on the next
  // build, but a drop no longer triggers one — so the gap is held here, in the
  // same frame the element leaves the flow, or the page lurches under you.
  const holdPlace = () => {
    if (!heldFlow || spacer) return;
    spacer = d.createElement('div');
    spacer.className = 'ds-spacer ds-ghost';
    spacer.style.height = box.h.toFixed(2) + 'in';
    spacer.setAttribute('aria-hidden', 'true');
    el.parentNode.insertBefore(spacer, el);
  };

  const lines = snapLines(d, page, el);

  // One rule for the width, used by the drag AND by what gets saved — they had
  // two, and the drag's was "none". An absolutely positioned block with no
  // width shrink-to-fits to its preferred width, which for a card of prose is
  // its longest line: drag it and it stretches into a strip. Pin the width it
  // had. Skip only things genuinely wider than the page (the cover lockup is
  // full-bleed on purpose); pinning that would shove it off the edge.
  const pinW = () => {
    const prev = (shapeId ? null : layout.positions[id]) || {};
    return prev.w ?? (box.w <= PAGE_W_IN ? +box.w.toFixed(2) : undefined);
  };

  const put = (x, y, snap = true) => {
    let vx = null, hy = null;
    if (snap) {
      const sx = snapAxis(lines.xs, x, box.w);
      const sy = snapAxis(lines.ys, y, box.h);
      if (sx) { x = +sx.at.toFixed(3); vx = sx.line; }
      if (sy) { y = +sy.at.toFixed(3); hy = sy.line; }
    }
    // Clamp inside the page: .page is overflow:hidden, so "off the edge" is
    // not bleed, it is gone. Better to refuse the pixel than fail the build.
    x = Math.min(Math.max(x, 0), PAGE_W_IN - Math.min(box.w, PAGE_W_IN));
    y = Math.min(Math.max(y, 0), PAGE_H_IN - Math.min(box.h, PAGE_H_IN));
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.x = +x.toFixed(2); sh.y = +y.toFixed(2); paintShape(d, shapeId); }
    } else if (bx) {
      bx.x = +x.toFixed(2); bx.y = +y.toFixed(2);
      el.style.left = x.toFixed(2) + 'in';
      el.style.top = y.toFixed(2) + 'in';
    } else {
      holdPlace();
      el.style.position = 'absolute';
      el.style.left = x.toFixed(2) + 'in';
      el.style.top = y.toFixed(2) + 'in';
      const w = pinW();
      if (w) el.style.width = w + 'in';     // what the renderer will do, now
    }
    showGuides(d, page, vx, hy);
    $('stat').textContent = `${id} → ${x.toFixed(2)}in, ${y.toFixed(2)}in`
                          + (vx !== null || hy !== null ? '  · aligned' : '');
    return { x, y };
  };

  const commit = ({ x, y }) => {
    if (bx) { clearGuides(d); markDirty(); return; }   // already written above
    if (!shapeId) {
      const prev = layout.positions[id] || {};
      const w = pinW();
      const reserve = prev.reserve ?? (heldFlow ? +box.h.toFixed(2) : undefined);
      layout.positions[id] = { ...prev, x: +x.toFixed(2), y: +y.toFixed(2),
                              ...(w ? { w } : {}),
                              ...(reserve ? { reserve } : {}) };
    }
    clearGuides(d);
    if (spacer) spacer.classList.remove('ds-ghost');
    markDirty();
  };

  return { id, box, put, commit };
}

/** Alt-drag duplicates: clone the data AND the node so the copy is draggable
 *  in the same gesture, before any re-render exists to build it properly. */
function altClone(d, members, page) {
  if (!members.every(m => m.dataset.shape || (m.dataset.el || '').startsWith('text.')))
    return null;
  return members.map(m => {
    if (m.dataset.shape) {
      const sh = layout.shapes.find(s => s.id === m.dataset.shape);
      const nid = freeShapeId(sh.kind);
      layout.shapes.push({ ...sh, id: nid });
      const node = m.cloneNode(true);
      node.setAttribute('data-shape', nid);
      m.parentNode.appendChild(node);
      return node;
    }
    const b = boxOf(m.dataset.el);
    const nid = freeBoxId();
    boxes().push({ ...b, id: nid });
    const node = m.cloneNode(true);
    node.setAttribute('data-el', 'text.' + nid);
    page.appendChild(node);
    return node;
  });
}

function startDrag(d, el, e0) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  const rect = el.getBoundingClientRect();
  // A hidden or unlaid-out pane reports every rect as zero, and the drag would
  // then write nonsense inches into layout.json. Refuse rather than corrupt.
  if (!pr.width || (!rect.width && !el.dataset.shape)) {
    $('stat').textContent = 'cannot move that yet — the page has no layout';
    return;
  }
  // Squeezed below print width the page has REFLOWED (max-width:100%): every
  // measurement describes a layout the PDF will never have. applyZoom pins
  // the width, so this only trips if someone forces 100% in a narrow pane.
  if (page.offsetWidth < PAGE_W_IN * DPI * 0.98) {
    $('stat').textContent = 'the page is squeezed below print width — use Fit zoom to move things';
    return;
  }
  pushHistory();
  // Dragging a selected element moves every selected element on this page;
  // anything locked stays put. A fresh element drags alone.
  let members = selIds.size > 1 && selIds.has(idOf(el))
    ? selEls(d).filter(m => (m.closest('section.page')) === page && !isLocked(idOf(m)))
    : [el];
  if (!members.length) members = [el];
  let cloned = false;
  if (e0.altKey) {
    const copies = altClone(d, members, page);
    if (copies) {
      members = copies;
      cloned = true;
      setSel(d, copies.map(idOf));
    }
  }
  const Ps = members.map(m => placer(d, m, page));
  const px = DPI * zoomOf(page);
  const grab = { x: e0.clientX, y: e0.clientY };
  const starts = Ps.map(P => ({ x: P.box.x, y: P.box.y }));
  // The group's snap box, and each member's offset within it.
  const group = { x: Math.min(...starts.map(s => s.x)),
                  y: Math.min(...starts.map(s => s.y)) };
  group.w = Math.max(...Ps.map((P, i) => starts[i].x + P.box.w)) - group.x;
  group.h = Math.max(...Ps.map((P, i) => starts[i].y + P.box.h)) - group.y;
  const glines = members.length > 1 ? snapLines(d, page, members) : null;
  let at = starts.map(s => ({ ...s }));
  let moved = false;

  members.forEach(m => m.classList.add('ds-lifted'));
  d.body.classList.add('ds-grabbing');
  hideHandles(d);

  // Applied straight from the event, not via requestAnimationFrame. Browsers
  // already coalesce mousemove to the frame rate, the snap lines are computed
  // once at pick-up, and put() only writes a couple of styles — so rAF would
  // buy nothing and cost a frame of lag. It also stops firing in a hidden
  // document, which turns a drag into a silent no-op.
  const move = e => {
    const dx = (e.clientX - grab.x) / px, dy = (e.clientY - grab.y) / px;
    if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) moved = true;
    if (members.length === 1) {
      at[0] = Ps[0].put(starts[0].x + dx, starts[0].y + dy);
      return;
    }
    // Group: snap and clamp the GROUP box, then place members by their offsets.
    let gx = group.x + dx, gy = group.y + dy, vx = null, hy = null;
    const sx = snapAxis(glines.xs, gx, group.w), sy = snapAxis(glines.ys, gy, group.h);
    if (sx) { gx = +sx.at.toFixed(3); vx = sx.line; }
    if (sy) { gy = +sy.at.toFixed(3); hy = sy.line; }
    gx = Math.min(Math.max(gx, 0), PAGE_W_IN - Math.min(group.w, PAGE_W_IN));
    gy = Math.min(Math.max(gy, 0), PAGE_H_IN - Math.min(group.h, PAGE_H_IN));
    Ps.forEach((P, i) => {
      at[i] = P.put(starts[i].x - group.x + gx, starts[i].y - group.y + gy, false);
    });
    showGuides(d, page, vx, hy);
    $('stat').textContent = `${members.length} elements → ${gx.toFixed(2)}in, ${gy.toFixed(2)}in`;
  };
  const up = async () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    members.forEach(m => {
      m.classList.remove('ds-lifted');
      m.classList.add('ds-settling');      // ~120ms ease into the snapped spot
    });
    d.defaultView.setTimeout(() =>
      members.forEach(m => m.classList.remove('ds-settling')), 160);
    d.body.classList.remove('ds-grabbing');
    // A click that never travelled is a selection, not a move — committing it
    // would write a position override that changes nothing and dirty the file.
    if (!moved && !cloned) { past.pop(); clearGuides(d); paintSel(d); return; }
    Ps.forEach((P, i) => P.commit(at[i]));
    if (cloned) await render();            // clones need real, wired nodes
    else paintSel(d);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Keyboard drag: focus, Space to pick up, arrows to move, Space to drop. */
const held = new WeakMap();
function keyDrag(d, el, e) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const picked = held.get(el);

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!picked) {
      pushHistory();
      const P = placer(d, el, page);
      held.set(el, { P, at: { x: P.box.x, y: P.box.y } });
      el.classList.add('ds-lifted');
      $('stat').textContent = `${P.id} picked up — arrows to move, Space to drop, Esc to cancel`;
    } else {
      picked.P.commit(picked.at);
      el.classList.remove('ds-lifted');
      held.delete(el);
      $('stat').textContent = 'dropped';
    }
    return;
  }
  if (!picked) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    el.classList.remove('ds-lifted');
    held.delete(el);
    clearGuides(d);
    undo();                                  // put it back where it was
    return;
  }
  const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
  const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
               ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
  if (!d4) return;
  e.preventDefault();
  // Arrows are a deliberate placement, so they do not snap out from under you.
  picked.at = picked.P.put(picked.at.x + d4[0], picked.at.y + d4[1], false);
}

/** Live-paint a shape's full geometry without a re-render, so drags and
 *  resizes stay smooth. All of it, not just x/y: a resized rect that does not
 *  grow until the next render looks like a resize that did not take. */
function paintShape(d, id) {
  const sh = layout.shapes.find(s => s.id === id);
  const node = d.querySelector(`[data-shape="${id}"]`);
  if (!sh || !node) return;
  if (sh.kind === 'rect') {
    node.setAttribute('x', sh.x); node.setAttribute('y', sh.y);
    node.setAttribute('width', sh.w); node.setAttribute('height', sh.h);
  } else if (sh.kind === 'ellipse') {
    node.setAttribute('cx', sh.x + sh.w / 2); node.setAttribute('cy', sh.y + sh.h / 2);
    node.setAttribute('rx', sh.w / 2); node.setAttribute('ry', sh.h / 2);
  } else {
    node.setAttribute('x1', sh.x); node.setAttribute('y1', sh.y);
    node.setAttribute('x2', sh.x + sh.w); node.setAttribute('y2', sh.y + sh.h);
  }
  if (sh.rot) paintRot(d, node);         // the pivot moved with the box
}

function markDirty() {
  dirty = source !== original
       || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
  $('save').disabled = $('revert').disabled = !dirty;
  $('save').classList.toggle('dirty', dirty);
}

$('shape').onclick = () => togglePop($('shapepop'), $('shape'));
document.querySelectorAll('#shapepop .shp').forEach(b => b.addEventListener('click', async () => {
  $('shapepop').hidden = true;
  const kind = b.dataset.k;
  const page = visiblePage();
  pushHistory();
  const id = freeShapeId(kind);
  layout.shapes.push({ id, page, kind, x: 1, y: 1, w: 2, h: kind === 'line' ? 0 : 1,
                       fill: kind === 'line' ? 'none' : '#E8EDE6',
                       stroke: kind === 'line' ? '#52796F' : 'none',
                       sw: 0.02, z: -1 });
  setSel($('out').contentDocument, [id]);
  markDirty();
  await render();
  $('stat').textContent = `${id} on page ${page} — drag to place, right-click to recolour`;
}));

addEventListener('keydown', e => {
  const t = e.target;
  if (t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    e.shiftKey ? redo() : undo();
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') {
    e.preventDefault();
    duplicateSel($('out').contentDocument);
  }
  if (e.key === 'Escape' && selIds.size) clearSel($('out').contentDocument);
});

async function boot() {
  M = JSON.parse(await get('engine/manifest.json'));
  REPO = M.repo || '';
  PAGE_W_IN = M.page.w; PAGE_H_IN = M.page.h;
  MARGIN_IN = M.margins.side; TOP_IN = M.margins.top;
  $('title').textContent = M.id;

  const urls = Object.keys(M.files);
  const [pyodide, ...files] = await Promise.all([loadPyodide(), ...urls.map(get)]);
  py = pyodide;
  // The renderer is written for a repo checkout, so rebuild one in Pyodide's FS
  // from the paths the manifest names — no directory list to keep in step.
  py.FS.mkdirTree('/repo');
  urls.forEach((u, i) => {
    const path = '/repo/' + M.files[u];
    py.FS.mkdirTree(path.slice(0, path.lastIndexOf('/')));
    py.FS.writeFile(path, files[i]);
  });
  py.FS.mkdirTree('/repo/' + M.out.slice(0, M.out.lastIndexOf('/')));
  source = original = files[urls.indexOf('engine/' + M.content)];
  if (M.layout) {
    layoutOrig = files[urls.indexOf('engine/' + M.layout)];
    layout = JSON.parse(layoutOrig || '{}');
  } else {
    layoutOrig = '{}'; layout = {};
  }
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  // Put the rebuilt checkout on the path once, here, rather than inside the
  // render call — the type row asks the engine for its font list before
  // anything has rendered.
  py.runPython("import sys\nsys.path.insert(0, '/repo')");
  fonts = JSON.parse(py.runPython(
    'import json\nfrom docsync.layout import FONTS\njson.dumps(FONTS)'));
  fxParams = JSON.parse(py.runPython(
    'import json\nfrom docsync.layout import EFFECT_PARAMS\njson.dumps(EFFECT_PARAMS)'));
  // The text-colour popover: the report's own palette first, then the wheel.
  const grid = $('ty-swgrid');
  (M.palette || []).forEach(c => {
    const b = document.createElement('button');
    b.className = 'sw';
    b.dataset.c = c.toUpperCase();
    b.style.background = c;
    b.title = c;
    b.addEventListener('click', async () => {
      setStyle(selected, { color: c });
      markDirty(); await render(); showType(selected);
    });
    grid.appendChild(b);
  });
  const cust = document.createElement('button');
  cust.className = 'sw custom';
  cust.title = 'Custom colour…';
  cust.addEventListener('click', () => $('ty-color').click());
  grid.appendChild(cust);
  $('ty-fx').innerHTML = '<option value="">no effect</option>'
    + Object.keys(fxParams).map(k => `<option value="${k}">${k}</option>`).join('');
  $('ty-font').innerHTML = '<option value="">font</option>'
    + Object.keys(fonts).sort().map(f => `<option value="${f}">${f}</option>`).join('');
  wireType();
  document.querySelectorAll('#zoom button').forEach(x =>
    x.classList.toggle('on', x.dataset.z === zoomChoice));
  await render();
}

async function render() {
  $('stat').textContent = 'rendering…';
  py.globals.set('SRC', source);
  py.globals.set('LAYOUT', JSON.stringify(layout, null, 2));
  py.globals.set('CONTENT', M.content);
  py.globals.set('LAYOUT_PATH', M.layout || '');
  py.globals.set('RENDER', M.render);
  py.globals.set('OUT', M.out);
  let html;
  try {
    html = await py.runPythonAsync(`
import sys, os, io, runpy, contextlib
os.environ['DOCSYNC_EDIT'] = '1'            # stamp data-slot on prose blocks
open('/repo/' + CONTENT, 'w').write(SRC)
if LAYOUT_PATH: open('/repo/' + LAYOUT_PATH, 'w').write(LAYOUT)
for m in [m for m in sys.modules if m.startswith('docsync')]: del sys.modules[m]
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/' + RENDER, run_name='__main__')
open('/repo/' + OUT).read()
`);
  } catch (e) {
    // A validation failure is the guardrail working — show it and keep the
    // source, so the edit that broke it can be fixed rather than lost.
    const tail = String(e.message || e).split('\n').filter(l => l.trim()).slice(-6).join('\n');
    $('out').srcdoc = `<pre style="color:#b00020;white-space:pre-wrap;padding:24px;
      font:12px/1.5 ui-monospace,monospace">This draft does not build:\n\n${
      tail.replace(/&/g,'&amp;').replace(/</g,'&lt;')}\n\nYour text is still here — fix it and it recovers.</pre>`;
    $('stat').textContent = 'draft does not build';
    return;
  }
  // Keep the reader's place. Assigning srcdoc reloads the iframe, which
  // scrolls to the top — after every edit, on a twelve-page report, that alone
  // made the thing miserable to use.
  const prev = $('out').contentDocument;
  const keep = prev && prev.scrollingElement ? prev.scrollingElement.scrollTop : scrollTopWas;
  scrollTopWas = keep;
  // onload before srcdoc: assigning srcdoc starts the load, so wiring the
  // handler afterwards is a race the editor loses by silently going inert.
  $('out').onload = () => {
    wire();
    const se = $('out').contentDocument.scrollingElement;
    if (se) se.scrollTop = scrollTopWas;
  };
  $('out').srcdoc = html;
  $('stat').textContent = dirty ? 'unsaved changes' : 'click any paragraph to edit it';
}

function wire() {

  keysFor(d);

  // Empty page is the marquee's surface; a travel-less marquee is click-away.
  d.querySelectorAll('section.page').forEach(pg => {
    pg.addEventListener('mousedown', e => {
      if (e.button !== 0 || editing) return;
      if (e.target.closest('[data-el], [data-shape], [data-slot], a, button, input, '
        + 'select, textarea, summary, img, .ds-menu, .ds-handles, .ds-edit')) return;

    .ds-tools-key { color:#8B9A90; margin-left:auto; font:10px ui-monospace,monospace; }
    .ds-cite { flex-basis:100%; margin-top:4px; }
    .ds-cite select { font:11px system-ui; padding:3px; max-width:100%; }
    /* The cursor is the whole affordance: a box says "grab me", the text
       inside it says "type in me". No mode to be in or forget you are in. */
    [data-el], [data-shape] { cursor:grab; }
    [data-el]:hover { outline:1px dashed #95B7A2; outline-offset:3px; }
    [data-el] [data-slot] { cursor:text; }
    [data-shape]:hover { outline:2px solid #6B9E78; }
    svg.shape-layer { pointer-events:none; }
    svg.shape-layer [data-shape] { pointer-events:auto; }
    /* Selected: a steady ring. Distinct from hover's dashed suggestion and

    .ds-sel { outline:2px solid #6B9E78 !important; outline-offset:2px; }
    /* outline is not a thing SVG children have; a glow rings a shape without

    svg.shape-layer .ds-sel { outline:none;
       filter:drop-shadow(0 0 .02in #6B9E78) drop-shadow(0 0 .01in #6B9E78); }
    .ds-marquee { position:absolute; z-index:9998; pointer-events:none;

    body.ds-grabbing [data-slot] { cursor:grabbing !important; }`;
  d.head.appendChild(css);

  const seen = new Set();
  d.querySelectorAll('[data-slot]').forEach(el => {
    const key = el.dataset.slot;
    if (seen.has(key)) return;              // a slot can render several <p>s
    seen.add(key);
    el.addEventListener('click', () => { showType(key); edit(d, key); });
  });
}

// The [[sources]] slot is the citation list: "[id]: text — url" per line. A
// footnote is a [^id] ref in prose; the renderer numbers them by first
// appearance, so inserting one never renumbers anything by hand.
const sourceIds = () => [...readSlot('sources').matchAll(/^\[([^\]]+)\]:/gm)].map(m => m[1]);
const sourceText = id => (readSlot('sources').match(
  new RegExp(`^\\[${id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]:\\s*(.*)$`, 'm')) || [,''])[1];

function addSource(id, text, url) {
  const line = `[${id}]: ${text} — ${url}`;
  writeSlot('sources', readSlot('sources') + '\n' + line);
}

function spliceAt(el, before, after = '') {
  const s = el.selectionStart ?? el.value.length;
  const e = el.selectionEnd ?? el.value.length;
  const sel = el.value.slice(s, e);
  el.value = el.value.slice(0, s) + before + sel + after + el.value.slice(e);
  const caret = s + before.length + sel.length + after.length;
  el.setSelectionRange(caret, caret);
  el.focus();
}

function edit(d, key) {

  const blocks = [...d.querySelectorAll(`[data-slot="${key}"]`)];
  if (!blocks.length || editing) return;
  editing = true;

  const inline = blocks[0].dataset.inline === '1';
  const ta = d.createElement(inline ? 'input' : 'textarea');
  if (inline) ta.type = 'text';
  ta.className = inline ? 'ds-edit ds-inline' : 'ds-edit';
  ta.value = readSlot(key);

  let hint = null;
  if (!inline) {
    hint = d.createElement('p');
    hint.className = 'ds-hint';
    hint.textContent = `${key} — **bold**, *italic*, [text](url). Blank line = new paragraph. `
                     + `Click away to render, Esc to cancel.`;
  }

  const tools = buildTools(d, ta, key);

  blocks[0].replaceWith(ta);
  ta.after(tools);
  if (hint) tools.after(hint);
  blocks.slice(1).forEach(b => b.remove());
  // Size to the text only once layout has settled: measured any earlier the
  // box is still zero-width, so the content "wraps" into thousands of pixels.
  if (!inline) {
    const fit = () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(Math.max(ta.scrollHeight + 4, 64), 460) + 'px';
    };
    requestAnimationFrame(fit);
    ta.addEventListener('input', fit);
  }
  ta.focus();
  ta.select?.();

  const finish = async (keep) => {
    if (ta.dataset.done) return;
    ta.dataset.done = '1';
    editing = false;
    tools.remove();
    if (keep && ta.value.trim() !== readSlot(key)) {
      writeSlot(key, ta.value);
      dirty = source !== original || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
      $('save').disabled = $('revert').disabled = !dirty;
      $('save').classList.toggle('dirty', dirty);
    }
    await render();
  };
  ta.addEventListener('blur', () => finish(true));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'Enter' && inline) { e.preventDefault(); finish(true); }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, ta); }
  });
}

// --- persistence -----------------------------------------------------------
// The one credential: a fine-grained token, this repo only, Contents r/w. It
// lives in this browser and never leaves it except to call GitHub. Committing
// content.md is what rebuilds the site and pushes the same text to the doc.
async function gh(path, opts = {}) {
  const tok = localStorage.getItem('docsync-pat');
  const r = await fetch(`https://api.github.com/repos/${REPO}/${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json',
               ...(opts.headers || {}) },
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0, 160)}`);
  return r.json();
}

/**
 * Check a token before trusting it.
 *
 * The repo endpoint reports what THIS token may do, so "valid but read-only"
 * is caught at the moment it is pasted rather than after an edit is composed.
 */
async function verifyToken(tok) {
  let r;
  try {
    r = await fetch(`https://api.github.com/repos/${REPO}`, {
      headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json' },
    });
  } catch (e) {
    return 'could not reach GitHub: ' + e.message;
  }
  if (r.status === 401) return 'GitHub rejected that token (expired, or mistyped).';
  if (r.status === 404)
    return `that token cannot see ${REPO}. In the token's "Repository access", `
         + 'select this repository.';
  if (!r.ok) return `GitHub said ${r.status}.`;
  const j = await r.json();
  if (!j.permissions || !j.permissions.push)
    return 'that token can read but not write. Open it at '
         + 'github.com/settings/personal-access-tokens and set '
         + 'Permissions -> Repository permissions -> Contents -> Read and write '
         + '(Read-only is the default, and is what this looks like).';
  return '';
}

async function askToken() {
  const tok = localStorage.getItem('docsync-pat');
  if (tok) return tok;
  const entered = prompt('Paste a GitHub fine-grained token\n\n' +
    'github.com -> Settings -> Developer settings -> Fine-grained tokens\n' +
    `Repository access: only ${REPO}\n` +
    'Permissions -> Repository permissions -> Contents: Read and WRITE\n' +
    '(Contents defaults to no access; Read-only is not enough.)\n\n' +
    'Stored in this browser only.');
  if (!entered) return null;
  $('stat').textContent = 'checking the token…';
  const bad = await verifyToken(entered.trim());
  if (bad) {
    $('stat').textContent = 'token not usable: ' + bad;
    return null;                       // not stored — a bad token helps nobody
  }
  localStorage.setItem('docsync-pat', entered.trim());
  $('stat').textContent = 'token accepted';
  return entered.trim();
}

$('save').onclick = async () => {
  // Confirm, not block: prose has always been able to overflow a page and
  // nothing stopped it. Turning a pre-existing, permitted edit into a hard
  // refusal would be a surprise. Making it impossible to do BY ACCIDENT is the
  // whole job.
  if (lastFit.length) {
    const pages = [...new Set(lastFit.map(b => b.page))];
    if (!confirm(`${pages.length} page${pages.length > 1 ? 's' : ''} will be cut off in the `
               + `printed PDF (${pages.join(', ')}).\n\nSave anyway?`)) return;
  }
  if (!await askToken()) return;
  $('save').disabled = true;
  $('stat').textContent = 'saving…';
  try {
    // Prose and layout are separate files, so a text edit and a move are
    // separate commits — each reviewable on its own.
    const layoutText = JSON.stringify(layout, null, 2) + '\n';
    const writes = [];
    if (source !== original)
      writes.push([M.content, source, `${M.id}: edit prose from the draft editor`]);
    if (M.layout && layoutText !== layoutOrig)
      writes.push([M.layout, layoutText, `${M.id}: move layout from the draft editor`]);

    for (const [path, body, message] of writes) {
      const cur = await gh(`contents/${path}?ref=main`).catch(() => ({}));
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message,
          content: btoa(String.fromCharCode(...new TextEncoder().encode(body))),
          ...(cur.sha ? { sha: cur.sha } : {}), branch: 'main',
        }),
      });
    }
    original = source; layoutOrig = layoutText; dirty = false;
    $('revert').disabled = true;
    $('save').classList.remove('dirty');
    $('stat').textContent = 'saved — the site rebuilds and the doc updates in ~2 min';
  } catch (e) {
    // "Resource not accessible" means the token is valid but was minted
    // without write access — the default. Say the fix, not the status code.
    const m = String(e.message);
    const why = m.includes('not accessible')
      ? 'the token has no write access. github.com/settings/personal-access-tokens '
        + `-> your token -> Repository access: ${REPO} -> Permissions -> Contents: `
        + 'Read and write. Then press Save again.'
      : m.match(/401/) ? 'the token was rejected — it may be expired or mistyped.'
      : m;
    $('stat').textContent = 'save failed: ' + why;
    $('save').disabled = false;
    // Only discard on 401 (the token itself is bad). A 403 means the token is
    // fine but under-permissioned — discarding it just makes you paste the
    // same token again and get the same 403, forever.
    if (m.match(/401/)) localStorage.removeItem('docsync-pat');
  }
};

$('revert').onclick = async () => {
  if (!confirm('Discard your unsaved edits?')) return;
  source = original;
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  dirty = false;
  $('save').disabled = $('revert').disabled = true;
  $('save').classList.remove('dirty');
  await render();
};

addEventListener('beforeunload', e => { if (dirty) e.preventDefault(); });
boot().catch(e => { $('stat').textContent = 'failed to start: ' + e.message; });
</script>
</body>
</html>
