<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Budget Primer — draft preview</title>
<!--
  Renders the primer IN THE BROWSER from the Google Doc's current text, using
  the repo's real renderer via Pyodide — full fidelity (footnote renumbering,
  new [[extra.*]] sections, charts) seconds after an edit, with no deploy.

  The doc's text arrives through the Apps Script web-app feed (Deploy -> Web
  app in the doc's script; paste the /exec URL via "Set doc feed"), because
  Google's export endpoint sends no CORS headers. Without a feed URL it falls
  back to the committed content.md, i.e. the live site's text.

  This page writes nothing anywhere. The canonical site still ships only
  validated, committed content — this is a viewport, not a second pipeline.
-->
<style>
  html, body { margin: 0; height: 100%; font: 13px/1.4 system-ui, sans-serif; }
  #bar { display: flex; gap: 10px; align-items: center; padding: 7px 12px;
         background: #2F3E46; color: #E8EDE6; flex-wrap: wrap; }
  #bar b { color: #fff; letter-spacing: .3px; }
  #stat { flex: 1; min-width: 200px; opacity: .85; }
  #bar button { background: #6B9E78; color: #fff; border: 0; border-radius: 4px;
                padding: 4px 11px; cursor: pointer; font: inherit; }
  #bar button:hover { background: #52796F; }
  #bar label { display: flex; gap: 4px; align-items: center; cursor: pointer; }
  #out { border: 0; width: 100%; height: calc(100% - 36px); background: #EDF1EE; }
  .err { color: #b00020; white-space: pre-wrap; padding: 24px;
         font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div id="bar">
  <b>DRAFT PREVIEW</b>
  <span id="stat">loading the render engine…</span>
  <label><input type="checkbox" id="auto" checked> auto-refresh</label>
  <button id="go">Render now</button>
  <button id="cfg" title="Paste the Apps Script /exec URL that serves the doc">Set doc feed…</button>
</div>
<iframe id="out" title="rendered draft"></iframe>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
const RAW = 'https://raw.githubusercontent.com/dtomkatsu/BudgetPrimerFinal/main/';
// Everything the renderer touches, fetched fresh from main so this page never
// carries a copy of the code or data (no second pipeline to maintain).
const TREE = {
  'docsync/content.py':                     'text',
  'docsync/normalise.py':                   'text',
  'report2027/tools/render_report.py':      'text',
  'report2027/content.md':                  'text',
  'report2027/data/report_data.json':       'text',
  'report2027/manual/obligated_costs.json': 'text',
  'docs/js/departments_act175_fy2027.json': 'text',
  'docs/js/historical_trends.json':         'text',
};

const $ = id => document.getElementById(id);
const bust = u => u + (u.includes('?') ? '&' : '?') + 'cb=' + Date.now();
async function fetchText(u) {
  const r = await fetch(bust(u));
  if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + u);
  return r.text();
}

let py = null, lastHash = '', rendering = false;

async function boot() {
  const feedParam = new URLSearchParams(location.search).get('feed');
  if (feedParam) localStorage.setItem('docsync-feed', feedParam);

  const [pyodide, ...files] = await Promise.all([
    loadPyodide(),
    ...Object.keys(TREE).map(p => fetchText(RAW + p)),
  ]);
  py = pyodide;
  ['/repo/docsync', '/repo/report2027/tools', '/repo/report2027/data',
   '/repo/report2027/manual', '/repo/report2027/web', '/repo/docs/js',
  ].forEach(d => py.FS.mkdirTree(d));
  // A minimal package init: the real one pulls in the registry (pyyaml),
  // which the renderer never needs.
  py.FS.writeFile('/repo/docsync/__init__.py', '');
  Object.keys(TREE).forEach((p, i) => py.FS.writeFile('/repo/' + p, files[i]));
  py.FS.writeFile('/repo/committed.md', files[Object.keys(TREE).indexOf('report2027/content.md')]);

  $('stat').textContent = 'engine ready';
  await render(true);
  setInterval(() => { if ($('auto').checked) render(false); }, 20000);
}

async function render(force) {
  if (rendering || !py) return;
  const feed = localStorage.getItem('docsync-feed');
  let md, src;
  try {
    if (feed) { md = await fetchText(feed); src = 'the Google Doc'; }
    else { md = await fetchText(RAW + 'report2027/content.md');
           src = 'committed content.md (no doc feed set)'; }
  } catch (e) {
    $('stat').textContent = 'feed error: ' + e.message;
    return;
  }
  const hash = md.length + ':' + md.slice(0, 80) + md.slice(-80);
  if (!force && hash === lastHash) return;

  rendering = true;
  $('stat').textContent = 'rendering…';
  try {
    py.globals.set('DOC_MD', md);
    const html = await py.runPythonAsync(`
import sys, io, runpy, contextlib
sys.path.insert(0, '/repo') if '/repo' not in sys.path else None
from docsync.normalise import normalise, leading_comment

header = leading_comment(open('/repo/committed.md').read())
open('/repo/report2027/content.md', 'w').write(normalise(DOC_MD, header))
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/report2027/tools/render_report.py', run_name='__main__')
open('/repo/report2027/web/index.html').read()
`);
    lastHash = hash;
    $('out').srcdoc = html;
    $('stat').textContent = 'rendered from ' + src + ' · ' +
      new Date().toLocaleTimeString();
  } catch (e) {
    // A validation failure here is the guardrail WORKING: the editor sees
    // "missing [[key]]" seconds after breaking it, before anything ships.
    const msg = String(e.message || e);
    const tail = msg.split('\n').filter(l => l.trim()).slice(-8).join('\n');
    $('out').srcdoc = '<pre class="err" style="color:#b00020;white-space:pre-wrap;' +
      'padding:24px;font-family:monospace">The draft does not build:\n\n' +
      tail.replace(/&/g, '&amp;').replace(/</g, '&lt;') +
      '\n\nFix the doc and this preview will recover on its own.</pre>';
    $('stat').textContent = 'draft failed validation · ' + new Date().toLocaleTimeString();
  } finally {
    rendering = false;
  }
}

$('go').onclick = () => render(true);
$('cfg').onclick = () => {
  const cur = localStorage.getItem('docsync-feed') || '';
  const v = prompt(
    'Apps Script web-app URL that serves the doc as Markdown\n' +
    '(the /exec URL from Deploy -> Web app in the doc’s script).\n' +
    'Leave empty to preview the committed content instead.', cur);
  if (v === null) return;
  if (v.trim()) localStorage.setItem('docsync-feed', v.trim());
  else localStorage.removeItem('docsync-feed');
  lastHash = '';
  render(true);
};

boot().catch(e => { $('stat').textContent = 'boot failed: ' + e.message; });
</script>
</body>
</html>
