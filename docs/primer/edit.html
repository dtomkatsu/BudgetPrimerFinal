<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Budget Primer — draft editor</title>
<!--
  Edit the report's prose in the report itself.

  Click a paragraph, its source appears in place, edit, click away — the whole
  page re-renders through the repo's REAL renderer (Pyodide), so footnote
  numbers, layout and every figure stay honest. No Google Doc, no CORS, no
  deploy: the page fetches content.md and the renderer from main and does the
  work locally.

  What is editable: the report's prose blocks. Everything else — figures,
  Table 1, dollar amounts — is generated from the budget data and has no text
  to edit. Structural changes (new sections, new footnotes) still belong in
  content.md or the doc.

  Save commits content.md via a fine-grained token, which is what triggers the
  site rebuild and pushes the same text to the Google Doc. Nothing is written
  anywhere until you press it.
-->
<style>
  :root { --ink:#2F3E46; --sage:#6B9E78; --deep:#52796F; }
  html, body { margin:0; height:100%; font:13px/1.45 system-ui, sans-serif; }
  #bar { display:flex; gap:10px; align-items:center; padding:7px 12px;
         background:var(--ink); color:#E8EDE6; flex-wrap:wrap; }
  #bar b { color:#fff; letter-spacing:.3px; }
  #stat { flex:1; min-width:180px; opacity:.85; }
  #bar button { background:var(--sage); color:#fff; border:0; border-radius:4px;
                padding:4px 11px; cursor:pointer; font:inherit; }
  #bar button:hover { background:var(--deep); }
  #bar button:disabled { background:#66707a; cursor:default; }
  #save.dirty { background:#c2703a; }
  #out { border:0; width:100%; height:calc(100% - 36px); background:#EDF1EE; }
</style>
</head>
<body>
<div id="bar">
  <b>DRAFT EDITOR</b>
  <span id="stat">loading the render engine…</span>
  <button id="mode" title="Switch between editing text and moving things">Move mode</button>
  <button id="shape" title="Add a shape to this page" hidden>+ Shape</button>
  <button id="save" disabled>Save</button>
  <button id="revert" disabled>Discard</button>
</div>
<iframe id="out" title="editable draft"></iframe>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
const REPO = 'dtomkatsu/BudgetPrimerFinal';
// Same-origin, deployed with this page by `make -C report2027 editor`. Fetching
// the renderer from raw.githubusercontent instead let its CDN serve a stale
// copy for minutes after a push, which rendered a wrong page that looked right.
// Here the engine can only ever be the one that shipped alongside the editor.
// FILES maps a URL to the path the renderer expects inside Pyodide's FS.
const FILES = {
  'engine/docsync/content.py':                   'docsync/content.py',
  'engine/docsync/normalise.py':                 'docsync/normalise.py',
  'engine/docsync/layout.py':                    'docsync/layout.py',
  'engine/report2027/tools/render_report.py':    'report2027/tools/render_report.py',
  'engine/report2027/content.md':                'report2027/content.md',
  'engine/report2027/layout.json':               'report2027/layout.json',
  'engine/report2027/data/report_data.json':     'report2027/data/report_data.json',
  'engine/report2027/manual/obligated_costs.json': 'report2027/manual/obligated_costs.json',
  '../js/departments_act175_fy2027.json':        'docs/js/departments_act175_fy2027.json',
  '../js/historical_trends.json':                'docs/js/historical_trends.json',
};
const $ = id => document.getElementById(id);
const bust = u => u + (u.includes('?') ? '&' : '?') + 'cb=' + Date.now();

let py = null, source = '', original = '', dirty = false, editing = false;
let layout = null, layoutOrig = '', mode = 'text';   // text | move

async function get(u) {
  // no-store: a query string alone does not reliably defeat the raw CDN,
  // and a stale renderer silently produces a wrong page.
  const r = await fetch(bust(u), { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${u}`);
  return r.text();
}

// content.md is [[key]] lines followed by their text. Reading and rewriting a
// single slot is all the editor needs, so it works on the raw string and
// leaves every byte it did not touch exactly as it was.
//
// No 'm' flag, deliberately: under it '$' means end-of-LINE, which ended every
// slot at its first line. Multi-line slots — the sources list, a two-paragraph
// block — would open truncated and save the rest into oblivion. Here '$' means
// end of input, and the marker is anchored by hand.
const rxEsc = k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const slotRe = k => new RegExp(`((?:^|\\n)\\[\\[${rxEsc(k)}\\]\\]\\n)([\\s\\S]*?)(?=\\n\\[\\[|$)`);
const readSlot  = k => (source.match(slotRe(k)) || [,,''])[2].trim();
const writeSlot = (k, v) => { source = source.replace(slotRe(k), (m, head) => head + v.trim() + '\n'); };

/**
 * Link and cite, acting on the open editor's selection.
 *
 * mousedown is cancelled on the whole bar: a click would otherwise blur the
 * editor first, which commits and re-renders, so the button would act on an
 * element that no longer exists.
 */
function buildTools(d, ta, key) {
  const bar = d.createElement('div');
  bar.className = 'ds-tools';
  bar.addEventListener('mousedown', e => e.preventDefault());

  const btn = (label, title, fn) => {
    const b = d.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.title = title;
    b.addEventListener('click', fn);
    bar.appendChild(b);
    return b;
  };

  btn('Link', 'Wrap the selection in a link (\u2318K)', () => link(d, ta));
  btn('Cite', 'Insert a footnote reference', () => cite(d, ta, bar));
  btn('Image', 'Upload an image and place it here', () => image(d, ta));
  btn('Bold', 'Wrap the selection in **bold**', () => spliceAt(ta, '**', '**'));
  btn('Italic', 'Wrap the selection in *italic*', () => spliceAt(ta, '*', '*'));

  const note = d.createElement('span');
  note.className = 'ds-tools-key';
  note.textContent = key;
  bar.appendChild(note);
  return bar;
}

function link(d, ta) {
  const sel = ta.value.slice(ta.selectionStart, ta.selectionEnd);
  const url = d.defaultView.prompt('Link URL', 'https://');
  if (!url) return;
  if (sel) spliceAt(ta, '[', `](${url})`);
  else spliceAt(ta, `[link text](${url})`);
}

/** Cite an existing source, or add one and cite it. */
function cite(d, ta, bar) {
  const old = bar.querySelector('.ds-cite');
  if (old) { old.remove(); return; }

  const panel = d.createElement('div');
  panel.className = 'ds-cite';
  const sel = d.createElement('select');
  sel.innerHTML = '<option value="">— cite an existing source —</option>'
    + sourceIds().map(id => `<option value="${id}">[${id}] ${
        (sourceText(id) || '').slice(0, 60)}</option>`).join('')
    + '<option value="__new">+ new source…</option>';
  sel.addEventListener('mousedown', e => e.stopPropagation());  // let it open
  sel.addEventListener('change', () => {
    const v = sel.value;
    if (!v) return;
    if (v === '__new') {
      const w = d.defaultView;
      const id = (w.prompt('Short id for the source (e.g. act99, itep-whopays)') || '').trim();
      if (!id) return;
      if (sourceIds().includes(id)) { w.alert(`[${id}] already exists — pick it from the list.`); return; }
      const text = (w.prompt('Citation text, e.g. "Act 99," State of Hawai\u02bbi, 2026.') || '').trim();
      if (!text) return;
      const url = (w.prompt('Source URL', 'https://') || '').trim();
      if (!url) return;
      addSource(id, text, url);
      spliceAt(ta, `[^${id}]`);
    } else {
      spliceAt(ta, `[^${v}]`);
    }
    panel.remove();
  });
  panel.appendChild(sel);
  bar.appendChild(panel);
  sel.focus();
}

// Uploaded images live in the report's own assets dir; the binding's build
// copies them to the deployed page, so the path in the prose ("assets/x.jpg")
// is the same one the published report uses.
const ASSETS = 'report2027/web/assets/';
const localImages = new Map();     // path -> data URL, for previewing pre-deploy

function image(d, ta) {
  const tok = askToken();
  if (!tok) return;
  const inp = d.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    if (!file) return;
    const name = file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-')
                          .replace(/^-|-$/g, '');
    const path = ASSETS + name;
    const dataUrl = await new Promise(r => {
      const fr = new FileReader();
      fr.onload = () => r(fr.result);
      fr.readAsDataURL(file);
    });
    const b64 = String(dataUrl).split(',')[1];
    $('stat').textContent = `uploading ${name}…`;
    try {
      // Overwrite needs the blob's sha; a fresh path has none.
      let sha;
      try { sha = (await gh(`contents/${path}?ref=main`)).sha; } catch (e) { sha = undefined; }
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message: `primer: add image ${name}`,
          content: b64, branch: 'main', ...(sha ? { sha } : {}),
        }),
      });
      localImages.set('assets/' + name, dataUrl);
      const alt = d.defaultView.prompt('Describe the image (alt text)', name) || name;
      spliceAt(ta, `\n\n![${alt}](assets/${name})\n\n`);
      $('stat').textContent = `${name} uploaded — it renders below`;
    } catch (e) {
      $('stat').textContent = 'upload failed: ' + e.message;
    }
  });
  inp.click();
}

/** Show just-uploaded images before they are deployed: the page resolves
 *  assets/… against the live site, where a new file does not exist yet. */
function showLocalImages(d) {
  if (!localImages.size) return;
  d.querySelectorAll('img[src^="assets/"]').forEach(img => {
    const local = localImages.get(img.getAttribute('src'));
    if (local) img.src = local;
  });
}

// ---------------------------------------------------------------- move mode
// Text and drag cannot share a click, so they are modes. In move mode every
// [data-el] and [data-shape] is draggable; a drop writes inches into
// layout.json and re-renders through the real renderer, so what you see is
// what the build produces — including it refusing to build if you drag
// something off the page.
const DPI = 96;                       // CSS px per inch
const PAGE_W_IN = 8.5;                // must match docsync/layout.py

function pageOf(el) {
  const sec = el.closest('section.page');
  const all = [...el.ownerDocument.querySelectorAll('section.page')];
  return all.indexOf(sec) + 1;
}

function setMode(next) {
  mode = next;
  $('mode').textContent = mode === 'move' ? 'Text mode' : 'Move mode';
  $('mode').style.background = mode === 'move' ? '#c2703a' : '';
  $('shape').hidden = mode !== 'move';
  $('stat').textContent = mode === 'move'
    ? 'drag any box, logo or shape — arrows nudge, Delete removes a shape'
    : 'click any text to edit it';
  const d = $('out').contentDocument;
  if (d) d.body.classList.toggle('ds-move', mode === 'move');
}

function dragify(d) {
  d.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    el.addEventListener('mousedown', e => {
      if (mode !== 'move') return;
      e.preventDefault();
      e.stopPropagation();
      startDrag(d, el, e);
    });
  });
}

function startDrag(d, el, e0) {
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const rect = el.getBoundingClientRect();
  const page = el.closest('section.page') || el.ownerDocument.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  // A hidden or unlaid-out pane reports every rect as zero, and the drag would
  // then write nonsense inches into layout.json. Refuse rather than corrupt.
  if (!pr.width || !rect.width) {
    $('stat').textContent = 'cannot move while the page has no layout — try again once it is visible';
    return;
  }
  // Where the box currently sits, in page inches — whether it was placed by
  // the renderer or by a previous drag.
  const start = { x: (rect.left - pr.left) / DPI, y: (rect.top - pr.top) / DPI };
  const grab = { x: e0.clientX, y: e0.clientY };
  el.style.outline = '2px solid #c2703a';

  const move = e => {
    const x = +(start.x + (e.clientX - grab.x) / DPI).toFixed(2);
    const y = +(start.y + (e.clientY - grab.y) / DPI).toFixed(2);
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.x = x; sh.y = y; }
      el.ownerDocument.defaultView.requestAnimationFrame(() => paintShape(d, shapeId));
    } else {
      el.style.position = 'absolute';
      el.style.left = x + 'in';
      el.style.top = y + 'in';
    }
    $('stat').textContent = `${id} → ${x}in, ${y}in`;
  };
  const up = async e => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    const x = +(start.x + (e.clientX - grab.x) / DPI).toFixed(2);
    const y = +(start.y + (e.clientY - grab.y) / DPI).toFixed(2);
    if (!shapeId) {
      const prev = layout.positions[id] || {};
      // Pinning the width keeps a flow box from shrink-to-fitting once it is
      // absolute. But some elements are wider than the page on purpose (the
      // cover lockup is full-bleed, clipped by overflow:hidden) — pinning
      // *that* width would shove it off the page and fail the build. Only pin
      // a width that actually fits where the box now sits.
      const wIn = +(rect.width / DPI).toFixed(2);
      const w = prev.w ?? (x + wIn <= PAGE_W_IN ? wIn : undefined);
      layout.positions[id] = { ...prev, x, y, ...(w ? { w } : {}) };
    }
    markDirty();
    await render();
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Live-move a shape without a full re-render, so dragging stays smooth. */
function paintShape(d, id) {
  const sh = layout.shapes.find(s => s.id === id);
  const node = d.querySelector(`[data-shape="${id}"]`);
  if (!sh || !node) return;
  if (sh.kind === 'rect') { node.setAttribute('x', sh.x); node.setAttribute('y', sh.y); }
  else if (sh.kind === 'ellipse') {
    node.setAttribute('cx', sh.x + sh.w / 2); node.setAttribute('cy', sh.y + sh.h / 2);
  } else {
    node.setAttribute('x1', sh.x); node.setAttribute('y1', sh.y);
    node.setAttribute('x2', sh.x + sh.w); node.setAttribute('y2', sh.y + sh.h);
  }
}

function markDirty() {
  dirty = source !== original
       || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
  $('save').disabled = $('revert').disabled = !dirty;
  $('save').classList.toggle('dirty', dirty);
}

$('mode').onclick = () => setMode(mode === 'move' ? 'text' : 'move');

$('shape').onclick = async () => {
  const d = $('out').contentDocument;
  const kind = prompt('Shape: rect, ellipse or line', 'rect');
  if (!kind || !['rect', 'ellipse', 'line'].includes(kind)) return;
  const page = +(prompt('Which page? (1–12)', '3') || 0);
  if (!page) return;
  const fill = prompt('Fill colour (or "none")', '#E8EDE6') || 'none';
  const id = 's' + (layout.shapes.length + 1) + '-' + kind;
  layout.shapes.push({ id, page, kind, x: 1, y: 1, w: 2, h: 1, fill,
                       stroke: kind === 'line' ? '#52796F' : 'none',
                       sw: 0.02, z: 'back' });
  markDirty();
  await render();
  $('stat').textContent = `${id} added to page ${page} — drag it into place`;
};

async function boot() {
  const urls = Object.keys(FILES);
  const [pyodide, ...files] = await Promise.all([loadPyodide(), ...urls.map(get)]);
  py = pyodide;
  ['docsync', 'report2027/tools', 'report2027/data', 'report2027/manual',
   'report2027/web', 'docs/js'].forEach(d => py.FS.mkdirTree('/repo/' + d));
  py.FS.writeFile('/repo/docsync/__init__.py', '');
  urls.forEach((u, i) => py.FS.writeFile('/repo/' + FILES[u], files[i]));
  source = original = files[urls.indexOf('engine/report2027/content.md')];
  layoutOrig = files[urls.indexOf('engine/report2027/layout.json')];
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  await render();
}

async function render() {
  $('stat').textContent = 'rendering…';
  py.globals.set('SRC', source);
  py.globals.set('LAYOUT', JSON.stringify(layout, null, 2));
  let html;
  try {
    html = await py.runPythonAsync(`
import sys, os, io, runpy, contextlib
if '/repo' not in sys.path: sys.path.insert(0, '/repo')
os.environ['DOCSYNC_EDIT'] = '1'            # stamp data-slot on prose blocks
open('/repo/report2027/content.md','w').write(SRC)
open('/repo/report2027/layout.json','w').write(LAYOUT)
for m in [m for m in sys.modules if m.startswith('docsync')]: del sys.modules[m]
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/report2027/tools/render_report.py', run_name='__main__')
open('/repo/report2027/web/index.html').read()
`);
  } catch (e) {
    // A validation failure is the guardrail working — show it and keep the
    // source, so the edit that broke it can be fixed rather than lost.
    const tail = String(e.message || e).split('\n').filter(l => l.trim()).slice(-6).join('\n');
    $('out').srcdoc = `<pre style="color:#b00020;white-space:pre-wrap;padding:24px;
      font:12px/1.5 ui-monospace,monospace">This draft does not build:\n\n${
      tail.replace(/&/g,'&amp;').replace(/</g,'&lt;')}\n\nYour text is still here — fix it and it recovers.</pre>`;
    $('stat').textContent = 'draft does not build';
    return;
  }
  // onload before srcdoc: assigning srcdoc starts the load, so wiring the
  // handler afterwards is a race the editor loses by silently going inert.
  $('out').onload = wire;
  $('out').srcdoc = html;
  $('stat').textContent = dirty ? 'unsaved changes' : 'click any paragraph to edit it';
}

function wire() {
  const d = $('out').contentDocument;
  showLocalImages(d);
  dragify(d);
  d.body.classList.toggle('ds-move', mode === 'move');
  const css = d.createElement('style');
  css.textContent = `
    [data-slot] { cursor:text; border-radius:3px; transition:background .12s;
                  outline:1px dashed transparent; outline-offset:3px; }
    [data-slot]:hover { background:#EAF3EC; outline-color:#95B7A2; }
    .ds-edit { width:100%; box-sizing:border-box; font:inherit; line-height:1.5;
               padding:8px 10px; border:2px solid #6B9E78; border-radius:4px;
               background:#fff; resize:vertical; }
    .ds-hint { font:11px system-ui; color:#52796F; margin:3px 0 10px; }
    .ds-inline { display:inline-block; width:auto; min-width:8ch; padding:1px 5px;
                 font:inherit; color:inherit; line-height:inherit; vertical-align:baseline; }
    .ds-tools { display:flex; gap:5px; align-items:center; flex-wrap:wrap;
                margin:5px 0 0; font:11px system-ui; }
    .ds-tools button { font:11px system-ui; padding:3px 9px; border:1px solid #B9C9BE;
                       background:#fff; color:#2F3E46; border-radius:4px; cursor:pointer; }
    .ds-tools button:hover { background:#6B9E78; color:#fff; border-color:#6B9E78; }
    .ds-tools-key { color:#8B9A90; margin-left:auto; font:10px ui-monospace,monospace; }
    .ds-cite { flex-basis:100%; margin-top:4px; }
    .ds-cite select { font:11px system-ui; padding:3px; max-width:100%; }
    body.ds-move [data-slot] { cursor:default; }
    body.ds-move [data-slot]:hover { background:none; outline-color:transparent; }
    body.ds-move [data-el], body.ds-move [data-shape] {
      cursor:grab; outline:1px dashed #95B7A2; outline-offset:2px; }
    body.ds-move [data-el]:hover, body.ds-move [data-shape]:hover {
      outline:2px solid #6B9E78; }
    body.ds-move svg.shape-layer { pointer-events:auto; }`;
  d.head.appendChild(css);

  const seen = new Set();
  d.querySelectorAll('[data-slot]').forEach(el => {
    const key = el.dataset.slot;
    if (seen.has(key)) return;              // a slot can render several <p>s
    seen.add(key);
    el.addEventListener('click', () => { if (mode === 'text') edit(d, key); });
  });
}

// The [[sources]] slot is the citation list: "[id]: text — url" per line. A
// footnote is a [^id] ref in prose; the renderer numbers them by first
// appearance, so inserting one never renumbers anything by hand.
const sourceIds = () => [...readSlot('sources').matchAll(/^\[([^\]]+)\]:/gm)].map(m => m[1]);
const sourceText = id => (readSlot('sources').match(
  new RegExp(`^\\[${id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]:\\s*(.*)$`, 'm')) || [,''])[1];

function addSource(id, text, url) {
  const line = `[${id}]: ${text} — ${url}`;
  writeSlot('sources', readSlot('sources') + '\n' + line);
}

function spliceAt(el, before, after = '') {
  const s = el.selectionStart ?? el.value.length;
  const e = el.selectionEnd ?? el.value.length;
  const sel = el.value.slice(s, e);
  el.value = el.value.slice(0, s) + before + sel + after + el.value.slice(e);
  const caret = s + before.length + sel.length + after.length;
  el.setSelectionRange(caret, caret);
  el.focus();
}

function edit(d, key) {

  const blocks = [...d.querySelectorAll(`[data-slot="${key}"]`)];
  if (!blocks.length || editing) return;
  editing = true;

  const inline = blocks[0].dataset.inline === '1';
  const ta = d.createElement(inline ? 'input' : 'textarea');
  if (inline) ta.type = 'text';
  ta.className = inline ? 'ds-edit ds-inline' : 'ds-edit';
  ta.value = readSlot(key);

  let hint = null;
  if (!inline) {
    hint = d.createElement('p');
    hint.className = 'ds-hint';
    hint.textContent = `${key} — **bold**, *italic*, [text](url). Blank line = new paragraph. `
                     + `Click away to render, Esc to cancel.`;
  }

  const tools = buildTools(d, ta, key);

  blocks[0].replaceWith(ta);
  ta.after(tools);
  if (hint) tools.after(hint);
  blocks.slice(1).forEach(b => b.remove());
  // Size to the text only once layout has settled: measured any earlier the
  // box is still zero-width, so the content "wraps" into thousands of pixels.
  if (!inline) {
    const fit = () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(Math.max(ta.scrollHeight + 4, 64), 460) + 'px';
    };
    requestAnimationFrame(fit);
    ta.addEventListener('input', fit);
  }
  ta.focus();
  ta.select?.();

  const finish = async (keep) => {
    if (ta.dataset.done) return;
    ta.dataset.done = '1';
    editing = false;
    tools.remove();
    if (keep && ta.value.trim() !== readSlot(key)) {
      writeSlot(key, ta.value);
      dirty = source !== original || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
      $('save').disabled = $('revert').disabled = !dirty;
      $('save').classList.toggle('dirty', dirty);
    }
    await render();
  };
  ta.addEventListener('blur', () => finish(true));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'Enter' && inline) { e.preventDefault(); finish(true); }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, ta); }
  });
}

// --- persistence -----------------------------------------------------------
// The one credential: a fine-grained token, this repo only, Contents r/w. It
// lives in this browser and never leaves it except to call GitHub. Committing
// content.md is what rebuilds the site and pushes the same text to the doc.
async function gh(path, opts = {}) {
  const tok = localStorage.getItem('docsync-pat');
  const r = await fetch(`https://api.github.com/repos/${REPO}/${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json',
               ...(opts.headers || {}) },
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0, 160)}`);
  return r.json();
}

function askToken() {
  let tok = localStorage.getItem('docsync-pat');
  if (tok) return tok;
  tok = prompt('Paste a GitHub fine-grained token\n\n' +
    'github.com -> Settings -> Developer settings -> Fine-grained tokens\n' +
    `Repository access: only ${REPO}\n` +
    'Permissions: Contents -> Read and write   <- must be WRITE\n\n' +
    'Stored in this browser only.');
  if (!tok) return null;
  localStorage.setItem('docsync-pat', tok.trim());
  return tok.trim();
}

$('save').onclick = async () => {
  if (!askToken()) return;
  $('save').disabled = true;
  $('stat').textContent = 'saving…';
  try {
    // Prose and layout are separate files, so a text edit and a move are
    // separate commits — each reviewable on its own.
    const layoutText = JSON.stringify(layout, null, 2) + '\n';
    const writes = [];
    if (source !== original)
      writes.push(['report2027/content.md', source, 'primer: edit prose from the draft editor']);
    if (layoutText !== layoutOrig)
      writes.push(['report2027/layout.json', layoutText, 'primer: move layout from the draft editor']);

    for (const [path, body, message] of writes) {
      const cur = await gh(`contents/${path}?ref=main`).catch(() => ({}));
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message,
          content: btoa(String.fromCharCode(...new TextEncoder().encode(body))),
          ...(cur.sha ? { sha: cur.sha } : {}), branch: 'main',
        }),
      });
    }
    original = source; layoutOrig = layoutText; dirty = false;
    $('revert').disabled = true;
    $('save').classList.remove('dirty');
    $('stat').textContent = 'saved — the site rebuilds and the doc updates in ~2 min';
  } catch (e) {
    // "Resource not accessible" means the token is valid but was minted
    // without write access — the default. Say the fix, not the status code.
    const m = String(e.message);
    const why = m.includes('not accessible')
      ? 'the token has no write access. github.com/settings/personal-access-tokens '
        + `-> your token -> Repository access: ${REPO} -> Permissions -> Contents: `
        + 'Read and write. Then press Save again.'
      : m.match(/401/) ? 'the token was rejected — it may be expired or mistyped.'
      : m;
    $('stat').textContent = 'save failed: ' + why;
    $('save').disabled = false;
    if (m.match(/401|403/)) localStorage.removeItem('docsync-pat');
  }
};

$('revert').onclick = async () => {
  if (!confirm('Discard your unsaved edits?')) return;
  source = original;
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  dirty = false;
  $('save').disabled = $('revert').disabled = true;
  $('save').classList.remove('dirty');
  await render();
};

addEventListener('beforeunload', e => { if (dirty) e.preventDefault(); });
boot().catch(e => { $('stat').textContent = 'failed to start: ' + e.message; });
</script>
</body>
</html>
