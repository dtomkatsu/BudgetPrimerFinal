<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Budget Primer — draft editor</title>
<!--
  Edit the report's prose in the report itself.

  Click a paragraph, its source appears in place, edit, click away — the whole
  page re-renders through the repo's REAL renderer (Pyodide), so footnote
  numbers, layout and every figure stay honest. No Google Doc, no CORS, no
  deploy: the page fetches content.md and the renderer from main and does the
  work locally.

  What is editable: the report's prose blocks. Everything else — figures,
  Table 1, dollar amounts — is generated from the budget data and has no text
  to edit. Structural changes (new sections, new footnotes) still belong in
  content.md or the doc.

  Save commits content.md via a fine-grained token, which is what triggers the
  site rebuild and pushes the same text to the Google Doc. Nothing is written
  anywhere until you press it.
-->
<style>
  :root { --ink:#2F3E46; --sage:#6B9E78; --deep:#52796F; }
  html, body { margin:0; height:100%; font:13px/1.45 system-ui, sans-serif; }
  #bar { display:flex; gap:10px; align-items:center; padding:7px 12px;
         background:var(--ink); color:#E8EDE6; flex-wrap:wrap; }
  #bar b { color:#fff; letter-spacing:.3px; }
  #stat { flex:1; min-width:180px; opacity:.85; }
  #bar button { background:var(--sage); color:#fff; border:0; border-radius:4px;
                padding:4px 11px; cursor:pointer; font:inherit; }
  #bar button:hover { background:var(--deep); }
  #bar button:disabled { background:#66707a; cursor:default; }
  #save.dirty { background:#c2703a; }
  #out { border:0; width:100%; height:calc(100% - 36px); background:#EDF1EE; }
</style>
</head>
<body>
<div id="bar">
  <b>DRAFT EDITOR</b>
  <span id="stat">loading the render engine…</span>
  <button id="shape" title="Add a shape to this page">+ Shape</button>
  <button id="tok" title="Check or replace the GitHub token used to save">Token…</button>
  <button id="save" disabled>Save</button>
  <button id="revert" disabled>Discard</button>
</div>
<iframe id="out" title="editable draft"></iframe>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
const REPO = 'dtomkatsu/BudgetPrimerFinal';
// Same-origin, deployed with this page by `make -C report2027 editor`. Fetching
// the renderer from raw.githubusercontent instead let its CDN serve a stale
// copy for minutes after a push, which rendered a wrong page that looked right.
// Here the engine can only ever be the one that shipped alongside the editor.
// FILES maps a URL to the path the renderer expects inside Pyodide's FS.
const FILES = {
  'engine/docsync/content.py':                   'docsync/content.py',
  'engine/docsync/normalise.py':                 'docsync/normalise.py',
  'engine/docsync/layout.py':                    'docsync/layout.py',
  'engine/report2027/tools/render_report.py':    'report2027/tools/render_report.py',
  'engine/report2027/content.md':                'report2027/content.md',
  'engine/report2027/layout.json':               'report2027/layout.json',
  'engine/report2027/data/report_data.json':     'report2027/data/report_data.json',
  'engine/report2027/manual/obligated_costs.json': 'report2027/manual/obligated_costs.json',
  '../js/departments_act175_fy2027.json':        'docs/js/departments_act175_fy2027.json',
  '../js/historical_trends.json':                'docs/js/historical_trends.json',
};
const $ = id => document.getElementById(id);
const bust = u => u + (u.includes('?') ? '&' : '?') + 'cb=' + Date.now();

let py = null, source = '', original = '', dirty = false, editing = false;
let layout = null, layoutOrig = '', scrollTopWas = 0;

async function get(u) {
  // no-store: a query string alone does not reliably defeat the raw CDN,
  // and a stale renderer silently produces a wrong page.
  const r = await fetch(bust(u), { cache: 'no-store' });
  if (!r.ok) throw new Error(`HTTP ${r.status} — ${u}`);
  return r.text();
}

// content.md is [[key]] lines followed by their text. Reading and rewriting a
// single slot is all the editor needs, so it works on the raw string and
// leaves every byte it did not touch exactly as it was.
//
// No 'm' flag, deliberately: under it '$' means end-of-LINE, which ended every
// slot at its first line. Multi-line slots — the sources list, a two-paragraph
// block — would open truncated and save the rest into oblivion. Here '$' means
// end of input, and the marker is anchored by hand.
const rxEsc = k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const slotRe = k => new RegExp(`((?:^|\\n)\\[\\[${rxEsc(k)}\\]\\]\\n)([\\s\\S]*?)(?=\\n\\[\\[|$)`);
const readSlot  = k => (source.match(slotRe(k)) || [,,''])[2].trim();
const writeSlot = (k, v) => { source = source.replace(slotRe(k), (m, head) => head + v.trim() + '\n'); };

/**
 * Link and cite, acting on the open editor's selection.
 *
 * mousedown is cancelled on the whole bar: a click would otherwise blur the
 * editor first, which commits and re-renders, so the button would act on an
 * element that no longer exists.
 */
function buildTools(d, ta, key) {
  const bar = d.createElement('div');
  bar.className = 'ds-tools';
  bar.addEventListener('mousedown', e => e.preventDefault());

  const btn = (label, title, fn) => {
    const b = d.createElement('button');
    b.type = 'button';
    b.textContent = label;
    b.title = title;
    b.addEventListener('click', fn);
    bar.appendChild(b);
    return b;
  };

  btn('Link', 'Wrap the selection in a link (\u2318K)', () => link(d, ta));
  btn('Cite', 'Insert a footnote reference', () => cite(d, ta, bar));
  btn('Image', 'Upload an image and place it here', () => image(d, ta));
  btn('Bold', 'Wrap the selection in **bold**', () => spliceAt(ta, '**', '**'));
  btn('Italic', 'Wrap the selection in *italic*', () => spliceAt(ta, '*', '*'));

  const note = d.createElement('span');
  note.className = 'ds-tools-key';
  note.textContent = key;
  bar.appendChild(note);
  return bar;
}

function link(d, ta) {
  const sel = ta.value.slice(ta.selectionStart, ta.selectionEnd);
  const url = d.defaultView.prompt('Link URL', 'https://');
  if (!url) return;
  if (sel) spliceAt(ta, '[', `](${url})`);
  else spliceAt(ta, `[link text](${url})`);
}

/** Cite an existing source, or add one and cite it. */
function cite(d, ta, bar) {
  const old = bar.querySelector('.ds-cite');
  if (old) { old.remove(); return; }

  const panel = d.createElement('div');
  panel.className = 'ds-cite';
  const sel = d.createElement('select');
  sel.innerHTML = '<option value="">— cite an existing source —</option>'
    + sourceIds().map(id => `<option value="${id}">[${id}] ${
        (sourceText(id) || '').slice(0, 60)}</option>`).join('')
    + '<option value="__new">+ new source…</option>';
  sel.addEventListener('mousedown', e => e.stopPropagation());  // let it open
  sel.addEventListener('change', () => {
    const v = sel.value;
    if (!v) return;
    if (v === '__new') {
      const w = d.defaultView;
      const id = (w.prompt('Short id for the source (e.g. act99, itep-whopays)') || '').trim();
      if (!id) return;
      if (sourceIds().includes(id)) { w.alert(`[${id}] already exists — pick it from the list.`); return; }
      const text = (w.prompt('Citation text, e.g. "Act 99," State of Hawai\u02bbi, 2026.') || '').trim();
      if (!text) return;
      const url = (w.prompt('Source URL', 'https://') || '').trim();
      if (!url) return;
      addSource(id, text, url);
      spliceAt(ta, `[^${id}]`);
    } else {
      spliceAt(ta, `[^${v}]`);
    }
    panel.remove();
  });
  panel.appendChild(sel);
  bar.appendChild(panel);
  sel.focus();
}

// Uploaded images live in the report's own assets dir; the binding's build
// copies them to the deployed page, so the path in the prose ("assets/x.jpg")
// is the same one the published report uses.
const ASSETS = 'report2027/web/assets/';
const localImages = new Map();     // path -> data URL, for previewing pre-deploy

async function image(d, ta) {
  const tok = await askToken();
  if (!tok) return;
  const inp = d.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.addEventListener('change', async () => {
    const file = inp.files[0];
    if (!file) return;
    const name = file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-')
                          .replace(/^-|-$/g, '');
    const path = ASSETS + name;
    const dataUrl = await new Promise(r => {
      const fr = new FileReader();
      fr.onload = () => r(fr.result);
      fr.readAsDataURL(file);
    });
    const b64 = String(dataUrl).split(',')[1];
    $('stat').textContent = `uploading ${name}…`;
    try {
      // Overwrite needs the blob's sha; a fresh path has none.
      let sha;
      try { sha = (await gh(`contents/${path}?ref=main`)).sha; } catch (e) { sha = undefined; }
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message: `primer: add image ${name}`,
          content: b64, branch: 'main', ...(sha ? { sha } : {}),
        }),
      });
      localImages.set('assets/' + name, dataUrl);
      const alt = d.defaultView.prompt('Describe the image (alt text)', name) || name;
      spliceAt(ta, `\n\n![${alt}](assets/${name})\n\n`);
      $('stat').textContent = `${name} uploaded — it renders below`;
    } catch (e) {
      $('stat').textContent = 'upload failed: ' + e.message;
    }
  });
  inp.click();
}

/** Show just-uploaded images before they are deployed: the page resolves
 *  assets/… against the live site, where a new file does not exist yet. */
function showLocalImages(d) {
  if (!localImages.size) return;
  d.querySelectorAll('img[src^="assets/"]').forEach(img => {
    const local = localImages.get(img.getAttribute('src'));
    if (local) img.src = local;
  });
}

// ------------------------------------------------------------------ layers
// z is a plain integer: below zero sits under the text, above it over the top.
// Right-click is where "which thing is on top" has lived for thirty years, so
// it lives there here too.
const zOf = id => {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) return typeof sh.z === 'number' ? sh.z : (sh.z === 'front' ? 2 : -1);
  return layout.positions[id]?.z ?? 1;
};
const setZ = (id, z) => {
  const sh = layout.shapes.find(s => s.id === id);
  if (sh) sh.z = z;
  else if (layout.positions[id]) layout.positions[id].z = z;
  else return false;
  return true;
};
const allZ = () => [
  ...Object.keys(layout.positions).map(zOf),
  ...layout.shapes.map(s => zOf(s.id)),
];

function closeMenu(d) {
  d.querySelectorAll('.ds-menu').forEach(m => m.remove());
}

function layerMenu(d, el, e) {
  closeMenu(d);
  const id = el.dataset.shape || el.dataset.el;
  // Only a moved element has a layer to change: an untouched one is still
  // wherever the design put it, and z-index would not apply to it anyway.
  const known = layout.shapes.some(s => s.id === id) || !!layout.positions[id];
  const m = d.createElement('div');
  m.className = 'ds-menu';
  m.style.left = (e.clientX + d.defaultView.scrollX) + 'px';
  m.style.top = (e.clientY + d.defaultView.scrollY) + 'px';

  const zs = allZ();
  const item = (label, fn, on = true) => {
    const b = d.createElement('button');
    b.textContent = label;
    b.disabled = !on;
    b.addEventListener('click', async () => { closeMenu(d); await fn(); });
    m.appendChild(b);
  };
  const head = d.createElement('div');
  head.className = 'ds-menu-head';
  head.textContent = known ? `${id} · layer ${zOf(id)}` : `${id} · move it first`;
  m.appendChild(head);

  const bump = async delta => {
    setZ(id, zOf(id) + delta); markDirty(); await render();
  };
  item('Bring to front', async () => { setZ(id, Math.max(...zs, 0) + 1); markDirty(); await render(); }, known);
  item('Forward',        () => bump(1), known);
  item('Backward',       () => bump(-1), known);
  item('Send to back',   async () => { setZ(id, Math.min(...zs, 0) - 1); markDirty(); await render(); }, known);
  if (layout.shapes.some(s => s.id === id)) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Delete shape', async () => {
      layout.shapes = layout.shapes.filter(s => s.id !== id);
      markDirty(); await render();
    });
  }
  if (layout.positions[id]) {
    const sep = d.createElement('div'); sep.className = 'ds-menu-sep'; m.appendChild(sep);
    item('Reset to its designed place', async () => {
      delete layout.positions[id];
      markDirty(); await render();
    });
  }
  d.body.appendChild(m);
}

function contextify(d) {
  d.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      layerMenu(d, el, e);
    });
  });
  d.addEventListener('mousedown', e => {
    if (!e.target.closest || !e.target.closest('.ds-menu')) closeMenu(d);
  });
}

// ---------------------------------------------------------------- resizing
// Width is always safe: text reflows, images scale. Height is not — pin a text
// box's height and it either clips the words or leaves a hole the moment the
// prose changes, and .page is overflow:hidden so the clipping is silent. So
// prose gets a width handle only; things whose size IS their content (images,
// shapes) get corners too.
const MIN_IN = 0.4;

function handlesFor(el) {
  if (el.dataset.shape) return ['e', 's', 'se'];
  const img = el.tagName === 'IMG' || el.querySelector('img');
  return img ? ['e', 's', 'se'] : ['e'];
}

function showHandles(d, page, el) {
  hideHandles(d);
  const b = inchBox(el, page);
  const ov = d.createElement('div');
  ov.className = 'ds-handles';
  ov.style.cssText = `left:${b.x}in;top:${b.y}in;width:${b.w}in;height:${b.h}in`;
  handlesFor(el).forEach(dir => {
    const h = d.createElement('div');
    h.className = 'ds-h ds-h-' + dir;
    h.title = dir === 'e' ? 'Drag to set width' : 'Drag to resize';
    h.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      startResize(d, el, e, dir);
    });
    ov.appendChild(h);
  });
  ov.dataset.for = el.dataset.shape || el.dataset.el;
  page.appendChild(ov);
}

const hideHandles = d => d.querySelectorAll('.ds-handles').forEach(h => h.remove());

function startResize(d, el, e0, dir) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  if (!pr.width) return;
  pushHistory();
  const px = DPI * zoomOf(page);
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  const P = placer(d, el, page);          // reuse: a resize is a layout override too
  const b = P.box;
  const grab = { x: e0.clientX, y: e0.clientY };
  el.classList.add('ds-lifted');
  d.body.classList.add('ds-resizing');

  const apply = e => {
    let w = b.w, h = b.h;
    if (dir.includes('e')) w = Math.max(MIN_IN, b.w + (e.clientX - grab.x) / px);
    if (dir.includes('s')) h = Math.max(MIN_IN, b.h + (e.clientY - grab.y) / px);
    // Never let a resize push content off the page — same rule as the drag.
    w = Math.min(w, PAGE_W_IN - b.x);
    h = Math.min(h, PAGE_H_IN - b.y);
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.w = +w.toFixed(2); sh.h = +h.toFixed(2); paintShape(d, shapeId); }
    } else {
      P.put(b.x, b.y, false);             // pin it in place, holding its flow slot
      el.style.width = w.toFixed(2) + 'in';
      if (dir.includes('s')) el.style.height = h.toFixed(2) + 'in';
    }
    showHandles(d, page, el);
    $('stat').textContent = `${id} → ${w.toFixed(2)}in wide`
                          + (dir.includes('s') ? ` × ${h.toFixed(2)}in` : '');
    return { w, h };
  };

  let size = { w: b.w, h: b.h };
  const move = e => { size = apply(e); };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    el.classList.remove('ds-lifted');
    d.body.classList.remove('ds-resizing');
    if (!shapeId) {
      P.commit({ x: b.x, y: b.y });
      const p = layout.positions[id];
      p.w = +size.w.toFixed(2);
      if (dir.includes('s')) p.h = +size.h.toFixed(2);
    } else {
      markDirty();
    }
    showHandles(d, page, el);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

// ------------------------------------------------------------------ moving
// No modes. A box is draggable by its own chrome; the text inside it is not.
// The target of the mousedown decides: land on a text slot and you are
// editing, land on the box itself and you are moving it.
//
// A drop does NOT re-render. The drag already moved the real element, so the
// page on screen is already the answer, and re-rendering would freeze for a
// second and throw away your scroll position for nothing. layout.json is
// updated and the renderer catches up on the next render or on save.
const DPI = 96;                        // CSS px per inch
const PAGE_W_IN = 8.5, PAGE_H_IN = 11; // must match docsync/layout.py
const MARGIN_IN = 0.62, TOP_IN = 0.75; // the text column primer.css sets
const SNAP_IN = 0.06;                  // how close before it pulls into line
const NUDGE_IN = 0.05, NUDGE_BIG_IN = 0.25;

/**
 * primer.css zooms .page to 125% on wide screens and the factor moves with the
 * viewport. getBoundingClientRect reports zoomed pixels; CSS inches are
 * unzoomed. Every conversion divides it back out — assuming 1 made a 7.26in box
 * measure 9.08in and moved things a quarter further than the cursor.
 */
const zoomOf = page => (page.getBoundingClientRect().width / page.offsetWidth) || 1;

const inchBox = (el, page) => {
  const r = el.getBoundingClientRect(), pr = page.getBoundingClientRect();
  const px = DPI * zoomOf(page);
  return { x: (r.left - pr.left) / px, y: (r.top - pr.top) / px,
           w: r.width / px, h: r.height / px };
};

/**
 * Lines worth snapping to: the page's own geometry, and the edges and centres
 * of everything else on the page. Alignment you can feel is the difference
 * between arranging and fiddling.
 */
function snapLines(d, page, moving) {
  const xs = [0, MARGIN_IN, PAGE_W_IN / 2, PAGE_W_IN - MARGIN_IN, PAGE_W_IN];
  const ys = [0, TOP_IN, PAGE_H_IN / 2, PAGE_H_IN - 0.9, PAGE_H_IN];
  page.querySelectorAll('[data-el], [data-shape], h1, h2.sub, .card, .branch, .photo')
      .forEach(el => {
    if (el === moving || moving.contains(el) || el.contains(moving)) return;
    const b = inchBox(el, page);
    if (b.w < 0.1 || b.h < 0.1) return;
    xs.push(b.x, b.x + b.w / 2, b.x + b.w);
    ys.push(b.y, b.y + b.h / 2, b.y + b.h);
  });
  return { xs, ys };
}

/** Nearest line within the threshold, given the three edges we align on. */
function snapAxis(lines, lo, size) {
  let best = null;
  for (const probe of [[lo, 0], [lo + size / 2, size / 2], [lo + size, size]]) {
    for (const line of lines) {
      const d = Math.abs(probe[0] - line);
      if (d <= SNAP_IN && (!best || d < best.d)) best = { d, at: line - probe[1], line };
    }
  }
  return best;
}

function showGuides(d, page, vx, hy) {
  d.querySelectorAll('.ds-guide').forEach(g => g.remove());
  const add = (cls, style) => {
    const g = d.createElement('div');
    g.className = 'ds-guide ' + cls;
    g.style.cssText = style;
    page.appendChild(g);
  };
  if (vx !== null) add('v', `left:${vx}in;top:0;height:${PAGE_H_IN}in`);
  if (hy !== null) add('h', `top:${hy}in;left:0;width:${PAGE_W_IN}in`);
}

const clearGuides = d => d.querySelectorAll('.ds-guide').forEach(g => g.remove());

// ---- history: every move is undoable, or it is not safe to experiment ----
const past = [], future = [];
const snapshot = () => JSON.stringify({ source, layout });
function pushHistory() {
  past.push(snapshot());
  if (past.length > 60) past.shift();
  future.length = 0;
}
async function restore(json) {
  const st = JSON.parse(json);
  source = st.source;
  layout = st.layout;
  markDirty();
  await render();
}
async function undo() {
  if (!past.length) { $('stat').textContent = 'nothing to undo'; return; }
  future.push(snapshot());
  await restore(past.pop());
  $('stat').textContent = 'undone';
}
async function redo() {
  if (!future.length) { $('stat').textContent = 'nothing to redo'; return; }
  past.push(snapshot());
  await restore(future.pop());
  $('stat').textContent = 'redone';
}

function dragify(d) {
  d.querySelectorAll('[data-el], [data-shape]').forEach(el => {
    // Reachable without a mouse: focus it, Space to pick up, arrows to move.
    el.setAttribute('tabindex', '0');
    el.addEventListener('mousedown', e => {
      if (e.target.closest && e.target.closest('[data-slot]')) return;
      if (editing) return;
      e.preventDefault();
      e.stopPropagation();
      startDrag(d, el, e);
    });
    el.addEventListener('keydown', e => keyDrag(d, el, e));
    const page = el.closest('section.page') || d.querySelector('section.page');
    el.addEventListener('mouseenter', () => { if (!editing) showHandles(d, page, el); });
    el.addEventListener('focus', () => showHandles(d, page, el));
  });
  // Handles belong to whatever the pointer is on; leaving the page drops them.
  d.querySelectorAll('section.page').forEach(pg => {
    pg.addEventListener('mouseleave', () => hideHandles(d));
  });
}

/** Shared by pointer and keyboard: place the element, snapping as it goes. */
function placer(d, el, page) {
  const shapeId = el.dataset.shape;
  const id = shapeId || el.dataset.el;
  // Measure the box, but trust a position we already recorded over a fresh
  // reading of it: rects carry rounding, and the lift's scale nudges them. Take
  // the measurement as truth and picking a box up without moving it walks it a
  // few hundredths of an inch — every time.
  const measured = inchBox(el, page);
  const stored = shapeId ? layout.shapes.find(s => s.id === shapeId)
                         : layout.positions[id];
  const box = stored && stored.x !== undefined
    ? { ...measured, x: +stored.x, y: +stored.y }
    : measured;
  const heldFlow = !shapeId &&
    d.defaultView.getComputedStyle(el).position === 'static';
  let spacer = null;

  // Going absolute drops the element out of the flow and everything below it
  // rushes up into the gap. The renderer reserves that height on the next
  // build, but a drop no longer triggers one — so the gap is held here, in the
  // same frame the element leaves the flow, or the page lurches under you.
  const holdPlace = () => {
    if (!heldFlow || spacer) return;
    spacer = d.createElement('div');
    spacer.className = 'ds-spacer ds-ghost';
    spacer.style.height = box.h.toFixed(2) + 'in';
    spacer.setAttribute('aria-hidden', 'true');
    el.parentNode.insertBefore(spacer, el);
  };

  const lines = snapLines(d, page, el);

  // One rule for the width, used by the drag AND by what gets saved — they had
  // two, and the drag's was "none". An absolutely positioned block with no
  // width shrink-to-fits to its preferred width, which for a card of prose is
  // its longest line: drag it and it stretches into a strip. Pin the width it
  // had. Skip only things genuinely wider than the page (the cover lockup is
  // full-bleed on purpose); pinning that would shove it off the edge.
  const pinW = () => {
    const prev = (shapeId ? null : layout.positions[id]) || {};
    return prev.w ?? (box.w <= PAGE_W_IN ? +box.w.toFixed(2) : undefined);
  };

  const put = (x, y, snap = true) => {
    let vx = null, hy = null;
    if (snap) {
      const sx = snapAxis(lines.xs, x, box.w);
      const sy = snapAxis(lines.ys, y, box.h);
      if (sx) { x = +sx.at.toFixed(3); vx = sx.line; }
      if (sy) { y = +sy.at.toFixed(3); hy = sy.line; }
    }
    // Clamp inside the page: .page is overflow:hidden, so "off the edge" is
    // not bleed, it is gone. Better to refuse the pixel than fail the build.
    x = Math.min(Math.max(x, 0), PAGE_W_IN - Math.min(box.w, PAGE_W_IN));
    y = Math.min(Math.max(y, 0), PAGE_H_IN - Math.min(box.h, PAGE_H_IN));
    if (shapeId) {
      const sh = layout.shapes.find(s => s.id === shapeId);
      if (sh) { sh.x = +x.toFixed(2); sh.y = +y.toFixed(2); paintShape(d, shapeId); }
    } else {
      holdPlace();
      el.style.position = 'absolute';
      el.style.left = x.toFixed(2) + 'in';
      el.style.top = y.toFixed(2) + 'in';
      const w = pinW();
      if (w) el.style.width = w + 'in';     // what the renderer will do, now
    }
    showGuides(d, page, vx, hy);
    $('stat').textContent = `${id} → ${x.toFixed(2)}in, ${y.toFixed(2)}in`
                          + (vx !== null || hy !== null ? '  · aligned' : '');
    return { x, y };
  };

  const commit = ({ x, y }) => {
    if (!shapeId) {
      const prev = layout.positions[id] || {};
      const w = pinW();
      const reserve = prev.reserve ?? (heldFlow ? +box.h.toFixed(2) : undefined);
      layout.positions[id] = { ...prev, x: +x.toFixed(2), y: +y.toFixed(2),
                              ...(w ? { w } : {}),
                              ...(reserve ? { reserve } : {}) };
    }
    clearGuides(d);
    if (spacer) spacer.classList.remove('ds-ghost');
    markDirty();
  };

  return { id, box, put, commit };
}

function startDrag(d, el, e0) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const pr = page.getBoundingClientRect();
  const rect = el.getBoundingClientRect();
  // A hidden or unlaid-out pane reports every rect as zero, and the drag would
  // then write nonsense inches into layout.json. Refuse rather than corrupt.
  if (!pr.width || (!rect.width && !el.dataset.shape)) {
    $('stat').textContent = 'cannot move that yet — the page has no layout';
    return;
  }
  pushHistory();
  const P = placer(d, el, page);
  const px = DPI * zoomOf(page);
  const grab = { x: e0.clientX, y: e0.clientY };
  const start = { x: P.box.x, y: P.box.y };
  let at = { ...start };

  el.classList.add('ds-lifted');
  d.body.classList.add('ds-grabbing');
  hideHandles(d);

  // Applied straight from the event, not via requestAnimationFrame. Browsers
  // already coalesce mousemove to the frame rate, the snap lines are computed
  // once at pick-up, and put() only writes a couple of styles — so rAF would
  // buy nothing and cost a frame of lag. It also stops firing in a hidden
  // document, which turns a drag into a silent no-op.
  const move = e => {
    at = P.put(start.x + (e.clientX - grab.x) / px,
               start.y + (e.clientY - grab.y) / px);
  };
  const up = () => {
    d.removeEventListener('mousemove', move);
    d.removeEventListener('mouseup', up);
    el.classList.remove('ds-lifted');
    el.classList.add('ds-settling');       // ~120ms ease into the snapped spot
    d.defaultView.setTimeout(() => el.classList.remove('ds-settling'), 160);
    d.body.classList.remove('ds-grabbing');
    P.commit(at);
  };
  d.addEventListener('mousemove', move);
  d.addEventListener('mouseup', up);
}

/** Keyboard drag: focus, Space to pick up, arrows to move, Space to drop. */
const held = new WeakMap();
function keyDrag(d, el, e) {
  const page = el.closest('section.page') || d.querySelector('section.page');
  const picked = held.get(el);

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!picked) {
      pushHistory();
      const P = placer(d, el, page);
      held.set(el, { P, at: { x: P.box.x, y: P.box.y } });
      el.classList.add('ds-lifted');
      $('stat').textContent = `${P.id} picked up — arrows to move, Space to drop, Esc to cancel`;
    } else {
      picked.P.commit(picked.at);
      el.classList.remove('ds-lifted');
      held.delete(el);
      $('stat').textContent = 'dropped';
    }
    return;
  }
  if (!picked) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    el.classList.remove('ds-lifted');
    held.delete(el);
    clearGuides(d);
    undo();                                  // put it back where it was
    return;
  }
  const step = e.shiftKey ? NUDGE_BIG_IN : NUDGE_IN;
  const d4 = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
               ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
  if (!d4) return;
  e.preventDefault();
  // Arrows are a deliberate placement, so they do not snap out from under you.
  picked.at = picked.P.put(picked.at.x + d4[0], picked.at.y + d4[1], false);
}

/** Live-move a shape without a full re-render, so dragging stays smooth. */
function paintShape(d, id) {
  const sh = layout.shapes.find(s => s.id === id);
  const node = d.querySelector(`[data-shape="${id}"]`);
  if (!sh || !node) return;
  if (sh.kind === 'rect') { node.setAttribute('x', sh.x); node.setAttribute('y', sh.y); }
  else if (sh.kind === 'ellipse') {
    node.setAttribute('cx', sh.x + sh.w / 2); node.setAttribute('cy', sh.y + sh.h / 2);
  } else {
    node.setAttribute('x1', sh.x); node.setAttribute('y1', sh.y);
    node.setAttribute('x2', sh.x + sh.w); node.setAttribute('y2', sh.y + sh.h);
  }
}

function markDirty() {
  dirty = source !== original
       || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
  $('save').disabled = $('revert').disabled = !dirty;
  $('save').classList.toggle('dirty', dirty);
}

$('shape').onclick = async () => {
  const kind = prompt('Shape: rect, ellipse or line', 'rect');
  if (!kind || !['rect', 'ellipse', 'line'].includes(kind)) return;
  const page = +(prompt('Which page? (1–12)', '3') || 0);
  if (!page) return;
  const fill = prompt('Fill colour (or "none")', '#E8EDE6') || 'none';
  pushHistory();
  const id = 's' + (layout.shapes.length + 1) + '-' + kind;
  layout.shapes.push({ id, page, kind, x: 1, y: 1, w: 2, h: 1, fill,
                       stroke: kind === 'line' ? '#52796F' : 'none',
                       sw: 0.02, z: -1 });
  markDirty();
  await render();
  $('stat').textContent = `${id} added to page ${page} — drag it into place`;
};

addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    e.shiftKey ? redo() : undo();
  }
});

async function boot() {
  const urls = Object.keys(FILES);
  const [pyodide, ...files] = await Promise.all([loadPyodide(), ...urls.map(get)]);
  py = pyodide;
  ['docsync', 'report2027/tools', 'report2027/data', 'report2027/manual',
   'report2027/web', 'docs/js'].forEach(d => py.FS.mkdirTree('/repo/' + d));
  py.FS.writeFile('/repo/docsync/__init__.py', '');
  urls.forEach((u, i) => py.FS.writeFile('/repo/' + FILES[u], files[i]));
  source = original = files[urls.indexOf('engine/report2027/content.md')];
  layoutOrig = files[urls.indexOf('engine/report2027/layout.json')];
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  await render();
}

async function render() {
  $('stat').textContent = 'rendering…';
  py.globals.set('SRC', source);
  py.globals.set('LAYOUT', JSON.stringify(layout, null, 2));
  let html;
  try {
    html = await py.runPythonAsync(`
import sys, os, io, runpy, contextlib
if '/repo' not in sys.path: sys.path.insert(0, '/repo')
os.environ['DOCSYNC_EDIT'] = '1'            # stamp data-slot on prose blocks
open('/repo/report2027/content.md','w').write(SRC)
open('/repo/report2027/layout.json','w').write(LAYOUT)
for m in [m for m in sys.modules if m.startswith('docsync')]: del sys.modules[m]
with contextlib.redirect_stdout(io.StringIO()):
    runpy.run_path('/repo/report2027/tools/render_report.py', run_name='__main__')
open('/repo/report2027/web/index.html').read()
`);
  } catch (e) {
    // A validation failure is the guardrail working — show it and keep the
    // source, so the edit that broke it can be fixed rather than lost.
    const tail = String(e.message || e).split('\n').filter(l => l.trim()).slice(-6).join('\n');
    $('out').srcdoc = `<pre style="color:#b00020;white-space:pre-wrap;padding:24px;
      font:12px/1.5 ui-monospace,monospace">This draft does not build:\n\n${
      tail.replace(/&/g,'&amp;').replace(/</g,'&lt;')}\n\nYour text is still here — fix it and it recovers.</pre>`;
    $('stat').textContent = 'draft does not build';
    return;
  }
  // Keep the reader's place. Assigning srcdoc reloads the iframe, which
  // scrolls to the top — after every edit, on a twelve-page report, that alone
  // made the thing miserable to use.
  const prev = $('out').contentDocument;
  const keep = prev && prev.scrollingElement ? prev.scrollingElement.scrollTop : scrollTopWas;
  scrollTopWas = keep;
  // onload before srcdoc: assigning srcdoc starts the load, so wiring the
  // handler afterwards is a race the editor loses by silently going inert.
  $('out').onload = () => {
    wire();
    const se = $('out').contentDocument.scrollingElement;
    if (se) se.scrollTop = scrollTopWas;
  };
  $('out').srcdoc = html;
  $('stat').textContent = dirty ? 'unsaved changes' : 'click any paragraph to edit it';
}

function wire() {
  const d = $('out').contentDocument;
  showLocalImages(d);
  dragify(d);
  contextify(d);
  const css = d.createElement('style');
  css.textContent = `
    [data-slot] { cursor:text; border-radius:3px; transition:background .12s;
                  outline:1px dashed transparent; outline-offset:3px; }
    [data-slot]:hover { background:#EAF3EC; outline-color:#95B7A2; }
    .ds-edit { width:100%; box-sizing:border-box; font:inherit; line-height:1.5;
               padding:8px 10px; border:2px solid #6B9E78; border-radius:4px;
               background:#fff; resize:vertical; }
    .ds-hint { font:11px system-ui; color:#52796F; margin:3px 0 10px; }
    .ds-inline { display:inline-block; width:auto; min-width:8ch; padding:1px 5px;
                 font:inherit; color:inherit; line-height:inherit; vertical-align:baseline; }
    .ds-tools { display:flex; gap:5px; align-items:center; flex-wrap:wrap;
                margin:5px 0 0; font:11px system-ui; }
    .ds-tools button { font:11px system-ui; padding:3px 9px; border:1px solid #B9C9BE;
                       background:#fff; color:#2F3E46; border-radius:4px; cursor:pointer; }
    .ds-tools button:hover { background:#6B9E78; color:#fff; border-color:#6B9E78; }
    .ds-tools-key { color:#8B9A90; margin-left:auto; font:10px ui-monospace,monospace; }
    .ds-cite { flex-basis:100%; margin-top:4px; }
    .ds-cite select { font:11px system-ui; padding:3px; max-width:100%; }
    /* The cursor is the whole affordance: a box says "grab me", the text
       inside it says "type in me". No mode to be in or forget you are in. */
    [data-el], [data-shape] { cursor:grab; }
    [data-el]:hover { outline:1px dashed #95B7A2; outline-offset:3px; }
    [data-el] [data-slot] { cursor:text; }
    [data-shape]:hover { outline:2px solid #6B9E78; }
    svg.shape-layer { pointer-events:none; }
    svg.shape-layer [data-shape] { pointer-events:auto; }
    /* Lifted: it should read as picked up off the page, not just outlined —
       elevation and a hair of scale do that faster than any border. */
    .ds-lifted { box-shadow:0 12px 32px rgba(47,62,70,.28) !important;
                 transform:scale(1.015); opacity:.96; z-index:9999 !important;
                 outline:2px solid #6B9E78 !important; outline-offset:2px; }
    /* Settling: land, don't teleport. Short enough to feel like physics. */
    .ds-settling { transition:left .13s cubic-bezier(.2,.8,.3,1),
                              top .13s cubic-bezier(.2,.8,.3,1); }
    [data-el], [data-shape] { transition:box-shadow .12s, transform .12s; }
    [data-el]:focus-visible { outline:2px solid #6B9E78; outline-offset:3px; }
    /* The ghost says where it came from while it is in the air. */
    .ds-spacer { pointer-events:none; }
    .ds-ghost { outline:1px dashed #B9C9BE; outline-offset:-2px;
                background:repeating-linear-gradient(45deg,
                  rgba(107,158,120,.06) 0 6px, transparent 6px 12px); }
    /* Alignment guides: thin, hot, and gone the moment you let go. */
    .ds-guide { position:absolute; z-index:9998; pointer-events:none; }
    .ds-guide.v { width:1px; background:#E8776B; box-shadow:0 0 0 .5px rgba(232,119,107,.35); }
    .ds-guide.h { height:1px; background:#E8776B; box-shadow:0 0 0 .5px rgba(232,119,107,.35); }
    /* Handles ride an overlay rather than living inside the element: the
       element may be static, and an absolute child would then anchor to the
       page corner instead of the box. */
    .ds-handles { position:absolute; z-index:9997; pointer-events:none;
                  outline:1px solid rgba(107,158,120,.5); }
    .ds-h { position:absolute; pointer-events:auto; background:#fff;
            border:1.5px solid #6B9E78; border-radius:2px; }
    .ds-h:hover { background:#6B9E78; }
    .ds-h-e { right:-4px; top:50%; width:7px; height:18px; margin-top:-9px; cursor:ew-resize; }
    .ds-h-s { bottom:-4px; left:50%; width:18px; height:7px; margin-left:-9px; cursor:ns-resize; }
    .ds-h-se { right:-4px; bottom:-4px; width:9px; height:9px; cursor:nwse-resize; }
    body.ds-resizing, body.ds-resizing * { cursor:inherit !important; }
    .ds-menu { position:absolute; z-index:99999; background:#fff; border:1px solid #C9D6CD;
               border-radius:6px; box-shadow:0 6px 24px rgba(47,62,70,.22); padding:4px;
               min-width:190px; font:12px system-ui; }
    .ds-menu-head { font:10px ui-monospace,monospace; color:#8B9A90; padding:4px 8px 6px; }
    .ds-menu-sep { height:1px; background:#E4EBE6; margin:4px 0; }
    .ds-menu button { display:block; width:100%; text-align:left; border:0; background:none;
                      padding:5px 8px; border-radius:4px; cursor:pointer; font:12px system-ui;
                      color:#2F3E46; }
    .ds-menu button:hover:not(:disabled) { background:#6B9E78; color:#fff; }
    .ds-menu button:disabled { color:#B4BFB7; cursor:default; }
    body.ds-grabbing, body.ds-grabbing * { cursor:grabbing !important; }
    body.ds-grabbing [data-slot] { cursor:grabbing !important; }`;
  d.head.appendChild(css);

  const seen = new Set();
  d.querySelectorAll('[data-slot]').forEach(el => {
    const key = el.dataset.slot;
    if (seen.has(key)) return;              // a slot can render several <p>s
    seen.add(key);
    el.addEventListener('click', () => edit(d, key));
  });
}

// The [[sources]] slot is the citation list: "[id]: text — url" per line. A
// footnote is a [^id] ref in prose; the renderer numbers them by first
// appearance, so inserting one never renumbers anything by hand.
const sourceIds = () => [...readSlot('sources').matchAll(/^\[([^\]]+)\]:/gm)].map(m => m[1]);
const sourceText = id => (readSlot('sources').match(
  new RegExp(`^\\[${id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\]:\\s*(.*)$`, 'm')) || [,''])[1];

function addSource(id, text, url) {
  const line = `[${id}]: ${text} — ${url}`;
  writeSlot('sources', readSlot('sources') + '\n' + line);
}

function spliceAt(el, before, after = '') {
  const s = el.selectionStart ?? el.value.length;
  const e = el.selectionEnd ?? el.value.length;
  const sel = el.value.slice(s, e);
  el.value = el.value.slice(0, s) + before + sel + after + el.value.slice(e);
  const caret = s + before.length + sel.length + after.length;
  el.setSelectionRange(caret, caret);
  el.focus();
}

function edit(d, key) {

  const blocks = [...d.querySelectorAll(`[data-slot="${key}"]`)];
  if (!blocks.length || editing) return;
  editing = true;

  const inline = blocks[0].dataset.inline === '1';
  const ta = d.createElement(inline ? 'input' : 'textarea');
  if (inline) ta.type = 'text';
  ta.className = inline ? 'ds-edit ds-inline' : 'ds-edit';
  ta.value = readSlot(key);

  let hint = null;
  if (!inline) {
    hint = d.createElement('p');
    hint.className = 'ds-hint';
    hint.textContent = `${key} — **bold**, *italic*, [text](url). Blank line = new paragraph. `
                     + `Click away to render, Esc to cancel.`;
  }

  const tools = buildTools(d, ta, key);

  blocks[0].replaceWith(ta);
  ta.after(tools);
  if (hint) tools.after(hint);
  blocks.slice(1).forEach(b => b.remove());
  // Size to the text only once layout has settled: measured any earlier the
  // box is still zero-width, so the content "wraps" into thousands of pixels.
  if (!inline) {
    const fit = () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(Math.max(ta.scrollHeight + 4, 64), 460) + 'px';
    };
    requestAnimationFrame(fit);
    ta.addEventListener('input', fit);
  }
  ta.focus();
  ta.select?.();

  const finish = async (keep) => {
    if (ta.dataset.done) return;
    ta.dataset.done = '1';
    editing = false;
    tools.remove();
    if (keep && ta.value.trim() !== readSlot(key)) {
      writeSlot(key, ta.value);
      dirty = source !== original || JSON.stringify(layout) !== JSON.stringify(JSON.parse(layoutOrig || '{}'));
      $('save').disabled = $('revert').disabled = !dirty;
      $('save').classList.toggle('dirty', dirty);
    }
    await render();
  };
  ta.addEventListener('blur', () => finish(true));
  ta.addEventListener('keydown', e => {
    if (e.key === 'Escape') { e.preventDefault(); finish(false); }
    if (e.key === 'Enter' && inline) { e.preventDefault(); finish(true); }
    if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); link(d, ta); }
  });
}

// --- persistence -----------------------------------------------------------
// The one credential: a fine-grained token, this repo only, Contents r/w. It
// lives in this browser and never leaves it except to call GitHub. Committing
// content.md is what rebuilds the site and pushes the same text to the doc.
async function gh(path, opts = {}) {
  const tok = localStorage.getItem('docsync-pat');
  const r = await fetch(`https://api.github.com/repos/${REPO}/${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json',
               ...(opts.headers || {}) },
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${(await r.text()).slice(0, 160)}`);
  return r.json();
}

/**
 * Check a token before trusting it.
 *
 * The repo endpoint reports what THIS token may do, so "valid but read-only"
 * is caught at the moment it is pasted rather than after an edit is composed.
 */
async function verifyToken(tok) {
  let r;
  try {
    r = await fetch(`https://api.github.com/repos/${REPO}`, {
      headers: { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json' },
    });
  } catch (e) {
    return 'could not reach GitHub: ' + e.message;
  }
  if (r.status === 401) return 'GitHub rejected that token (expired, or mistyped).';
  if (r.status === 404)
    return `that token cannot see ${REPO}. In the token's "Repository access", `
         + 'select this repository.';
  if (!r.ok) return `GitHub said ${r.status}.`;
  const j = await r.json();
  if (!j.permissions || !j.permissions.push)
    return 'that token can read but not write. Open it at '
         + 'github.com/settings/personal-access-tokens and set '
         + 'Permissions -> Repository permissions -> Contents -> Read and write '
         + '(Read-only is the default, and is what this looks like).';
  return '';
}

async function askToken() {
  const tok = localStorage.getItem('docsync-pat');
  if (tok) return tok;
  const entered = prompt('Paste a GitHub fine-grained token\n\n' +
    'github.com -> Settings -> Developer settings -> Fine-grained tokens\n' +
    `Repository access: only ${REPO}\n` +
    'Permissions -> Repository permissions -> Contents: Read and WRITE\n' +
    '(Contents defaults to no access; Read-only is not enough.)\n\n' +
    'Stored in this browser only.');
  if (!entered) return null;
  $('stat').textContent = 'checking the token…';
  const bad = await verifyToken(entered.trim());
  if (bad) {
    $('stat').textContent = 'token not usable: ' + bad;
    return null;                       // not stored — a bad token helps nobody
  }
  localStorage.setItem('docsync-pat', entered.trim());
  $('stat').textContent = 'token accepted';
  return entered.trim();
}

$('save').onclick = async () => {
  if (!await askToken()) return;
  $('save').disabled = true;
  $('stat').textContent = 'saving…';
  try {
    // Prose and layout are separate files, so a text edit and a move are
    // separate commits — each reviewable on its own.
    const layoutText = JSON.stringify(layout, null, 2) + '\n';
    const writes = [];
    if (source !== original)
      writes.push(['report2027/content.md', source, 'primer: edit prose from the draft editor']);
    if (layoutText !== layoutOrig)
      writes.push(['report2027/layout.json', layoutText, 'primer: move layout from the draft editor']);

    for (const [path, body, message] of writes) {
      const cur = await gh(`contents/${path}?ref=main`).catch(() => ({}));
      await gh(`contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({
          message,
          content: btoa(String.fromCharCode(...new TextEncoder().encode(body))),
          ...(cur.sha ? { sha: cur.sha } : {}), branch: 'main',
        }),
      });
    }
    original = source; layoutOrig = layoutText; dirty = false;
    $('revert').disabled = true;
    $('save').classList.remove('dirty');
    $('stat').textContent = 'saved — the site rebuilds and the doc updates in ~2 min';
  } catch (e) {
    // "Resource not accessible" means the token is valid but was minted
    // without write access — the default. Say the fix, not the status code.
    const m = String(e.message);
    const why = m.includes('not accessible')
      ? 'the token has no write access. github.com/settings/personal-access-tokens '
        + `-> your token -> Repository access: ${REPO} -> Permissions -> Contents: `
        + 'Read and write. Then press Save again.'
      : m.match(/401/) ? 'the token was rejected — it may be expired or mistyped.'
      : m;
    $('stat').textContent = 'save failed: ' + why;
    $('save').disabled = false;
    // Only discard on 401 (the token itself is bad). A 403 means the token is
    // fine but under-permissioned — discarding it just makes you paste the
    // same token again and get the same 403, forever.
    if (m.match(/401/)) localStorage.removeItem('docsync-pat');
  }
};

$('revert').onclick = async () => {
  if (!confirm('Discard your unsaved edits?')) return;
  source = original;
  layout = JSON.parse(layoutOrig || '{}');
  layout.positions = layout.positions || {};
  layout.shapes = layout.shapes || [];
  dirty = false;
  $('save').disabled = $('revert').disabled = true;
  $('save').classList.remove('dirty');
  await render();
};

addEventListener('beforeunload', e => { if (dirty) e.preventDefault(); });
boot().catch(e => { $('stat').textContent = 'failed to start: ' + e.message; });
</script>
</body>
</html>
