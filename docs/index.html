<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="HB1800 Supplemental Budget Tracker - Hawaii State Legislature">
    <title>Hawaiʻi's Budget Changes: 2026 Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600;1,6..72,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=147">
    <!-- Load Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@3.1.0"></script>
    <!-- Fallback for SPA routing -->
    <script>
        // Single Page Apps for GitHub Pages
        (function() {
            var l = window.location;
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function(v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~/g, ' ');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null, l.pathname.slice(0, -1) + (q.p || '') + (q.q ? ('?' + q.q) : '') + l.hash);
                }
            }
        })();
    </script>
    <!-- Dev-mode: ?dev in the URL reveals hidden work-in-progress tabs.
         Runs synchronously so tabs appear before first paint — no flash. -->
    <script>
        (function() {
            if (new URLSearchParams(window.location.search).has('dev')) {
                document.documentElement.setAttribute('data-dev', '');
            }
        })();
    </script>
<body>
    <div class="app-container">
        <header class="app-header">
            <a id="open-fullpage-btn" class="open-fullpage-btn" href="#" target="_blank" rel="noopener" hidden>Open ↗</a>
            <div class="app-header-inner">
                <!-- Three stacked ocean swells. Faintest at the back, strongest
                     at the front — reads as the Pacific without leaning on a
                     specific landmark. The repeating Q→T pattern produces
                     gentle, alternating crests and troughs across the mark. -->
                <svg class="app-header-mark" viewBox="0 0 96 28" fill="none" aria-hidden="true">
                    <path d="M0,6 Q12,2 24,6 T48,6 T72,6 T96,6"
                          stroke="rgba(255,255,255,0.32)"
                          stroke-width="1.4"
                          stroke-linecap="round"
                          fill="none"/>
                    <path d="M0,14 Q12,10 24,14 T48,14 T72,14 T96,14"
                          stroke="rgba(255,255,255,0.58)"
                          stroke-width="1.4"
                          stroke-linecap="round"
                          fill="none"/>
                    <path d="M0,22 Q12,18 24,22 T48,22 T72,22 T96,22"
                          stroke="rgba(255,255,255,0.90)"
                          stroke-width="1.6"
                          stroke-linecap="round"
                          fill="none"/>
                </svg>
                <h1>
                    <span class="app-header-place">Hawaiʻi</span> Budget
                    <span class="app-header-tag">Tracker</span>
                </h1>
                <p class="app-header-subtitle">FY2026–27 · Compare the Governor, House, and Senate drafts.</p>
                <nav class="main-nav">
                    <a href="#/" class="nav-link nav-link-stacked">HB1800<span class="nav-sub">2026 budget bill</span></a>
                    <a href="#/tax-calculator" class="nav-link nav-link-calc" data-dev-only="true" hidden>Where Do My Taxes Go?<span class="nav-sub">Tax calculator</span></a>
                    <a href="#/enacted" class="nav-link nav-link-hb300">HB300<span class="nav-sub">Enacted budgets, FY16–27</span></a>
                    <a href="#/about" class="nav-link">About</a>
                </nav>
            </div>
            <!-- Soft curved bottom edge — replaces the hard rectangle. SVG sits
                 flush against the bottom of the sage band and curves up into a
                 shallow arc so the content area peeks through. -->
            <svg class="app-header-curve" viewBox="0 0 1200 48" preserveAspectRatio="none" aria-hidden="true">
                <path d="M0,48 L0,18 Q300,0 600,12 T1200,18 L1200,48 Z" fill="#ffffff"/>
            </svg>
        </header>

        <main id="app">
            <!-- Content will be loaded here -->
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading budget data...</p>
            </div>
        </main>

        <footer class="app-footer">
            <p>Data Source: HB1800 Supplemental Appropriations (HD1, SD1)</p>
            <p>Last Updated: April 2026</p>
        </footer>
    </div>

    <!-- Load app and router scripts -->
    <script src="js/app.js?v=161"></script>
    <script src="js/router.js?v=18"></script>
    
    <script>
        // Show "Open ↗" button only when this page is embedded inside an
        // iframe on another site. Clicking opens the current URL (including
        // hash route) in a new tab as a full page.
        (function() {
            try {
                if (window.self !== window.top) {
                    var btn = document.getElementById('open-fullpage-btn');
                    if (btn) {
                        btn.href = window.location.href;
                        btn.hidden = false;
                        // Keep href fresh as the user navigates via hash routes
                        window.addEventListener('hashchange', function() {
                            btn.href = window.location.href;
                        });
                    }
                }
            } catch (e) { /* cross-origin access error → treat as embedded */
                var btn = document.getElementById('open-fullpage-btn');
                if (btn) { btn.href = window.location.href; btn.hidden = false; }
            }
        })();

        // Initialize the app when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing router...');
            
            // Initialize the router with our routes
            const router = new Router([
                {
                    path: '/',
                    component: draftComparePage,
                    init: initDraftComparePage
                },
                {
                    path: '/enacted',
                    component: homePage,
                    init: initHomePage
                },
                {
                    path: '/drafts',
                    component: draftComparePage,
                    init: initDraftComparePage
                },
                {
                    path: '/department/:id',
                    component: departmentDetailPage,
                    init: initDepartmentDetailPage
                },
                {
                    path: '/search',
                    component: searchPage,
                    init: initSearchPage
                },
                {
                    path: '/compare',
                    component: comparePage,
                    init: initComparePage
                },
                {
                    path: '/tax-calculator',
                    component: taxCalculatorPage,
                    init: initTaxCalculatorPage
                },
                {
                    // History is merged into the HB300 (/enacted) page.
                    // Keep the route registered as a redirect so any old
                    // bookmarks land on the new combined view.
                    path: '/history',
                    component: async () => {
                        window.location.replace('#/enacted');
                        return '';
                    }
                },
                {
                    path: '/about',
                    component: aboutPage
                },
                {
                    path: '*',
                    component: notFoundPage
                }
            ]);
            
            // Expose router for debugging
            window.router = router;
        });
    </script>
</body>
</html>
