name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare site files
        run: |
          mkdir -p _site
          cp docs/*.html _site/
          cp -r docs/css _site/
          cp -r docs/js _site/
          cp -r docs/pages _site/
          # The primer report + its in-browser draft editor. Leaving this out
          # does not fail the build — it silently 404s /primer/ on the live
          # site whenever this workflow deploys after the legacy branch build.
          cp -r docs/primer _site/
          cp .nojekyll _site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
