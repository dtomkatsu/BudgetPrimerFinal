name: Doc sync

# Keeps every binding in docsync.yml in step with its Google Doc.
#
# doc -> repo runs on a schedule: an edit in the doc reaches the site without
# anyone opening a laptop. It only ever commits content that parses and
# satisfies the report — a broken doc fails the run and changes nothing.
#
# repo -> doc runs when a push touches a bound content file, and refuses to
# overwrite a doc holding edits that were never pulled. A genuine conflict
# opens an issue rather than picking a winner.
#
# Requires the GOOGLE_SERVICE_ACCOUNT_KEY secret — see docsync/SETUP.md.

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [ main ]
    paths:
      - "**/content.md"
      - "docsync.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "pull (doc->repo), push (repo->doc), or status"
        type: choice
        options: [ status, pull, push ]
        default: status
      id:
        description: "binding id (blank = all)"
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: docsync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The push step commits back; use a token that can write.
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pyyaml google-auth

      - name: Self-test the round-trip rules
        run: python3 docsync/test_docsync.py

      # Until the secret exists the engine cannot do anything, but that is
      # "not set up yet", not a failure — a red X on every push would train
      # everyone to ignore this workflow. Say so once and stop.
      - name: Check credentials
        id: creds
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=docsync is not set up::GOOGLE_SERVICE_ACCOUNT_KEY is not set, so no sync ran. See docsync/SETUP.md."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve action
        id: what
        if: steps.creds.outputs.ready == 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "action=push" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "action=pull" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action || 'status' }}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ inputs.id }}" ]; then
            echo "id=--id ${{ inputs.id }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync
        id: sync
        if: steps.creds.outputs.ready == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          set +e
          python3 -m docsync.sync ${{ steps.what.outputs.action }} \
            ${{ steps.what.outputs.id }} | tee sync.log
          code=${PIPESTATUS[0]}
          echo "code=$code" >> "$GITHUB_OUTPUT"
          # 3 means a conflict was reported — surfaced as an issue below, not a
          # red X, since nothing is broken and nothing was lost.
          [ "$code" = "3" ] && exit 0
          exit $code

      - name: Commit what changed
        if: >-
          steps.creds.outputs.ready == 'true' &&
          (steps.what.outputs.action == 'pull' || steps.what.outputs.action == 'push')
        run: |
          git config user.name  "docsync[bot]"
          git config user.email "docsync@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "docsync: ${{ steps.what.outputs.action }} from the bound doc

          $(head -c 1500 sync.log)"
          # A scheduled pull races with human pushes; rebase rather than fail.
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}

      - name: Open an issue on conflict
        if: steps.sync.outputs.code == '3'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('sync.log', 'utf8');
            const title = 'docsync: doc and repo have diverged';
            const body = [
              'A bound Google Doc has edits the repo does not have, **and** the',
              'repo has changes the doc does not. Nothing was overwritten.',
              '',
              'To resolve, pick the side that should win:',
              '- doc wins: `make -C report2027 pull-doc`, review the diff, commit.',
              '- repo wins: `python3 -m docsync.sync push --id <id> --force`',
              '',
              '```', log.slice(0, 4000), '```',
            ].join('\n');
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'docsync-conflict',
            });
            if (open.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['docsync-conflict'],
              });
            }
